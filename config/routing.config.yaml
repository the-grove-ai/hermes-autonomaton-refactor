# ============================================================================
# routing.config.yaml — Cognitive Router tier bindings
# ============================================================================
#
# This file declares the four tiers of cognition the Autonomaton routes work
# across, and the model bound to each. Edit it to change which model handles
# which kind of work — or to point a tier at a different provider entirely.
#
# THE FOUR TIERS
#   T0  Pattern Cache      Deterministic recall from your cellar. No model
#                          call, no cost.
#   T1  Cheap Cognition    A small, fast model for quick, simple work.
#   T2  Premium Cognition  The default. Most interactions land here.
#   T3  Apex Cognition     The strongest, slowest, costliest model, for
#                          the hardest problems.
#
# CHANGING A BINDING
#   A binding is just config. To move a tier to a different model — or a
#   different provider, including a local one — edit its `provider` and
#   `model` values and restart. No code change is required; nothing here is
#   locked to one vendor.
#
# DEFAULT PROVIDER
#   The tiers below ship bound to OpenRouter — an aggregator that fronts many
#   vendors' models behind one OpenAI-compatible API (set OPENROUTER_API_KEY).
#   Each tier shows a commented direct-Anthropic alternative. Every tier, and
#   the telemetry classifier itself, is provider-agnostic — OpenRouter is the
#   default, not a requirement.
#
# OWNERSHIP
#   The Autonomaton seeds this file into ~/.grove/routing.config.yaml on
#   first run. That copy is yours. The system reads it; it cannot write to
#   it. Tier bindings change only by your hand.
# ============================================================================

routing:
  # The shape of this file. Leave it at 1.
  schema_version: 1

  # The tier used for ordinary work, when nothing routes a request
  # elsewhere.
  #
  # Sprint 54 (intent-taxonomy-v2): inverted from T2 to T1.  T1 is now
  # the floor; the classifier drives upward escalation for the
  # knowledge-work and architect intents.  Daily-driver intents
  # (memory_operation, scheduling, messaging, retrieval, summarization,
  # translation, conversation, factual_lookup) run on the cheap tier by
  # default — the economic engine of the Autonomaton Pattern (T3 pays
  # once, retrieval is forever cheap).
  default_tier: T1

  # Optional. Pin a tier for every action the zone classifier places in a
  # given zone (green / yellow / red). An empty map — the default — means
  # zones do not influence routing. Example: route every red-zone action
  # (sovereignty-boundary work) to the apex tier —
  #   zone_overrides:
  #     red: T3
  zone_overrides: {}

  # GRV-010 C2d — GOVERNED FALLBACK (optional, per tier)
  #
  #   fallback_tier: "<tier>"
  #
  # Declare this on any inference tier to opt that tier into governed downshift.
  # When the tier's bound model becomes unavailable — a connection drop, a
  # timeout, a 429, or an exhausted credential pool — the Cognitive Router
  # re-routes the turn through itself at the named fallback tier (it re-classifies
  # and re-binds; it does NOT blindly swap the model). The downshift is recorded
  # as a tier_fallback event in the session's Kaizen ledger. If the fallback tier
  # is also unavailable (or none is declared), the turn fails loud rather than
  # silently substituting an undeclared model. Example: route T2 down to T1 on
  # failure —
  #   T2:
  #     ...
  #     fallback_tier: "T1"
  # Absent (the default) keeps the tier on the legacy in-loop fallback behavior.
  #
  # ── model_facts (binding-opacity-v1 P4a) ────────────────────────────────
  # Operator-declared PHYSICS for a model, keyed by its opaque slug. A model
  # fact is true regardless of which tier binds the model, so it is declared
  # ONCE here — not per tier — and the router resolves tier -> model -> facts
  # (CognitiveRouter.model_facts_for). A model bound to two tiers therefore
  # carries ONE declaration; there is no per-tier drift.
  #
  # Consumed by the adapter and runtime. NEVER read by prompt composition (the
  # opacity guard's assertion 3 fails the build if it is) — governance does not
  # vary by binding; only mechanics do.
  #
  # model_facts is NOT a support list. An ABSENT slug is NORMAL — it safe-
  # defaults with a one-shot warning. This declares physics for the slugs a tier
  # binds; it does not enumerate "supported models." A whitelist here would be
  # the vendor-conditioning anti-pattern returning as data.
  #
  # Absence is safe and legible, never silent-wrong:
  #   context_window absent     -> 8192 floor + a one-shot loud warning
  #   native_tool_schema absent -> caller falls back to provider/base-url detect
  #   reasoning_support absent   -> false        system_message_role absent -> "system"
  #   prompt_cache_style absent  -> "none"
  #   max_output_tokens absent   -> 0 = no model ceiling; the per-tier max_tokens
  #                                 deployment budget stands unmodified
  #
  # max_output_tokens is the MODEL's hard output ceiling (physics), distinct from
  # the per-tier max_tokens deployment budget above — same split as context_window
  # (model) vs max_tokens (tier).
  #
  # native_tool_schema names the model's tool-call message dialect:
  #   chat_completions  — plain OpenAI-wire (default)
  #   anthropic_messages — native Anthropic tool blocks
  #   openai_responses   — model requires the OpenAI Responses API transport
  #                        (GPT-5.x 400s on /v1/chat/completions). Absent ->
  #                        provider/base-url auto-detect; an undeclared GPT-5
  #                        binding gets a legible 400, never a silent misroute
  #   deepseek / mimo    — thinking-mode dialects that REQUIRE reasoning_content
  #                        echoed back on every assistant tool-call turn
  # prompt_cache_style names the cache-control wire the model honours:
  #   none       — no prompt caching (default)
  #   anthropic  — honours Anthropic-style cache_control markers (Claude AND
  #                Qwen families; the native-vs-envelope LAYOUT is decided by
  #                api_mode/endpoint, not this field)
  # context_window / reasoning_support / prompt_cache_style / native_tool_schema
  # / max_output_tokens are operator-declared (R-3: declared, never inferred from
  # the name). The reference roster and its model_facts land together in P4c;
  # live values are the operator's sovereign write on the VM. One worked entry
  # below shows the shape only.
  model_facts:
    "provider/example-model-slug":     # illustrative shape only — not a bound model
      context_window: 131072
      reasoning_support: false
      native_tool_schema: chat_completions
      system_message_role: system
      prompt_cache_style: none
      max_output_tokens: 32768

  # Price figures below are May 2026 list prices. The "per average
  # interaction" estimates are rough — real cost scales with how much
  # context a request carries.
  tier_preferences:
    T0:
      handler: pattern_cache
      description: |
        Deterministic recall — answers resolved from cached patterns in
        your cellar (~/.grove/cellar/) with no model call. Instant, and
        free. As the Autonomaton learns your recurring work, more of it
        is answered here.
      max_latency_ms: 50

    T1:
      provider: openrouter
      # Direct Anthropic alternative (requires ANTHROPIC_API_KEY):
      #   provider: anthropic
      #   model: claude-haiku-4-5-20251001
      model: anthropic/claude-haiku-4.5
      description: |
        Cheap, fast cognition — a small model for quick, well-scoped
        work: classification, triage, short transformations. Also scores
        incoming requests to decide where they should run.
        Speed: fastest tier.
        Price: ~$1 / ~$5 per million input / output tokens —
        roughly $0.003 per average interaction.
      max_tokens: 4096
      # USD per million tokens. Read by the T-telemetry spend tracker in
      # grove/classify.py to compute cumulative cost without hardcoding
      # a model-specific constant. Update whenever the binding changes
      # or the provider's list price moves.
      cost_per_mtok_input: 1.0
      cost_per_mtok_output: 5.0

    Telemetry:
      provider: openrouter
      model: google/gemini-2.5-flash
      description: |
        Telemetry classifier — scores every incoming request to decide
        which tier handles it. High-volume, structured output (forced
        tool call). Bound separately from T1 so the operator can
        optimize classification and compaction independently.
        Speed: fastest tier.
        Price: ~$0.15 / ~$0.60 per million input / output tokens.
      max_tokens: 4096
      cost_per_mtok_input: 0.15
      cost_per_mtok_output: 0.60

    T-QA:
      provider: openrouter
      model: deepseek/deepseek-v4-pro
      description: |
        Quality evaluator — the fleet quality gate's judge
        (drafter-quality-checks-v1). Scores a staged draft against a
        capability record's declared rubric via one forced tool call.
        Bound separately so rebinding T1 (the dispatch floor) never
        silently changes the judge, and vice versa (the Telemetry-tier
        precedent). Requires reliable forced tool_choice; the 1M
        context comfortably holds rubric + draft.
        Price: ~$0.44 / ~$0.87 per million input / output tokens.
      max_tokens: 4096
      cost_per_mtok_input: 0.435
      cost_per_mtok_output: 0.87

    T-GA:
      provider: openrouter
      model: deepseek/deepseek-v4-pro
      description: |
        Goal-attachment adjudicator — the goal-spine detector's judge
        (goal-spine-v1 P1). Rules on whether an artifact ADVANCES a Dock
        goal (not merely mentions its topic) via one forced tool call.
        Bound separately from T-QA so rebinding the quality judge never
        silently changes the attachment judge, and vice versa (the
        Telemetry-tier precedent). Requires reliable forced tool_choice.
        Price: ~$0.44 / ~$0.87 per million input / output tokens.
      max_tokens: 4096
      cost_per_mtok_input: 0.435
      cost_per_mtok_output: 0.87

    T2:
      provider: openrouter
      # Direct Anthropic alternative (requires ANTHROPIC_API_KEY):
      #   provider: anthropic
      #   model: claude-sonnet-4-6
      model: anthropic/claude-sonnet-4.6
      description: |
        Premium cognition — the default for most of your work: real
        reasoning, code, analysis, drafting. The balance of capability
        and cost most interactions should run on.
        Speed: fast.
        Price: ~$3 / ~$15 per million input / output tokens —
        roughly $0.02 per average interaction.
      max_tokens: 8192
      cost_per_mtok_input: 3.0
      cost_per_mtok_output: 15.0

    # ----- LOCAL BINDING — run T2 on-device with Ollama -------------------
    # The T2 block above runs on a cloud model. To make the daily driver
    # local — most interactions on-device, at zero marginal cost — install
    # Ollama, pull a model, and replace the T2 block above with this one:
    #
    #   T2:
    #     provider: ollama
    #     model: gemma4
    #     description: |
    #       Daily driver. Most interactions run on-device at zero marginal
    #       cost. Gemma 4 (Apache 2.0-licensed, large context) handles
    #       drafting, analysis, code, and conversation. The GPU serves the
    #       operator; the API bill drops to near-zero for routine work.
    #     max_tokens: 8192
    #
    # The endpoint defaults to http://localhost:11434/v1. For Ollama on a
    # different host or port, set OLLAMA_BASE_URL in the environment — the
    # tier block carries no base_url field of its own.
    #
    # Telemetry runs on its own dedicated tier (routing.telemetry.tier).
    # It is independent of T1 — rebinding T1 does not affect classification,
    # and rebinding Telemetry does not affect compaction or agent dispatch.
    # Both require reliable forced tool_choice from the bound model.
    #
    # Full walkthrough: docs/guides/local-tier-binding.md
    # ---------------------------------------------------------------------

    T3:
      provider: openrouter
      # Direct Anthropic alternative (requires ANTHROPIC_API_KEY):
      #   provider: anthropic
      #   model: claude-opus-4-6
      model: anthropic/claude-opus-4.6   # 4.6, not 4.7 — predictable tokenization
      description: |
        Apex cognition — the strongest model, for the hardest problems:
        multi-step planning, novel synthesis, architecture-level
        reasoning. Slower and several times costlier than T2, so it is
        used sparingly, only when the work needs it.
        Speed: slowest tier.
        Price: ~$5 / ~$25 per million input / output tokens —
        roughly $0.08 per average interaction, about four times the
        cost of a T2 interaction.
      max_tokens: 16384
      cost_per_mtok_input: 5.0
      cost_per_mtok_output: 25.0
      # skill-adoption-v1 P3 — governed downshift (GRV-010 C2d). When T3's model
      # is unreachable (network / 5xx / 429 / exhausted credentials), the turn
      # re-routes THROUGH the Cognitive Router at T2 and re-drives, rather than
      # failing loud. The downshift is surfaced LEGIBLY to the operator (a
      # conversational note naming T3 -> T2); it is never silent.
      fallback_tier: T2

  escalation:
    threshold: 0.6
    description: |
      A confidence dial from 0.0 to 1.0. When the Autonomaton is less
      than this sure it has picked the right tier for a request, it
      moves the request up a tier rather than risk a weak answer on a
      cheaper model. Raise it toward 1.0 to escalate more readily —
      better answers, higher cost. Lower it to hold work on cheaper
      tiers — lower cost, more risk of a thin answer.

  # ----------------------------------------------------------------------
  # Declarative routing rules. After operator overrides (--tier / --model)
  # are checked, each ENABLED rule below is tested in FILE ORDER — first
  # match wins — against the telemetry classifier's read of the request
  # (intent_class + complexity_signal). If none match, the request runs on
  # default_tier (T1). Order rules most-specific-first when they overlap;
  # the four rules below are DISJOINT (each covered intent×complexity cell
  # maps to exactly one rule), so their order is immaterial.
  #
  # routing-favor-t2-v1 (operator-authored): favor Premium Cognition
  # (T2 / Sonnet) as the home of knowledge work; reserve Apex (T3 / Opus)
  # for the hardest cases. Coding is CONSERVATIVE — code_generation and
  # debugging stay on T2 through ``complex``, escalating to T3 only at
  # ``novel``; the other knowledge intents (research, analysis,
  # creative_writing, planning, system_admin) escalate to T3 at ``complex``.
  # Daily-driver intents (conversation, factual_lookup, retrieval,
  # summarization, translation, scheduling, messaging, memory_operation)
  # are named in no rule and fall through to the T1 floor. escalation
  # step_up is DISABLED: the partition is total over the covered intents, so
  # there is no uncovered combo for a low-confidence step_up to act on.
  #
  # This is the dial that makes routing yours: change an intent list, a
  # complexity set, a target_tier, or an `enabled` flag and the Autonomaton
  # routes differently on the next request. No code change.
  # ----------------------------------------------------------------------
  routing_rules:

    # Coding — Premium (T2) through complex; Apex (T3) reserved for novel.
    premium_coding:
      enabled: true
      match:
        complexity: [simple, moderate, complex]
        intents: [code_generation, debugging]
      target_tier: T2

    apex_coding:
      enabled: true
      match:
        complexity: [novel]
        intents: [code_generation, debugging]
      target_tier: T3

    # Other knowledge work — Premium (T2) at simple/moderate; Apex (T3) at
    # complex/novel.
    premium:
      enabled: true
      match:
        complexity: [simple, moderate]
        intents: [research, analysis, creative_writing, planning, system_admin]
      target_tier: T2

    apex:
      enabled: true
      match:
        complexity: [complex, novel]
        intents: [research, analysis, creative_writing, planning, system_admin]
      target_tier: T3

    # Disabled — the partition above is total over the covered intents, so
    # there is no uncovered combo to step up. Kept as an explicit
    # ``enabled: false`` declaration rather than relying on the parser's
    # synthesized-when-absent backward-compat.
    escalation:
      enabled: false

  telemetry:
    tier: Telemetry
    description: |
      Which tier scores incoming requests — judging what kind of work
      each one is, and how confident that judgment is. T1 is the natural
      home: the scoring is fast, high-volume, well-scoped work, and a
      cheap model keeps the overhead negligible.

  # ────────────────────────────────────────────────────────────────────────
  # PROVIDER ROUTING (openrouter-zero-retention-routing-v1)
  # ────────────────────────────────────────────────────────────────────────
  # Operator-owned OpenRouter request shaping, passed through VERBATIM to every
  # OpenRouter call's `provider` field (agent turns, telemetry classifier, wiki
  # compaction). The code never names a provider — edit this block to change
  # routing, no code change. (The autonomaton can edit it on request.)
  #
  #   order            — preferred providers, in order. NAMES the fast provider
  #                      (DeepInfra) so we get its latency; without it, `deny`
  #                      alone routes to any zero-retention provider.
  #   data_collection  — `deny` = only providers that DON'T retain/train on
  #                      prompts. The privacy floor, applied to order AND
  #                      fallbacks. A hard filter: a model with no deny-compliant
  #                      endpoint 404s (loud) rather than leaking to a retainer.
  #   allow_fallbacks  — if none of `order` serve a model, use other eligible
  #                      (deny-compliant) providers instead of failing.
  #
  # Any other OpenRouter provider field (only / ignore / sort / quantizations /
  # future knobs) added here flows through unchanged. Remove the block to disable.
  provider_routing:
    openrouter:
      order: [DeepInfra]
      allow_fallbacks: true
      data_collection: deny

  # ────────────────────────────────────────────────────────────────────────
  # ESCALATION POLICY (Sprint 30 — escalation-signal-v1)
  # ────────────────────────────────────────────────────────────────────────
  # Distinct from routing_rules.escalation above. That block is the
  # confidence-driven step-up the classifier triggers when it's
  # uncertain. THIS block is the Agent-driven escalation: the LLM calls
  # the synthetic `escalate(reasoning_depth, context_size, blocker)`
  # tool when it genuinely needs more capacity; the Dispatcher applies
  # this policy to decide grant vs. deny.
  #
  # Default state: enabled=false. Vanilla installs auto-deny every
  # escalate call (the synthetic tool is still in the LLM's surface,
  # but nothing escalates without operator opt-in).
  #
  # When enabled, the policy is deterministic and silent: no operator
  # prompt, no Kaizen halt. Auto-grant within budget+ceiling; auto-deny
  # above. Both paths log to the Kaizen Ledger as escalation_decision
  # events so the operator can audit grants/denies after the fact.
  #
  # Per GRV-005 § III: the Agent declares WHAT it needs (reasoning_depth
  # mapped to a tier here). The Dispatcher decides HOW. The Agent never
  # dictates infrastructure.
  escalation_policy:
    enabled: false
    # Hard cap per turn — second escalate call in the same turn auto-
    # denies regardless of budget.
    max_escalations_per_turn: 1
    # Soft budget across a session. Hits the deny path once exhausted.
    max_escalations_per_session: 5
    # Never escalate above this tier — even if the Agent asks for apex.
    ceiling_tier: T3
    # Reserved for v0.2 — distinguishes auto-grant tiers from operator-
    # confirmation-required tiers. v0.1 treats any grant within ceiling
    # as auto-grant.
    auto_grant_above_tier: T3
    # Map the declarative reasoning_depth the Agent emits to a concrete
    # tier from tier_preferences above. Edit to tune which depth lands
    # on which tier; the Agent's vocabulary stays declarative.
    mapping:
      shallow:  T1
      moderate: T2
      deep:     T3
      apex:     T3

    # ── Pre-route (Sprint 30.1 post-completion patch) ─────────────────
    # Classifier-driven pre-routing for hard turns. Distinct from
    # routing_rules.escalation above (Sprint 12 step_up; bumps one
    # tier on low classifier confidence regardless of complexity).
    #
    # pre_route jumps STRAIGHT to mapping[target_depth] when:
    #   complexity_signal in complexity_triggers AND
    #   confidence < confidence_threshold
    #
    # The two are complementary:
    #   step_up:   "classifier isn't sure" → one tier bump
    #   pre_route: "this is genuinely hard" → jump to deep
    #
    # When both would trigger on the same turn, pre_route wins (the
    # router enforces precedence). enabled defaults to the parent
    # escalation_policy.enabled, so flipping the parent on enables
    # pre-routing by default. Set pre_route.enabled: false to keep
    # the Agent-driven escalation path (synthetic tool) without the
    # classifier-driven pre-route.
    pre_route:
      enabled: false
      complexity_triggers: [complex, novel]
      confidence_threshold: 0.6
      # Key into escalation_policy.mapping above.
      target_depth: deep


# ═════════════════════════════════════════════════════════════════════════
# tier_budgets — the per-tier prefill governor
# (Sprint 73, declarative-jit-budget-v1)
# ═════════════════════════════════════════════════════════════════════════
# THE BUDGET, IN ONE PLACE. For each cognition tier this declares what the
# autonomaton loads into the prompt BEFORE the model runs: which heavy
# *context blocks* compose. It is the Cognitive Router applied to the prompt
# itself — load the minimum a tier needs; keep the apex tier eager.
#
# TOOL EXPOSURE IS NOT A BUDGET KEY. The tools.allow_groups dual-gate is retired
# (web-surface-admission-fix, Option B): per-tier tool exposure is governed
# SOLELY by each Capability record's tier_rule.eligible (config/capabilities/*),
# applied by the offered-surface builder and enforced by the execution seam. A
# tool loads on tier T iff T is in its record's tier_rule.eligible. Re-tiering a
# tool is a one-line edit to that record's eligible list. (A leftover tools:
# block in an old/sovereign copy of this file is silently ignored.)
#
# context — an allow-list over the GATEABLE heavy blocks only:
#     claude_contract   the CLAUDE.md contract        (~4.5K)
#     skills_index      the promoted-skills index      (~2.8K)
#     cellar_context    the wiki-cellar BM25 retrieval (K6; per-tier ceiling
#                       via cellar_context_ceiling, default 1500)
#   (K6 D1 retired goal_record — Dock goals now serve via cellar_context.)
#   The always-on baseline (identity, environment, platform, register, the
#   Tier-0 routing manifest) is NEVER listed — it always composes. A block
#   absent from a tier's list is gated OFF for that tier.
#
# cellar_context_ceiling — per-tier token budget the cellar_context block fills
#   when admitted (K6, A-D3 ruling). Optional scalar; omit ⇒ 1500 default.
#
# FAIL LOUD (no silent full-load): every provider-backed tier in
# tier_preferences above MUST have an entry here, with known block names, or the
# config raises at load. Non-inference tiers (the T0 pattern cache) take no
# entry — they have no prefill to govern.
tier_budgets:

  T3:                       # Apex Cognition — unbounded window, eager.
    context: [claude_contract, skills_index, cellar_context, skill_payload]
    cellar_context_ceiling: 2000
    skill_payload_ceiling: 3000   # skill-adoption-v1 C2 — primary-skill payload

  T2:                       # Premium Cognition — the prefill-budgeted path.
    context: [cellar_context, skill_payload]  # claude_contract + skills_index gated OFF
    cellar_context_ceiling: 1500
    skill_payload_ceiling: 3000   # skill-adoption-v1 C2 — primary-skill payload

  T1:                       # Cheap Cognition — the floor. Minimal prefill.
    context: [cellar_context]  # K6 (A-D3): minimal but non-zero cellar grounding
    cellar_context_ceiling: 1000   # skill_payload NOT admitted at T1 (lean floor)

  Telemetry:                # Classifier tier — a forced-tool classification call
    context: []             # that composes no agent prefill, so no heavy blocks
                            # (exact-cover D7: provider-backed tier needs an entry)

  T-QA:                     # Quality-evaluator tier — a forced-tool verdict call
    context: []             # that composes no agent prefill, so no heavy blocks
                            # (exact-cover D7: provider-backed tier needs an entry)

  T-GA:                     # Goal-attachment adjudicator — a forced-tool verdict
    context: []             # call that composes no agent prefill, so no heavy
                            # blocks (exact-cover D7: provider-backed tier needs
                            # an entry)


# ─────────────────────────────────────────────────────────────────────────
# pattern_cache — T0 Pattern Compiler (Sprint 48)
# ─────────────────────────────────────────────────────────────────────────
# T0 is the deterministic Pattern Cache: a query asked enough times, with a
# stable enough result, retires from inference to a compiled cache entry that
# returns with NO model call. The compiler scans the Flywheel evidence
# (~/.grove/intent_records.jsonl), groups by a conservative normalized key,
# and PROPOSES promotions the operator approves. The system never self-promotes.
#
# These thresholds gate candidacy. Precision-first: tight bars, broaden later.
pattern_cache:
  enabled: true

  # Intent classes excluded from T0 candidacy. system_admin is where OAuth
  # redirect-callback noise lands (it repeats but is not a real query pattern);
  # unknown is classification failure; conversation is small-talk with no
  # tool and no stable answer (it phrases differently every turn) — it would
  # only ever drop, so the compiler stays focused on data and action queries
  # (Sprint 56 Fix #4).
  exclude_intents: [unknown, system_admin, conversation]

  promotion:
    # Same normalized pattern seen at least this many times.
    min_repetitions: 5
    # All repetitions clustered within this many days (recency + density).
    within_days: 14
    # Maximum correction signals on the pattern. Zero: any correction
    # disqualifies it (a corrected pattern is not stable).
    max_rejections: 0
    # Static patterns only: the captured responses must be identical across
    # the evidence. Zero variance — if responses differ, the pattern is not
    # safely static-cacheable and is not promoted.
    max_response_variance: 0


# ─────────────────────────────────────────────────────────────────────────
# goal_attachment — goal-spine detector (goal-spine-v1 P1)
# ─────────────────────────────────────────────────────────────────────────
# The off-path goal-attachment detector: scans artifact_written ledger
# events, prefilters against Dock goal projection pages (Stage 1), and asks
# the adjudicator tier whether each candidate artifact ADVANCES the matched
# goal (Stage 2). P1 is dry-run only — a manual entry point that prints a
# report; no proposal, no ledger event. Read by
# grove.dock.attachment.load_goal_attachment_config (the pattern_cache
# section-loader precedent; operator copy wins over this repo default).
goal_attachment:
  # The adjudicator tier, resolved BY NAME through call_t1(tier=...) — the
  # T-QA quality-gate pattern. Must name a tier declared in tier_preferences
  # above (an unknown tier raises KeyError at call time, never a fallback).
  adjudicator_tier: T-GA

  # Stage 2 promotion cap per run — the maximum number of Stage-1 candidates
  # sent to the adjudicator in one detector run. Bounds LLM spend.
  stage2_candidate_cap: 5

  # Stage 1 retrieval depth — top-k dock_goal projection pages consulted per
  # artifact when scoring goal relevance.
  prefilter_top_k: 3

  # P2 — character cap on the adjudication excerpt stored in the
  # artifact_goal_attached ledger event. Provenance must survive approval,
  # but the ledger must not bloat. Truncation is visible in the stored
  # event (excerpt_truncated + excerpt_full_chars), never silent.
  excerpt_cap_chars: 600
