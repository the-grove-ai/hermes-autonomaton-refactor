# ══════════════════════════════════════════════════════════════════════
# THE DOCK — Mylo's Strategic Compass
# ══════════════════════════════════════════════════════════════════════
#
# Operator: Jim Calhoun
# System: Mylo (Hermes Autonomaton, grove-autonomaton)
# Updated: 2026-06-07
#
# Purpose: The Dock holds the operator's strategic goals so each
# conversation turn can identify the relevant vector, load context,
# unlock skills, and surface opportunities to compound progress.
#
# Lodestar: "Design is philosophy expressed through constraint."
#
# North Star: The Autonomaton is a seismic inversion of computer
# science. Classical CS = deterministic execution against implementer
# code. Autonomaton = accumulated context and judgment at the sovereign
# node — declarative, human-readable. The owner drives the system
# toward destinations only their experience and soil generate.
# Variance between nodes IS the point.
#
# ══════════════════════════════════════════════════════════════════════

version: "1.0"
operator: jim-calhoun
system_name: mylo
home: ~/.grove/

# ──────────────────────────────────────────────────────────────────────
# GOAL TAXONOMY
# ──────────────────────────────────────────────────────────────────────
#
# Vectors:
#   apex_strategic  — Singular forcing function. Everything feeds this.
#   strategic       — Direct contributors to the apex goal.
#   operational     — Recurring execution rhythms.
#   product         — Discrete deliverables with ship dates.
#   personal        — Non-Grove life management.
#
# Status:
#   accelerating    — Active focus, consuming daily attention.
#   cruising        — In motion, needs periodic check-ins.
#   staging         — Defined but not yet started.
#   blocked         — Waiting on a dependency.
#   parked          — Intentionally paused.
#
# ──────────────────────────────────────────────────────────────────────

