# ─────────────────────────────────────────────────────────────────────────────
# config/fleet_workers.yaml — Fleet Background-Worker OPERATIONAL registry
#
# background-worker-runtime-v1 (Fleet Background-Worker EPIC, Sprint 1).
#
# LAYER: OPERATIONAL only — WHEN and HOW-MUCH a worker runs. The STRUCTURAL
# contract (zone / trigger / bindings / tier_rule / read_surfaces / declared
# staging sink / governance) lives in the worker's CAPABILITY RECORD at
# config/capabilities/<skill-record-id>.yaml, NOT here. The layers do not cross:
# no zone, no read surface, no skill I/O shape ever appears in this file.
#
# The in-gateway cron ticker reads this registry each tick, evaluates each
# enabled worker's input_state predicate, and — when work exists — spawns a
# short-lived worker PROCESS that runs the pinned skill (resolved from `skill`)
# via the Dispatcher, drafts into the record's Yellow pending_review sink, writes
# a terminal-state event, and exits. The operator publish tap is the sole
# external-write gate.
#
# A worker is defined by (a) its operational entry here and (b) its capability
# record. The runtime never hard-codes a skill — it reads `skill` and loads the
# record. This file ships with NO seeded worker; the first worker (forge) is
# added in Phase 4 with enabled: false.
# ─────────────────────────────────────────────────────────────────────────────

workers:
  # First worker (background-worker-runtime-v1 Phase 4). enabled: false until the
  # Phase-5 smoke authorizes it; the ticker skips a disabled worker entirely.
  - id: forge
    skill: skill.fleet.forge-jobsearch   # capability-record id (read_surfaces: [corpus_file])
    enabled: true
    cadence: "*/30 * * * *"               # at most one spawn per 30 min
    input_state:
      type: notion_query
      data_source: 5eb5630d-42ae-4a7f-8eee-8b04f0e96eaa   # Job Opportunities DB
      filter:
        Status: "To Apply"
      # Phase-4 single-unit selection (generic — the resolver reads these keys;
      # no skill name or per-skill logic in the resolver). skip_already_staged
      # drops rows whose row_id already has a draft in the worker's staging_dir;
      # order_by ranks the remainder; select_one yields exactly ONE per dispatch.
      select_one: true
      skip_already_staged: true
      order_by:                            # deterministic ranking + stable tiebreak
        - field: "Fit Score"
          direction: desc                  # highest fit first
        - field: id                        # Notion page id — stable tiebreak
          direction: asc
    budget:
      per_run_tokens: 120000
      daily_tokens: 600000
    limits:
      wall_clock_secs: 900               # REQUIRED — absolute group-kill timeout
      mem_mb: 1536                        # RLIMIT_AS VA ceiling (headroom over RSS)
      fsize_mb: 64                        # per-file cap (drafts are small markdown)
      nofile: 512
    quiet_hours:
      start: "22:00"
      end: "07:00"

  # fleet-review-unification-v1 C1b-2 — the file producers become real workers. Each
  # consumes an upstream fleet SINK dir via the file_source resolver; the unit_id is
  # the stable semantic slug from the source filename (timestamps stripped), so an
  # upstream refresh continues the same unit. An empty/absent source dir is a graceful
  # no-op (the upstream producer may not run yet). Conservative daily cadence.
  - id: drafter
    skill: skill.fleet.drafter            # capability-record id (canonical_dir: drafter)
    enabled: true
    cadence: "0 8 * * *"                   # once daily (08:00), work-gated
    input_state:
      type: file_source
      source_dir: researcher              # ~/.grove/researcher/ — Researcher briefs
      pattern: "brief-*.json"
      slug_regex: '^brief-\d{4}-\d{2}-\d{2}-(.+)\.json$'   # unit_id = topic slug, date stripped
      select_one: true
      skip_already_staged: true
    budget:
      per_run_tokens: 120000
      daily_tokens: 400000
    limits:
      wall_clock_secs: 900
      mem_mb: 1536
      fsize_mb: 64
      nofile: 512
    quiet_hours:
      start: "22:00"
      end: "07:00"

  - id: cultivator
    skill: skill.fleet.cultivator         # capability-record id (canonical_dir: cultivator)
    enabled: true
    cadence: "0 8 * * *"                   # once daily (08:00), work-gated
    input_state:
      type: file_source
      source_dir: scout                   # ~/.grove/scout/ — Scout digests
      pattern: "digest-*.json"
      slug_regex: '^digest-(\d{4}-\d{2}-\d{2})\.json$'     # unit_id = digest date (no topic slug)
      select_one: true
      skip_already_staged: true
    budget:
      per_run_tokens: 120000
      daily_tokens: 400000
    limits:
      wall_clock_secs: 900
      mem_mb: 1536
      fsize_mb: 64
      nofile: 512
    quiet_hours:
      start: "22:00"
      end: "07:00"

# ── Worker entry schema (commented template — copy an entry, uncomment, fill) ─
#
# workers:
#   - id: <slug>                     # unique worker id; also the isolation key
#                                    #   (~/.grove/fleet/<id>/ session db + pid file).
#     skill: <capability-record-id>  # e.g. skill.fleet.forge-jobsearch — the `id:`
#                                    #   of a config/capabilities/*.yaml record. The
#                                    #   runtime loads THIS record for zone /
#                                    #   read_surfaces / declared sink. Fail-loud if
#                                    #   the id resolves to no record.
#     enabled: false                 # master switch. false = ticker skips entirely.
#
#     cadence: "*/30 * * * *"        # 5-field cron expression — the MINIMUM spacing
#                                    #   between spawns. A tick spawns only when the
#                                    #   cadence is due AND input_state reports work.
#
#     input_state:                   # work-detection predicate, dispatched on `type`.
#       type: notion_query           #   notion_query | file_glob | ...  (resolvers are
#                                    #   generic; add types as workers require them).
#       # --- notion_query fields (read via the gateway's WARM MCP session) ---
#       data_source: <collection-id> # Notion data source / collection to query.
#       filter:                      # equality predicate over row properties.
#         Status: "To Apply"
#       # --- file_glob fields (alternative predicate type) ---
#       # root: <dir>                # directory to scan.
#       # glob: "*.md"               # filename pattern; presence of a match = work.
#
#     budget:                        # token ceilings — fail-loud when exceeded.
#       per_run_tokens: 60000        # hard cap for a single worker run.
#       daily_tokens: 400000         # rolling 24h cap across all runs of this worker.
#
#     limits:                        # OS resource ceilings enforced on the process.
#       wall_clock_secs: 900         # REQUIRED. absolute timeout; the process
#                                    #   GROUP is killed (no unbounded workers).
#       mem_mb: 1024                 # RLIMIT_AS VIRTUAL-address-space ceiling — NOT
#                                    #   an RSS target. Allocator arenas / mmap count
#                                    #   against it, so leave headroom over real RSS.
#       fsize_mb: 256                # per-file write cap (RLIMIT_FSIZE). Default 256.
#       nofile: 512                  # open-fd cap (RLIMIT_NOFILE). Default 512.
#       nice: 5                      # scheduling niceness (os.nice increment).
#
#     quiet_hours:                   # local-time window during which the worker never
#       start: "22:00"               #   spawns (operator rest / cost control). Omit the
#       end: "07:00"                 #   whole block for a 24h worker.
# ─────────────────────────────────────────────────────────────────────────────
