  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: teams-meeting-pipeline\n\
    description: \"Operate the Teams meeting summary pipeline via Hermes CLI \u2014\
    \ summarize meetings, inspect pipeline status, replay jobs, manage Microsoft Graph\
    \ subscriptions.\"\nversion: 1.1.0\nauthor: Hermes Agent + Teknium\nlicense: MIT\n\
    prerequisites:\n  env_vars: [MSGRAPH_TENANT_ID, MSGRAPH_CLIENT_ID, MSGRAPH_CLIENT_SECRET]\n\
    \  commands: [hermes]\nmetadata:\n  hermes:\n    tags: [Teams, Microsoft Graph,\
    \ Meetings, Productivity, Operations]\n    related_docs:\n      - /docs/guides/microsoft-graph-app-registration\n\
    \      - /docs/user-guide/messaging/teams-meetings\n      - /docs/guides/operate-teams-meeting-pipeline\n\
    ---\n\n# Teams Meeting Pipeline\n\nUse this skill whenever the user asks about\
    \ Microsoft Teams meeting summaries, transcripts, recordings, action items, Graph\
    \ subscriptions, or any operational question about the Teams meeting pipeline.\
    \ Works in any language \u2014 the triggers below are examples, not an exhaustive\
    \ list.\n\nEverything operator-facing is a `hermes teams-pipeline` subcommand\
    \ run via the terminal tool. There are no new model tools for this pipeline \u2014\
    \ the CLI is the surface.\n\n## When to use this skill\n\nThe user is asking to:\n\
    - summarize a Teams meeting / extract action items / pull meeting notes\n- check\
    \ pipeline status, inspect a stored meeting job, or see recent meetings\n- replay\
    \ / re-run a stored job that failed or needs a fresh summary\n- validate Microsoft\
    \ Graph setup after changing env or config\n- troubleshoot \"meeting summary never\
    \ arrived\" or \"no new meetings are ingesting\"\n- manage Graph webhook subscriptions\
    \ (create, renew, delete, inspect)\n- set up automated subscription renewal (see\
    \ pitfall below)\n\nMultilingual trigger examples (not exhaustive):\n- English:\
    \ \"summarize the Teams meeting\", \"pipeline status\", \"replay job X\"\n- Turkish:\
    \ \"Teams meeting \xF6zetle\", \"action item \xE7\u0131kar\", \"toplant\u0131\
    \ notu\", \"pipeline durumu\", \"replay job\"\n\n## Prerequisites\n\nBefore using\
    \ the pipeline, verify these are set in `~/.hermes/.env`:\n\n```bash\nMSGRAPH_TENANT_ID=...\n\
    MSGRAPH_CLIENT_ID=...\nMSGRAPH_CLIENT_SECRET=...\n```\n\nIf any are missing, direct\
    \ the user to the Azure app registration guide at `/docs/guides/microsoft-graph-app-registration`\
    \ \u2014 they need an Azure AD app registration with admin-consented Graph application\
    \ permissions before the pipeline will work.\n\n## Command reference\n\n### Status\
    \ and inspection (start here)\n\n```bash\nhermes teams-pipeline validate     \
    \         # config snapshot \u2014 run first after any change\nhermes teams-pipeline\
    \ token-health          # Graph token status\nhermes teams-pipeline token-health\
    \ --force-refresh   # force a fresh token acquisition\nhermes teams-pipeline list\
    \                  # recent meeting jobs\nhermes teams-pipeline list --status\
    \ failed  # only failed jobs\nhermes teams-pipeline show <job-id>         # full\
    \ detail of one job\nhermes teams-pipeline subscriptions         # current Graph\
    \ webhook subscriptions\n```\n\n### Re-running / debugging\n\n```bash\nhermes\
    \ teams-pipeline run <job-id>          # replay a stored job (re-summarize, re-deliver)\n\
    hermes teams-pipeline fetch --meeting-id <id>   # dry-run: resolve meeting + transcript\
    \ without persisting\nhermes teams-pipeline fetch --join-web-url \"<url>\"   #\
    \ dry-run by join URL\n```\n\n### Subscription management\n\n```bash\nhermes teams-pipeline\
    \ subscribe \\\n  --resource communications/onlineMeetings/getAllTranscripts \\\
    \n  --notification-url https://<your-public-host>/msgraph/webhook \\\n  --client-state\
    \ \"$MSGRAPH_WEBHOOK_CLIENT_STATE\"\n\nhermes teams-pipeline renew-subscription\
    \ <sub-id> --expiration <iso-8601>\nhermes teams-pipeline delete-subscription\
    \ <sub-id>\nhermes teams-pipeline maintain-subscriptions            # renew near-expiry\
    \ ones\nhermes teams-pipeline maintain-subscriptions --dry-run  # show what would\
    \ be renewed\n```\n\n## Decision tree for common asks\n\n- User asks \"why didn't\
    \ I get a summary for today's meeting?\" \u2192 start with `list --status failed`,\
    \ then `show <job-id>` on the relevant row. If the job doesn't exist at all, check\
    \ `subscriptions` \u2014 the webhook may have expired (see pitfall below).\n-\
    \ User asks \"is setup working?\" \u2192 `validate`, then `token-health`, then\
    \ `subscriptions`. If all three pass, request a test meeting and check `list`\
    \ for a fresh row.\n- User asks \"re-run summary for meeting X\" \u2192 `list`\
    \ to find the job ID, `run <job-id>` to replay. If it fails again, `show <job-id>`\
    \ to inspect the error and `fetch --meeting-id` to dry-run the artifact resolution.\n\
    - User asks \"add meeting X to the pipeline\" \u2192 usually you don't \u2014\
    \ the pipeline is subscription-driven, not per-meeting. If they want a specific\
    \ past meeting summarized, use `fetch` to pull transcript + `run` after a job\
    \ is created.\n\n## Critical pitfall: Graph subscriptions expire in 72 hours\n\
    \nMicrosoft Graph caps webhook subscriptions at 72 hours and **will not auto-renew\
    \ them**. If `maintain-subscriptions` is not scheduled, meeting notifications\
    \ silently stop arriving 3 days after any manual subscription creation.\n\nWhen\
    \ the user reports \"the pipeline worked yesterday but nothing is arriving today\"\
    :\n1. Run `hermes teams-pipeline subscriptions` \u2014 if it's empty or all entries\
    \ show `expirationDateTime` in the past, that's the cause.\n2. Recreate with `subscribe`\
    \ as shown above.\n3. **Set up automated renewal immediately** via `hermes cron\
    \ add`, a systemd timer, or plain crontab. The operator runbook at `/docs/guides/operate-teams-meeting-pipeline#automating-subscription-renewal-required-for-production`\
    \ has all three options. 12-hour interval is safe (6x headroom against the 72h\
    \ limit).\n\n## Other pitfalls\n\n- **Transcript not available yet.** Teams takes\
    \ some time after a meeting ends to generate the transcript artifact. `fetch --meeting-id`\
    \ on a just-ended meeting may return empty. Wait 2-5 minutes and retry, or let\
    \ the Graph webhook drive ingestion naturally.\n- **Delivery mode mismatch.**\
    \ If summaries are produced (`list` shows success) but nothing lands in Teams,\
    \ check `platforms.teams.extra.delivery_mode` and the matching target config (`incoming_webhook_url`\
    \ OR `chat_id` OR `team_id`+`channel_id`). The writer reads these from config.yaml\
    \ or `TEAMS_*` env vars.\n- **Graph app permissions.** A token acquires cleanly\
    \ (`token-health` passes) but Graph API calls return 401/403 when permissions\
    \ were added but admin consent wasn't re-granted. Have the user revisit the app\
    \ registration in the Azure portal and click \"Grant admin consent\" again.\n\n\
    ## Related docs\n\nPoint the user to these when they need more depth than this\
    \ skill covers:\n- Azure app registration walkthrough: `/docs/guides/microsoft-graph-app-registration`\n\
    - Full pipeline setup: `/docs/user-guide/messaging/teams-meetings`\n- Operator\
    \ runbook (renewal automation, troubleshooting, go-live checklist): `/docs/guides/operate-teams-meeting-pipeline`\n\
    - Webhook listener setup: `/docs/user-guide/messaging/msgraph-webhook`\n"
