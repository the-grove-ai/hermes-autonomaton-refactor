  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: ascii-art\ndescription:\
    \ \"ASCII art: pyfiglet, cowsay, boxes, image-to-ascii.\"\nversion: 4.0.0\nauthor:\
    \ 0xbyt4, Hermes Agent\nlicense: MIT\ndependencies: []\nplatforms: [linux, macos,\
    \ windows]\nmetadata:\n  hermes:\n    tags: [ASCII, Art, Banners, Creative, Unicode,\
    \ Text-Art, pyfiglet, figlet, cowsay, boxes]\n    related_skills: [excalidraw]\n\
    \n---\n\n# ASCII Art Skill\n\nMultiple tools for different ASCII art needs. All\
    \ tools are local CLI programs or free REST APIs \u2014 no API keys required.\n\
    \n## Tool 1: Text Banners (pyfiglet \u2014 local)\n\nRender text as large ASCII\
    \ art banners. 571 built-in fonts.\n\n### Setup\n\n```bash\npip install pyfiglet\
    \ --break-system-packages -q\n```\n\n### Usage\n\n```bash\npython3 -m pyfiglet\
    \ \"YOUR TEXT\" -f slant\npython3 -m pyfiglet \"TEXT\" -f doom -w 80    # Set\
    \ width\npython3 -m pyfiglet --list_fonts             # List all 571 fonts\n```\n\
    \n### Recommended fonts\n\n| Style | Font | Best for |\n|-------|------|----------|\n\
    | Clean & modern | `slant` | Project names, headers |\n| Bold & blocky | `doom`\
    \ | Titles, logos |\n| Big & readable | `big` | Banners |\n| Classic banner |\
    \ `banner3` | Wide displays |\n| Compact | `small` | Subtitles |\n| Cyberpunk\
    \ | `cyberlarge` | Tech themes |\n| 3D effect | `3-d` | Splash screens |\n| Gothic\
    \ | `gothic` | Dramatic text |\n\n### Tips\n\n- Preview 2-3 fonts and let the\
    \ user pick their favorite\n- Short text (1-8 chars) works best with detailed\
    \ fonts like `doom` or `block`\n- Long text works better with compact fonts like\
    \ `small` or `mini`\n\n## Tool 2: Text Banners (asciified API \u2014 remote, no\
    \ install)\n\nFree REST API that converts text to ASCII art. 250+ FIGlet fonts.\
    \ Returns plain text directly \u2014 no parsing needed. Use this when pyfiglet\
    \ is not installed or as a quick alternative.\n\n### Usage (via terminal curl)\n\
    \n```bash\n# Basic text banner (default font)\ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello+World\"\
    \n\n# With a specific font\ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello&font=Slant\"\
    \ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello&font=Doom\"\
    \ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello&font=Star+Wars\"\
    \ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello&font=3-D\"\n\
    curl -s \"https://asciified.thelicato.io/api/v2/ascii?text=Hello&font=Banner3\"\
    \n\n# List all available fonts (returns JSON array)\ncurl -s \"https://asciified.thelicato.io/api/v2/fonts\"\
    \n```\n\n### Tips\n\n- URL-encode spaces as `+` in the text parameter\n- The response\
    \ is plain text ASCII art \u2014 no JSON wrapping, ready to display\n- Font names\
    \ are case-sensitive; use the fonts endpoint to get exact names\n- Works from\
    \ any terminal with curl \u2014 no Python or pip needed\n\n## Tool 3: Cowsay (Message\
    \ Art)\n\nClassic tool that wraps text in a speech bubble with an ASCII character.\n\
    \n### Setup\n\n```bash\nsudo apt install cowsay -y    # Debian/Ubuntu\n# brew\
    \ install cowsay         # macOS\n```\n\n### Usage\n\n```bash\ncowsay \"Hello\
    \ World\"\ncowsay -f tux \"Linux rules\"       # Tux the penguin\ncowsay -f dragon\
    \ \"Rawr!\"          # Dragon\ncowsay -f stegosaurus \"Roar!\"     # Stegosaurus\n\
    cowthink \"Hmm...\"                  # Thought bubble\ncowsay -l             \
    \             # List all characters\n```\n\n### Available characters (50+)\n\n\
    `beavis.zen`, `bong`, `bunny`, `cheese`, `daemon`, `default`, `dragon`,\n`dragon-and-cow`,\
    \ `elephant`, `eyes`, `flaming-skull`, `ghostbusters`,\n`hellokitty`, `kiss`,\
    \ `kitty`, `koala`, `luke-koala`, `mech-and-cow`,\n`meow`, `moofasa`, `moose`,\
    \ `ren`, `sheep`, `skeleton`, `small`,\n`stegosaurus`, `stimpy`, `supermilker`,\
    \ `surgery`, `three-eyes`,\n`turkey`, `turtle`, `tux`, `udder`, `vader`, `vader-koala`,\
    \ `www`\n\n### Eye/tongue modifiers\n\n```bash\ncowsay -b \"Borg\"       # =_=\
    \ eyes\ncowsay -d \"Dead\"       # x_x eyes\ncowsay -g \"Greedy\"     # $_$ eyes\n\
    cowsay -p \"Paranoid\"   # @_@ eyes\ncowsay -s \"Stoned\"     # *_* eyes\ncowsay\
    \ -w \"Wired\"      # O_O eyes\ncowsay -e \"OO\" \"Msg\"   # Custom eyes\ncowsay\
    \ -T \"U \" \"Msg\"   # Custom tongue\n```\n\n## Tool 4: Boxes (Decorative Borders)\n\
    \nDraw decorative ASCII art borders/frames around any text. 70+ built-in designs.\n\
    \n### Setup\n\n```bash\nsudo apt install boxes -y    # Debian/Ubuntu\n# brew install\
    \ boxes         # macOS\n```\n\n### Usage\n\n```bash\necho \"Hello World\" | boxes\
    \                    # Default box\necho \"Hello World\" | boxes -d stone    \
    \       # Stone border\necho \"Hello World\" | boxes -d parchment       # Parchment\
    \ scroll\necho \"Hello World\" | boxes -d cat             # Cat border\necho \"\
    Hello World\" | boxes -d dog             # Dog border\necho \"Hello World\" |\
    \ boxes -d unicornsay      # Unicorn\necho \"Hello World\" | boxes -d diamonds\
    \        # Diamond pattern\necho \"Hello World\" | boxes -d c-cmt           #\
    \ C-style comment\necho \"Hello World\" | boxes -d html-cmt        # HTML comment\n\
    echo \"Hello World\" | boxes -a c               # Center text\nboxes -l      \
    \                                 # List all 70+ designs\n```\n\n### Combine with\
    \ pyfiglet or asciified\n\n```bash\npython3 -m pyfiglet \"HERMES\" -f slant |\
    \ boxes -d stone\n# Or without pyfiglet installed:\ncurl -s \"https://asciified.thelicato.io/api/v2/ascii?text=HERMES&font=Slant\"\
    \ | boxes -d stone\n```\n\n## Tool 5: TOIlet (Colored Text Art)\n\nLike pyfiglet\
    \ but with ANSI color effects and visual filters. Great for terminal eye candy.\n\
    \n### Setup\n\n```bash\nsudo apt install toilet toilet-fonts -y    # Debian/Ubuntu\n\
    # brew install toilet                      # macOS\n```\n\n### Usage\n\n```bash\n\
    toilet \"Hello World\"                    # Basic text art\ntoilet -f bigmono12\
    \ \"Hello\"            # Specific font\ntoilet --gay \"Rainbow!\"            \
    \     # Rainbow coloring\ntoilet --metal \"Metal!\"                 # Metallic\
    \ effect\ntoilet -F border \"Bordered\"             # Add border\ntoilet -F border\
    \ --gay \"Fancy!\"         # Combined effects\ntoilet -f pagga \"Block\"     \
    \            # Block-style font (unique to toilet)\ntoilet -F list           \
    \               # List available filters\n```\n\n### Filters\n\n`crop`, `gay`\
    \ (rainbow), `metal`, `flip`, `flop`, `180`, `left`, `right`, `border`\n\n**Note**:\
    \ toilet outputs ANSI escape codes for colors \u2014 works in terminals but may\
    \ not render in all contexts (e.g., plain text files, some chat platforms).\n\n\
    ## Tool 6: Image to ASCII Art\n\nConvert images (PNG, JPEG, GIF, WEBP) to ASCII\
    \ art.\n\n### Option A: ascii-image-converter (recommended, modern)\n\n```bash\n\
    # Install\nsudo snap install ascii-image-converter\n# OR: go install github.com/TheZoraiz/ascii-image-converter@latest\n\
    ```\n\n```bash\nascii-image-converter image.png                  # Basic\nascii-image-converter\
    \ image.png -C               # Color output\nascii-image-converter image.png -d\
    \ 60,30         # Set dimensions\nascii-image-converter image.png -b         \
    \      # Braille characters\nascii-image-converter image.png -n              \
    \ # Negative/inverted\nascii-image-converter https://url/image.jpg      # Direct\
    \ URL\nascii-image-converter image.png --save-txt out   # Save as text\n```\n\n\
    ### Option B: jp2a (lightweight, JPEG only)\n\n```bash\nsudo apt install jp2a\
    \ -y\njp2a --width=80 image.jpg\njp2a --colors image.jpg              # Colorized\n\
    ```\n\n## Tool 7: Search Pre-Made ASCII Art\n\nSearch curated ASCII art from the\
    \ web. Use `terminal` with `curl`.\n\n### Source A: ascii.co.uk (recommended for\
    \ pre-made art)\n\nLarge collection of classic ASCII art organized by subject.\
    \ Art is inside HTML `<pre>` tags. Fetch the page with curl, then extract art\
    \ with a small Python snippet.\n\n**URL pattern:** `https://ascii.co.uk/art/{subject}`\n\
    \n**Step 1 \u2014 Fetch the page:**\n\n```bash\ncurl -s 'https://ascii.co.uk/art/cat'\
    \ -o /tmp/ascii_art.html\n```\n\n**Step 2 \u2014 Extract art from pre tags:**\n\
    \n```python\nimport re, html\nwith open('/tmp/ascii_art.html') as f:\n    text\
    \ = f.read()\narts = re.findall(r'<pre[^>]*>(.*?)</pre>', text, re.DOTALL)\nfor\
    \ art in arts:\n    clean = re.sub(r'<[^>]+>', '', art)\n    clean = html.unescape(clean).strip()\n\
    \    if len(clean) > 30:\n        print(clean)\n        print('\\n---\\n')\n```\n\
    \n**Available subjects** (use as URL path):\n- Animals: `cat`, `dog`, `horse`,\
    \ `bird`, `fish`, `dragon`, `snake`, `rabbit`, `elephant`, `dolphin`, `butterfly`,\
    \ `owl`, `wolf`, `bear`, `penguin`, `turtle`\n- Objects: `car`, `ship`, `airplane`,\
    \ `rocket`, `guitar`, `computer`, `coffee`, `beer`, `cake`, `house`, `castle`,\
    \ `sword`, `crown`, `key`\n- Nature: `tree`, `flower`, `sun`, `moon`, `star`,\
    \ `mountain`, `ocean`, `rainbow`\n- Characters: `skull`, `robot`, `angel`, `wizard`,\
    \ `pirate`, `ninja`, `alien`\n- Holidays: `christmas`, `halloween`, `valentine`\n\
    \n**Tips:**\n- Preserve artist signatures/initials \u2014 important etiquette\n\
    - Multiple art pieces per page \u2014 pick the best one for the user\n- Works\
    \ reliably via curl, no JavaScript needed\n\n### Source B: GitHub Octocat API\
    \ (fun easter egg)\n\nReturns a random GitHub Octocat with a wise quote. No auth\
    \ needed.\n\n```bash\ncurl -s https://api.github.com/octocat\n```\n\n## Tool 8:\
    \ Fun ASCII Utilities (via curl)\n\nThese free services return ASCII art directly\
    \ \u2014 great for fun extras.\n\n### QR Codes as ASCII Art\n\n```bash\ncurl -s\
    \ \"qrenco.de/Hello+World\"\ncurl -s \"qrenco.de/https://example.com\"\n```\n\n\
    ### Weather as ASCII Art\n\n```bash\ncurl -s \"wttr.in/London\"          # Full\
    \ weather report with ASCII graphics\ncurl -s \"wttr.in/Moon\"            # Moon\
    \ phase in ASCII art\ncurl -s \"v2.wttr.in/London\"       # Detailed version\n\
    ```\n\n## Tool 9: LLM-Generated Custom Art (Fallback)\n\nWhen tools above don't\
    \ have what's needed, generate ASCII art directly using these Unicode characters:\n\
    \n### Character Palette\n\n**Box Drawing:** `\u2554 \u2557 \u255A \u255D \u2551\
    \ \u2550 \u2560 \u2563 \u2566 \u2569 \u256C \u250C \u2510 \u2514 \u2518 \u2502\
    \ \u2500 \u251C \u2524 \u252C \u2534 \u253C \u256D \u256E \u2570 \u256F`\n\n**Block\
    \ Elements:** `\u2591 \u2592 \u2593 \u2588 \u2584 \u2580 \u258C \u2590 \u2596\
    \ \u2597 \u2598 \u259D \u259A \u259E`\n\n**Geometric & Symbols:** `\u25C6 \u25C7\
    \ \u25C8 \u25CF \u25CB \u25C9 \u25A0 \u25A1 \u25B2 \u25B3 \u25BC \u25BD \u2605\
    \ \u2606 \u2726 \u2727 \u25C0 \u25B6 \u25C1 \u25B7 \u2B21 \u2B22 \u2302`\n\n###\
    \ Rules\n\n- Max width: 60 characters per line (terminal-safe)\n- Max height:\
    \ 15 lines for banners, 25 for scenes\n- Monospace only: output must render correctly\
    \ in fixed-width fonts\n\n## Decision Flow\n\n1. **Text as a banner** \u2192 pyfiglet\
    \ if installed, otherwise asciified API via curl\n2. **Wrap a message in fun character\
    \ art** \u2192 cowsay\n3. **Add decorative border/frame** \u2192 boxes (can combine\
    \ with pyfiglet/asciified)\n4. **Art of a specific thing** (cat, rocket, dragon)\
    \ \u2192 ascii.co.uk via curl + parsing\n5. **Convert an image to ASCII** \u2192\
    \ ascii-image-converter or jp2a\n6. **QR code** \u2192 qrenco.de via curl\n7.\
    \ **Weather/moon art** \u2192 wttr.in via curl\n8. **Something custom/creative**\
    \ \u2192 LLM generation with Unicode palette\n9. **Any tool not installed** \u2192\
    \ install it, or fall back to next option\n"
