  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: serving-llms-vllm\n\
    description: \"vLLM: high-throughput LLM serving, OpenAI API, quantization.\"\n\
    version: 1.0.0\nauthor: Orchestra Research\nlicense: MIT\ndependencies: [vllm,\
    \ torch, transformers]\nplatforms: [linux, macos]\nmetadata:\n  hermes:\n    tags:\
    \ [vLLM, Inference Serving, PagedAttention, Continuous Batching, High Throughput,\
    \ Production, OpenAI API, Quantization, Tensor Parallelism]\n\n---\n\n# vLLM -\
    \ High-Performance LLM Serving\n\n## When to use\n\nUse when deploying production\
    \ LLM APIs, optimizing inference latency/throughput, or serving models with limited\
    \ GPU memory. Supports OpenAI-compatible endpoints, quantization (GPTQ/AWQ/FP8),\
    \ and tensor parallelism.\n\n## Quick start\n\nvLLM achieves 24x higher throughput\
    \ than standard transformers through PagedAttention (block-based KV cache) and\
    \ continuous batching (mixing prefill/decode requests).\n\n**Installation**:\n\
    ```bash\npip install vllm\n```\n\n**Basic offline inference**:\n```python\nfrom\
    \ vllm import LLM, SamplingParams\n\nllm = LLM(model=\"meta-llama/Llama-3-8B-Instruct\"\
    )\nsampling = SamplingParams(temperature=0.7, max_tokens=256)\n\noutputs = llm.generate([\"\
    Explain quantum computing\"], sampling)\nprint(outputs[0].outputs[0].text)\n```\n\
    \n**OpenAI-compatible server**:\n```bash\nvllm serve meta-llama/Llama-3-8B-Instruct\n\
    \n# Query with OpenAI SDK\npython -c \"\nfrom openai import OpenAI\nclient = OpenAI(base_url='http://localhost:8000/v1',\
    \ api_key='EMPTY')\nprint(client.chat.completions.create(\n    model='meta-llama/Llama-3-8B-Instruct',\n\
    \    messages=[{'role': 'user', 'content': 'Hello!'}]\n).choices[0].message.content)\n\
    \"\n```\n\n## Common workflows\n\n### Workflow 1: Production API deployment\n\n\
    Copy this checklist and track progress:\n\n```\nDeployment Progress:\n- [ ] Step\
    \ 1: Configure server settings\n- [ ] Step 2: Test with limited traffic\n- [ ]\
    \ Step 3: Enable monitoring\n- [ ] Step 4: Deploy to production\n- [ ] Step 5:\
    \ Verify performance metrics\n```\n\n**Step 1: Configure server settings**\n\n\
    Choose configuration based on your model size:\n\n```bash\n# For 7B-13B models\
    \ on single GPU\nvllm serve meta-llama/Llama-3-8B-Instruct \\\n  --gpu-memory-utilization\
    \ 0.9 \\\n  --max-model-len 8192 \\\n  --port 8000\n\n# For 30B-70B models with\
    \ tensor parallelism\nvllm serve meta-llama/Llama-2-70b-hf \\\n  --tensor-parallel-size\
    \ 4 \\\n  --gpu-memory-utilization 0.9 \\\n  --quantization awq \\\n  --port 8000\n\
    \n# For production with caching and metrics\nvllm serve meta-llama/Llama-3-8B-Instruct\
    \ \\\n  --gpu-memory-utilization 0.9 \\\n  --enable-prefix-caching \\\n  --enable-metrics\
    \ \\\n  --metrics-port 9090 \\\n  --port 8000 \\\n  --host 0.0.0.0\n```\n\n**Step\
    \ 2: Test with limited traffic**\n\nRun load test before production:\n\n```bash\n\
    # Install load testing tool\npip install locust\n\n# Create test_load.py with\
    \ sample requests\n# Run: locust -f test_load.py --host http://localhost:8000\n\
    ```\n\nVerify TTFT (time to first token) < 500ms and throughput > 100 req/sec.\n\
    \n**Step 3: Enable monitoring**\n\nvLLM exposes Prometheus metrics on port 9090:\n\
    \n```bash\ncurl http://localhost:9090/metrics | grep vllm\n```\n\nKey metrics\
    \ to monitor:\n- `vllm:time_to_first_token_seconds` - Latency\n- `vllm:num_requests_running`\
    \ - Active requests\n- `vllm:gpu_cache_usage_perc` - KV cache utilization\n\n\
    **Step 4: Deploy to production**\n\nUse Docker for consistent deployment:\n\n\
    ```bash\n# Run vLLM in Docker\ndocker run --gpus all -p 8000:8000 \\\n  vllm/vllm-openai:latest\
    \ \\\n  --model meta-llama/Llama-3-8B-Instruct \\\n  --gpu-memory-utilization\
    \ 0.9 \\\n  --enable-prefix-caching\n```\n\n**Step 5: Verify performance metrics**\n\
    \nCheck that deployment meets targets:\n- TTFT < 500ms (for short prompts)\n-\
    \ Throughput > target req/sec\n- GPU utilization > 80%\n- No OOM errors in logs\n\
    \n### Workflow 2: Offline batch inference\n\nFor processing large datasets without\
    \ server overhead.\n\nCopy this checklist:\n\n```\nBatch Processing:\n- [ ] Step\
    \ 1: Prepare input data\n- [ ] Step 2: Configure LLM engine\n- [ ] Step 3: Run\
    \ batch inference\n- [ ] Step 4: Process results\n```\n\n**Step 1: Prepare input\
    \ data**\n\n```python\n# Load prompts from file\nprompts = []\nwith open(\"prompts.txt\"\
    ) as f:\n    prompts = [line.strip() for line in f]\n\nprint(f\"Loaded {len(prompts)}\
    \ prompts\")\n```\n\n**Step 2: Configure LLM engine**\n\n```python\nfrom vllm\
    \ import LLM, SamplingParams\n\nllm = LLM(\n    model=\"meta-llama/Llama-3-8B-Instruct\"\
    ,\n    tensor_parallel_size=2,  # Use 2 GPUs\n    gpu_memory_utilization=0.9,\n\
    \    max_model_len=4096\n)\n\nsampling = SamplingParams(\n    temperature=0.7,\n\
    \    top_p=0.95,\n    max_tokens=512,\n    stop=[\"</s>\", \"\\n\\n\"]\n)\n```\n\
    \n**Step 3: Run batch inference**\n\nvLLM automatically batches requests for efficiency:\n\
    \n```python\n# Process all prompts in one call\noutputs = llm.generate(prompts,\
    \ sampling)\n\n# vLLM handles batching internally\n# No need to manually chunk\
    \ prompts\n```\n\n**Step 4: Process results**\n\n```python\n# Extract generated\
    \ text\nresults = []\nfor output in outputs:\n    prompt = output.prompt\n   \
    \ generated = output.outputs[0].text\n    results.append({\n        \"prompt\"\
    : prompt,\n        \"generated\": generated,\n        \"tokens\": len(output.outputs[0].token_ids)\n\
    \    })\n\n# Save to file\nimport json\nwith open(\"results.jsonl\", \"w\") as\
    \ f:\n    for result in results:\n        f.write(json.dumps(result) + \"\\n\"\
    )\n\nprint(f\"Processed {len(results)} prompts\")\n```\n\n### Workflow 3: Quantized\
    \ model serving\n\nFit large models in limited GPU memory.\n\n```\nQuantization\
    \ Setup:\n- [ ] Step 1: Choose quantization method\n- [ ] Step 2: Find or create\
    \ quantized model\n- [ ] Step 3: Launch with quantization flag\n- [ ] Step 4:\
    \ Verify accuracy\n```\n\n**Step 1: Choose quantization method**\n\n- **AWQ**:\
    \ Best for 70B models, minimal accuracy loss\n- **GPTQ**: Wide model support,\
    \ good compression\n- **FP8**: Fastest on H100 GPUs\n\n**Step 2: Find or create\
    \ quantized model**\n\nUse pre-quantized models from HuggingFace:\n\n```bash\n\
    # Search for AWQ models\n# Example: TheBloke/Llama-2-70B-AWQ\n```\n\n**Step 3:\
    \ Launch with quantization flag**\n\n```bash\n# Using pre-quantized model\nvllm\
    \ serve TheBloke/Llama-2-70B-AWQ \\\n  --quantization awq \\\n  --tensor-parallel-size\
    \ 1 \\\n  --gpu-memory-utilization 0.95\n\n# Results: 70B model in ~40GB VRAM\n\
    ```\n\n**Step 4: Verify accuracy**\n\nTest outputs match expected quality:\n\n\
    ```python\n# Compare quantized vs non-quantized responses\n# Verify task-specific\
    \ performance unchanged\n```\n\n## When to use vs alternatives\n\n**Use vLLM when:**\n\
    - Deploying production LLM APIs (100+ req/sec)\n- Serving OpenAI-compatible endpoints\n\
    - Limited GPU memory but need large models\n- Multi-user applications (chatbots,\
    \ assistants)\n- Need low latency with high throughput\n\n**Use alternatives instead:**\n\
    - **llama.cpp**: CPU/edge inference, single-user\n- **HuggingFace transformers**:\
    \ Research, prototyping, one-off generation\n- **TensorRT-LLM**: NVIDIA-only,\
    \ need absolute maximum performance\n- **Text-Generation-Inference**: Already\
    \ in HuggingFace ecosystem\n\n## Common issues\n\n**Issue: Out of memory during\
    \ model loading**\n\nReduce memory usage:\n```bash\nvllm serve MODEL \\\n  --gpu-memory-utilization\
    \ 0.7 \\\n  --max-model-len 4096\n```\n\nOr use quantization:\n```bash\nvllm serve\
    \ MODEL --quantization awq\n```\n\n**Issue: Slow first token (TTFT > 1 second)**\n\
    \nEnable prefix caching for repeated prompts:\n```bash\nvllm serve MODEL --enable-prefix-caching\n\
    ```\n\nFor long prompts, enable chunked prefill:\n```bash\nvllm serve MODEL --enable-chunked-prefill\n\
    ```\n\n**Issue: Model not found error**\n\nUse `--trust-remote-code` for custom\
    \ models:\n```bash\nvllm serve MODEL --trust-remote-code\n```\n\n**Issue: Low\
    \ throughput (<50 req/sec)**\n\nIncrease concurrent sequences:\n```bash\nvllm\
    \ serve MODEL --max-num-seqs 512\n```\n\nCheck GPU utilization with `nvidia-smi`\
    \ - should be >80%.\n\n**Issue: Inference slower than expected**\n\nVerify tensor\
    \ parallelism uses power of 2 GPUs:\n```bash\nvllm serve MODEL --tensor-parallel-size\
    \ 4  # Not 3\n```\n\nEnable speculative decoding for faster generation:\n```bash\n\
    vllm serve MODEL --speculative-model DRAFT_MODEL\n```\n\n## Advanced topics\n\n\
    **Server deployment patterns**: See [references/server-deployment.md](references/server-deployment.md)\
    \ for Docker, Kubernetes, and load balancing configurations.\n\n**Performance\
    \ optimization**: See [references/optimization.md](references/optimization.md)\
    \ for PagedAttention tuning, continuous batching details, and benchmark results.\n\
    \n**Quantization guide**: See [references/quantization.md](references/quantization.md)\
    \ for AWQ/GPTQ/FP8 setup, model preparation, and accuracy comparisons.\n\n**Troubleshooting**:\
    \ See [references/troubleshooting.md](references/troubleshooting.md) for detailed\
    \ error messages, debugging steps, and performance diagnostics.\n\n## Hardware\
    \ requirements\n\n- **Small models (7B-13B)**: 1x A10 (24GB) or A100 (40GB)\n\
    - **Medium models (30B-40B)**: 2x A100 (40GB) with tensor parallelism\n- **Large\
    \ models (70B+)**: 4x A100 (40GB) or 2x A100 (80GB), use AWQ/GPTQ\n\nSupported\
    \ platforms: NVIDIA (primary), AMD ROCm, Intel GPUs, TPUs\n\n## Resources\n\n\
    - Official docs: https://docs.vllm.ai\n- GitHub: https://github.com/vllm-project/vllm\n\
    - Paper: \"Efficient Memory Management for Large Language Model Serving with PagedAttention\"\
    \ (SOSP 2023)\n- Community: https://discuss.vllm.ai\n\n\n\n"
