    \ \u2014 confirmed April 2026).\nContext-aware (knows selected OP, current network).\n\
    Hub health check: `GET http://localhost:40404/mcp` returns JSON with instance\
    \ PID, project name, TD version.\n\n## Setup (Automated)\n\nRun the setup script\
    \ to handle everything:\n\n```bash\nbash \"${HERMES_HOME:-$HOME/.hermes}/skills/creative/touchdesigner-mcp/scripts/setup.sh\"\
    \n```\n\nThe script will:\n1. Check if TD is running\n2. Download twozero.tox\
    \ if not already cached\n3. Add `twozero_td` MCP server to Hermes config (if missing)\n\
    4. Test the MCP connection on port 40404\n5. Report what manual steps remain (drag\
    \ .tox into TD, enable MCP toggle)\n\n### Manual steps (one-time, cannot be automated)\n\
    \n1. **Drag `~/Downloads/twozero.tox` into the TD network editor** \u2192 click\
    \ Install\n2. **Enable MCP:** click twozero icon \u2192 Settings \u2192 mcp \u2192\
    \ \"auto start MCP\" \u2192 Yes\n3. **Restart Hermes session** to pick up the\
    \ new MCP server\n\nAfter setup, verify:\n```bash\nnc -z 127.0.0.1 40404 && echo\
    \ \"twozero MCP: READY\"\n```\n\n## Environment Notes\n\n- **Non-Commercial TD**\
    \ caps resolution at 1280\xD71280. Use `outputresolution = 'custom'` and set width/height\
    \ explicitly.\n- **Codecs:** `prores` (preferred on macOS) or `mjpa` as fallback.\
    \ H.264/H.265/AV1 require a Commercial license.\n- Always call `td_get_par_info`\
    \ before setting params \u2014 names vary by TD version (see CRITICAL RULES #1).\n\
    \n## Workflow\n\n### Step 0: Discover (before building anything)\n\n```\nCall\
    \ td_get_par_info with op_type for each type you plan to use.\nCall td_get_hints\
    \ with the topic you're building (e.g. \"glsl\", \"audio reactive\", \"feedback\"\
    ).\nCall td_get_focus to see where the user is and what's selected.\nCall td_get_network\
    \ to see what already exists.\n```\n\nNo temp nodes, no cleanup. This replaces\
    \ the old discovery dance entirely.\n\n### Step 1: Clean + Build\n\n**IMPORTANT:\
    \ Split cleanup and creation into SEPARATE MCP calls.** Destroying and recreating\
    \ same-named nodes in one `td_execute_python` script causes \"Invalid OP object\"\
    \ errors. See pitfalls #11b.\n\nUse `td_create_operator` for each node (handles\
    \ viewport positioning automatically):\n\n```\ntd_create_operator(type=\"noiseTOP\"\
    , parent=\"/project1\", name=\"bg\", parameters={\"resolutionw\": 1280, \"resolutionh\"\
    : 720})\ntd_create_operator(type=\"levelTOP\", parent=\"/project1\", name=\"brightness\"\
    )\ntd_create_operator(type=\"nullTOP\", parent=\"/project1\", name=\"out\")\n\
    ```\n\nFor bulk creation or wiring, use `td_execute_python`:\n\n```python\n# td_execute_python\
    \ script:\nroot = op('/project1')\nnodes = []\nfor name, optype in [('bg', noiseTOP),\
    \ ('fx', levelTOP), ('out', nullTOP)]:\n    n = root.create(optype, name)\n  \
    \  nodes.append(n.path)\n# Wire chain\nfor i in range(len(nodes)-1):\n    op(nodes[i]).outputConnectors[0].connect(op(nodes[i+1]).inputConnectors[0])\n\
    result = {'created': nodes}\n```\n\n### Step 2: Set Parameters\n\nPrefer the native\
    \ tool (validates params, won't crash):\n\n```\ntd_set_operator_pars(path=\"/project1/bg\"\
    , parameters={\"roughness\": 0.6, \"monochrome\": true})\n```\n\nFor expressions\
    \ or modes, use `td_execute_python`:\n\n```python\nop('/project1/time_driver').par.colorr.expr\
    \ = \"absTime.seconds % 1000.0\"\n```\n\n### Step 3: Wire\n\nUse `td_execute_python`\
    \ \u2014 no native wire tool exists:\n\n```python\nop('/project1/bg').outputConnectors[0].connect(op('/project1/fx').inputConnectors[0])\n\
    ```\n\n### Step 4: Verify\n\n```\ntd_get_errors(path=\"/project1\", recursive=true)\n\
    td_get_perf()\ntd_get_operator_info(path=\"/project1/out\", detail=\"full\")\n\
    ```\n\n### Step 5: Display / Capture\n\n```\ntd_get_screenshot(path=\"/project1/out\"\
    )\n```\n\nOr open a window via script:\n\n```python\nwin = op('/project1').create(windowCOMP,\
    \ 'display')\nwin.par.winop = op('/project1/out').path\nwin.par.winw = 1280; win.par.winh\
    \ = 720\nwin.par.winopen.pulse()\n```\n\n## MCP Tool Quick Reference\n\n**Core\
    \ (use these most):**\n| Tool | What |\n|------|------|\n| `td_execute_python`\
    \ | Run arbitrary Python in TD. Full API access. |\n| `td_create_operator` | Create\
    \ node with params + auto-positioning |\n| `td_set_operator_pars` | Set params\
    \ safely (validates, won't crash) |\n| `td_get_operator_info` | Inspect one node:\
    \ connections, params, errors |\n| `td_get_operators_info` | Inspect multiple\
    \ nodes in one call |\n| `td_get_network` | See network structure at a path |\n\
    | `td_get_errors` | Find errors/warnings recursively |\n| `td_get_par_info` |\
    \ Get param names for an OP type (replaces discovery) |\n| `td_get_hints` | Get\
    \ patterns/tips before building |\n| `td_get_focus` | What network is open, what's\
    \ selected |\n\n**Read/Write:**\n| Tool | What |\n|------|------|\n| `td_read_dat`\
    \ | Read DAT text content |\n| `td_write_dat` | Write/patch DAT content |\n| `td_read_chop`\
    \ | Read CHOP channel values |\n| `td_read_textport` | Read TD console output\
    \ |\n\n**Visual:**\n| Tool | What |\n|------|------|\n| `td_get_screenshot` |\
    \ Capture one OP viewer to file |\n| `td_get_screenshots` | Capture multiple OPs\
    \ at once |\n| `td_get_screen_screenshot` | Capture actual screen via TD |\n|\
    \ `td_navigate_to` | Jump network editor to an OP |\n\n**Search:**\n| Tool | What\
    \ |\n|------|------|\n| `td_find_op` | Find ops by name/type across project |\n\
    | `td_search` | Search code, expressions, string params |\n\n**System:**\n| Tool\
    \ | What |\n|------|------|\n| `td_get_perf` | Performance profiling (FPS, slow\
    \ ops) |\n| `td_list_instances` | List all running TD instances |\n| `td_get_docs`\
    \ | In-depth docs on a TD topic |\n| `td_agents_md` | Read/write per-COMP markdown\
    \ docs |\n| `td_reinit_extension` | Reload extension after code edit |\n| `td_clear_textport`\
    \ | Clear console before debug session |\n\n**Input Automation:**\n| Tool | What\
    \ |\n|------|------|\n| `td_input_execute` | Send mouse/keyboard to TD |\n| `td_input_status`\
    \ | Poll input queue status |\n| `td_input_clear` | Stop input automation |\n\
    | `td_op_screen_rect` | Get screen coords of a node |\n| `td_click_screen_point`\
    \ | Click a point in a screenshot |\n| `td_screen_point_to_global` | Convert screenshot\
    \ pixel to absolute screen coords |\n\nThe table above covers the 32 tools used\
    \ in typical creative workflows. The remaining 4 tools (`td_project_quit`, `td_test_session`,\
    \ `td_dev_log`, `td_clear_dev_log`) are admin/dev-mode utilities \u2014 see `references/mcp-tools.md`\
    \ for the full 36-tool reference with complete parameter schemas.\n\n## Key Implementation\
    \ Rules\n\n**GLSL time:** No `uTDCurrentTime` in GLSL TOP. Use the Values page:\n\
    ```python\n# Call td_get_par_info(op_type=\"glslTOP\") first to confirm param\
    \ names\ntd_set_operator_pars(path=\"/project1/shader\", parameters={\"value0name\"\
    : \"uTime\"})\n# Then set expression via script:\n# op('/project1/shader').par.value0.expr\
    \ = \"absTime.seconds\"\n# In GLSL: uniform float uTime;\n```\n\nFallback: Constant\
    \ TOP in `rgba32float` format (8-bit clamps to 0-1, freezing the shader).\n\n\
    **Feedback TOP:** Use `top` parameter reference, not direct input wire. \"Not\
    \ enough sources\" resolves after first cook. \"Cook dependency loop\" warning\
    \ is expected.\n\n**Resolution:** Non-Commercial caps at 1280\xD71280. Use `outputresolution\
    \ = 'custom'`.\n\n**Large shaders:** Write GLSL to `/tmp/file.glsl`, then use\
    \ `td_write_dat` or `td_execute_python` to load.\n\n**Vertex/Point access (TD\
    \ 2025.32):** `point.P[0]`, `point.P[1]`, `point.P[2]` \u2014 NOT `.x`, `.y`,\
    \ `.z`.\n\n**Extensions:** `ext0object` format is `\"op('./datName').module.ClassName(me)\"\
    ` in CONSTANT mode. After editing extension code with `td_write_dat`, call `td_reinit_extension`.\n\
    \n**Script callbacks:** ALWAYS use relative paths via `me.parent()` / `scriptOp.parent()`.\n\
    \n**Cleaning nodes:** Always `list(root.children)` before iterating + `child.valid`\
    \ check.\n\n## Recording / Exporting Video\n\n```python\n# via td_execute_python:\n\
    root = op('/project1')\nrec = root.create(moviefileoutTOP, 'recorder')\nop('/project1/out').outputConnectors[0].connect(rec.inputConnectors[0])\n\
    rec.par.type = 'movie'\nrec.par.file = '/tmp/output.mov'\nrec.par.videocodec =\
    \ 'prores'  # Apple ProRes \u2014 NOT license-restricted on macOS\nrec.par.record\
    \ = True   # start\n# rec.par.record = False  # stop (call separately later)\n\
    ```\n\nH.264/H.265/AV1 need Commercial license. Use `prores` on macOS or `mjpa`\
    \ as fallback.\nExtract frames: `ffmpeg -i /tmp/output.mov -vframes 120 /tmp/frames/frame_%06d.png`\n\
    \n**TOP.save() is useless for animation** \u2014 captures same GPU texture every\
    \ time. Always use MovieFileOut.\n\n### Before Recording: Checklist\n\n1. **Verify\
    \ FPS > 0** via `td_get_perf`. If FPS=0 the recording will be empty. See pitfalls\
    \ #38-39.\n2. **Verify shader output is not black** via `td_get_screenshot`. Black\
    \ output = shader error or missing input. See pitfalls #8, #40.\n3. **If recording\
    \ with audio:** cue audio to start first, then delay recording by 3 frames. See\
    \ pitfalls #19.\n4. **Set output path before starting record** \u2014 setting\
    \ both in the same script can race.\n\n## Audio-Reactive GLSL (Proven Recipe)\n\
    \n### Correct signal chain (tested April 2026)\n\n```\nAudioFileIn CHOP (playmode=sequential)\n\
    \  \u2192 AudioSpectrum CHOP (FFT=512, outputmenu=setmanually, outlength=256,\
    \ timeslice=ON)\n  \u2192 Math CHOP (gain=10)\n  \u2192 CHOP to TOP (dataformat=r,\
    \ layout=rowscropped)\n  \u2192 GLSL TOP input 1 (spectrum texture, 256x2)\n\n\
    Constant TOP (rgba32float, time) \u2192 GLSL TOP input 0\nGLSL TOP \u2192 Null\
    \ TOP \u2192 MovieFileOut\n```\n\n### Critical audio-reactive rules (empirically\
    \ verified)\n\n1. **TimeSlice must stay ON** for AudioSpectrum. OFF = processes\
    \ entire audio file \u2192 24000+ samples \u2192 CHOP to TOP overflow.\n2. **Set\
    \ Output Length manually** to 256 via `outputmenu='setmanually'` and `outlength=256`.\
    \ Default outputs 22050 samples.\n3. **DO NOT use Lag CHOP for spectrum smoothing.**\
    \ Lag CHOP operates in timeslice mode and expands 256 samples to 2400+, averaging\
    \ all values to near-zero (~1e-06). The shader receives no usable data. This was\
    \ the #1 audio sync failure in testing.\n4. **DO NOT use Filter CHOP either**\
    \ \u2014 same timeslice expansion problem with spectrum data.\n5. **Smoothing\
    \ belongs in the GLSL shader** if needed, via temporal lerp with a feedback texture:\
    \ `mix(prevValue, newValue, 0.3)`. This gives frame-perfect sync with zero pipeline\
    \ latency.\n6. **CHOP to TOP dataformat = 'r'**, layout = 'rowscropped'. Spectrum\
    \ output is 256x2 (stereo). Sample at y=0.25 for first channel.\n7. **Math gain\
    \ = 10** (not 5). Raw spectrum values are ~0.19 in bass range. Gain of 10 gives\
    \ usable ~5.0 for the shader.\n8. **No Resample CHOP needed.** Control output\
    \ size via AudioSpectrum's `outlength` param directly.\n\n### GLSL spectrum sampling\n\
    \n```glsl\n// Input 0 = time (1x1 rgba32float), Input 1 = spectrum (256x2)\nfloat\
    \ iTime = texture(sTD2DInputs[0], vec2(0.5)).r;\n\n// Sample multiple points per\
    \ band and average for stability:\n// NOTE: y=0.25 for first channel (stereo texture\
    \ is 256x2, first row center is 0.25)\nfloat bass = (texture(sTD2DInputs[1], vec2(0.02,\
    \ 0.25)).r +\n              texture(sTD2DInputs[1], vec2(0.05, 0.25)).r) / 2.0;\n\
    float mid  = (texture(sTD2DInputs[1], vec2(0.2, 0.25)).r +\n              texture(sTD2DInputs[1],\
    \ vec2(0.35, 0.25)).r) / 2.0;\nfloat hi   = (texture(sTD2DInputs[1], vec2(0.6,\
    \ 0.25)).r +\n              texture(sTD2DInputs[1], vec2(0.8, 0.25)).r) / 2.0;\n\
    ```\n\nSee `references/network-patterns.md` for complete build scripts + shader\
    \ code.\n\n## Operator Quick Reference\n\n| Family | Color | Python class / MCP\
    \ type | Suffix |\n|--------|-------|-------------|--------|\n| TOP | Purple |\
    \ noiseTOP, glslTOP, compositeTOP, levelTop, blurTOP, textTOP, nullTOP | TOP |\n\
    | CHOP | Green | audiofileinCHOP, audiospectrumCHOP, mathCHOP, lfoCHOP, constantCHOP\
    \ | CHOP |\n| SOP | Blue | gridSOP, sphereSOP, transformSOP, noiseSOP | SOP |\n\
    | DAT | White | textDAT, tableDAT, scriptDAT, webserverDAT | DAT |\n| MAT | Yellow\
    \ | phongMAT, pbrMAT, glslMAT, constMAT | MAT |\n| COMP | Gray | geometryCOMP,\
    \ containerCOMP, cameraCOMP, lightCOMP, windowCOMP | COMP |\n\n## Security Notes\n\
    \n- MCP runs on localhost only (port 40404). No authentication \u2014 any local\
    \ process can send commands.\n- `td_execute_python` has unrestricted access to\
    \ the TD Python environment and filesystem as the TD process user.\n- `setup.sh`\
    \ downloads twozero.tox from the official 404zero.com URL. Verify the download\
    \ if concerned.\n- The skill never sends data outside localhost. All MCP communication\
    \ is local.\n\n## References\n\n| File | What |\n|------|------|\n| `references/pitfalls.md`\
    \ | Hard-won lessons from real sessions |\n| `references/operators.md` | All operator\
    \ families with params and use cases |\n| `references/network-patterns.md` | Recipes:\
    \ audio-reactive, generative, GLSL, instancing |\n| `references/mcp-tools.md`\
