    \ fall back to `td_execute_python` for complex multi-step logic.\n5. **Call `td_get_hints`\
    \ before building.** It returns patterns specific to the op type you're working\
    \ with.\n\n## Architecture\n\n```\nHermes Agent -> MCP (Streamable HTTP) -> twozero.tox\
