    \ TD Python: op(), scripting, extensions |\n| `references/troubleshooting.md`\
    \ | Connection diagnostics, debugging |\n| `references/glsl.md` | GLSL uniforms,\
    \ built-in functions, shader templates |\n| `references/postfx.md` | Post-FX:\
    \ bloom, CRT, chromatic aberration, feedback glow |\n| `references/layout-compositor.md`\
