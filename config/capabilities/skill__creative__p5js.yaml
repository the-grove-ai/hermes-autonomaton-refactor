    \ attractor-driven, flow-field following | `references/visual-effects.md` \xA7\
    \ Particles |\n| **Shape language** | Geometric primitives, custom vertices, bezier\
    \ curves, SVG paths | `references/shapes-and-geometry.md` |\n| **Motion style**\
    \ | Eased, spring-based, noise-driven, physics sim, lerped, stepped | `references/animation.md`\
    \ |\n| **Typography** | System fonts, loaded OTF, `textToPoints()` particle text,\
    \ kinetic | `references/typography.md` |\n| **Shader effects** | GLSL fragment/vertex,\
    \ filter shaders, post-processing, feedback loops | `references/webgl-and-3d.md`\
    \ \xA7 Shaders |\n| **Composition** | Grid, radial, golden ratio, rule of thirds,\
    \ organic scatter, tiled | `references/core-api.md` \xA7 Composition |\n| **Interaction\
    \ model** | Mouse follow, click spawn, drag, keyboard state, scroll-driven, mic\
    \ input | `references/interaction.md` |\n| **Blend modes** | `BLEND`, `ADD`, `MULTIPLY`,\
