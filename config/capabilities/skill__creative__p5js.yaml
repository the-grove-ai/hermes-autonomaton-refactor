    \ \xA7 Blend Modes |\n| **Layering** | `createGraphics()` offscreen buffers, alpha\
    \ compositing, masking | `references/core-api.md` \xA7 Offscreen Buffers |\n|\
    \ **Texture** | Perlin surface, stippling, hatching, halftone, pixel sorting |\
    \ `references/visual-effects.md` \xA7 Texture Generation |\n\n### Per-Project\
    \ Variation Rules\n\nNever use default configurations. For every project:\n- **Custom\
    \ color palette** \u2014 never raw `fill(255, 0, 0)`. Always a designed palette\
    \ with 3-7 colors\n- **Custom stroke weight vocabulary** \u2014 thin accents (0.5),\
    \ medium structure (1-2), bold emphasis (3-5)\n- **Background treatment** \u2014\
    \ never plain `background(0)` or `background(255)`. Always textured, gradient,\
    \ or layered\n- **Motion variety** \u2014 different speeds for different elements.\
    \ Primary at 1x, secondary at 0.3x, ambient at 0.1x\n- **At least one invented\
    \ element** \u2014 a custom particle behavior, a novel noise application, a unique\
    \ interaction response\n\n### Project-Specific Invention\n\nFor every project,\
    \ invent at least one of:\n- A custom color palette matching the mood (not a preset)\n\
    - A novel noise field combination (e.g., curl noise + domain warp + feedback)\n\
    - A unique particle behavior (custom forces, custom trails, custom spawning)\n\
    - An interaction mechanic the user didn't request but that elevates the piece\n\
    - A compositional technique that creates visual hierarchy\n\n### Parameter Design\
    \ Philosophy\n\nParameters should emerge from the algorithm, not from a generic\
    \ menu. Ask: \"What properties of *this* system should be tunable?\"\n\n**Good\
    \ parameters** expose the algorithm's character:\n- **Quantities** \u2014 how\
    \ many particles, branches, cells (controls density)\n- **Scales** \u2014 noise\
    \ frequency, element size, spacing (controls texture)\n- **Rates** \u2014 speed,\
    \ growth rate, decay (controls energy)\n- **Thresholds** \u2014 when does behavior\
    \ change? (controls drama)\n- **Ratios** \u2014 proportions, balance between forces\
    \ (controls harmony)\n\n**Bad parameters** are generic controls unrelated to the\
    \ algorithm:\n- \"color1\", \"color2\", \"size\" \u2014 meaningless without context\n\
    - Toggle switches for unrelated effects\n- Parameters that only change cosmetics,\
    \ not behavior\n\nEvery parameter should change how the algorithm *thinks*, not\
    \ just how it *looks*. A \"turbulence\" parameter that changes noise octaves is\
    \ good. A \"particle size\" slider that only changes `ellipse()` radius is shallow.\n\
    \n## Workflow\n\n### Step 1: Creative Vision\n\nBefore any code, articulate:\n\
    \n- **Mood / atmosphere**: What should the viewer feel? Contemplative? Energized?\
    \ Unsettled? Playful?\n- **Visual story**: What happens over time (or on interaction)?\
    \ Build? Decay? Transform? Oscillate?\n- **Color world**: Warm/cool? Monochrome?\
    \ Complementary? What's the dominant hue? The accent?\n- **Shape language**: Organic\
    \ curves? Sharp geometry? Dots? Lines? Mixed?\n- **Motion vocabulary**: Slow drift?\
    \ Explosive burst? Breathing pulse? Mechanical precision?\n- **What makes THIS\
    \ different**: What is the one thing that makes this sketch unique?\n\nMap the\
    \ user's prompt to aesthetic choices. \"Relaxing generative background\" demands\
    \ different everything from \"glitch data visualization.\"\n\n### Step 2: Technical\
    \ Design\n\n- **Mode** \u2014 which of the 7 modes from the table above\n- **Canvas\
    \ size** \u2014 landscape 1920x1080, portrait 1080x1920, square 1080x1080, or\
    \ responsive `windowWidth/windowHeight`\n- **Renderer** \u2014 `P2D` (default)\
    \ or `WEBGL` (for 3D, shaders, advanced blend modes)\n- **Frame rate** \u2014\
    \ 60fps (interactive), 30fps (ambient animation), or `noLoop()` (static generative)\n\
    - **Export target** \u2014 browser display, PNG still, GIF loop, MP4 video, SVG\
    \ vector\n- **Interaction model** \u2014 passive (no input), mouse-driven, keyboard-driven,\
    \ audio-reactive, scroll-driven\n- **Viewer UI** \u2014 for interactive generative\
    \ art, start from `templates/viewer.html` which provides seed navigation, parameter\
    \ sliders, and download. For simple sketches or video export, use bare HTML\n\n\
    ### Step 3: Code the Sketch\n\nFor **interactive generative art** (seed exploration,\
    \ parameter tuning): start from `templates/viewer.html`. Read the template first,\
    \ keep the fixed sections (seed nav, actions), replace the algorithm and parameter\
    \ controls. This gives the user seed prev/next/random/jump, parameter sliders\
    \ with live update, and PNG download \u2014 all wired up.\n\nFor **animations,\
    \ video export, or simple sketches**: use bare HTML:\n\nSingle HTML file. Structure:\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\"\
    >\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n  <title>Project Name</title>\n  <script>p5.disableFriendlyErrors = true;</script>\n\
    \  <script src=\"https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js\"\
    ></script>\n  <!-- <script src=\"https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/addons/p5.sound.min.js\"\
    ></script> -->\n  <!-- <script src=\"https://unpkg.com/p5.js-svg@1.6.0\"></script>\
    \ -->  <!-- SVG export -->\n  <!-- <script src=\"https://cdn.jsdelivr.net/npm/ccapture.js-npmfixed/build/CCapture.all.min.js\"\
    ></script> -->  <!-- video capture -->\n  <style>\n    html, body { margin: 0;\
    \ padding: 0; overflow: hidden; }\n    canvas { display: block; }\n  </style>\n\
    </head>\n<body>\n<script>\n// === Configuration ===\nconst CONFIG = {\n  seed:\
    \ 42,\n  // ... project-specific params\n};\n\n// === Color Palette ===\nconst\
    \ PALETTE = {\n  bg: '#0a0a0f',\n  primary: '#e8d5b7',\n  // ...\n};\n\n// ===\
    \ Global State ===\nlet particles = [];\n\n// === Preload (fonts, images, data)\
    \ ===\nfunction preload() {\n  // font = loadFont('...');\n}\n\n// === Setup ===\n\
    function setup() {\n  createCanvas(1920, 1080);\n  randomSeed(CONFIG.seed);\n\
    \  noiseSeed(CONFIG.seed);\n  colorMode(HSB, 360, 100, 100, 100);\n  // Initialize\
    \ state...\n}\n\n// === Draw Loop ===\nfunction draw() {\n  // Render frame...\n\
    }\n\n// === Helper Functions ===\n// ...\n\n// === Classes ===\nclass Particle\
    \ {\n  // ...\n}\n\n// === Event Handlers ===\nfunction mousePressed() { /* ...\
    \ */ }\nfunction keyPressed() { /* ... */ }\nfunction windowResized() { resizeCanvas(windowWidth,\
    \ windowHeight); }\n</script>\n</body>\n</html>\n```\n\nKey implementation patterns:\n\
    - **Seeded randomness**: Always `randomSeed()` + `noiseSeed()` for reproducibility\n\
    - **Color mode**: Use `colorMode(HSB, 360, 100, 100, 100)` for intuitive color\
    \ control\n- **State separation**: CONFIG for parameters, PALETTE for colors,\
    \ globals for mutable state\n- **Class-based entities**: Particles, agents, shapes\
    \ as classes with `update()` + `display()` methods\n- **Offscreen buffers**: `createGraphics()`\
    \ for layered composition, trails, masks\n\n### Step 4: Preview & Iterate\n\n\
    - Open HTML file directly in browser \u2014 no server needed for basic sketches\n\
    - For `loadImage()`/`loadFont()` from local files: use `scripts/serve.sh` or `python3\
    \ -m http.server`\n- Chrome DevTools Performance tab to verify 60fps\n- Test at\
    \ target export resolution, not just the window size\n- Adjust parameters until\
    \ the visual matches the concept from Step 1\n\n### Step 5: Export\n\n| Format\
    \ | Method | Command |\n|--------|--------|---------|\n| **PNG** | `saveCanvas('output',\
    \ 'png')` in `keyPressed()` | Press 's' to save |\n| **High-res PNG** | Puppeteer\
    \ headless capture | `node scripts/export-frames.js sketch.html --width 3840 --height\
    \ 2160 --frames 1` |\n| **GIF** | `saveGif('output', 5)` \u2014 captures N seconds\
    \ | Press 'g' to save |\n| **Frame sequence** | `saveFrames('frame', 'png', 10,\
    \ 30)` \u2014 10s at 30fps | Then `ffmpeg -i frame-%04d.png -c:v libx264 output.mp4`\
    \ |\n| **MP4** | Puppeteer frame capture + ffmpeg | `bash scripts/render.sh sketch.html\
    \ output.mp4 --duration 30 --fps 30` |\n| **SVG** | `createCanvas(w, h, SVG)`\
    \ with p5.js-svg | `save('output.svg')` |\n\n### Step 6: Quality Verification\n\
    \n- **Does it match the vision?** Compare output to the creative concept. If it\
    \ looks generic, go back to Step 1\n- **Resolution check**: Is it sharp at the\
    \ target display size? No aliasing artifacts?\n- **Performance check**: Does it\
    \ hold 60fps in browser? (30fps minimum for animations)\n- **Color check**: Do\
    \ the colors work together? Test on both light and dark monitors\n- **Edge cases**:\
    \ What happens at canvas edges? On resize? After running for 10 minutes?\n\n##\
    \ Critical Implementation Notes\n\n### Performance \u2014 Disable FES First\n\n\
    The Friendly Error System (FES) adds up to 10x overhead. Disable it in every production\
    \ sketch:\n\n```javascript\np5.disableFriendlyErrors = true;  // BEFORE setup()\n\
    \nfunction setup() {\n  pixelDensity(1);  // prevent 2x-4x overdraw on retina\n\
    \  createCanvas(1920, 1080);\n}\n```\n\nIn hot loops (particles, pixel ops), use\
    \ `Math.*` instead of p5 wrappers \u2014 measurably faster:\n\n```javascript\n\
    // In draw() or update() hot paths:\nlet a = Math.sin(t);          // not sin(t)\n\
    let r = Math.sqrt(dx*dx+dy*dy); // not dist() \u2014 or better: skip sqrt, compare\
    \ magSq\nlet v = Math.random();        // not random() \u2014 when seed not needed\n\
    let m = Math.min(a, b);       // not min(a, b)\n```\n\nNever `console.log()` inside\
    \ `draw()`. Never manipulate DOM in `draw()`. See `references/troubleshooting.md`\
    \ \xA7 Performance.\n\n### Seeded Randomness \u2014 Always\n\nEvery generative\
    \ sketch must be reproducible. Same seed, same output.\n\n```javascript\nfunction\
    \ setup() {\n  randomSeed(CONFIG.seed);\n  noiseSeed(CONFIG.seed);\n  // All random()\
    \ and noise() calls now deterministic\n}\n```\n\nNever use `Math.random()` for\
    \ generative content \u2014 only for performance-critical non-visual code. Always\
    \ `random()` for visual elements. If you need a random seed: `CONFIG.seed = floor(random(99999))`.\n\
    \n### Generative Art Platform Support (fxhash / Art Blocks)\n\nFor generative\
    \ art platforms, replace p5's PRNG with the platform's deterministic random:\n\
    \n```javascript\n// fxhash convention\nconst SEED = $fx.hash;              //\
    \ unique per mint\nconst rng = $fx.rand;               // deterministic PRNG\n\
    $fx.features({ palette: 'warm', complexity: 'high' });\n\n// In setup():\nrandomSeed(SEED);\
    \   // for p5's noise()\nnoiseSeed(SEED);\n\n// Replace random() with rng() for\
    \ platform determinism\nlet x = rng() * width;  // instead of random(width)\n\
    ```\n\nSee `references/export-pipeline.md` \xA7 Platform Export.\n\n### Color\
    \ Mode \u2014 Use HSB\n\nHSB (Hue, Saturation, Brightness) is dramatically easier\
    \ to work with than RGB for generative art:\n\n```javascript\ncolorMode(HSB, 360,\
    \ 100, 100, 100);\n// Now: fill(hue, sat, bri, alpha)\n// Rotate hue: fill((baseHue\
    \ + offset) % 360, 80, 90)\n// Desaturate: fill(hue, sat * 0.3, bri)\n// Darken:\
    \ fill(hue, sat, bri * 0.5)\n```\n\nNever hardcode raw RGB values. Define a palette\
    \ object, derive variations procedurally. See `references/color-systems.md`.\n\
    \n### Noise \u2014 Multi-Octave, Not Raw\n\nRaw `noise(x, y)` looks like smooth\
    \ blobs. Layer octaves for natural texture:\n\n```javascript\nfunction fbm(x,\
    \ y, octaves = 4) {\n  let val = 0, amp = 1, freq = 1, sum = 0;\n  for (let i\
    \ = 0; i < octaves; i++) {\n    val += noise(x * freq, y * freq) * amp;\n    sum\
    \ += amp;\n    amp *= 0.5;\n    freq *= 2;\n  }\n  return val / sum;\n}\n```\n\
    \nFor flowing organic forms, use **domain warping**: feed noise output back as\
    \ noise input coordinates. See `references/visual-effects.md`.\n\n### createGraphics()\
    \ for Layers \u2014 Not Optional\n\nFlat single-pass rendering looks flat. Use\
    \ offscreen buffers for composition:\n\n```javascript\nlet bgLayer, fgLayer, trailLayer;\n\
    function setup() {\n  createCanvas(1920, 1080);\n  bgLayer = createGraphics(width,\
    \ height);\n  fgLayer = createGraphics(width, height);\n  trailLayer = createGraphics(width,\
    \ height);\n}\nfunction draw() {\n  renderBackground(bgLayer);\n  renderTrails(trailLayer);\
    \   // persistent, fading\n  renderForeground(fgLayer);  // cleared each frame\n\
    \  image(bgLayer, 0, 0);\n  image(trailLayer, 0, 0);\n  image(fgLayer, 0, 0);\n\
    }\n```\n\n### Performance \u2014 Vectorize Where Possible\n\np5.js draw calls\
    \ are expensive. For thousands of particles:\n\n```javascript\n// SLOW: individual\
    \ shapes\nfor (let p of particles) {\n  ellipse(p.x, p.y, p.size);\n}\n\n// FAST:\
    \ single shape with beginShape()\nbeginShape(POINTS);\nfor (let p of particles)\
    \ {\n  vertex(p.x, p.y);\n}\nendShape();\n\n// FASTEST: pixel buffer for massive\
    \ counts\nloadPixels();\nfor (let p of particles) {\n  let idx = 4 * (floor(p.y)\
    \ * width + floor(p.x));\n  pixels[idx] = r; pixels[idx+1] = g; pixels[idx+2]\
    \ = b; pixels[idx+3] = 255;\n}\nupdatePixels();\n```\n\nSee `references/troubleshooting.md`\
    \ \xA7 Performance.\n\n### Instance Mode for Multiple Sketches\n\nGlobal mode\
    \ pollutes `window`. For production, use instance mode:\n\n```javascript\nconst\
    \ sketch = (p) => {\n  p.setup = function() {\n    p.createCanvas(800, 800);\n\
    \  };\n  p.draw = function() {\n    p.background(0);\n    p.ellipse(p.mouseX,\
    \ p.mouseY, 50);\n  };\n};\nnew p5(sketch, 'canvas-container');\n```\n\nRequired\
    \ when embedding multiple sketches on one page or integrating with frameworks.\n\
    \n### WebGL Mode Gotchas\n\n- `createCanvas(w, h, WEBGL)` \u2014 origin is center,\
    \ not top-left\n- Y-axis is inverted (positive Y goes up in WEBGL, down in P2D)\n\
    - `translate(-width/2, -height/2)` to get P2D-like coordinates\n- `push()`/`pop()`\
    \ around every transform \u2014 matrix stack overflows silently\n- `texture()`\
    \ before `rect()`/`plane()` \u2014 not after\n- Custom shaders: `createShader(vert,\
    \ frag)` \u2014 test on multiple browsers\n\n### Export \u2014 Key Bindings Convention\n\
    \nEvery sketch should include these in `keyPressed()`:\n\n```javascript\nfunction\
    \ keyPressed() {\n  if (key === 's' || key === 'S') saveCanvas('output', 'png');\n\
    \  if (key === 'g' || key === 'G') saveGif('output', 5);\n  if (key === 'r' ||\
    \ key === 'R') { randomSeed(millis()); noiseSeed(millis()); }\n  if (key === '\
    \ ') CONFIG.paused = !CONFIG.paused;\n}\n```\n\n### Headless Video Export \u2014\
    \ Use noLoop()\n\nFor headless rendering via Puppeteer, the sketch **must** use\
    \ `noLoop()` in setup. Without it, p5's draw loop runs freely while screenshots\
    \ are slow \u2014 the sketch races ahead and you get skipped/duplicate frames.\n\
    \n```javascript\nfunction setup() {\n  createCanvas(1920, 1080);\n  pixelDensity(1);\n\
    \  noLoop();                    // capture script controls frame advance\n  window._p5Ready\
    \ = true;      // signal readiness to capture script\n}\n```\n\nThe bundled `scripts/export-frames.js`\
    \ detects `_p5Ready` and calls `redraw()` once per capture for exact 1:1 frame\
    \ correspondence. See `references/export-pipeline.md` \xA7 Deterministic Capture.\n\
    \nFor multi-scene videos, use the per-clip architecture: one HTML per scene, render\
    \ independently, stitch with `ffmpeg -f concat`. See `references/export-pipeline.md`\
    \ \xA7 Per-Clip Architecture.\n\n### Agent Workflow\n\nWhen building p5.js sketches:\n\
    \n1. **Write the HTML file** \u2014 single self-contained file, all code inline\n\
    2. **Open in browser** \u2014 `open sketch.html` (macOS) or `xdg-open sketch.html`\
    \ (Linux)\n3. **Local assets** (fonts, images) require a server: `python3 -m http.server\
    \ 8080` in the project directory, then open `http://localhost:8080/sketch.html`\n\
    4. **Export PNG/GIF** \u2014 add `keyPressed()` shortcuts as shown above, tell\
    \ the user which key to press\n5. **Headless export** \u2014 `node scripts/export-frames.js\
    \ sketch.html --frames 300` for automated frame capture (sketch must use `noLoop()`\
    \ + `_p5Ready`)\n6. **MP4 rendering** \u2014 `bash scripts/render.sh sketch.html\
    \ output.mp4 --duration 30`\n7. **Iterative refinement** \u2014 edit the HTML\
    \ file, user refreshes browser to see changes\n8. **Load references on demand**\
    \ \u2014 use `skill_view(name=\"p5js\", file_path=\"references/...\")` to load\
    \ specific reference files as needed during implementation\n\n## Performance Targets\n\
    \n| Metric | Target |\n|--------|--------|\n| Frame rate (interactive) | 60fps\
    \ sustained |\n| Frame rate (animated export) | 30fps minimum |\n| Particle count\
    \ (P2D shapes) | 5,000-10,000 at 60fps |\n| Particle count (pixel buffer) | 50,000-100,000\
    \ at 60fps |\n| Canvas resolution | Up to 3840x2160 (export), 1920x1080 (interactive)\
    \ |\n| File size (HTML) | < 100KB (excluding CDN libraries) |\n| Load time | <\
    \ 2s to first frame |\n\n## References\n\n| File | Contents |\n|------|----------|\n\
    | `references/core-api.md` | Canvas setup, coordinate system, draw loop, `push()`/`pop()`,\
    \ offscreen buffers, composition patterns, `pixelDensity()`, responsive design\
    \ |\n| `references/shapes-and-geometry.md` | 2D primitives, `beginShape()`/`endShape()`,\
    \ Bezier/Catmull-Rom curves, `vertex()` systems, custom shapes, `p5.Vector`, signed\
    \ distance fields, SVG path conversion |\n| `references/visual-effects.md` | Noise\
    \ (Perlin, fractal, domain warp, curl), flow fields, particle systems (physics,\
    \ flocking, trails), pixel manipulation, texture generation (stipple, hatch, halftone),\
    \ feedback loops, reaction-diffusion |\n| `references/animation.md` | Frame-based\
    \ animation, easing functions, `lerp()`/`map()`, spring physics, state machines,\
    \ timeline sequencing, `millis()`-based timing, transition patterns |\n| `references/typography.md`\
    \ | `text()`, `loadFont()`, `textToPoints()`, kinetic typography, text masks,\
    \ font metrics, responsive text sizing |\n| `references/color-systems.md` | `colorMode()`,\
    \ HSB/HSL/RGB, `lerpColor()`, `paletteLerp()`, procedural palettes, color harmony,\
    \ `blendMode()`, gradient rendering, curated palette library |\n| `references/webgl-and-3d.md`\
    \ | WEBGL renderer, 3D primitives, camera, lighting, materials, custom geometry,\
    \ GLSL shaders (`createShader()`, `createFilterShader()`), framebuffers, post-processing\
    \ |\n| `references/interaction.md` | Mouse events, keyboard state, touch input,\
    \ DOM elements, `createSlider()`/`createButton()`, audio input (p5.sound FFT/amplitude),\
    \ scroll-driven animation, responsive events |\n| `references/export-pipeline.md`\
    \ | `saveCanvas()`, `saveGif()`, `saveFrames()`, deterministic headless capture,\
    \ ffmpeg frame-to-video, CCapture.js, SVG export, per-clip architecture, platform\
    \ export (fxhash), video gotchas |\n| `references/troubleshooting.md` | Performance\
    \ profiling, per-pixel budgets, common mistakes, browser compatibility, WebGL\
    \ debugging, font loading issues, pixel density traps, memory leaks, CORS |\n\
    | `templates/viewer.html` | Interactive viewer template: seed navigation (prev/next/random/jump),\
    \ parameter sliders, download PNG, responsive canvas. Start from this for explorable\
    \ generative art |\n\n---\n\n## Creative Divergence (use only when user requests\
    \ experimental/creative/unique output)\n\nIf the user asks for creative, experimental,\
    \ surprising, or unconventional output, select the strategy that best fits and\
    \ reason through its steps BEFORE generating code.\n\n- **Conceptual Blending**\
    \ \u2014 when the user names two things to combine or wants hybrid aesthetics\n\
    - **SCAMPER** \u2014 when the user wants a twist on a known generative art pattern\n\
    - **Distance Association** \u2014 when the user gives a single concept and wants\
    \ exploration (\"make something about time\")\n\n### Conceptual Blending\n1. Name\
    \ two distinct visual systems (e.g., particle physics + handwriting)\n2. Map correspondences\
    \ (particles = ink drops, forces = pen pressure, fields = letterforms)\n3. Blend\
    \ selectively \u2014 keep mappings that produce interesting emergent visuals\n\
    4. Code the blend as a unified system, not two systems side-by-side\n\n### SCAMPER\
    \ Transformation\nTake a known generative pattern (flow field, particle system,\
    \ L-system, cellular automata) and systematically transform it:\n- **Substitute**:\
    \ replace circles with text characters, lines with gradients\n- **Combine**: merge\
    \ two patterns (flow field + voronoi)\n- **Adapt**: apply a 2D pattern to a 3D\
    \ projection\n- **Modify**: exaggerate scale, warp the coordinate space\n- **Purpose**:\
    \ use a physics sim for typography, a sorting algorithm for color\n- **Eliminate**:\
    \ remove the grid, remove color, remove symmetry\n- **Reverse**: run the simulation\
    \ backward, invert the parameter space\n\n### Distance Association\n1. Anchor\
    \ on the user's concept (e.g., \"loneliness\")\n2. Generate associations at three\
    \ distances:\n   - Close (obvious): empty room, single figure, silence\n   - Medium\
    \ (interesting): one fish in a school swimming the wrong way, a phone with no\
    \ notifications, the gap between subway cars\n   - Far (abstract): prime numbers,\
    \ asymptotic curves, the color of 3am\n3. Develop the medium-distance associations\
    \ \u2014 they're specific enough to visualize but unexpected enough to be interesting\n"
