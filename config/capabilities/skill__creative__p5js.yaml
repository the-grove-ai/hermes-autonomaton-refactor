    \ | Audio file / mic | Sound-driven generative visuals | `references/interaction.md`\
    \ \xA7 Audio Input |\n\n## Stack\n\nSingle self-contained HTML file per project.\
    \ No build step required.\n\n| Layer | Tool | Purpose |\n|-------|------|---------|\n\
    | Core | p5.js 1.11.3 (CDN) | Canvas rendering, math, transforms, event handling\
    \ |\n| 3D | p5.js WebGL mode | 3D geometry, camera, lighting, GLSL shaders |\n\
