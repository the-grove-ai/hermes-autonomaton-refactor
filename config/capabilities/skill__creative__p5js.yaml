    \n**Cohesive aesthetic over feature count.** All elements must serve a unified\
    \ visual language \u2014 shared color temperature, consistent stroke weight vocabulary,\
    \ harmonious motion speeds. A sketch with ten unrelated effects is worse than\
    \ one with three that belong together.\n\n## Modes\n\n| Mode | Input | Output\
    \ | Reference |\n|------|-------|--------|-----------|\n| **Generative art** |\
    \ Seed / parameters | Procedural visual composition (still or animated) | `references/visual-effects.md`\
    \ |\n| **Data visualization** | Dataset / API | Interactive charts, graphs, custom\
