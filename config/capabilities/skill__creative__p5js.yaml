    \n## When to use\n\nUse when users request: p5.js sketches, creative coding, generative\
    \ art, interactive visualizations, canvas animations, browser-based visual art,\
    \ data viz, shader effects, or any p5.js project.\n\n## What's inside\n\nProduction\
