    \ |\n| Export | Built-in `saveCanvas()` / `saveGif()` / `saveFrames()` | PNG,\
    \ GIF, frame sequence output |\n| Capture | CCapture.js (optional) | Deterministic\
    \ framerate video capture (WebM, GIF) |\n| Headless | Puppeteer + Node.js (optional)\
    \ | Automated high-res rendering, MP4 via ffmpeg |\n| SVG | p5.js-svg 1.6.0 (optional)\
