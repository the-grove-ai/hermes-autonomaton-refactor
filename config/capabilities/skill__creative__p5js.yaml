    \ technical decisions\n3. **CODE** \u2014 Write single HTML file with inline p5.js.\
    \ Structure: globals \u2192 `preload()` \u2192 `setup()` \u2192 `draw()` \u2192\
    \ helpers \u2192 classes \u2192 event handlers\n4. **PREVIEW** \u2014 Open in\
    \ browser, verify visual quality. Test at target resolution. Check performance\n\
    5. **EXPORT** \u2014 Capture output: `saveCanvas()` for PNG, `saveGif()` for GIF,\
    \ `saveFrames()` + ffmpeg for MP4, Puppeteer for headless batch\n6. **VERIFY**\
    \ \u2014 Does the output match the concept? Is it visually striking at the intended\
    \ display size? Would you frame it?\n\n## Creative Direction\n\n### Aesthetic\
    \ Dimensions\n\n| Dimension | Options | Reference |\n|-----------|---------|-----------|\n\
    | **Color system** | HSB/HSL, RGB, named palettes, procedural harmony, gradient\
    \ interpolation | `references/color-systems.md` |\n| **Noise vocabulary** | Perlin\
    \ noise, simplex, fractal (octaved), domain warping, curl noise | `references/visual-effects.md`\
