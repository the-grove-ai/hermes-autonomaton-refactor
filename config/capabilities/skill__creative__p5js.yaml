    | Texture | p5.grain (optional) | Film grain, texture overlays |\n| Fonts | Google\
    \ Fonts / `loadFont()` | Custom typography via OTF/TTF/WOFF2 |\n\n### Version\
    \ Note\n\n**p5.js 1.x** (1.11.3) is the default \u2014 stable, well-documented,\
    \ broadest library compatibility. Use this unless a project requires 2.x features.\n\
    \n**p5.js 2.x** (2.2+) adds: `async setup()` replacing `preload()`, OKLCH/OKLAB\
    \ color modes, `splineVertex()`, shader `.modify()` API, variable fonts, `textToContours()`,\
    \ pointer events. Required for p5.brush. See `references/core-api.md` \xA7 p5.js\
    \ 2.0.\n\n## Pipeline\n\nEvery project follows the same 6-stage path:\n\n```\n\
    CONCEPT \u2192 DESIGN \u2192 CODE \u2192 PREVIEW \u2192 EXPORT \u2192 VERIFY\n\
    ```\n\n1. **CONCEPT** \u2014 Articulate the creative vision: mood, color world,\
    \ motion vocabulary, what makes this unique\n2. **DESIGN** \u2014 Choose mode,\
