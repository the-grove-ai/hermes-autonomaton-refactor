# GRV-009 E5 C-VERBS + A4t (declarative-resolution-v1) — grouped verb record.
# family=file  zone=yellow  tiers=[1, 2, 3]  disclosure=proactive  trigger=always
id: write_file
kind: verb
trigger:
  # write_file is a CORE file primitive, now always-on like its siblings
  # `terminal` and `read_file` (both always: true). Intent-gating it was the
  # anomaly: the agent could always read and always shell, but write_file was
  # offered only on a few intents — so file-writes (which classify as
  # system_admin / memory_operation / etc.) fell back to shell heredoc and hit
  # the opacity-RED wall. Authorization is enforced per-call by zone (YELLOW) +
  # the granted-workspace allowlist, NOT by disclosure, so always-offering adds
  # availability without weakening governance. Supersedes the incremental
  # intent adds (action-intent-disclosure-v1 memory_operation, etc.).
  intents: []
  keywords: []
  dock_affinity: []
  always: true
  disclosure: proactive
bindings:
  tools:
  - write_file
  credentials: null
  toolset_key: file
tier_rule:
  eligible:
  - 1
  - 2
  - 3
  preferred: 2
  promotion_criteria: {}
  validation:
    strategy: shadow_compare
    confidence_threshold: 0.95
    shadow_window: 20
zone: yellow
telemetry:
  feed: intent_feed
  track:
  - invocation
  - result
  - cost
  - latency
  - confidence
  - human_feedback
context:
  disclosure: eager
  payload: 'Native file tools (write, zone yellow). Tools: write_file.

    '
  dock_composition: none
lifecycle:
  state: approved
  provenance: migrated
  created_at: '2026-06-12T00:00:00+00:00'
  last_used: null
  use_count: 0
  flywheel_eligible: true
lineage:
  source_patterns: []
  parent_id: null
  decision_log:
  - actor: operator
    timestamp: '2026-06-12T00:00:00+00:00'
    from_state: migrated
    to_state: approved
    reason: 'E5 C-VERBS — declarative-resolution-v1: grouped verb record (strict A2: zone+tier+trigger
      homogeneous) governing native tools at the operator-locked gate'
    evidence:
    - config/tool_groups.yaml
    - config/zones.schema.yaml#tool_zones
failure:
  fallback: halt_and_surface
  diagnostic_context:
  - 'capability: write_file'
  - 'subsystem: native verb registry (tools.registry)'
  - 'check: tool registered + zone mapped in zones.schema.yaml'
  circuit_breaker:
    threshold: 3
    window_seconds: 300
