# GRV-009 E5 C-VERBS + A4t (declarative-resolution-v1) — grouped verb record.
# family=file  zone=yellow  tiers=[1, 2, 3]  disclosure=proactive  trigger=code_generation/creative_writing/planning/memory_operation
id: write_file
kind: verb
trigger:
  intents:
  - code_generation
  - creative_writing
  - planning
  # SEAM5 parity with action-intent-disclosure-v1 (Notion): crystallize/persist
  # turns classify as memory_operation, so write_file must be offered there too.
  - memory_operation
  keywords: []
  dock_affinity: []
  always: false
  disclosure: proactive
bindings:
  tools:
  - write_file
  credentials: null
  toolset_key: file
tier_rule:
  eligible:
  - 1
  - 2
  - 3
  preferred: 2
  promotion_criteria: {}
  validation:
    strategy: shadow_compare
    confidence_threshold: 0.95
    shadow_window: 20
zone: yellow
telemetry:
  feed: intent_feed
  track:
  - invocation
  - result
  - cost
  - latency
  - confidence
  - human_feedback
context:
  disclosure: eager
  payload: 'Native file tools (write, zone yellow). Tools: write_file.

    '
  dock_composition: none
lifecycle:
  state: approved
  provenance: migrated
  created_at: '2026-06-12T00:00:00+00:00'
  last_used: null
  use_count: 0
  flywheel_eligible: true
lineage:
  source_patterns: []
  parent_id: null
  decision_log:
  - actor: operator
    timestamp: '2026-06-12T00:00:00+00:00'
    from_state: migrated
    to_state: approved
    reason: 'E5 C-VERBS — declarative-resolution-v1: grouped verb record (strict A2: zone+tier+trigger
      homogeneous) governing native tools at the operator-locked gate'
    evidence:
    - config/tool_groups.yaml
    - config/zones.schema.yaml#tool_zones
failure:
  fallback: halt_and_surface
  diagnostic_context:
  - 'capability: write_file'
  - 'subsystem: native verb registry (tools.registry)'
  - 'check: tool registered + zone mapped in zones.schema.yaml'
  circuit_breaker:
    threshold: 3
    window_seconds: 300
