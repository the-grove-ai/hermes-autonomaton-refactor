  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: python-debugpy\n\
    description: \"Debug Python: pdb REPL + debugpy remote (DAP).\"\nversion: 1.0.0\n\
    author: Hermes Agent\nlicense: MIT\nplatforms: [linux, macos]\nmetadata:\n  hermes:\n\
    \    tags: [debugging, python, pdb, debugpy, breakpoints, dap, post-mortem]\n\
    \    related_skills: [systematic-debugging, node-inspect-debugger, debugging-hermes-tui-commands]\n\
    ---\n\n# Python Debugger (pdb + debugpy)\n\n## Overview\n\nThree tools, picked\
    \ by situation:\n\n| Tool | When |\n|---|---|\n| **`breakpoint()` + pdb** | Local,\
    \ interactive, simplest. Add `breakpoint()` in the source, run normally, get a\
    \ REPL at that line. |\n| **`python -m pdb`** | Launch an existing script under\
    \ pdb with no source edits. Useful for quick poking. |\n| **`debugpy`** | Remote\
    \ / headless / \"attach to already-running process.\" Talks DAP, scriptable from\
    \ terminal, works for long-lived processes (gateway, daemon, PTY children). |\n\
    \n**Start with `breakpoint()`.** It's the cheapest thing that works.\n\n## When\
    \ to Use\n\n- A test fails and the traceback doesn't reveal why a value is wrong\n\
    - You need to step through a function and watch a collection mutate\n- A long-running\
    \ process (hermes gateway, tui_gateway) misbehaves and you can't restart it\n\
    - Post-mortem: an exception fired in prod-ish code and you want to inspect locals\
    \ at the crash site\n- A subprocess / child (Python `_SlashWorker`, PTY bridge\
    \ worker) is the actual bug site\n\n**Don't use for:** things `print()` / `logging.debug`\
    \ solve in under a minute, or things `pytest -vv --tb=long --showlocals` already\
    \ reveals.\n\n## pdb Quick Reference\n\nInside any pdb prompt (`(Pdb)`):\n\n|\
    \ Command | Action |\n|---|---|\n| `h` / `h cmd` | help |\n| `n` | next line (step\
    \ over) |\n| `s` | step into |\n| `r` | return from current function |\n| `c`\
    \ | continue |\n| `unt N` | continue until line N |\n| `j N` | jump to line N\
    \ (same function only) |\n| `l` / `ll` | list source around current line / full\
    \ function |\n| `w` | where (stack trace) |\n| `u` / `d` | move up / down in the\
    \ stack |\n| `a` | print args of the current function |\n| `p expr` / `pp expr`\
    \ | print / pretty-print expression |\n| `display expr` | auto-print expr on every\
    \ stop |\n| `b file:line` | set breakpoint |\n| `b func` | break on function entry\
    \ |\n| `b file:line, cond` | conditional breakpoint |\n| `cl N` | clear breakpoint\
    \ N |\n| `tbreak file:line` | one-shot breakpoint |\n| `!stmt` | execute arbitrary\
    \ Python (assignments included) |\n| `interact` | drop into full Python REPL in\
    \ current scope (Ctrl+D to exit) |\n| `q` | quit |\n\nThe `interact` command is\
    \ the most powerful \u2014 you can import anything, inspect complex objects, even\
    \ call methods that mutate state. Locals are read-only by default; use `!x = 42`\
    \ from the `(Pdb)` prompt to mutate.\n\n## Recipe 1: Local breakpoint\n\nEasiest.\
    \ Edit the file:\n\n```python\ndef compute(x, y):\n    result = some_helper(x)\n\
    \    breakpoint()           # <-- drops into pdb here\n    return result + y\n\
    ```\n\nRun the code normally. You land at the `breakpoint()` line with full access\
    \ to locals.\n\n**Don't forget to remove `breakpoint()` before committing.** Use\
    \ `git diff` or a pre-commit grep:\n```bash\nrg -n 'breakpoint\\(\\)' --type py\n\
    ```\n\n## Recipe 2: Launch a script under pdb (no source edits)\n\n```bash\npython\
    \ -m pdb path/to/script.py arg1 arg2\n# Lands at first line of script\n(Pdb) b\
    \ path/to/script.py:42\n(Pdb) c\n```\n\n## Recipe 3: Debug a pytest test\n\nThe\
    \ hermes test runner and pytest both support this:\n\n```bash\n# Drop to pdb on\
    \ failure (or on any raised exception):\nscripts/run_tests.sh tests/path/to/test_file.py::test_name\
    \ --pdb\n\n# Drop to pdb at the START of the test:\nscripts/run_tests.sh tests/path/to/test_file.py::test_name\
    \ --trace\n\n# Show locals in tracebacks without pdb:\nscripts/run_tests.sh tests/path/to/test_file.py\
    \ --showlocals --tb=long\n```\n\nNote: `scripts/run_tests.sh` uses xdist (`-n\
    \ 4`) by default, and pdb does NOT work under xdist. Add `-p no:xdist` or run\
    \ a single test with `-n 0`:\n\n```bash\nscripts/run_tests.sh tests/foo_test.py::test_bar\
    \ --pdb -p no:xdist\n# or\nsource .venv/bin/activate\npython -m pytest tests/foo_test.py::test_bar\
    \ --pdb\n```\n\nThis bypasses the hermetic-env guarantees \u2014 fine for debugging,\
    \ but re-run under the wrapper to confirm before pushing.\n\n## Recipe 4: Post-mortem\
    \ on any exception\n\n```python\nimport pdb, sys\ntry:\n    run_the_thing()\n\
    except Exception:\n    pdb.post_mortem(sys.exc_info()[2])\n```\n\nOr wrap a whole\
    \ script:\n\n```bash\npython -m pdb -c continue script.py\n# When it crashes,\
    \ pdb catches it and you're in the frame of the exception\n```\n\nOr set a global\
    \ hook in a repl/jupyter:\n\n```python\nimport sys\ndef excepthook(etype, value,\
    \ tb):\n    import pdb; pdb.post_mortem(tb)\nsys.excepthook = excepthook\n```\n\
    \n## Recipe 5: Remote debug with debugpy (attach to running process)\n\nFor long-lived\
    \ processes: Hermes gateway, tui_gateway, a daemon, a process that's already misbehaving\
    \ and can't be restarted clean.\n\n### Setup\n\n```bash\nsource /home/bb/hermes-agent/.venv/bin/activate\n\
    pip install debugpy\n```\n\n### Pattern A: Source-edit \u2014 process waits for\
    \ debugger at launch\n\nAdd near the top of the entry point (or inside the function\
    \ you want to debug):\n\n```python\nimport debugpy\ndebugpy.listen((\"127.0.0.1\"\
    , 5678))\nprint(\"debugpy listening on 5678, waiting for client...\", flush=True)\n\
    debugpy.wait_for_client()\ndebugpy.breakpoint()       # optional: pause immediately\
    \ once attached\n```\n\nStart the process; it blocks on `wait_for_client()`.\n\
    \n### Pattern B: No source edit \u2014 launch with `-m debugpy`\n\n```bash\npython\
    \ -m debugpy --listen 127.0.0.1:5678 --wait-for-client your_script.py arg1\n```\n\
    \nEquivalent for module entry:\n\n```bash\npython -m debugpy --listen 127.0.0.1:5678\
    \ --wait-for-client -m your.module\n```\n\n### Pattern C: Attach to an already-running\
    \ process\n\nNeeds the PID and debugpy preinstalled in the target's environment:\n\
    \n```bash\npython -m debugpy --listen 127.0.0.1:5678 --pid <pid>\n# debugpy injects\
    \ itself into the process. Then attach a client as below.\n```\n\nSome kernels/security\
    \ configs block the ptrace-based injection (`/proc/sys/kernel/yama/ptrace_scope`).\
    \ Fix with:\n```bash\necho 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope\n```\n\
    \n### Connecting a client from the terminal\n\nThe easiest terminal-side DAP client\
    \ is VS Code CLI or a small script. From inside Hermes you have two practical\
    \ options:\n\n**Option 1: `debugpy`'s own CLI REPL** \u2014 not an official feature,\
    \ but a tiny DAP client script:\n\n```python\n# /tmp/dap_client.py\nimport socket,\
    \ json, itertools, time, sys\n\nHOST, PORT = \"127.0.0.1\", 5678\ns = socket.create_connection((HOST,\
    \ PORT))\nseq = itertools.count(1)\n\ndef send(msg):\n    msg[\"seq\"] = next(seq)\n\
    \    body = json.dumps(msg).encode()\n    s.sendall(f\"Content-Length: {len(body)}\\\
    r\\n\\r\\n\".encode() + body)\n\ndef recv():\n    header = b\"\"\n    while b\"\
    \\r\\n\\r\\n\" not in header:\n        header += s.recv(1)\n    length = int(header.decode().split(\"\
    Content-Length:\")[1].split(\"\\r\\n\")[0].strip())\n    body = b\"\"\n    while\
    \ len(body) < length:\n        body += s.recv(length - len(body))\n    return\
    \ json.loads(body)\n\nsend({\"type\": \"request\", \"command\": \"initialize\"\
    , \"arguments\": {\"adapterID\": \"python\"}})\nprint(recv())\nsend({\"type\"\
    : \"request\", \"command\": \"attach\", \"arguments\": {}})\nprint(recv())\nsend({\"\
    type\": \"request\", \"command\": \"setBreakpoints\",\n      \"arguments\": {\"\
    source\": {\"path\": sys.argv[1]},\n                    \"breakpoints\": [{\"\
    line\": int(sys.argv[2])}]}})\nprint(recv())\nsend({\"type\": \"request\", \"\
    command\": \"configurationDone\"})\n# ... loop reading events and sending continue/stepIn/etc.\n\
    ```\n\nThis is fine for one-off automation but painful as an interactive UX.\n\
    \n**Option 2: Attach from VS Code / Cursor / Zed** \u2014 if the user has one\
    \ open, they can add a `launch.json`:\n\n```json\n{\n  \"name\": \"Attach to Hermes\"\
    ,\n  \"type\": \"debugpy\",\n  \"request\": \"attach\",\n  \"connect\": { \"host\"\
    : \"127.0.0.1\", \"port\": 5678 },\n  \"justMyCode\": false,\n  \"pathMappings\"\
    : [\n    { \"localRoot\": \"${workspaceFolder}\", \"remoteRoot\": \"/home/bb/hermes-agent\"\
    \ }\n  ]\n}\n```\n\n**Option 3: Ditch DAP, use `remote-pdb`** \u2014 usually what\
    \ you actually want from a terminal agent:\n\n```bash\npip install remote-pdb\n\
    ```\n\nIn your code:\n```python\nfrom remote_pdb import set_trace\nset_trace(host=\"\
    127.0.0.1\", port=4444)   # blocks until connection\n```\n\nThen from the terminal:\n\
    ```bash\nnc 127.0.0.1 4444\n# You get a (Pdb) prompt exactly as if debugging locally.\n\
    ```\n\n`remote-pdb` is the cleanest agent-friendly choice when `debugpy`'s DAP\
    \ protocol is overkill. Use `debugpy` only when you actually need IDE integration.\n\
    \n## Debugging Hermes-specific Processes\n\n### Tests\nSee Recipe 3. Always add\
    \ `-p no:xdist` or run single tests without xdist.\n\n### `run_agent.py` / CLI\
    \ \u2014 one-shot\nEasiest: add `breakpoint()` near the suspect line, then run\
    \ `hermes` normally. Control returns to your terminal at the pause point.\n\n\
    ### `tui_gateway` subprocess (spawned by `hermes --tui`)\nThe gateway runs as\
    \ a child of the Node TUI. Options:\n\n**A. Source-edit the gateway:**\n```python\n\
    # tui_gateway/server.py near the top of serve()\nimport debugpy\ndebugpy.listen((\"\
    127.0.0.1\", 5678))\ndebugpy.wait_for_client()\n```\nStart `hermes --tui`. The\
    \ TUI will appear frozen (its backend is waiting). Attach a client; execution\
    \ resumes when you `continue`.\n\n**B. Use `remote-pdb` at a specific handler:**\n\
    ```python\nfrom remote_pdb import set_trace\nset_trace(host=\"127.0.0.1\", port=4444)\
    \   # in the RPC handler you want to trap\n```\nTrigger the matching slash command\
    \ from the TUI, then `nc 127.0.0.1 4444` in another terminal.\n\n### `_SlashWorker`\
    \ subprocess\nSame pattern \u2014 `remote-pdb` with `set_trace()` inside the worker's\
    \ `exec` path. The worker is persistent across slash commands, so the first trigger\
    \ blocks until you connect; subsequent slash commands pass through normally unless\
    \ you re-arm.\n\n### Gateway (`gateway/run.py`)\nLong-lived. Use `remote-pdb`\
    \ at a handler, or `debugpy` with `--wait-for-client` if you're restarting the\
    \ gateway anyway.\n\n## Common Pitfalls\n\n1. **pdb under pytest-xdist silently\
    \ does nothing.** You won't see the prompt, the test just hangs. Always use `-p\
    \ no:xdist` or `-n 0`.\n\n2. **`breakpoint()` in CI / non-TTY contexts hangs the\
    \ process.** Safe locally; never commit it. Add a pre-commit grep as a safety\
    \ net.\n\n3. **`PYTHONBREAKPOINT=0`** disables all `breakpoint()` calls. Check\
    \ the env if your breakpoint isn't hitting:\n   ```bash\n   echo $PYTHONBREAKPOINT\n\
    \   ```\n\n4. **`debugpy.listen` blocks only if you also call `wait_for_client()`.**\
    \ Without it, execution continues and your first breakpoint may fire before the\
    \ client is attached.\n\n5. **Attach to PID fails on hardened kernels.** `ptrace_scope=1`\
    \ (Ubuntu default) allows only same-user ptrace of child processes. Workaround:\
    \ `echo 0 > /proc/sys/kernel/yama/ptrace_scope` (needs root) or launch under `debugpy`\
    \ from the start.\n\n6. **Threads.** `pdb` only debugs the current thread. For\
    \ multithreaded code, use `debugpy` (thread-aware DAP) or set `threading.settrace()`\
    \ per thread.\n\n7. **asyncio.** `pdb` works in coroutines but `await` inside\
    \ pdb requires Python 3.13+ or `await` from `interact` mode on older versions.\
    \ For 3.11/3.12, use `asyncio.run_coroutine_threadsafe` tricks or `!stmt`-based\
    \ awaits via `asyncio.ensure_future`.\n\n8. **`scripts/run_tests.sh` strips credentials\
    \ and sets `HOME=<tmpdir>`.** If your bug depends on user config or real API keys,\
    \ it won't reproduce under the wrapper. Debug with raw `pytest` first to repro,\
    \ then re-confirm under the wrapper.\n\n9. **Forking / multiprocessing.** pdb\
    \ does not follow forks. Each child needs its own `breakpoint()` or `set_trace()`.\
    \ For Hermes subagents, debug one process at a time.\n\n## Verification Checklist\n\
    \n- [ ] After `pip install debugpy`, confirm: `python -c \"import debugpy; print(debugpy.__version__)\"\
    `\n- [ ] For remote debug, confirm the port is actually listening: `ss -tlnp |\
    \ grep 5678`\n- [ ] First breakpoint actually hits (if it doesn't, you likely\
    \ have `PYTHONBREAKPOINT=0`, you're under xdist, or execution finished before\
    \ attach)\n- [ ] `where` / `w` shows the expected call stack\n- [ ] Post-debug\
    \ cleanup: no stray `breakpoint()` / `set_trace()` in committed code\n  ```bash\n\
    \  rg -n 'breakpoint\\(\\)|set_trace\\(|debugpy\\.listen' --type py\n  ```\n\n\
    ## One-Shot Recipes\n\n**\"Why is this dict missing a key?\"**\n```python\n# add\
    \ above the KeyError site\nbreakpoint()\n# then in pdb:\n(Pdb) pp d\n(Pdb) pp\
    \ list(d.keys())\n(Pdb) w                # how did we get here\n```\n\n**\"This\
    \ test passes in isolation but fails in the suite.\"**\n```bash\nscripts/run_tests.sh\
    \ tests/the_test.py --pdb -p no:xdist\n# But if it only fails WITH other tests:\n\
    source .venv/bin/activate\npython -m pytest tests/ -x --pdb -p no:xdist\n# Now\
    \ it pdb-traps at the exact failing test after state accumulated.\n```\n\n**\"\
    My async handler deadlocks.\"**\n```python\n# Add at handler entry\nimport remote_pdb;\
    \ remote_pdb.set_trace(host=\"127.0.0.1\", port=4444)\n```\nTrigger the handler.\
    \ `nc 127.0.0.1 4444`, then `w` to see the suspended frame, `!import asyncio;\
    \ asyncio.all_tasks()` to see what else is pending.\n\n**\"Post-mortem on a crash\
    \ in an Ink child process / subprocess.\"**\n```bash\nPYTHONFAULTHANDLER=1 python\
    \ -m pdb -c continue path/to/entrypoint.py\n# On crash, pdb lands at the frame\
    \ of the exception with full locals\n```\n"
