  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: kanban-worker\n\
    description: Pitfalls, examples, and edge cases for Hermes Kanban workers. The\
    \ lifecycle itself is auto-injected into every worker's system prompt as KANBAN_GUIDANCE\
    \ (from agent/prompt_builder.py); this skill is what you load when you want deeper\
    \ detail on specific scenarios.\nversion: 2.0.0\nplatforms: [linux, macos, windows]\n\
    metadata:\n  hermes:\n    tags: [kanban, multi-agent, collaboration, workflow,\
    \ pitfalls]\n    related_skills: [kanban-orchestrator]\n---\n\n# Kanban Worker\
    \ \u2014 Pitfalls and Examples\n\n> You're seeing this skill because the Hermes\
    \ Kanban dispatcher spawned you as a worker with `--skills kanban-worker` \u2014\
    \ it's loaded automatically for every dispatched worker. The **lifecycle** (6\
    \ steps: orient \u2192 work \u2192 heartbeat \u2192 block/complete) also lives\
    \ in the `KANBAN_GUIDANCE` block that's auto-injected into your system prompt.\
    \ This skill is the deeper detail: good handoff shapes, retry diagnostics, edge\
    \ cases.\n\n## Workspace handling\n\nYour workspace kind determines how you should\
    \ behave inside `$HERMES_KANBAN_WORKSPACE`:\n\n| Kind | What it is | How to work\
    \ |\n|---|---|---|\n| `scratch` | Fresh tmp dir, yours alone | Read/write freely;\
    \ it gets GC'd when the task is archived. |\n| `dir:<path>` | Shared persistent\
    \ directory | Other runs will read what you write. Treat it like long-lived state.\
    \ Path is guaranteed absolute (the kernel rejects relative paths). |\n| `worktree`\
    \ | Git worktree at the resolved path | If `.git` doesn't exist, run `git worktree\
    \ add <path> <branch>` from the main repo first, then cd and work normally. Commit\
    \ work here. |\n\n## Tenant isolation\n\nIf `$HERMES_TENANT` is set, the task\
    \ belongs to a tenant namespace. When reading or writing persistent memory, prefix\
    \ memory entries with the tenant so context doesn't leak across tenants:\n\n-\
    \ Good: `business-a: Acme is our biggest customer`\n- Bad (leaks): `Acme is our\
    \ biggest customer`\n\n## Good summary + metadata shapes\n\nThe `kanban_complete(summary=...,\
    \ metadata=...)` handoff is how downstream workers read what you did. Patterns\
    \ that work:\n\n**Coding task:**\n```python\nkanban_complete(\n    summary=\"\
    shipped rate limiter \u2014 token bucket, keys on user_id with IP fallback, 14\
    \ tests pass\",\n    metadata={\n        \"changed_files\": [\"rate_limiter.py\"\
    , \"tests/test_rate_limiter.py\"],\n        \"tests_run\": 14,\n        \"tests_passed\"\
    : 14,\n        \"decisions\": [\"user_id primary, IP fallback for unauthenticated\
    \ requests\"],\n    },\n)\n```\n\n**Coding task that needs human review (review-required):**\n\
    \nFor most code-changing tasks, the work isn't truly *done* until a human reviewer\
    \ has eyes on it. Block instead of complete, with `reason` prefixed `review-required:\
    \ ` so the dashboard surfaces the row as needing review. Drop the structured metadata\
    \ (changed files, test counts, diff/PR url) into a comment first, since `kanban_block`\
    \ only carries the human-readable reason \u2014 comments are the durable annotation\
    \ channel. Reviewer either approves and runs `hermes kanban unblock <id>` (which\
    \ re-spawns you with the comment thread for any follow-ups) or asks for changes\
    \ via another comment.\n\n```python\nimport json\n\nkanban_comment(\n    body=\"\
    review-required handoff:\\n\" + json.dumps({\n        \"changed_files\": [\"rate_limiter.py\"\
    , \"tests/test_rate_limiter.py\"],\n        \"tests_run\": 14,\n        \"tests_passed\"\
    : 14,\n        \"diff_path\": \"/path/to/worktree\",  # or PR url if pushed\n\
    \        \"decisions\": [\"user_id primary, IP fallback for unauthenticated requests\"\
    ],\n    }, indent=2),\n)\nkanban_block(\n    reason=\"review-required: rate limiter\
    \ shipped, 14/14 tests pass \u2014 needs eyes on the user_id/IP fallback choice\
    \ before merging\",\n)\n```\n\nUse `kanban_complete` only when the task is genuinely\
    \ terminal \u2014 e.g. a one-line typo fix, a docs change with no functional consequences,\
    \ or a research task where the artifact IS the writeup itself.\n\n**Research task:**\n\
    ```python\nkanban_complete(\n    summary=\"3 competing libraries reviewed; vLLM\
    \ wins on throughput, SGLang on latency, Tensorrt-LLM on memory efficiency\",\n\
    \    metadata={\n        \"sources_read\": 12,\n        \"recommendation\": \"\
    vLLM\",\n        \"benchmarks\": {\"vllm\": 1.0, \"sglang\": 0.87, \"trtllm\"\
    : 0.72},\n    },\n)\n```\n\n**Review task:**\n```python\nkanban_complete(\n  \
    \  summary=\"reviewed PR #123; 2 blocking issues found (SQL injection in /search,\
    \ missing CSRF on /settings)\",\n    metadata={\n        \"pr_number\": 123,\n\
    \        \"findings\": [\n            {\"severity\": \"critical\", \"file\": \"\
    api/search.py\", \"line\": 42, \"issue\": \"raw SQL concat\"},\n            {\"\
    severity\": \"high\", \"file\": \"api/settings.py\", \"issue\": \"missing CSRF\
    \ middleware\"},\n        ],\n        \"approved\": False,\n    },\n)\n```\n\n\
    Shape `metadata` so downstream parsers (reviewers, aggregators, schedulers) can\
    \ use it without re-reading your prose.\n\n## Claiming cards you actually created\n\
    \nIf your run produced new kanban tasks (via `kanban_create`), pass the ids in\
    \ `created_cards` on `kanban_complete`. The kernel verifies each id exists and\
    \ was created by your profile; any phantom id blocks the completion with an error\
    \ listing what went wrong, and the rejected attempt is permanently recorded on\
    \ the task's event log. **Only list ids you captured from a successful `kanban_create`\
    \ return value \u2014 never invent ids from prose, never paste ids from earlier\
    \ runs, never claim cards another worker created.**\n\n```python\n# GOOD \u2014\
    \ capture return values, then claim them.\nc1 = kanban_create(title=\"remediate\
    \ SQL injection\", assignee=\"security-worker\")\nc2 = kanban_create(title=\"\
    fix CSRF middleware\", assignee=\"web-worker\")\n\nkanban_complete(\n    summary=\"\
    Review done; spawned remediations for both findings.\",\n    metadata={\"pr_number\"\
    : 123, \"approved\": False},\n    created_cards=[c1[\"task_id\"], c2[\"task_id\"\
    ]],\n)\n```\n\n```python\n# BAD \u2014 claiming ids you don't have captured return\
    \ values for.\nkanban_complete(\n    summary=\"Created remediation cards t_a1b2c3d4,\
    \ t_deadbeef\",  # hallucinated\n    created_cards=[\"t_a1b2c3d4\", \"t_deadbeef\"\
    ],                   # \u2192 gate rejects\n)\n```\n\nIf a `kanban_create` call\
    \ fails (exception, tool_error), the card was NOT created \u2014 do not include\
    \ a phantom id for it. Retry the create, or omit the id and mention the failure\
    \ in your summary. The prose-scan pass also catches `t_<hex>` references in your\
    \ free-form summary that don't resolve; these don't block the completion but show\
    \ up as advisory warnings on the task in the dashboard.\n\n## Block reasons that\
    \ get answered fast\n\nBad: `\"stuck\"` \u2014 the human has no context.\n\nGood:\
    \ one sentence naming the specific decision you need. Leave longer context as\
    \ a comment instead.\n\n```python\nkanban_comment(\n    task_id=os.environ[\"\
    HERMES_KANBAN_TASK\"],\n    body=\"Full context: I have user IPs from Cloudflare\
    \ headers but some users are behind NATs with thousands of peers. Keying on IP\
    \ alone causes false positives.\",\n)\nkanban_block(reason=\"Rate limit key choice:\
    \ IP (simple, NAT-unsafe) or user_id (requires auth, skips anonymous endpoints)?\"\
    )\n```\n\nThe block message is what appears in the dashboard / gateway notifier.\
    \ The comment is the deeper context a human reads when they open the task.\n\n\
    ## Heartbeats worth sending\n\nGood heartbeats name progress: `\"epoch 12/50,\
    \ loss 0.31\"`, `\"scanned 1.2M/2.4M rows\"`, `\"uploaded 47/120 videos\"`.\n\n\
    Bad heartbeats: `\"still working\"`, empty notes, sub-second intervals. Every\
    \ few minutes max; skip entirely for tasks under ~2 minutes.\n\n## Retry scenarios\n\
    \nIf you open the task and `kanban_show` returns `runs: [...]` with one or more\
    \ closed runs, you're a retry. The prior runs' `outcome` / `summary` / `error`\
    \ tell you what didn't work. Don't repeat that path. Typical retry diagnostics:\n\
    \n- `outcome: \"timed_out\"` \u2014 the previous attempt hit `max_runtime_seconds`.\
    \ You may need to chunk the work or shorten it.\n- `outcome: \"crashed\"` \u2014\
    \ OOM or segfault. Reduce memory footprint.\n- `outcome: \"spawn_failed\"` + `error:\
    \ \"...\"` \u2014 usually a profile config issue (missing credential, bad PATH).\
    \ Ask the human via `kanban_block` instead of retrying blindly.\n- `outcome: \"\
    reclaimed\"` + `summary: \"task archived...\"` \u2014 operator archived the task\
    \ out from under the previous run; you probably shouldn't be running at all, check\
    \ status carefully.\n- `outcome: \"blocked\"` \u2014 a previous attempt blocked;\
    \ the unblock comment should be in the thread by now.\n\n## Do NOT\n\n- Call `delegate_task`\
    \ as a substitute for `kanban_create`. `delegate_task` is for short reasoning\
    \ subtasks inside YOUR run; `kanban_create` is for cross-agent handoffs that outlive\
    \ one API loop.\n- Modify files outside `$HERMES_KANBAN_WORKSPACE` unless the\
    \ task body says to.\n- Create follow-up tasks assigned to yourself \u2014 assign\
    \ to the right specialist.\n- Complete a task you didn't actually finish. Block\
    \ it instead.\n\n## Pitfalls\n\n**Task state can change between dispatch and your\
    \ startup.** Between when the dispatcher claimed and when your process actually\
    \ booted, the task may have been blocked, reassigned, or archived. Always `kanban_show`\
    \ first. If it reports `blocked` or `archived`, stop \u2014 you shouldn't be running.\n\
    \n**Workspace may have stale artifacts.** Especially `dir:` and `worktree` workspaces\
    \ can have files from previous runs. Read the comment thread \u2014 it usually\
    \ explains why you're running again and what state the workspace is in.\n\n**Don't\
    \ rely on the CLI when the guidance is available.** The `kanban_*` tools work\
    \ across all terminal backends (Docker, Modal, SSH). `hermes kanban <verb>` from\
    \ your terminal tool will fail in containerized backends because the CLI isn't\
    \ installed there. When in doubt, use the tool.\n\n## CLI fallback (for scripting)\n\
    \nEvery tool has a CLI equivalent for human operators and scripts:\n- `kanban_show`\
    \ \u2194 `hermes kanban show <id> --json`\n- `kanban_complete` \u2194 `hermes\
    \ kanban complete <id> --summary \"...\" --metadata '{...}'`\n- `kanban_block`\
    \ \u2194 `hermes kanban block <id> \"reason\"`\n- `kanban_create` \u2194 `hermes\
    \ kanban create \"title\" --assignee <profile> [--parent <id>]`\n- etc.\n\nUse\
    \ the tools from inside an agent; the CLI exists for the human at the terminal.\n"
