    \ `skill_manage(\"install\", \"qmd\")` |\n| **diagramming** | Phase 4-5: creating\
    \ Excalidraw-based figures and architecture diagrams | `skill_view(\"diagramming\"\
    )` |\n| **data-science** | Phase 4 (Analysis): Jupyter live kernel for interactive\
    \ analysis and visualization | `skill_view(\"data-science\")` |\n\n**This skill\
    \ supersedes `ml-paper-writing`** \u2014 it contains all of ml-paper-writing's\
    \ content plus the full experiment/analysis pipeline and autoreason methodology.\n\
    \n### Hermes Tools Reference\n\n| Tool | Usage in This Pipeline |\n|------|----------------------|\n\
    | **`terminal`** | LaTeX compilation (`latexmk -pdf`), git operations, launching\
    \ experiments (`nohup python run.py &`), process checks |\n| **`process`** | Background\
    \ experiment management: `process(\"start\", ...)`, `process(\"poll\", pid)`,\
    \ `process(\"log\", pid)`, `process(\"kill\", pid)` |\n| **`execute_code`** |\
    \ Run Python for citation verification, statistical analysis, data aggregation.\
    \ Has tool access via RPC. |\n| **`read_file`** / **`write_file`** / **`patch`**\
    \ | Paper editing, experiment scripts, result files. Use `patch` for targeted\
    \ edits to large .tex files. |\n| **`web_search`** | Literature discovery: `web_search(\"\
    transformer attention mechanism 2024\")` |\n| **`web_extract`** | Fetch paper\
    \ content, verify citations: `web_extract(\"https://arxiv.org/abs/2303.17651\"\
    )` |\n| **`delegate_task`** | **Parallel section drafting** \u2014 spawn isolated\
    \ subagents for each section. Also for concurrent citation verification. |\n|\
    \ **`todo`** | Primary state tracker across sessions. Update after every phase\
    \ transition. |\n| **`memory`** | Persist key decisions across sessions: contribution\
    \ framing, venue choice, reviewer feedback. |\n| **`cronjob`** | Schedule experiment\
    \ monitoring, deadline countdowns, automated arXiv checks. |\n| **`clarify`**\
    \ | Ask the user targeted questions when blocked (venue choice, contribution framing).\
    \ |\n| **`send_message`** | Notify user when experiments complete or drafts are\
    \ ready, even if user isn't in chat. |\n\n### Tool Usage Patterns\n\n**Experiment\
    \ monitoring** (most common):\n```\nterminal(\"ps aux | grep <pattern>\")\n\u2192\
    \ terminal(\"tail -30 <logfile>\")\n\u2192 terminal(\"ls results/\")\n\u2192 execute_code(\"\
    analyze results JSON, compute metrics\")\n\u2192 terminal(\"git add -A && git\
    \ commit -m '<descriptive message>' && git push\")\n\u2192 send_message(\"Experiment\
    \ complete: <summary>\")\n```\n\n**Parallel section drafting** (using delegation):\n\
    ```\ndelegate_task(\"Draft the Methods section based on these experiment scripts\
    \ and configs. \n  Include: pseudocode, all hyperparameters, architectural details\
    \ sufficient for \n  reproduction. Write in LaTeX using the neurips2025 template\
    \ conventions.\")\n\ndelegate_task(\"Draft the Related Work section. Use web_search\
    \ and web_extract to \n  find papers. Verify every citation via Semantic Scholar.\
    \ Group by methodology.\")\n\ndelegate_task(\"Draft the Experiments section. Read\
    \ all result files in results/. \n  State which claim each experiment supports.\
    \ Include error bars and significance.\")\n```\n\nEach delegate runs as a **fresh\
    \ subagent** with no shared context \u2014 provide all necessary information in\
    \ the prompt. Collect outputs and integrate.\n\n**Citation verification** (using\
    \ execute_code):\n```python\n# In execute_code:\nfrom semanticscholar import SemanticScholar\n\
    import requests\n\nsch = SemanticScholar()\nresults = sch.search_paper(\"attention\
    \ mechanism transformers\", limit=5)\nfor paper in results:\n    doi = paper.externalIds.get('DOI',\
    \ 'N/A')\n    if doi != 'N/A':\n        bibtex = requests.get(f\"https://doi.org/{doi}\"\
    , \n                              headers={\"Accept\": \"application/x-bibtex\"\
    }).text\n        print(bibtex)\n```\n\n### State Management with `memory` and\
    \ `todo`\n\n**`memory` tool** \u2014 persist key decisions (bounded: ~2200 chars\
    \ for MEMORY.md):\n\n```\nmemory(\"add\", \"Paper: autoreason. Venue: NeurIPS\
    \ 2025 (9 pages). \n  Contribution: structured refinement works when generation-evaluation\
    \ gap is wide.\n  Key results: Haiku 42/42, Sonnet 3/5, S4.6 constrained 2/3.\n\
    \  Status: Phase 5 \u2014 drafting Methods section.\")\n```\n\nUpdate memory after\
    \ major decisions or phase transitions. This persists across sessions.\n\n**`todo`\
    \ tool** \u2014 track granular progress:\n\n```\ntodo(\"add\", \"Design constrained\
    \ task experiments for Sonnet 4.6\")\ntodo(\"add\", \"Run Haiku baseline comparison\"\
    )\ntodo(\"add\", \"Draft Methods section\")\ntodo(\"update\", id=3, status=\"\
    in_progress\")\ntodo(\"update\", id=1, status=\"completed\")\n```\n\n**Session\
    \ startup protocol:**\n```\n1. todo(\"list\")                           # Check\
    \ current task list\n2. memory(\"read\")                         # Recall key\
    \ decisions\n3. terminal(\"git log --oneline -10\")      # Check recent commits\n\
    4. terminal(\"ps aux | grep python\")       # Check running experiments\n5. terminal(\"\
    ls results/ | tail -20\")     # Check for new results\n6. Report status to user,\
    \ ask for direction\n```\n\n### Cron Monitoring with `cronjob`\n\nUse the `cronjob`\
    \ tool to schedule periodic experiment checks:\n\n```\ncronjob(\"create\", {\n\
    \  \"schedule\": \"*/30 * * * *\",  # Every 30 minutes\n  \"prompt\": \"Check\
    \ experiment status:\n    1. ps aux | grep run_experiment\n    2. tail -30 logs/experiment_haiku.log\n\
    \    3. ls results/haiku_baselines/\n    4. If complete: read results, compute\
    \ Borda scores, \n       git add -A && git commit -m 'Add Haiku results' && git\
    \ push\n    5. Report: table of results, key finding, next step\n    6. If nothing\
    \ changed: respond with [SILENT]\"\n})\n```\n\n**[SILENT] protocol**: When nothing\
    \ has changed since the last check, respond with exactly `[SILENT]`. This suppresses\
    \ notification delivery to the user. Only report when there are genuine changes\
    \ worth knowing about.\n\n**Deadline tracking**:\n```\ncronjob(\"create\", {\n\
    \  \"schedule\": \"0 9 * * *\",  # Daily at 9am\n  \"prompt\": \"NeurIPS 2025\
    \ deadline: May 22. Today is {date}. \n    Days remaining: {compute}. \n    Check\
    \ todo list \u2014 are we on track? \n    If <7 days: warn user about remaining\
    \ tasks.\"\n})\n```\n\n### Communication Patterns\n\n**When to notify the user**\
    \ (via `send_message` or direct response):\n- Experiment batch completed (with\
    \ results table)\n- Unexpected finding or failure requiring decision\n- Draft\
    \ section ready for review\n- Deadline approaching with incomplete tasks\n\n**When\
    \ NOT to notify:**\n- Experiment still running, no new results \u2192 `[SILENT]`\n\
    - Routine monitoring with no changes \u2192 `[SILENT]`\n- Intermediate steps that\
    \ don't need attention\n\n**Report format** \u2014 always include structured data:\n\
    ```\n## Experiment: <name>\nStatus: Complete / Running / Failed\n\n| Task | Method\
    \ A | Method B | Method C |\n|------|---------|---------|---------|\n| Task 1\
    \ | 85.2 | 82.1 | **89.4** |\n\nKey finding: <one sentence>\nNext step: <what\
    \ happens next>\n```\n\n### Decision Points Requiring Human Input\n\nUse `clarify`\
    \ for targeted questions when genuinely blocked:\n\n| Decision | When to Ask |\n\
    |----------|-------------|\n| Target venue | Before starting paper (affects page\
    \ limits, framing) |\n| Contribution framing | When multiple valid framings exist\
    \ |\n| Experiment priority | When TODO list has more experiments than time allows\
    \ |\n| Submission readiness | Before final submission |\n\n**Do NOT ask about**\
    \ (be proactive, make a choice, flag it):\n- Word choice, section ordering\n-\
    \ Which specific results to highlight\n- Citation completeness (draft with what\
    \ you find, note gaps)\n\n---\n\n## Reviewer Evaluation Criteria\n\nUnderstanding\
    \ what reviewers look for helps focus effort:\n\n| Criterion | What They Check\
    \ |\n|-----------|----------------|\n| **Quality** | Technical soundness, well-supported\
    \ claims, fair baselines |\n| **Clarity** | Clear writing, reproducible by experts,\
    \ consistent notation |\n| **Significance** | Community impact, advances understanding\
    \ |\n| **Originality** | New insights (doesn't require new method) |\n\n**Scoring\
    \ (NeurIPS 6-point scale):**\n- 6: Strong Accept \u2014 groundbreaking, flawless\n\
    - 5: Accept \u2014 technically solid, high impact\n- 4: Borderline Accept \u2014\
    \ solid, limited evaluation\n- 3: Borderline Reject \u2014 weaknesses outweigh\n\
    - 2: Reject \u2014 technical flaws\n- 1: Strong Reject \u2014 known results or\
    \ ethics issues\n\nSee [references/reviewer-guidelines.md](references/reviewer-guidelines.md)\
    \ for detailed guidelines, common concerns, and rebuttal strategies.\n\n---\n\n\
    ## Common Issues and Solutions\n\n| Issue | Solution |\n|-------|----------|\n\
    | Abstract too generic | Delete first sentence if it could prepend any ML paper.\
    \ Start with your specific contribution. |\n| Introduction exceeds 1.5 pages |\
    \ Split background into Related Work. Front-load contribution bullets. |\n| Experiments\
    \ lack explicit claims | Add: \"This experiment tests whether [specific claim]...\"\
    \ before each one. |\n| Reviewers find paper hard to follow | Add signposting,\
    \ use consistent terminology, make figure captions self-contained. |\n| Missing\
    \ statistical significance | Add error bars, number of runs, statistical tests,\
    \ confidence intervals. |\n| Scope creep in experiments | Every experiment must\
    \ map to a specific claim. Cut experiments that don't. |\n| Paper rejected, need\
    \ to resubmit | See Conference Resubmission in Phase 7. Address reviewer concerns\
    \ without referencing reviews. |\n| Missing broader impact statement | See Step\
    \ 5.10. Most venues require it. \"No negative impacts\" is almost never credible.\
    \ |\n| Human eval criticized as weak | See Step 2.5 and [references/human-evaluation.md](references/human-evaluation.md).\
    \ Report agreement metrics, annotator details, compensation. |\n| Reviewers question\
    \ reproducibility | Release code (Step 7.9), document all hyperparameters, include\
    \ seeds and compute details. |\n| Theory paper lacks intuition | Add proof sketches\
    \ with plain-language explanations before formal proofs. See [references/paper-types.md](references/paper-types.md).\
    \ |\n| Results are negative/null | See Phase 4.3 on handling negative results.\
    \ Consider workshops, TMLR, or reframing as analysis. |\n\n---\n\n## Reference\
    \ Documents\n\n| Document | Contents |\n|----------|----------|\n| [references/writing-guide.md](references/writing-guide.md)\
    \ | Gopen & Swan 7 principles, Perez micro-tips, Lipton word choice, Steinhardt\
    \ precision, figure design |\n| [references/citation-workflow.md](references/citation-workflow.md)\
    \ | Citation APIs, Python code, CitationManager class, BibTeX management |\n|\
    \ [references/checklists.md](references/checklists.md) | NeurIPS 16-item, ICML,\
    \ ICLR, ACL requirements, universal pre-submission checklist |\n| [references/reviewer-guidelines.md](references/reviewer-guidelines.md)\
    \ | Evaluation criteria, scoring, common concerns, rebuttal template |\n| [references/sources.md](references/sources.md)\
    \ | Complete bibliography of all writing guides, conference guidelines, APIs |\n\
    | [references/experiment-patterns.md](references/experiment-patterns.md) | Experiment\
    \ design patterns, evaluation protocols, monitoring, error recovery |\n| [references/autoreason-methodology.md](references/autoreason-methodology.md)\
    \ | Autoreason loop, strategy selection, model guide, prompts, scope constraints,\
    \ Borda scoring |\n| [references/human-evaluation.md](references/human-evaluation.md)\
    \ | Human evaluation design, annotation guidelines, agreement metrics, crowdsourcing\
    \ QC, IRB guidance |\n| [references/paper-types.md](references/paper-types.md)\
    \ | Theory papers (proof writing, theorem structure), survey papers, benchmark\
    \ papers, position papers |\n\n### LaTeX Templates\n\nTemplates in `templates/`\
    \ for: **NeurIPS 2025**, **ICML 2026**, **ICLR 2026**, **ACL**, **AAAI 2026**,\
    \ **COLM 2025**.\n\nSee [templates/README.md](templates/README.md) for compilation\
    \ instructions.\n\n### Key External Sources\n\n**Writing Philosophy:**\n- [Neel\
    \ Nanda: How to Write ML Papers](https://www.alignmentforum.org/posts/eJGptPbbFPZGLpjsp/highly-opinionated-advice-on-how-to-write-ml-papers)\n\
    - [Sebastian Farquhar: How to Write ML Papers](https://sebastianfarquhar.com/on-research/2024/11/04/how_to_write_ml_papers/)\n\
    - [Gopen & Swan: Science of Scientific Writing](https://cseweb.ucsd.edu/~swanson/papers/science-of-writing.pdf)\n\
    - [Lipton: Heuristics for Scientific Writing](https://www.approximatelycorrect.com/2018/01/29/heuristics-technical-scientific-writing-machine-learning-perspective/)\n\
    - [Perez: Easy Paper Writing Tips](https://ethanperez.net/easy-paper-writing-tips/)\n\
    \n**APIs:** [Semantic Scholar](https://api.semanticscholar.org/api-docs/) | [CrossRef](https://www.crossref.org/documentation/retrieve-metadata/rest-api/)\
    \ | [arXiv](https://info.arxiv.org/help/api/basics.html)\n\n**Venues:** [NeurIPS](https://neurips.cc/Conferences/2025/PaperInformation/StyleFiles)\
    \ | [ICML](https://icml.cc/Conferences/2025/AuthorInstructions) | [ICLR](https://iclr.cc/Conferences/2026/AuthorGuide)\
    \ | [ACL](https://github.com/acl-org/acl-style-files)\n"
