    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n<!-- ascii-guard-ignore-end\
    \ -->\n\n---\n\n## When To Use This Skill\n\nUse this skill when:\n- **Starting\
    \ a new research paper** from an existing codebase or idea\n- **Designing and\
    \ running experiments** to support paper claims\n- **Writing or revising** any\
    \ section of a research paper\n- **Preparing for submission** to a specific conference\
    \ or workshop\n- **Responding to reviews** with additional experiments or revisions\n\
    - **Converting** a paper between conference formats\n- **Writing non-empirical\
    \ papers** \u2014 theory, survey, benchmark, or position papers (see [Paper Types\
    \ Beyond Empirical ML](#paper-types-beyond-empirical-ml))\n- **Designing human\
    \ evaluations** for NLP, HCI, or alignment research\n- **Preparing post-acceptance\
    \ deliverables** \u2014 posters, talks, code releases\n\n## Core Philosophy\n\n\
    1. **Be proactive.** Deliver complete drafts, not questions. Scientists are busy\
    \ \u2014 produce something concrete they can react to, then iterate.\n2. **Never\
    \ hallucinate citations.** AI-generated citations have ~40% error rate. Always\
    \ fetch programmatically. Mark unverifiable citations as `[CITATION NEEDED]`.\n\
    3. **Paper is a story, not a collection of experiments.** Every paper needs one\
    \ clear contribution stated in a single sentence. If you can't do that, the paper\
    \ isn't ready.\n4. **Experiments serve claims.** Every experiment must explicitly\
    \ state which claim it supports. Never run experiments that don't connect to the\
    \ paper's narrative.\n5. **Commit early, commit often.** Every completed experiment\
    \ batch, every paper draft update \u2014 commit with descriptive messages. Git\
    \ log is the experiment history.\n\n### Proactivity and Collaboration\n\n**Default:\
    \ Be proactive. Draft first, ask with the draft.**\n\n| Confidence Level | Action\
    \ |\n|-----------------|--------|\n| **High** (clear repo, obvious contribution)\
    \ | Write full draft, deliver, iterate on feedback |\n| **Medium** (some ambiguity)\
    \ | Write draft with flagged uncertainties, continue |\n| **Low** (major unknowns)\
    \ | Ask 1-2 targeted questions via `clarify`, then draft |\n\n| Section | Draft\
    \ Autonomously? | Flag With Draft |\n|---------|-------------------|-----------------|\n\
    | Abstract | Yes | \"Framed contribution as X \u2014 adjust if needed\" |\n| Introduction\
    \ | Yes | \"Emphasized problem Y \u2014 correct if wrong\" |\n| Methods | Yes\
    \ | \"Included details A, B, C \u2014 add missing pieces\" |\n| Experiments |\
    \ Yes | \"Highlighted results 1, 2, 3 \u2014 reorder if needed\" |\n| Related\
    \ Work | Yes | \"Cited papers X, Y, Z \u2014 add any I missed\" |\n\n**Block for\
    \ input only when**: target venue unclear, multiple contradictory framings, results\
    \ seem incomplete, explicit request to review first.\n\n---\n\n## Phase 0: Project\
    \ Setup\n\n**Goal**: Establish the workspace, understand existing work, identify\
    \ the contribution.\n\n### Step 0.1: Explore the Repository\n\n```bash\n# Understand\
    \ project structure\nls -la\nfind . -name \"*.py\" | head -30\nfind . -name \"\
    *.md\" -o -name \"*.txt\" | xargs grep -l -i \"result\\|conclusion\\|finding\"\
    \n```\n\nLook for:\n- `README.md` \u2014 project overview and claims\n- `results/`,\
    \ `outputs/`, `experiments/` \u2014 existing findings\n- `configs/` \u2014 experimental\
    \ settings\n- `.bib` files \u2014 existing citations\n- Draft documents or notes\n\
    \n### Step 0.2: Organize the Workspace\n\nEstablish a consistent workspace structure:\n\
    \n```\nworkspace/\n  paper/               # LaTeX source, figures, compiled PDFs\n\
    \  experiments/         # Experiment runner scripts\n  code/                #\
    \ Core method implementation\n  results/             # Raw experiment results\
    \ (auto-generated)\n  tasks/               # Task/benchmark definitions\n  human_eval/\
    \          # Human evaluation materials (if needed)\n```\n\n### Step 0.3: Set\
    \ Up Version Control\n\n```bash\ngit init  # if not already\ngit remote add origin\
    \ <repo-url>\ngit checkout -b paper-draft  # or main\n```\n\n**Git discipline**:\
    \ Every completed experiment batch gets committed with a descriptive message.\
    \ Example:\n```\nAdd Monte Carlo constrained results (5 runs, Sonnet 4.6, policy\
    \ memo task)\nAdd Haiku baseline comparison: autoreason vs refinement baselines\
    \ at cheap model tier\n```\n\n### Step 0.4: Identify the Contribution\n\nBefore\
    \ writing anything, articulate:\n- **The What**: What is the single thing this\
    \ paper contributes?\n- **The Why**: What evidence supports it?\n- **The So What**:\
    \ Why should readers care?\n\n> Propose to the scientist: \"Based on my understanding,\
    \ the main contribution is: [one sentence]. The key results show [Y]. Is this\
    \ the framing you want?\"\n\n### Step 0.5: Create a TODO List\n\nUse the `todo`\
    \ tool to create a structured project plan:\n\n```\nResearch Paper TODO:\n- [\
    \ ] Define one-sentence contribution\n- [ ] Literature review (related work +\
    \ baselines)\n- [ ] Design core experiments\n- [ ] Run experiments\n- [ ] Analyze\
    \ results\n- [ ] Write first draft\n- [ ] Self-review (simulate reviewers)\n-\
    \ [ ] Revise based on review\n- [ ] Submission prep\n```\n\nUpdate this throughout\
    \ the project. It serves as the persistent state across sessions.\n\n### Step\
    \ 0.6: Estimate Compute Budget\n\nBefore running experiments, estimate total cost\
    \ and time:\n\n```\nCompute Budget Checklist:\n- [ ] API costs: (model price per\
    \ token) \xD7 (estimated tokens per run) \xD7 (number of runs)\n- [ ] GPU hours:\
    \ (time per experiment) \xD7 (number of experiments) \xD7 (number of seeds)\n\
    - [ ] Human evaluation costs: (annotators) \xD7 (hours) \xD7 (hourly rate)\n-\
    \ [ ] Total budget ceiling and contingency (add 30-50% for reruns)\n```\n\nTrack\
    \ actual spend as experiments run:\n```python\n# Simple cost tracker pattern\n\
    import json, os\nfrom datetime import datetime\n\nCOST_LOG = \"results/cost_log.jsonl\"\
    \n\ndef log_cost(experiment: str, model: str, input_tokens: int, output_tokens:\
    \ int, cost_usd: float):\n    entry = {\n        \"timestamp\": datetime.now().isoformat(),\n\
    \        \"experiment\": experiment,\n        \"model\": model,\n        \"input_tokens\"\
    : input_tokens,\n        \"output_tokens\": output_tokens,\n        \"cost_usd\"\
    : cost_usd,\n    }\n    with open(COST_LOG, \"a\") as f:\n        f.write(json.dumps(entry)\
    \ + \"\\n\")\n```\n\n**When budget is tight**: Run pilot experiments (1-2 seeds,\
    \ subset of tasks) before committing to full sweeps. Use cheaper models for debugging\
    \ pipelines, then switch to target models for final runs.\n\n### Step 0.7: Multi-Author\
    \ Coordination\n\nMost papers have 3-10 authors. Establish workflows early:\n\n\
    | Workflow | Tool | When to Use |\n|----------|------|-------------|\n| **Overleaf**\
    \ | Browser-based | Multiple authors editing simultaneously, no git experience\
    \ |\n| **Git + LaTeX** | `git` with `.gitignore` for aux files | Technical teams,\
    \ need branch-based review |\n| **Overleaf + Git sync** | Overleaf premium | Best\
    \ of both \u2014 live collab with version history |\n\n**Section ownership**:\
    \ Assign each section to one primary author. Others comment but don't edit directly.\
    \ Prevents merge conflicts and style inconsistency.\n\n```\nAuthor Coordination\
    \ Checklist:\n- [ ] Agree on section ownership (who writes what)\n- [ ] Set up\
    \ shared workspace (Overleaf or git repo)\n- [ ] Establish notation conventions\
    \ (before anyone writes)\n- [ ] Schedule internal review rounds (not just at the\
    \ end)\n- [ ] Designate one person for final formatting pass\n- [ ] Agree on figure\
    \ style (colors, fonts, sizes) before creating figures\n```\n\n**LaTeX conventions\
    \ to agree on early**:\n- `\\method{}` macro for consistent method naming\n- Citation\
    \ style: `\\citet{}` vs `\\citep{}` usage\n- Math notation: lowercase bold for\
    \ vectors, uppercase bold for matrices, etc.\n- British vs American spelling\n\
    \n---\n\n## Phase 1: Literature Review\n\n**Goal**: Find related work, identify\
    \ baselines, gather citations.\n\n### Step 1.1: Identify Seed Papers\n\nStart\
    \ from papers already referenced in the codebase:\n\n```bash\n# Via terminal:\n\
    grep -r \"arxiv\\|doi\\|cite\" --include=\"*.md\" --include=\"*.bib\" --include=\"\
    *.py\"\nfind . -name \"*.bib\"\n```\n\n### Step 1.2: Search for Related Work\n\
    \n**Load the `arxiv` skill** for structured paper discovery: `skill_view(\"arxiv\"\
    )`. It provides arXiv REST API search, Semantic Scholar citation graphs, author\
    \ profiles, and BibTeX generation.\n\nUse `web_search` for broad discovery, `web_extract`\
    \ for fetching specific papers:\n\n```\n# Via web_search:\nweb_search(\"[main\
    \ technique] + [application domain] site:arxiv.org\")\nweb_search(\"[baseline\
    \ method] comparison ICML NeurIPS 2024\")\n\n# Via web_extract (for specific papers):\n\
    web_extract(\"https://arxiv.org/abs/2303.17651\")\n```\n\nAdditional search queries\
    \ to try:\n\n```\nSearch queries:\n- \"[main technique] + [application domain]\"\
    \n- \"[baseline method] comparison\"\n- \"[problem name] state-of-the-art\"\n\
    - Author names from existing citations\n```\n\n**Recommended**: Install **Exa\
    \ MCP** for real-time academic search:\n```bash\nclaude mcp add exa -- npx -y\
    \ mcp-remote \"https://mcp.exa.ai/mcp\"\n```\n\n### Step 1.2b: Deepen the Search\
    \ (Breadth-First, Then Depth)\n\nA flat search (one round of queries) typically\
    \ misses important related work. Use an iterative **breadth-then-depth** pattern\
    \ inspired by deep research pipelines:\n\n```\nIterative Literature Search:\n\n\
    Round 1 (Breadth): 4-6 parallel queries covering different angles\n  - \"[method]\
    \ + [domain]\"\n  - \"[problem name] state-of-the-art 2024 2025\"\n  - \"[baseline\
    \ method] comparison\"\n  - \"[alternative approach] vs [your approach]\"\n  \u2192\
    \ Collect papers, extract key concepts and terminology\n\nRound 2 (Depth): Generate\
    \ follow-up queries from Round 1 learnings\n  - New terminology discovered in\
    \ Round 1 papers\n  - Papers cited by the most relevant Round 1 results\n  - Contradictory\
    \ findings that need investigation\n  \u2192 Collect papers, identify remaining\
    \ gaps\n\nRound 3 (Targeted): Fill specific gaps\n  - Missing baselines identified\
    \ in Rounds 1-2\n  - Concurrent work (last 6 months, same problem)\n  - Key negative\
    \ results or failed approaches\n  \u2192 Stop when new queries return mostly papers\
    \ you've already seen\n```\n\n**When to stop**: If a round returns >80% papers\
    \ already in your collection, the search is saturated. Typically 2-3 rounds suffice.\
    \ For survey papers, expect 4-5 rounds.\n\n**For agent-based workflows**: Delegate\
    \ each round's queries in parallel via `delegate_task`. Collect results, deduplicate,\
    \ then generate the next round's queries from the combined learnings.\n\n### Step\
    \ 1.3: Verify Every Citation\n\n**NEVER generate BibTeX from memory. ALWAYS fetch\
    \ programmatically.**\n\nFor each citation, follow the mandatory 5-step process:\n\
    \n```\nCitation Verification (MANDATORY per citation):\n1. SEARCH \u2192 Query\
    \ Semantic Scholar or Exa MCP with specific keywords\n2. VERIFY \u2192 Confirm\
    \ paper exists in 2+ sources (Semantic Scholar + arXiv/CrossRef)\n3. RETRIEVE\
    \ \u2192 Get BibTeX via DOI content negotiation (programmatically, not from memory)\n\
    4. VALIDATE \u2192 Confirm the claim you're citing actually appears in the paper\n\
    5. ADD \u2192 Add verified BibTeX to bibliography\nIf ANY step fails \u2192 mark\
    \ as [CITATION NEEDED], inform scientist\n```\n\n```python\n# Fetch BibTeX via\
    \ DOI\nimport requests\n\ndef doi_to_bibtex(doi: str) -> str:\n    response =\
    \ requests.get(\n        f\"https://doi.org/{doi}\",\n        headers={\"Accept\"\
    : \"application/x-bibtex\"}\n    )\n    response.raise_for_status()\n    return\
    \ response.text\n```\n\nIf you cannot verify a citation:\n\n```latex\n\\cite{PLACEHOLDER_author2024_verify_this}\
    \  % TODO: Verify this citation exists\n```\n\n**Always tell the scientist**:\
    \ \"I've marked [X] citations as placeholders that need verification.\"\n\nSee\
    \ [references/citation-workflow.md](references/citation-workflow.md) for complete\
    \ API documentation and the full `CitationManager` class.\n\n### Step 1.4: Organize\
    \ Related Work\n\nGroup papers by methodology, not paper-by-paper:\n\n**Good**:\
    \ \"One line of work uses X's assumption [refs] whereas we use Y's assumption\
    \ because...\"\n**Bad**: \"Smith et al. introduced X. Jones et al. introduced\
    \ Y. We combine both.\"\n\n---\n\n## Phase 2: Experiment Design\n\n**Goal**: Design\
    \ experiments that directly support paper claims. Every experiment must answer\
    \ a specific question.\n\n### Step 2.1: Map Claims to Experiments\n\nCreate an\
    \ explicit mapping:\n\n| Claim | Experiment | Expected Evidence |\n|-------|-----------|-------------------|\n\
    | \"Our method outperforms baselines\" | Main comparison (Table 1) | Win rate,\
    \ statistical significance |\n| \"Effect is larger for weaker models\" | Model\
    \ scaling study | Monotonic improvement curve |\n| \"Convergence requires scope\
    \ constraints\" | Constrained vs unconstrained | Convergence rate comparison |\n\
    \n**Rule**: If an experiment doesn't map to a claim, don't run it.\n\n### Step\
    \ 2.2: Design Baselines\n\nStrong baselines are what separates accepted papers\
    \ from rejected ones. Reviewers will ask: \"Did they compare against X?\"\n\n\
    Standard baseline categories:\n- **Naive baseline**: Simplest possible approach\n\
    - **Strong baseline**: Best known existing method\n- **Ablation baselines**: Your\
    \ method minus one component\n- **Compute-matched baselines**: Same compute budget,\
    \ different allocation\n\n### Step 2.3: Define Evaluation Protocol\n\nBefore running\
    \ anything, specify:\n- **Metrics**: What you're measuring, direction symbols\
    \ (higher/lower better)\n- **Aggregation**: How results are combined across runs/tasks\n\
    - **Statistical tests**: What tests will establish significance\n- **Sample sizes**:\
    \ How many runs/problems/tasks\n\n### Step 2.4: Write Experiment Scripts\n\nFollow\
    \ these patterns from successful research pipelines:\n\n**Incremental saving**\
    \ \u2014 save results after each step for crash recovery:\n```python\n# Save after\
    \ each problem/task\nresult_path = f\"results/{task}/{strategy}/result.json\"\n\
    if os.path.exists(result_path):\n    continue  # Skip already-completed work\n\
    # ... run experiment ...\nwith open(result_path, 'w') as f:\n    json.dump(result,\
    \ f, indent=2)\n```\n\n**Artifact preservation** \u2014 save all intermediate\
    \ outputs:\n```\nresults/<experiment>/\n  <task>/\n    <strategy>/\n      final_output.md\
    \          # Final result\n      history.json             # Full trajectory\n\
    \      pass_01/                 # Per-iteration artifacts\n        version_a.md\n\
    \        version_b.md\n        critic.md\n```\n\n**Separation of concerns** \u2014\
    \ keep generation, evaluation, and visualization separate:\n```\nrun_experiment.py\
    \              # Core experiment runner\nrun_baselines.py               # Baseline\
    \ comparison\nrun_comparison_judge.py        # Blind evaluation\nanalyze_results.py\
    \             # Statistical analysis\nmake_charts.py                 # Visualization\n\
    ```\n\nSee [references/experiment-patterns.md](references/experiment-patterns.md)\
    \ for complete design patterns, cron monitoring, and error recovery.\n\n### Step\
    \ 2.5: Design Human Evaluation (If Applicable)\n\nMany NLP, HCI, and alignment\
    \ papers require human evaluation as primary or complementary evidence. Design\
    \ this before running automated experiments \u2014 human eval often has longer\
    \ lead times (IRB approval, annotator recruitment).\n\n**When human evaluation\
    \ is needed:**\n- Automated metrics don't capture what you care about (fluency,\
    \ helpfulness, safety)\n- Your contribution is about human-facing qualities (readability,\
    \ preference, trust)\n- Reviewers at NLP venues (ACL, EMNLP) expect it for generation\
    \ tasks\n\n**Key design decisions:**\n\n| Decision | Options | Guidance |\n|----------|---------|----------|\n\
    | **Annotator type** | Expert, crowdworker, end-user | Match to what your claims\
    \ require |\n| **Scale** | Likert (1-5), pairwise comparison, ranking | Pairwise\
    \ is more reliable than Likert for LLM outputs |\n| **Sample size** | Per annotator\
    \ and total items | Power analysis or minimum 100 items, 3+ annotators |\n| **Agreement\
    \ metric** | Cohen's kappa, Krippendorff's alpha, ICC | Krippendorff's alpha for\
    \ >2 annotators; report raw agreement too |\n| **Platform** | Prolific, MTurk,\
    \ internal team | Prolific for quality; MTurk for scale; internal for domain expertise\
    \ |\n\n**Annotation guideline checklist:**\n```\n- [ ] Clear task description\
    \ with examples (good AND bad)\n- [ ] Decision criteria for ambiguous cases\n\
    - [ ] At least 2 worked examples per category\n- [ ] Attention checks / gold standard\
    \ items (10-15% of total)\n- [ ] Qualification task or screening round\n- [ ]\
    \ Estimated time per item and fair compensation (>= local minimum wage)\n- [ ]\
    \ IRB/ethics review if required by your institution\n```\n\n**Reporting requirements**\
    \ (reviewers check all of these):\n- Number of annotators and their qualifications\n\
    - Inter-annotator agreement with specific metric and value\n- Compensation details\
    \ (amount, estimated hourly rate)\n- Annotation interface description or screenshot\
    \ (appendix)\n- Total annotation time\n\nSee [references/human-evaluation.md](references/human-evaluation.md)\
    \ for complete guide including statistical tests for human eval data, crowdsourcing\
    \ quality control patterns, and IRB guidance.\n\n---\n\n## Phase 3: Experiment\
    \ Execution & Monitoring\n\n**Goal**: Run experiments reliably, monitor progress,\
    \ recover from failures.\n\n### Step 3.1: Launch Experiments\n\nUse `nohup` for\
    \ long-running experiments:\n\n```bash\nnohup python run_experiment.py --config\
    \ config.yaml > logs/experiment_01.log 2>&1 &\necho $!  # Record the PID\n```\n\
    \n**Parallel execution**: Run independent experiments simultaneously, but be aware\
    \ of API rate limits. 4+ concurrent experiments on the same API will slow each\
    \ down.\n\n### Step 3.2: Set Up Monitoring (Cron Pattern)\n\nFor long-running\
    \ experiments, set up periodic status checks. The cron prompt should follow this\
    \ template:\n\n```\nMonitor Prompt Template:\n1. Check if process is still running:\
    \ ps aux | grep <pattern>\n2. Read last 30 lines of log: tail -30 <logfile>\n\
    3. Check for completed results: ls <result_dir>\n4. If results exist, read and\
    \ report: cat <result_file>\n5. If all done, commit: git add -A && git commit\
    \ -m \"<descriptive message>\" && git push\n6. Report in structured format (tables\
    \ with key metrics)\n7. Answer the key analytical question for this experiment\n\
    ```\n\n**Silent mode**: If nothing has changed since the last check, respond with\
    \ `[SILENT]` to suppress notification to the user. Only report when there's news.\n\
    \n### Step 3.3: Handle Failures\n\nCommon failure modes and recovery:\n\n| Failure\
    \ | Detection | Recovery |\n|---------|-----------|----------|\n| API rate limit\
    \ / credit exhaustion | 402/429 errors in logs | Wait, then re-run (scripts skip\
    \ completed work) |\n| Process crash | PID gone, incomplete results | Re-run from\
    \ last checkpoint |\n| Timeout on hard problems | Process stuck, no log progress\
    \ | Kill and skip, note in results |\n| Wrong model ID | Errors referencing model\
    \ name | Fix ID and re-run |\n\n**Key**: Scripts should always check for existing\
    \ results and skip completed work. This makes re-runs safe and efficient.\n\n\
    ### Step 3.4: Commit Completed Results\n\nAfter each experiment batch completes:\n\
    \n```bash\ngit add -A\ngit commit -m \"Add <experiment name>: <key finding in\
    \ 1 line>\"\ngit push\n```\n\n### Step 3.5: Maintain an Experiment Journal\n\n\
    Git commits track what happened, but not the **exploration tree** \u2014 the decisions\
    \ about what to try next based on what you learned. Maintain a structured experiment\
    \ journal that captures this tree:\n\n```json\n// experiment_journal.jsonl \u2014\
    \ append one entry per experiment attempt\n{\n  \"id\": \"exp_003\",\n  \"parent\"\
    : \"exp_001\",\n  \"timestamp\": \"2025-05-10T14:30:00Z\",\n  \"hypothesis\":\
    \ \"Adding scope constraints will fix convergence failure from exp_001\",\n  \"\
    plan\": \"Re-run autoreason with max_tokens=2000 and fixed structure template\"\
    ,\n  \"config\": {\"model\": \"haiku\", \"strategy\": \"autoreason\", \"max_tokens\"\
    : 2000},\n  \"status\": \"completed\",\n  \"result_path\": \"results/exp_003/\"\
    ,\n  \"key_metrics\": {\"win_rate\": 0.85, \"convergence_rounds\": 3},\n  \"analysis\"\
    : \"Scope constraints fixed convergence. Win rate jumped from 0.42 to 0.85.\"\
    ,\n  \"next_steps\": [\"Try same constraints on Sonnet\", \"Test without structure\
    \ template\"],\n  \"figures\": [\"figures/exp003_convergence.pdf\"]\n}\n```\n\n\
    **Why a journal, not just git?** Git tracks file changes. The journal tracks the\
    \ reasoning: why you tried X, what you learned, and what that implies for the\
    \ next experiment. When writing the paper, this tree is invaluable for the Methods\
    \ section (\"we observed X, which motivated Y\") and for honest failure reporting.\n\
    \n**Selecting the best path**: When the journal shows a branching tree (exp_001\
    \ \u2192 exp_002a, exp_002b, exp_003), identify the path that best supports the\
    \ paper's claims. Document dead-end branches in the appendix as ablations or negative\
    \ results.\n\n**Snapshot code per experiment**: Copy the experiment script after\
    \ each run:\n```bash\ncp experiment.py results/exp_003/experiment_snapshot.py\n\
    ```\nThis enables exact reproduction even after subsequent code changes.\n\n---\n\
    \n## Phase 4: Result Analysis\n\n**Goal**: Extract findings, compute statistics,\
    \ identify the story.\n\n### Step 4.1: Aggregate Results\n\nWrite analysis scripts\
    \ that:\n1. Load all result files from a batch\n2. Compute per-task and aggregate\
    \ metrics\n3. Generate summary tables\n\n```python\n# Standard analysis pattern\n\
    import json, os\nfrom pathlib import Path\n\nresults = {}\nfor result_file in\
    \ Path(\"results/\").rglob(\"result.json\"):\n    data = json.loads(result_file.read_text())\n\
    \    strategy = result_file.parent.name\n    task = result_file.parent.parent.name\n\
    \    results.setdefault(strategy, {})[task] = data\n\n# Compute aggregate metrics\n\
    for strategy, tasks in results.items():\n    scores = [t[\"score\"] for t in tasks.values()]\n\
    \    print(f\"{strategy}: mean={np.mean(scores):.1f}, std={np.std(scores):.1f}\"\
    )\n```\n\n### Step 4.2: Statistical Significance\n\nAlways compute:\n- **Error\
    \ bars**: Standard deviation or standard error, specify which\n- **Confidence\
    \ intervals**: 95% CI for key results\n- **Pairwise tests**: McNemar's test for\
    \ comparing two methods\n- **Effect sizes**: Cohen's d or h for practical significance\n\
    \nSee [references/experiment-patterns.md](references/experiment-patterns.md) for\
    \ complete implementations of McNemar's test, bootstrapped CIs, and Cohen's h.\n\
    \n### Step 4.3: Identify the Story\n\nAfter analysis, explicitly answer:\n1. **What\
    \ is the main finding?** State it in one sentence.\n2. **What surprised you?**\
    \ Unexpected results often make the best papers.\n3. **What failed?** Failed experiments\
    \ can be the most informative. Honest reporting of failures strengthens the paper.\n\
    4. **What follow-up experiments are needed?** Results often raise new questions.\n\
    \n#### Handling Negative or Null Results\n\nWhen your hypothesis was wrong or\
    \ results are inconclusive, you have three options:\n\n| Situation | Action |\
    \ Venue Fit |\n|-----------|--------|-----------|\n| Hypothesis wrong but **why**\
    \ is informative | Frame paper around the analysis of why | NeurIPS, ICML (if\
    \ analysis is rigorous) |\n| Method doesn't beat baselines but **reveals something\
    \ new** | Reframe contribution as understanding/analysis | ICLR (values understanding),\
    \ workshop papers |\n| Clean negative result on popular claim | Write it up \u2014\
    \ the field needs to know | NeurIPS Datasets & Benchmarks, TMLR, workshops |\n\
    | Results inconclusive, no clear story | Pivot \u2014 run different experiments\
    \ or reframe | Don't force a paper that isn't there |\n\n**How to write a negative\
    \ results paper:**\n- Lead with what the community believes and why it matters\
    \ to test it\n- Describe your rigorous methodology (must be airtight \u2014 reviewers\
    \ will scrutinize harder)\n- Present the null result clearly with statistical\
    \ evidence\n- Analyze **why** the expected result didn't materialize\n- Discuss\
    \ implications for the field\n\n**Venues that explicitly welcome negative results**:\
    \ NeurIPS (Datasets & Benchmarks track), TMLR, ML Reproducibility Challenge, workshops\
    \ at major conferences. Some workshops specifically call for negative results.\n\
    \n### Step 4.4: Create Figures and Tables\n\n**Figures**:\n- Use vector graphics\
    \ (PDF) for all plots: `plt.savefig('fig.pdf')`\n- Colorblind-safe palettes (Okabe-Ito\
    \ or Paul Tol)\n- Self-contained captions \u2014 reader should understand without\
    \ main text\n- No title inside figure \u2014 the caption serves this function\n\
    \n**Tables**:\n- Use `booktabs` LaTeX package\n- Bold best value per metric\n\
    - Include direction symbols (higher/lower better)\n- Consistent decimal precision\n\
    \n```latex\n\\usepackage{booktabs}\n\\begin{tabular}{lcc}\n\\toprule\nMethod &\
    \ Accuracy $\\uparrow$ & Latency $\\downarrow$ \\\\\n\\midrule\nBaseline & 85.2\
    \ & 45ms \\\\\n\\textbf{Ours} & \\textbf{92.1} & 38ms \\\\\n\\bottomrule\n\\end{tabular}\n\
    ```\n\n### Step 4.5: Decide: More Experiments or Write?\n\n| Situation | Action\
    \ |\n|-----------|--------|\n| Core claims supported, results significant | Move\
    \ to Phase 5 (writing) |\n| Results inconclusive, need more data | Back to Phase\
    \ 2 (design) |\n| Unexpected finding suggests new direction | Back to Phase 2\
    \ (design) |\n| Missing one ablation reviewers will ask for | Run it, then Phase\
    \ 5 |\n| All experiments done but some failed | Note failures, move to Phase 5\
    \ |\n\n### Step 4.6: Write the Experiment Log (Bridge to Writeup)\n\nBefore moving\
    \ to paper writing, create a structured experiment log that bridges results to\
    \ prose. This is the single most important connective tissue between experiments\
    \ and the writeup \u2014 without it, the writing agent has to re-derive the story\
    \ from raw result files.\n\n**Create `experiment_log.md`** with the following\
    \ structure:\n\n```markdown\n# Experiment Log\n\n## Contribution (one sentence)\n\
    [The paper's main claim]\n\n## Experiments Run\n\n### Experiment 1: [Name]\n-\
    \ **Claim tested**: [Which paper claim this supports]\n- **Setup**: [Model, dataset,\
    \ config, number of runs]\n- **Key result**: [One sentence with the number]\n\
    - **Result files**: results/exp1/final_info.json\n- **Figures generated**: figures/exp1_comparison.pdf\n\
    - **Surprising findings**: [Anything unexpected]\n\n### Experiment 2: [Name]\n\
    ...\n\n## Figures\n| Filename | Description | Which section it belongs in |\n\
    |----------|-------------|---------------------------|\n| figures/main_comparison.pdf\
    \ | Bar chart comparing all methods on benchmark X | Results, Figure 2 |\n| figures/ablation.pdf\
    \ | Ablation removing components A, B, C | Results, Figure 3 |\n...\n\n## Failed\
    \ Experiments (document for honesty)\n- [What was tried, why it failed, what it\
    \ tells us]\n\n## Open Questions\n- [Anything the results raised that the paper\
    \ should address]\n```\n\n**Why this matters**: When drafting, the agent (or a\
    \ delegated sub-agent) can load `experiment_log.md` alongside the LaTeX template\
    \ and produce a first draft grounded in actual results. Without this bridge, the\
    \ writing agent must parse raw JSON/CSV files and infer the story \u2014 a common\
    \ source of hallucinated or misreported numbers.\n\n**Git discipline**: Commit\
    \ this log alongside the results it describes.\n\n---\n\n## Iterative Refinement:\
    \ Strategy Selection\n\nAny output in this pipeline \u2014 paper drafts, experiment\
    \ scripts, analysis \u2014 can be iteratively refined. The autoreason research\
    \ provides empirical evidence for when each refinement strategy works and when\
    \ it fails. Use this section to choose the right approach.\n\n### Quick Decision\
    \ Table\n\n| Your Situation | Strategy | Why |\n|---------------|----------|-----|\n\
    | Mid-tier model + constrained task | **Autoreason** | Sweet spot. Generation-evaluation\
    \ gap is widest. Baselines actively destroy weak model outputs. |\n| Mid-tier\
    \ model + open task | **Autoreason** with scope constraints added | Add fixed\
    \ facts, structure, or deliverable to bound the improvement space. |\n| Frontier\
    \ model + constrained task | **Autoreason** | Wins 2/3 constrained tasks even\
    \ at frontier. |\n| Frontier model + unconstrained task | **Critique-and-revise**\
    \ or **single pass** | Autoreason comes last. Model self-evaluates well enough.\
    \ |\n| Concrete technical task (system design) | **Critique-and-revise** | Direct\
    \ find-and-fix loop is more efficient. |\n| Template-filling task (one correct\
    \ structure) | **Single pass** or **conservative** | Minimal decision space. Iteration\
    \ adds no value. |\n| Code with test cases | **Autoreason (code variant)** | Structured\
    \ analysis of *why* it failed before fixing. Recovery rate 62% vs 43%. |\n| Very\
    \ weak model (Llama 8B class) | **Single pass** | Model too weak for diverse candidates.\
    \ Invest in generation quality. |\n\n### The Generation-Evaluation Gap\n\n**Core\
    \ insight**: Autoreason's value depends on the gap between a model's generation\
    \ capability and its self-evaluation capability.\n\n```\nModel Tier        \u2502\
    \ Generation \u2502 Self-Eval \u2502 Gap    \u2502 Autoreason Value\n\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253C\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\nWeak (Llama 8B)   \u2502 Poor       \u2502 Poor      \u2502\
    \ Small  \u2502 None \u2014 can't generate diverse candidates\nMid (Haiku 3.5)\
    \   \u2502 Decent     \u2502 Poor      \u2502 LARGE  \u2502 MAXIMUM \u2014 42/42\
    \ perfect Borda\nMid (Gemini Flash)\u2502 Decent     \u2502 Moderate  \u2502 Large\
    \  \u2502 High \u2014 wins 2/3\nStrong (Sonnet 4) \u2502 Good       \u2502 Decent\
    \    \u2502 Medium \u2502 Moderate \u2014 wins 3/5\nFrontier (S4.6)   \u2502 Excellent\
    \  \u2502 Good      \u2502 Small  \u2502 Only with constraints\n```\n\nThis gap\
    \ is structural, not temporary. As costs drop, today's frontier becomes tomorrow's\
    \ mid-tier. The sweet spot moves but never disappears.\n\n### Autoreason Loop\
    \ (Summary)\n\nEach pass produces three candidates from fresh, isolated agents:\n\
    \n1. **Critic** \u2192 finds problems in incumbent A (no fixes)\n2. **Author B**\
    \ \u2192 revises A based on critique\n3. **Synthesizer** \u2192 merges A and B\
    \ (randomized labels)\n4. **Judge Panel** \u2192 3 blind CoT judges rank A, B,\
    \ AB via Borda count\n5. **Convergence** \u2192 A wins k=2 consecutive passes\
    \ \u2192 done\n\n**Key parameters:**\n- k=2 convergence (k=1 premature, k=3 too\
    \ expensive, no quality gain)\n- CoT judges always (3x faster convergence)\n-\
    \ Temperature 0.8 authors, 0.3 judges\n- Conservative tiebreak: incumbent wins\
    \ ties\n- Every role is a fresh agent with no shared context\n\n### Applying to\
    \ Paper Drafts\n\nWhen refining the paper itself through autoreason:\n- **Provide\
    \ ground truth to the critic**: actual experimental data, result JSONs, statistical\
    \ outputs. Without this, models hallucinate fabricated ablation studies and fake\
    \ confidence intervals.\n- **Use 3 working judges minimum**: A broken judge parser\
    \ doesn't add noise \u2014 it prevents equilibrium entirely.\n- **Scope constrain\
    \ the revision**: \"Address these specific weaknesses\" not \"improve the paper.\"\
    \n\n### Failure Modes\n\n| Failure | Detection | Fix |\n|---------|-----------|-----|\n\
    | No convergence (A never wins) | A wins <15% over 20+ passes | Add scope constraints\
    \ to the task |\n| Synthesis drift | Word counts grow unboundedly | Constrain\
    \ structure and deliverable |\n| Degradation below single pass | Baselines score\
    \ higher than iterated output | Switch to single pass; model may be too weak |\n\
    | Overfitting (code) | High public-test pass, low private-test pass | Use structured\
    \ analysis, not just test feedback |\n| Broken judges | Parsing failures reduce\
    \ panel below 3 | Fix parser before continuing |\n\nSee [references/autoreason-methodology.md](references/autoreason-methodology.md)\
    \ for complete prompts, Borda scoring details, model selection guide, scope constraint\
    \ design patterns, and compute budget reference.\n\n---\n\n## Phase 5: Paper Drafting\n\
    \n**Goal**: Write a complete, publication-ready paper.\n\n### Context Management\
    \ for Large Projects\n\nA paper project with 50+ experiment files, multiple result\
    \ directories, and extensive literature notes can easily exceed the agent's context\
    \ window. Manage this proactively:\n\n**What to load into context per drafting\
    \ task:**\n\n| Drafting Task | Load Into Context | Do NOT Load |\n|---------------|------------------|-------------|\n\
    | Writing Introduction | `experiment_log.md`, contribution statement, 5-10 most\
    \ relevant paper abstracts | Raw result JSONs, full experiment scripts, all literature\
    \ notes |\n| Writing Methods | Experiment configs, pseudocode, architecture description\
    \ | Raw logs, results from other experiments |\n| Writing Results | `experiment_log.md`,\
    \ result summary tables, figure list | Full analysis scripts, intermediate data\
    \ |\n| Writing Related Work | Organized citation notes (Step 1.4 output), .bib\
    \ file | Experiment files, raw PDFs |\n| Revision pass | Full paper draft, specific\
    \ reviewer concerns | Everything else |\n\n**Principles:**\n- **`experiment_log.md`\
    \ is the primary context bridge** \u2014 it summarizes everything needed for writing\
    \ without loading raw data files (see Step 4.6)\n- **Load one section's context\
    \ at a time** when delegating. A sub-agent drafting Methods doesn't need the literature\
    \ review notes.\n- **Summarize, don't include raw files.** For a 200-line result\
    \ JSON, load a 10-line summary table. For a 50-page related paper, load the 5-sentence\
    \ abstract + your 2-line note about its relevance.\n- **For very large projects**:\
    \ Create a `context/` directory with pre-compressed summaries:\n  ```\n  context/\n\
    \    contribution.md          # 1 sentence\n    experiment_summary.md    # Key\
    \ results table (from experiment_log.md)\n    literature_map.md        # Organized\
    \ citation notes\n    figure_inventory.md      # List of figures with descriptions\n\
    \  ```\n\n### The Narrative Principle\n\n**The single most critical insight**:\
    \ Your paper is not a collection of experiments \u2014 it's a story with one clear\
    \ contribution supported by evidence.\n\nEvery successful ML paper centers on\
    \ what Neel Nanda calls \"the narrative\": a short, rigorous, evidence-based technical\
    \ story with a takeaway readers care about.\n\n**Three Pillars (must be crystal\
    \ clear by end of introduction):**\n\n| Pillar | Description | Test |\n|--------|-------------|------|\n\
    | **The What** | 1-3 specific novel claims | Can you state them in one sentence?\
    \ |\n| **The Why** | Rigorous empirical evidence | Do experiments distinguish\
    \ your hypothesis from alternatives? |\n| **The So What** | Why readers should\
    \ care | Does this connect to a recognized community problem? |\n\n**If you cannot\
    \ state your contribution in one sentence, you don't yet have a paper.**\n\n###\
    \ The Sources Behind This Guidance\n\nThis skill synthesizes writing philosophy\
    \ from researchers who have published extensively at top venues. The writing philosophy\
    \ layer was originally compiled by [Orchestra Research](https://github.com/orchestra-research)\
    \ as the `ml-paper-writing` skill.\n\n| Source | Key Contribution | Link |\n|--------|-----------------|------|\n\
    | **Neel Nanda** (Google DeepMind) | The Narrative Principle, What/Why/So What\
    \ framework | [How to Write ML Papers](https://www.alignmentforum.org/posts/eJGptPbbFPZGLpjsp/highly-opinionated-advice-on-how-to-write-ml-papers)\
    \ |\n| **Sebastian Farquhar** (DeepMind) | 5-sentence abstract formula | [How\
    \ to Write ML Papers](https://sebastianfarquhar.com/on-research/2024/11/04/how_to_write_ml_papers/)\
    \ |\n| **Gopen & Swan** | 7 principles of reader expectations | [Science of Scientific\
    \ Writing](https://cseweb.ucsd.edu/~swanson/papers/science-of-writing.pdf) |\n\
    | **Zachary Lipton** | Word choice, eliminating hedging | [Heuristics for Scientific\
    \ Writing](https://www.approximatelycorrect.com/2018/01/29/heuristics-technical-scientific-writing-machine-learning-perspective/)\
    \ |\n| **Jacob Steinhardt** (UC Berkeley) | Precision, consistent terminology\
    \ | [Writing Tips](https://bounded-regret.ghost.io/) |\n| **Ethan Perez** (Anthropic)\
    \ | Micro-level clarity tips | [Easy Paper Writing Tips](https://ethanperez.net/easy-paper-writing-tips/)\
    \ |\n| **Andrej Karpathy** | Single contribution focus | Various lectures |\n\n\
    **For deeper dives into any of these, see:**\n- [references/writing-guide.md](references/writing-guide.md)\
    \ \u2014 Full explanations with examples\n- [references/sources.md](references/sources.md)\
    \ \u2014 Complete bibliography\n\n### Time Allocation\n\nSpend approximately **equal\
    \ time** on each of:\n1. The abstract\n2. The introduction\n3. The figures\n4.\
    \ Everything else combined\n\n**Why?** Most reviewers form judgments before reaching\
    \ your methods. Readers encounter your paper as: title \u2192 abstract \u2192\
    \ introduction \u2192 figures \u2192 maybe the rest.\n\n### Writing Workflow\n\
    \n```\nPaper Writing Checklist:\n- [ ] Step 1: Define the one-sentence contribution\n\
    - [ ] Step 2: Draft Figure 1 (core idea or most compelling result)\n- [ ] Step\
    \ 3: Draft abstract (5-sentence formula)\n- [ ] Step 4: Draft introduction (1-1.5\
    \ pages max)\n- [ ] Step 5: Draft methods\n- [ ] Step 6: Draft experiments & results\n\
    - [ ] Step 7: Draft related work\n- [ ] Step 8: Draft conclusion & discussion\n\
    - [ ] Step 9: Draft limitations (REQUIRED by all venues)\n- [ ] Step 10: Plan\
    \ appendix (proofs, extra experiments, details)\n- [ ] Step 11: Complete paper\
    \ checklist\n- [ ] Step 12: Final review\n```\n\n### Two-Pass Refinement Pattern\n\
    \nWhen drafting with an AI agent, use a **two-pass** approach (proven effective\
    \ in SakanaAI's AI-Scientist pipeline):\n\n**Pass 1 \u2014 Write + immediate refine\
    \ per section:**\nFor each section, write a complete draft, then immediately refine\
    \ it in the same context. This catches local issues (clarity, flow, completeness)\
    \ while the section is fresh.\n\n**Pass 2 \u2014 Global refinement with full-paper\
    \ context:**\nAfter all sections are drafted, revisit each section with awareness\
    \ of the complete paper. This catches cross-section issues: redundancy, inconsistent\
    \ terminology, narrative flow, and gaps where one section promises something another\
    \ doesn't deliver.\n\n```\nSecond-pass refinement prompt (per section):\n\"Review\
    \ the [SECTION] in the context of the complete paper.\n- Does it fit with the\
    \ rest of the paper? Are there redundancies with other sections?\n- Is terminology\
    \ consistent with Introduction and Methods?\n- Can anything be cut without weakening\
    \ the message?\n- Does the narrative flow from the previous section and into the\
    \ next?\nMake minimal, targeted edits. Do not rewrite from scratch.\"\n```\n\n\
    ### LaTeX Error Checklist\n\nAppend this checklist to every refinement prompt.\
    \ These are the most common errors when LLMs write LaTeX:\n\n```\nLaTeX Quality\
    \ Checklist (verify after every edit):\n- [ ] No unenclosed math symbols ($ signs\
    \ balanced)\n- [ ] Only reference figures/tables that exist (\\ref matches \\\
    label)\n- [ ] No fabricated citations (\\cite matches entries in .bib)\n- [ ]\
    \ Every \\begin{env} has matching \\end{env} (especially figure, table, algorithm)\n\
    - [ ] No HTML contamination (</end{figure}> instead of \\end{figure})\n- [ ] No\
    \ unescaped underscores outside math mode (use \\_ in text)\n- [ ] No duplicate\
    \ \\label definitions\n- [ ] No duplicate section headers\n- [ ] Numbers in text\
    \ match actual experimental results\n- [ ] All figures have captions and labels\n\
    - [ ] No overly long lines that cause overfull hbox warnings\n```\n\n### Step\
    \ 5.0: Title\n\nThe title is the single most-read element of the paper. It determines\
    \ whether anyone clicks through to the abstract.\n\n**Good titles**:\n- State\
    \ the contribution or finding: \"Autoreason: When Iterative LLM Refinement Works\
    \ and Why It Fails\"\n- Highlight a surprising result: \"Scaling Data-Constrained\
    \ Language Models\" (implies you can)\n- Name the method + what it does: \"DPO:\
    \ Direct Preference Optimization of Language Models\"\n\n**Bad titles**:\n- Too\
    \ generic: \"An Approach to Improving Language Model Outputs\"\n- Too long: anything\
    \ over ~15 words\n- Jargon-only: \"Asymptotic Convergence of Iterative Stochastic\
    \ Policy Refinement\" (who is this for?)\n\n**Rules**:\n- Include your method\
    \ name if you have one (for citability)\n- Include 1-2 keywords reviewers will\
    \ search for\n- Avoid colons unless both halves carry meaning\n- Test: would a\
    \ reviewer know the domain and contribution from the title alone?\n\n### Step\
    \ 5.1: Abstract (5-Sentence Formula)\n\nFrom Sebastian Farquhar (DeepMind):\n\n\
    ```\n1. What you achieved: \"We introduce...\", \"We prove...\", \"We demonstrate...\"\
    \n2. Why this is hard and important\n3. How you do it (with specialist keywords\
    \ for discoverability)\n4. What evidence you have\n5. Your most remarkable number/result\n\
    ```\n\n**Delete** generic openings like \"Large language models have achieved\
    \ remarkable success...\"\n\n### Step 5.2: Figure 1\n\nFigure 1 is the second\
    \ thing most readers look at (after abstract). Draft it before writing the introduction\
    \ \u2014 it forces you to clarify the core idea.\n\n| Figure 1 Type | When to\
    \ Use | Example |\n|---------------|-------------|---------|\n| **Method diagram**\
    \ | New architecture or pipeline | TikZ flowchart showing your system |\n| **Results\
    \ teaser** | One compelling result tells the whole story | Bar chart: \"Ours vs\
    \ baselines\" with clear gap |\n| **Problem illustration** | The problem is unintuitive\
    \ | Before/after showing failure mode you fix |\n| **Conceptual diagram** | Abstract\
    \ contribution needs visual grounding | 2x2 matrix of method properties |\n\n\
    **Rules**: Figure 1 must be understandable without reading any text. The caption\
    \ alone should communicate the core idea. Use color purposefully \u2014 don't\
    \ just decorate.\n\n### Step 5.3: Introduction (1-1.5 pages max)\n\nMust include:\n\
    - Clear problem statement\n- Brief approach overview\n- 2-4 bullet contribution\
    \ list (max 1-2 lines each in two-column format)\n- Methods should start by page\
    \ 2-3\n\n### Step 5.4: Methods\n\nEnable reimplementation:\n- Conceptual outline\
    \ or pseudocode\n- All hyperparameters listed\n- Architectural details sufficient\
    \ for reproduction\n- Present final design decisions; ablations go in experiments\n\
    \n### Step 5.5: Experiments & Results\n\nFor each experiment, explicitly state:\n\
    - **What claim it supports**\n- How it connects to main contribution\n- What to\
    \ observe: \"the blue line shows X, which demonstrates Y\"\n\nRequirements:\n\
    - Error bars with methodology (std dev vs std error)\n- Hyperparameter search\
    \ ranges\n- Compute infrastructure (GPU type, total hours)\n- Seed-setting methods\n\
    \n### Step 5.6: Related Work\n\nOrganize methodologically, not paper-by-paper.\
    \ Cite generously \u2014 reviewers likely authored relevant papers.\n\n### Step\
    \ 5.7: Limitations (REQUIRED)\n\nAll major conferences require this. Honesty helps:\n\
    - Reviewers are instructed not to penalize honest limitation acknowledgment\n\
    - Pre-empt criticisms by identifying weaknesses first\n- Explain why limitations\
    \ don't undermine core claims\n\n### Step 5.8: Conclusion & Discussion\n\n**Conclusion**\
    \ (required, 0.5-1 page):\n- Restate the contribution in one sentence (different\
    \ wording from abstract)\n- Summarize key findings (2-3 sentences, not a list)\n\
    - Implications: what does this mean for the field?\n- Future work: 2-3 concrete\
    \ next steps (not vague \"we leave X for future work\")\n\n**Discussion** (optional,\
    \ sometimes combined with conclusion):\n- Broader implications beyond immediate\
    \ results\n- Connections to other subfields\n- Honest assessment of when the method\
    \ does and doesn't work\n- Practical deployment considerations\n\n**Do NOT** introduce\
    \ new results or claims in the conclusion.\n\n### Step 5.9: Appendix Strategy\n\
    \nAppendices are unlimited at all major venues and are essential for reproducibility.\
    \ Structure:\n\n| Appendix Section | What Goes Here |\n|-----------------|---------------|\n\
    | **Proofs & Derivations** | Full proofs too long for main text. Main text can\
    \ state theorems with \"proof in Appendix A.\" |\n| **Additional Experiments**\
    \ | Ablations, scaling curves, per-dataset breakdowns, hyperparameter sensitivity\
    \ |\n| **Implementation Details** | Full hyperparameter tables, training details,\
    \ hardware specs, random seeds |\n| **Dataset Documentation** | Data collection\
    \ process, annotation guidelines, licensing, preprocessing |\n| **Prompts & Templates**\
    \ | Exact prompts used (for LLM-based methods), evaluation templates |\n| **Human\
    \ Evaluation** | Annotation interface screenshots, instructions given to annotators,\
    \ IRB details |\n| **Additional Figures** | Per-task breakdowns, trajectory visualizations,\
    \ failure case examples |\n\n**Rules**:\n- The main paper must be self-contained\
    \ \u2014 reviewers are not required to read appendices\n- Never put critical evidence\
    \ only in the appendix\n- Cross-reference: \"Full results in Table 5 (Appendix\
    \ B)\" not just \"see appendix\"\n- Use `\\appendix` command, then `\\section{A:\
    \ Proofs}` etc.\n\n### Page Budget Management\n\nWhen over the page limit:\n\n\
    | Cut Strategy | Saves | Risk |\n|-------------|-------|------|\n| Move proofs\
    \ to appendix | 0.5-2 pages | Low \u2014 standard practice |\n| Condense related\
    \ work | 0.5-1 page | Medium \u2014 may miss key citations |\n| Combine tables\
    \ with subfigures | 0.25-0.5 page | Low \u2014 often improves readability |\n\
    | Use `\\vspace{-Xpt}` sparingly | 0.1-0.3 page | Low if subtle, high if obvious\
    \ |\n| Remove qualitative examples | 0.5-1 page | Medium \u2014 reviewers like\
    \ examples |\n| Reduce figure sizes | 0.25-0.5 page | High \u2014 figures must\
    \ remain readable |\n\n**Do NOT**: reduce font size, change margins, remove required\
    \ sections (limitations, broader impact), or use `\\small`/`\\footnotesize` for\
    \ main text.\n\n### Step 5.10: Ethics & Broader Impact Statement\n\nMost venues\
    \ now require or strongly encourage an ethics/broader impact statement. This is\
    \ not boilerplate \u2014 reviewers read it and can flag ethics concerns that trigger\
    \ desk rejection.\n\n**What to include:**\n\n| Component | Content | Required\
    \ By |\n|-----------|---------|-------------|\n| **Positive societal impact**\
    \ | How your work benefits society | NeurIPS, ICML |\n| **Potential negative impact**\
    \ | Misuse risks, dual-use concerns, failure modes | NeurIPS, ICML |\n| **Fairness\
    \ & bias** | Does your method/data have known biases? | All venues (implicitly)\
    \ |\n| **Environmental impact** | Compute carbon footprint for large-scale training\
    \ | ICML, increasingly NeurIPS |\n| **Privacy** | Does your work use or enable\
    \ processing of personal data? | ACL, NeurIPS |\n| **LLM disclosure** | Was AI\
    \ used in writing or experiments? | ICLR (mandatory), ACL |\n\n**Writing the statement:**\n\
    \n```latex\n\\section*{Broader Impact Statement}\n% NeurIPS/ICML: after conclusion,\
    \ does not count toward page limit\n\n% 1. Positive applications (1-2 sentences)\n\
    This work enables [specific application] which may benefit [specific group].\n\
    \n% 2. Risks and mitigations (1-3 sentences, be specific)\n[Method/model] could\
    \ potentially be misused for [specific risk]. We mitigate\nthis by [specific mitigation,\
    \ e.g., releasing only model weights above size X,\nincluding safety filters,\
    \ documenting failure modes].\n\n% 3. Limitations of impact claims (1 sentence)\n\
    Our evaluation is limited to [specific domain]; broader deployment would\nrequire\
    \ [specific additional work].\n```\n\n**Common mistakes:**\n- Writing \"we foresee\
    \ no negative impacts\" (almost never true \u2014 reviewers distrust this)\n-\
    \ Being vague: \"this could be misused\" without specifying how\n- Ignoring compute\
    \ costs for large-scale work\n- Forgetting to disclose LLM use at venues that\
    \ require it\n\n**Compute carbon footprint** (for training-heavy papers):\n```python\n\
    # Estimate using ML CO2 Impact tool methodology\ngpu_hours = 1000  # total GPU\
    \ hours\ngpu_tdp_watts = 400  # e.g., A100 = 400W\npue = 1.1  # Power Usage Effectiveness\
    \ (data center overhead)\ncarbon_intensity = 0.429  # kg CO2/kWh (US average;\
    \ varies by region)\n\nenergy_kwh = (gpu_hours * gpu_tdp_watts * pue) / 1000\n\
    carbon_kg = energy_kwh * carbon_intensity\nprint(f\"Energy: {energy_kwh:.0f} kWh,\
    \ Carbon: {carbon_kg:.0f} kg CO2eq\")\n```\n\n### Step 5.11: Datasheets & Model\
    \ Cards (If Applicable)\n\nIf your paper introduces a **new dataset** or **releases\
    \ a model**, include structured documentation. Reviewers increasingly expect this,\
    \ and NeurIPS Datasets & Benchmarks track requires it.\n\n**Datasheets for Datasets**\
    \ (Gebru et al., 2021) \u2014 include in appendix:\n\n```\nDataset Documentation\
    \ (Appendix):\n- Motivation: Why was this dataset created? What task does it support?\n\
    - Composition: What are the instances? How many? What data types?\n- Collection:\
    \ How was data collected? What was the source?\n- Preprocessing: What cleaning/filtering\
    \ was applied?\n- Distribution: How is the dataset distributed? Under what license?\n\
    - Maintenance: Who maintains it? How to report issues?\n- Ethical considerations:\
    \ Contains personal data? Consent obtained?\n  Potential for harm? Known biases?\n\
    ```\n\n**Model Cards** (Mitchell et al., 2019) \u2014 include in appendix for\
    \ model releases:\n\n```\nModel Card (Appendix):\n- Model details: Architecture,\
    \ training data, training procedure\n- Intended use: Primary use cases, out-of-scope\
    \ uses\n- Metrics: Evaluation metrics and results on benchmarks\n- Ethical considerations:\
    \ Known biases, fairness evaluations\n- Limitations: Known failure modes, domains\
    \ where model underperforms\n```\n\n### Writing Style\n\n**Sentence-level clarity\
    \ (Gopen & Swan's 7 Principles):**\n\n| Principle | Rule |\n|-----------|------|\n\
    | Subject-verb proximity | Keep subject and verb close |\n| Stress position |\
    \ Place emphasis at sentence ends |\n| Topic position | Put context first, new\
    \ info after |\n| Old before new | Familiar info \u2192 unfamiliar info |\n| One\
    \ unit, one function | Each paragraph makes one point |\n| Action in verb | Use\
    \ verbs, not nominalizations |\n| Context before new | Set stage before presenting\
    \ |\n\n**Word choice (Lipton, Steinhardt):**\n- Be specific: \"accuracy\" not\
    \ \"performance\"\n- Eliminate hedging: drop \"may\" unless genuinely uncertain\n\
    - Consistent terminology throughout\n- Avoid incremental vocabulary: \"develop\"\
    , not \"combine\"\n\n**Full writing guide with examples**: See [references/writing-guide.md](references/writing-guide.md)\n\
    \n### Using LaTeX Templates\n\n**Always copy the entire template directory first,\
    \ then write within it.**\n\n```\nTemplate Setup Checklist:\n- [ ] Step 1: Copy\
    \ entire template directory to new project\n- [ ] Step 2: Verify template compiles\
    \ as-is (before any changes)\n- [ ] Step 3: Read the template's example content\
    \ to understand structure\n- [ ] Step 4: Replace example content section by section\n\
    - [ ] Step 5: Use template macros (check preamble for \\newcommand definitions)\n\
    - [ ] Step 6: Clean up template artifacts only at the end\n```\n\n**Step 1: Copy\
    \ the Full Template**\n\n```bash\ncp -r templates/neurips2025/ ~/papers/my-paper/\n\
    cd ~/papers/my-paper/\nls -la  # Should see: main.tex, neurips.sty, Makefile,\
    \ etc.\n```\n\nCopy the ENTIRE directory, not just the .tex file. Templates include\
    \ style files (.sty), bibliography styles (.bst), example content, and Makefiles.\n\
    \n**Step 2: Verify Template Compiles First**\n\nBefore making ANY changes:\n```bash\n\
    latexmk -pdf main.tex\n# Or manual: pdflatex main.tex && bibtex main && pdflatex\
    \ main.tex && pdflatex main.tex\n```\n\nIf the unmodified template doesn't compile,\
    \ fix that first (usually missing TeX packages \u2014 install via `tlmgr install\
    \ <package>`).\n\n**Step 3: Keep Template Content as Reference**\n\nDon't immediately\
    \ delete example content. Comment it out and use as formatting reference:\n```latex\n\
    % Template example (keep for reference):\n% \\begin{figure}[t]\n%   \\centering\n\
    %   \\includegraphics[width=0.8\\linewidth]{example-image}\n%   \\caption{Template\
    \ shows caption style}\n% \\end{figure}\n\n% Your actual figure:\n\\begin{figure}[t]\n\
    \  \\centering\n  \\includegraphics[width=0.8\\linewidth]{your-figure.pdf}\n \
    \ \\caption{Your caption following the same style.}\n\\end{figure}\n```\n\n**Step\
    \ 4: Replace Content Section by Section**\n\nWork through systematically: title/authors\
    \ \u2192 abstract \u2192 introduction \u2192 methods \u2192 experiments \u2192\
    \ related work \u2192 conclusion \u2192 references \u2192 appendix. Compile after\
    \ each section.\n\n**Step 5: Use Template Macros**\n\n```latex\n\\newcommand{\\\
    method}{YourMethodName}  % Consistent method naming\n\\newcommand{\\eg}{e.g.,\\\
    xspace}        % Proper abbreviations\n\\newcommand{\\ie}{i.e.,\\xspace}\n```\n\
    \n### Template Pitfalls\n\n| Pitfall | Problem | Solution |\n|---------|---------|----------|\n\
    | Copying only `.tex` file | Missing `.sty`, won't compile | Copy entire directory\
    \ |\n| Modifying `.sty` files | Breaks conference formatting | Never edit style\
    \ files |\n| Adding random packages | Conflicts, breaks template | Only add if\
    \ necessary |\n| Deleting template content early | Lose formatting reference |\
    \ Keep as comments until done |\n| Not compiling frequently | Errors accumulate\
    \ | Compile after each section |\n| Raster PNGs for figures | Blurry in paper\
    \ | Always use vector PDF via `savefig('fig.pdf')` |\n\n### Quick Template Reference\n\
    \n| Conference | Main File | Style File | Page Limit |\n|------------|-----------|------------|------------|\n\
    | NeurIPS 2025 | `main.tex` | `neurips.sty` | 9 pages |\n| ICML 2026 | `example_paper.tex`\
    \ | `icml2026.sty` | 8 pages |\n| ICLR 2026 | `iclr2026_conference.tex` | `iclr2026_conference.sty`\
    \ | 9 pages |\n| ACL 2025 | `acl_latex.tex` | `acl.sty` | 8 pages (long) |\n|\
    \ AAAI 2026 | `aaai2026-unified-template.tex` | `aaai2026.sty` | 7 pages |\n|\
    \ COLM 2025 | `colm2025_conference.tex` | `colm2025_conference.sty` | 9 pages\
    \ |\n\n**Universal**: Double-blind, references don't count, appendices unlimited,\
    \ LaTeX required.\n\nTemplates in `templates/` directory. See [templates/README.md](templates/README.md)\
    \ for compilation setup (VS Code, CLI, Overleaf, other IDEs).\n\n### Tables and\
    \ Figures\n\n**Tables** \u2014 use `booktabs` for professional formatting:\n\n\
    ```latex\n\\usepackage{booktabs}\n\\begin{tabular}{lcc}\n\\toprule\nMethod & Accuracy\
    \ $\\uparrow$ & Latency $\\downarrow$ \\\\\n\\midrule\nBaseline & 85.2 & 45ms\
    \ \\\\\n\\textbf{Ours} & \\textbf{92.1} & 38ms \\\\\n\\bottomrule\n\\end{tabular}\n\
    ```\n\nRules:\n- Bold best value per metric\n- Include direction symbols ($\\\
    uparrow$ higher better, $\\downarrow$ lower better)\n- Right-align numerical columns\n\
    - Consistent decimal precision\n\n**Figures**:\n- **Vector graphics** (PDF, EPS)\
    \ for all plots and diagrams \u2014 `plt.savefig('fig.pdf')`\n- **Raster** (PNG\
    \ 600 DPI) only for photographs\n- **Colorblind-safe palettes** (Okabe-Ito or\
    \ Paul Tol)\n- Verify **grayscale readability** (8% of men have color vision deficiency)\n\
    - **No title inside figure** \u2014 the caption serves this function\n- **Self-contained\
    \ captions** \u2014 reader should understand without main text\n\n### Conference\
    \ Resubmission\n\nFor converting between venues, see Phase 7 (Submission Preparation)\
    \ \u2014 it covers the full conversion workflow, page-change table, and post-rejection\
    \ guidance.\n\n### Professional LaTeX Preamble\n\nAdd these packages to any paper\
    \ for professional quality. They are compatible with all major conference style\
    \ files:\n\n```latex\n% --- Professional Packages (add after conference style\
    \ file) ---\n\n% Typography\n\\usepackage{microtype}              % Microtypographic\
    \ improvements (protrusion, expansion)\n                                     %\
    \ Makes text noticeably more polished \u2014 always include\n\n% Tables\n\\usepackage{booktabs}\
    \               % Professional table rules (\\toprule, \\midrule, \\bottomrule)\n\
    \\usepackage{siunitx}                % Consistent number formatting, decimal alignment\n\
    \                                     % Usage: \\num{12345} \u2192 12,345; \\\
    SI{3.5}{GHz} \u2192 3.5 GHz\n                                     % Table alignment:\
    \ S column type for decimal-aligned numbers\n\n% Figures\n\\usepackage{graphicx}\
    \               % Include graphics (\\includegraphics)\n\\usepackage{subcaption}\
    \             % Subfigures with (a), (b), (c) labels\n                       \
    \              % Usage: \\begin{subfigure}{0.48\\textwidth} ... \\end{subfigure}\n\
    \n% Diagrams and Algorithms\n\\usepackage{tikz}                   % Programmable\
    \ vector diagrams\n\\usetikzlibrary{arrows.meta, positioning, shapes.geometric,\
    \ calc, fit, backgrounds}\n\\usepackage[ruled,vlined]{algorithm2e}  % Professional\
    \ pseudocode\n                                     % Alternative: \\usepackage{algorithmicx}\
    \ if template bundles it\n\n% Cross-references\n\\usepackage{cleveref}       \
    \        % Smart references: \\cref{fig:x} \u2192 \"Figure 1\"\n             \
    \                        % MUST be loaded AFTER hyperref\n                   \
    \                  % Handles: figures, tables, sections, equations, algorithms\n\
    \n% Math (usually included by conference .sty, but verify)\n\\usepackage{amsmath,amssymb}\
    \        % AMS math environments and symbols\n\\usepackage{mathtools}        \
    \      % Extends amsmath (dcases, coloneqq, etc.)\n\n% Colors (for figures and\
    \ diagrams)\n\\usepackage{xcolor}                 % Color management\n% Okabe-Ito\
    \ colorblind-safe palette:\n\\definecolor{okblue}{HTML}{0072B2}\n\\definecolor{okorange}{HTML}{E69F00}\n\
    \\definecolor{okgreen}{HTML}{009E73}\n\\definecolor{okred}{HTML}{D55E00}\n\\definecolor{okpurple}{HTML}{CC79A7}\n\
    \\definecolor{okcyan}{HTML}{56B4E9}\n\\definecolor{okyellow}{HTML}{F0E442}\n```\n\
    \n**Notes:**\n- `microtype` is the single highest-impact package for visual quality.\
    \ It adjusts character spacing at a sub-pixel level. Always include it.\n- `siunitx`\
    \ handles decimal alignment in tables via the `S` column type \u2014 eliminates\
    \ manual spacing.\n- `cleveref` must be loaded **after** `hyperref`. Most conference\
    \ .sty files load hyperref, so put cleveref last.\n- Check if the conference template\
    \ already loads any of these (especially `algorithm`, `amsmath`, `graphicx`).\
    \ Don't double-load.\n\n### siunitx Table Alignment\n\n`siunitx` makes number-heavy\
    \ tables significantly more readable:\n\n```latex\n\\begin{tabular}{l S[table-format=2.1]\
    \ S[table-format=2.1] S[table-format=2.1]}\n\\toprule\nMethod & {Accuracy $\\\
    uparrow$} & {F1 $\\uparrow$} & {Latency (ms) $\\downarrow$} \\\\\n\\midrule\n\
    Baseline         & 85.2  & 83.7  & 45.3 \\\\\nAblation (no X)  & 87.1  & 85.4\
    \  & 42.1 \\\\\n\\textbf{Ours}    & \\textbf{92.1} & \\textbf{90.8} & \\textbf{38.7}\
    \ \\\\\n\\bottomrule\n\\end{tabular}\n```\n\nThe `S` column type auto-aligns on\
    \ the decimal point. Headers in `{}` escape the alignment.\n\n### Subfigures\n\
    \nStandard pattern for side-by-side figures:\n\n```latex\n\\begin{figure}[t]\n\
    \  \\centering\n  \\begin{subfigure}[b]{0.48\\textwidth}\n    \\centering\n  \
    \  \\includegraphics[width=\\textwidth]{fig_results_a.pdf}\n    \\caption{Results\
    \ on Dataset A.}\n    \\label{fig:results-a}\n  \\end{subfigure}\n  \\hfill\n\
    \  \\begin{subfigure}[b]{0.48\\textwidth}\n    \\centering\n    \\includegraphics[width=\\\
    textwidth]{fig_results_b.pdf}\n    \\caption{Results on Dataset B.}\n    \\label{fig:results-b}\n\
    \  \\end{subfigure}\n  \\caption{Comparison of our method across two datasets.\
    \ (a) shows the scaling\n  behavior and (b) shows the ablation results. Both use\
    \ 5 random seeds.}\n  \\label{fig:results}\n\\end{figure}\n```\n\nUse `\\cref{fig:results}`\
    \ \u2192 \"Figure 1\", `\\cref{fig:results-a}` \u2192 \"Figure 1a\".\n\n### Pseudocode\
    \ with algorithm2e\n\n```latex\n\\begin{algorithm}[t]\n\\caption{Iterative Refinement\
    \ with Judge Panel}\n\\label{alg:method}\n\\KwIn{Task $T$, model $M$, judges $J_1\
    \ \\ldots J_n$, convergence threshold $k$}\n\\KwOut{Final output $A^*$}\n$A \\\
    gets M(T)$ \\tcp*{Initial generation}\n$\\text{streak} \\gets 0$\\;\n\\While{$\\\
    text{streak} < k$}{\n  $C \\gets \\text{Critic}(A, T)$ \\tcp*{Identify weaknesses}\n\
    \  $B \\gets M(T, C)$ \\tcp*{Revised version addressing critique}\n  $AB \\gets\
    \ \\text{Synthesize}(A, B)$ \\tcp*{Merge best elements}\n  \\ForEach{judge $J_i$}{\n\
    \    $\\text{rank}_i \\gets J_i(\\text{shuffle}(A, B, AB))$ \\tcp*{Blind ranking}\n\
    \  }\n  $\\text{winner} \\gets \\text{BordaCount}(\\text{ranks})$\\;\n  \\eIf{$\\\
    text{winner} = A$}{\n    $\\text{streak} \\gets \\text{streak} + 1$\\;\n  }{\n\
    \    $A \\gets \\text{winner}$; $\\text{streak} \\gets 0$\\;\n  }\n}\n\\Return{$A$}\\\
    ;\n\\end{algorithm}\n```\n\n### TikZ Diagram Patterns\n\nTikZ is the standard\
    \ for method diagrams in ML papers. Common patterns:\n\n**Pipeline/Flow Diagram**\
    \ (most common in ML papers):\n\n```latex\n\\begin{figure}[t]\n\\centering\n\\\
    begin{tikzpicture}[\n  node distance=1.8cm,\n  box/.style={rectangle, draw, rounded\
    \ corners, minimum height=1cm, \n              minimum width=2cm, align=center,\
    \ font=\\small},\n  arrow/.style={-{Stealth[length=3mm]}, thick},\n]\n  \\node[box,\
    \ fill=okcyan!20] (input) {Input\\\\$x$};\n  \\node[box, fill=okblue!20, right\
    \ of=input] (encoder) {Encoder\\\\$f_\\theta$};\n  \\node[box, fill=okgreen!20,\
    \ right of=encoder] (latent) {Latent\\\\$z$};\n  \\node[box, fill=okorange!20,\
    \ right of=latent] (decoder) {Decoder\\\\$g_\\phi$};\n  \\node[box, fill=okred!20,\
    \ right of=decoder] (output) {Output\\\\$\\hat{x}$};\n  \n  \\draw[arrow] (input)\
    \ -- (encoder);\n  \\draw[arrow] (encoder) -- (latent);\n  \\draw[arrow] (latent)\
    \ -- (decoder);\n  \\draw[arrow] (decoder) -- (output);\n\\end{tikzpicture}\n\\\
    caption{Architecture overview. The encoder maps input $x$ to latent \nrepresentation\
    \ $z$, which the decoder reconstructs.}\n\\label{fig:architecture}\n\\end{figure}\n\
    ```\n\n**Comparison/Matrix Diagram** (for showing method variants):\n\n```latex\n\
    \\begin{tikzpicture}[\n  cell/.style={rectangle, draw, minimum width=2.5cm, minimum\
    \ height=1cm, \n               align=center, font=\\small},\n  header/.style={cell,\
    \ fill=gray!20, font=\\small\\bfseries},\n]\n  % Headers\n  \\node[header] at\
    \ (0, 0) {Method};\n  \\node[header] at (3, 0) {Converges?};\n  \\node[header]\
    \ at (6, 0) {Quality?};\n  % Rows\n  \\node[cell] at (0, -1) {Single Pass};\n\
    \  \\node[cell, fill=okgreen!15] at (3, -1) {N/A};\n  \\node[cell, fill=okorange!15]\
    \ at (6, -1) {Baseline};\n  \\node[cell] at (0, -2) {Critique+Revise};\n  \\node[cell,\
    \ fill=okred!15] at (3, -2) {No};\n  \\node[cell, fill=okred!15] at (6, -2) {Degrades};\n\
    \  \\node[cell] at (0, -3) {Ours};\n  \\node[cell, fill=okgreen!15] at (3, -3)\
    \ {Yes ($k$=2)};\n  \\node[cell, fill=okgreen!15] at (6, -3) {Improves};\n\\end{tikzpicture}\n\
    ```\n\n**Iterative Loop Diagram** (for methods with feedback):\n\n```latex\n\\\
    begin{tikzpicture}[\n  node distance=2cm,\n  box/.style={rectangle, draw, rounded\
    \ corners, minimum height=0.8cm, \n              minimum width=1.8cm, align=center,\
    \ font=\\small},\n  arrow/.style={-{Stealth[length=3mm]}, thick},\n  label/.style={font=\\\
    scriptsize, midway, above},\n]\n  \\node[box, fill=okblue!20] (gen) {Generator};\n\
    \  \\node[box, fill=okred!20, right=2.5cm of gen] (critic) {Critic};\n  \\node[box,\
    \ fill=okgreen!20, below=1.5cm of $(gen)!0.5!(critic)$] (judge) {Judge Panel};\n\
    \  \n  \\draw[arrow] (gen) -- node[label] {output $A$} (critic);\n  \\draw[arrow]\
    \ (critic) -- node[label, right] {critique $C$} (judge);\n  \\draw[arrow] (judge)\
    \ -| node[label, left, pos=0.3] {winner} (gen);\n\\end{tikzpicture}\n```\n\n###\
    \ latexdiff for Revision Tracking\n\nEssential for rebuttals \u2014 generates\
    \ a marked-up PDF showing changes between versions:\n\n```bash\n# Install\n# macOS:\
    \ brew install latexdiff (or comes with TeX Live)\n# Linux: sudo apt install latexdiff\n\
    \n# Generate diff\nlatexdiff paper_v1.tex paper_v2.tex > paper_diff.tex\npdflatex\
    \ paper_diff.tex\n\n# For multi-file projects (with \\input{} or \\include{})\n\
    latexdiff --flatten paper_v1.tex paper_v2.tex > paper_diff.tex\n```\n\nThis produces\
    \ a PDF with deletions in red strikethrough and additions in blue \u2014 standard\
    \ format for rebuttal supplements.\n\n### SciencePlots for matplotlib\n\nInstall\
    \ and use for publication-quality plots:\n\n```bash\npip install SciencePlots\n\
    ```\n\n```python\nimport matplotlib.pyplot as plt\nimport scienceplots  # registers\
    \ styles\n\n# Use science style (IEEE-like, clean)\nwith plt.style.context(['science',\
    \ 'no-latex']):\n    fig, ax = plt.subplots(figsize=(3.5, 2.5))  # Single-column\
    \ width\n    ax.plot(x, y, label='Ours', color='#0072B2')\n    ax.plot(x, y2,\
    \ label='Baseline', color='#D55E00', linestyle='--')\n    ax.set_xlabel('Training\
    \ Steps')\n    ax.set_ylabel('Accuracy')\n    ax.legend()\n    fig.savefig('paper/fig_results.pdf',\
    \ bbox_inches='tight')\n\n# Available styles: 'science', 'ieee', 'nature', 'science+ieee'\n\
    # Add 'no-latex' if LaTeX is not installed on the machine generating plots\n```\n\
    \n**Standard figure sizes** (two-column format):\n- Single column: `figsize=(3.5,\
    \ 2.5)` \u2014 fits in one column\n- Double column: `figsize=(7.0, 3.0)` \u2014\
    \ spans both columns\n- Square: `figsize=(3.5, 3.5)` \u2014 for heatmaps, confusion\
    \ matrices\n\n---\n\n## Phase 6: Self-Review & Revision\n\n**Goal**: Simulate\
    \ the review process before submission. Catch weaknesses early.\n\n### Step 6.1:\
    \ Simulate Reviews (Ensemble Pattern)\n\nGenerate reviews from multiple perspectives.\
    \ The key insight from automated research pipelines (notably SakanaAI's AI-Scientist):\
    \ **ensemble reviewing with a meta-reviewer produces far more calibrated feedback\
    \ than a single review pass.**\n\n**Step 1: Generate N independent reviews** (N=3-5)\n\
    \nUse different models or temperature settings. Each reviewer sees only the paper,\
    \ not other reviews. **Default to negative bias** \u2014 LLMs have well-documented\
    \ positivity bias in evaluation.\n\n```\nYou are an expert reviewer for [VENUE].\
    \ You are critical and thorough.\nIf a paper has weaknesses or you are unsure\
    \ about a claim, flag it clearly\nand reflect that in your scores. Do not give\
    \ the benefit of the doubt.\n\nReview this paper according to the official reviewer\
    \ guidelines. Evaluate:\n\n1. Soundness (are claims well-supported? are baselines\
    \ fair and strong?)\n2. Clarity (is the paper well-written? could an expert reproduce\
    \ it?)\n3. Significance (does this matter to the community?)\n4. Originality (new\
    \ insights, not just incremental combination?)\n\nProvide your review as structured\
    \ JSON:\n{\n  \"summary\": \"2-3 sentence summary\",\n  \"strengths\": [\"strength\
    \ 1\", \"strength 2\", ...],\n  \"weaknesses\": [\"weakness 1 (most critical)\"\
    , \"weakness 2\", ...],\n  \"questions\": [\"question for authors 1\", ...],\n\
    \  \"missing_references\": [\"paper that should be cited\", ...],\n  \"soundness\"\
    : 1-4,\n  \"presentation\": 1-4,\n  \"contribution\": 1-4,\n  \"overall\": 1-10,\n\
    \  \"confidence\": 1-5\n}\n```\n\n**Step 2: Meta-review (Area Chair aggregation)**\n\
    \nFeed all N reviews to a meta-reviewer:\n\n```\nYou are an Area Chair at [VENUE].\
    \ You have received [N] independent reviews\nof a paper. Your job is to:\n\n1.\
    \ Identify consensus strengths and weaknesses across reviewers\n2. Resolve disagreements\
    \ by examining the paper directly\n3. Produce a meta-review that represents the\
    \ aggregate judgment\n4. Use AVERAGED numerical scores across all reviews\n\n\
    Be conservative: if reviewers disagree on whether a weakness is serious,\ntreat\
    \ it as serious until the authors address it.\n\nReviews:\n[review_1]\n[review_2]\n\
    ...\n```\n\n**Step 3: Reflection loop** (optional, 2-3 rounds)\n\nEach reviewer\
    \ can refine their review after seeing the meta-review. Use an early termination\
    \ sentinel: if the reviewer responds \"I am done\" (no changes), stop iterating.\n\
    \n**Model selection for reviewing**: Reviewing is best done with the strongest\
    \ available model, even if you wrote the paper with a cheaper one. The reviewer\
    \ model should be chosen independently from the writing model.\n\n**Few-shot calibration**:\
    \ If available, include 1-2 real published reviews from the target venue as examples.\
    \ This dramatically improves score calibration. See [references/reviewer-guidelines.md](references/reviewer-guidelines.md)\
    \ for example reviews.\n\n### Step 6.1b: Visual Review Pass (VLM)\n\nText-only\
    \ review misses an entire class of problems: figure quality, layout issues, visual\
    \ consistency. If you have access to a vision-capable model, run a separate **visual\
    \ review** on the compiled PDF:\n\n```\nYou are reviewing the visual presentation\
    \ of this research paper PDF.\nCheck for:\n1. Figure quality: Are plots readable?\
    \ Labels legible? Colors distinguishable?\n2. Figure-caption alignment: Does each\
    \ caption accurately describe its figure?\n3. Layout issues: Orphaned section\
    \ headers, awkward page breaks, figures far from their references\n4. Table formatting:\
    \ Aligned columns, consistent decimal precision, bold for best results\n5. Visual\
    \ consistency: Same color scheme across all figures, consistent font sizes\n6.\
    \ Grayscale readability: Would the figures be understandable if printed in B&W?\n\
    \nFor each issue, specify the page number and exact location.\n```\n\nThis catches\
    \ problems that text-based review cannot: a plot with illegible axis labels, a\
    \ figure placed 3 pages from its first reference, inconsistent color palettes\
    \ between Figure 2 and Figure 5, or a table that's clearly wider than the column\
    \ width.\n\n### Step 6.1c: Claim Verification Pass\n\nAfter simulated reviews,\
    \ run a separate verification pass. This catches factual errors that reviewers\
    \ might miss:\n\n```\nClaim Verification Protocol:\n1. Extract every factual claim\
    \ from the paper (numbers, comparisons, trends)\n2. For each claim, trace it to\
    \ the specific experiment/result that supports it\n3. Verify the number in the\
    \ paper matches the actual result file\n4. Flag any claim without a traceable\
    \ source as [VERIFY]\n```\n\nFor agent-based workflows: delegate verification\
    \ to a **fresh sub-agent** that receives only the paper text and the raw result\
    \ files. The fresh context prevents confirmation bias \u2014 the verifier doesn't\
    \ \"remember\" what the results were supposed to be.\n\n### Step 6.2: Prioritize\
    \ Feedback\n\nAfter collecting reviews, categorize:\n\n| Priority | Action |\n\
    |----------|--------|\n| **Critical** (technical flaw, missing baseline) | Must\
    \ fix. May require new experiments \u2192 back to Phase 2 |\n| **High** (clarity\
    \ issue, missing ablation) | Should fix in this revision |\n| **Medium** (minor\
    \ writing issues, extra experiments) | Fix if time allows |\n| **Low** (style\
    \ preferences, tangential suggestions) | Note for future work |\n\n### Step 6.3:\
    \ Revision Cycle\n\nFor each critical/high issue:\n1. Identify the specific section(s)\
    \ affected\n2. Draft the fix\n3. Verify the fix doesn't break other claims\n4.\
    \ Update the paper\n5. Re-check against the reviewer's concern\n\n### Step 6.4:\
    \ Rebuttal Writing\n\nWhen responding to actual reviews (post-submission), rebuttals\
    \ are a distinct skill from revision:\n\n**Format**: Point-by-point. For each\
    \ reviewer concern:\n```\n> R1-W1: \"The paper lacks comparison with Method X.\"\
    \n\nWe thank the reviewer for this suggestion. We have added a comparison with\
    \ \nMethod X in Table 3 (revised). Our method outperforms X by 3.2pp on [metric]\
    \ \n(p<0.05). We note that X requires 2x our compute budget.\n```\n\n**Rules**:\n\
    - Address every concern \u2014 reviewers notice if you skip one\n- Lead with the\
    \ strongest responses\n- Be concise and direct \u2014 reviewers read dozens of\
    \ rebuttals\n- Include new results if you ran experiments during the rebuttal\
    \ period\n- Never be defensive or dismissive, even of weak criticisms\n- Use `latexdiff`\
    \ to generate a marked-up PDF showing changes (see Professional LaTeX Tooling\
    \ section)\n- Thank reviewers for specific, actionable feedback (not generic praise)\n\
    \n**What NOT to do**: \"We respectfully disagree\" without evidence. \"This is\
    \ out of scope\" without explanation. Ignoring a weakness by only responding to\
    \ strengths.\n\n### Step 6.5: Paper Evolution Tracking\n\nSave snapshots at key\
    \ milestones:\n```\npaper/\n  paper.tex                    # Current working version\n\
    \  paper_v1_first_draft.tex     # First complete draft\n  paper_v2_post_review.tex\
    \     # After simulated review\n  paper_v3_pre_submission.tex  # Final before\
    \ submission\n  paper_v4_camera_ready.tex    # Post-acceptance final\n```\n\n\
    ---\n\n## Phase 7: Submission Preparation\n\n**Goal**: Final checks, formatting,\
    \ and submission.\n\n### Step 7.1: Conference Checklist\n\nEvery venue has mandatory\
    \ checklists. Complete them carefully \u2014 incomplete checklists can result\
    \ in desk rejection.\n\nSee [references/checklists.md](references/checklists.md)\
    \ for:\n- NeurIPS 16-item paper checklist\n- ICML broader impact + reproducibility\n\
    - ICLR LLM disclosure policy\n- ACL mandatory limitations section\n- Universal\
    \ pre-submission checklist\n\n### Step 7.2: Anonymization Checklist\n\nDouble-blind\
    \ review means reviewers cannot know who wrote the paper. Check ALL of these:\n\
    \n```\nAnonymization Checklist:\n- [ ] No author names or affiliations anywhere\
    \ in the PDF\n- [ ] No acknowledgments section (add after acceptance)\n- [ ] Self-citations\
    \ written in third person: \"Smith et al. [1] showed...\" not \"We previously\
    \ showed [1]...\"\n- [ ] No GitHub/GitLab URLs pointing to your personal repos\n\
    - [ ] Use Anonymous GitHub (https://anonymous.4open.science/) for code links\n\
    - [ ] No institutional logos or identifiers in figures\n- [ ] No file metadata\
    \ containing author names (check PDF properties)\n- [ ] No \"our previous work\"\
    \ or \"in our earlier paper\" phrasing\n- [ ] Dataset names don't reveal institution\
    \ (rename if needed)\n- [ ] Supplementary materials don't contain identifying\
    \ information\n```\n\n**Common mistakes**: Git commit messages visible in supplementary\
    \ code, watermarked figures from institutional tools, acknowledgments left in\
    \ from a previous draft, arXiv preprint posted before anonymity period.\n\n###\
    \ Step 7.3: Formatting Verification\n\n```\nPre-Submission Format Check:\n- [\
    \ ] Page limit respected (excluding references and appendix)\n- [ ] All figures\
    \ are vector (PDF) or high-res raster (600 DPI PNG)\n- [ ] All figures readable\
    \ in grayscale\n- [ ] All tables use booktabs\n- [ ] References compile correctly\
    \ (no \"?\" in citations)\n- [ ] No overfull hboxes in critical areas\n- [ ] Appendix\
    \ clearly labeled and separated\n- [ ] Required sections present (limitations,\
    \ broader impact, etc.)\n```\n\n### Step 7.4: Pre-Compilation Validation\n\nRun\
    \ these automated checks **before** attempting `pdflatex`. Catching errors here\
    \ is faster than debugging compiler output.\n\n```bash\n# 1. Lint with chktex\
    \ (catches common LaTeX mistakes)\n# Suppress noisy warnings: -n2 (sentence end),\
    \ -n24 (parens), -n13 (intersentence), -n1 (command terminated)\nchktex main.tex\
    \ -q -n2 -n24 -n13 -n1\n\n# 2. Verify all citations exist in .bib\n# Extract \\\
    cite{...} from .tex, check each against .bib\npython3 -c \"\nimport re\ntex =\
    \ open('main.tex').read()\nbib = open('references.bib').read()\ncites = set(re.findall(r'\\\
    \\\\\\cite[tp]?{([^}]+)}', tex))\nfor cite_group in cites:\n    for cite in cite_group.split(','):\n\
    \        cite = cite.strip()\n        if cite and cite not in bib:\n         \
    \   print(f'WARNING: \\\\\\\\cite{{{cite}}} not found in references.bib')\n\"\n\
    \n# 3. Verify all referenced figures exist on disk\npython3 -c \"\nimport re,\
    \ os\ntex = open('main.tex').read()\nfigs = re.findall(r'\\\\\\\\includegraphics(?:\\\
    [.*?\\])?{([^}]+)}', tex)\nfor fig in figs:\n    if not os.path.exists(fig):\n\
    \        print(f'WARNING: Figure file not found: {fig}')\n\"\n\n# 4. Check for\
    \ duplicate \\label definitions\npython3 -c \"\nimport re\nfrom collections import\
    \ Counter\ntex = open('main.tex').read()\nlabels = re.findall(r'\\\\\\\\label{([^}]+)}',\
    \ tex)\ndupes = {k: v for k, v in Counter(labels).items() if v > 1}\nfor label,\
    \ count in dupes.items():\n    print(f'WARNING: Duplicate label: {label} (appears\
    \ {count} times)')\n\"\n```\n\nFix any warnings before proceeding. For agent-based\
    \ workflows: feed chktex output back to the agent with instructions to make minimal\
    \ fixes.\n\n### Step 7.5: Final Compilation\n\n```bash\n# Clean build\nrm -f *.aux\
    \ *.bbl *.blg *.log *.out *.pdf\nlatexmk -pdf main.tex\n\n# Or manual (triple\
    \ pdflatex + bibtex for cross-references)\npdflatex -interaction=nonstopmode main.tex\n\
    bibtex main\npdflatex -interaction=nonstopmode main.tex\npdflatex -interaction=nonstopmode\
    \ main.tex\n\n# Verify output exists and has content\nls -la main.pdf\n```\n\n\
    **If compilation fails**: Parse the `.log` file for the first error. Common fixes:\n\
    - \"Undefined control sequence\" \u2192 missing package or typo in command name\n\
    - \"Missing $ inserted\" \u2192 math symbol outside math mode\n- \"File not found\"\
    \ \u2192 wrong figure path or missing .sty file\n- \"Citation undefined\" \u2192\
    \ .bib entry missing or bibtex not run\n\n### Step 7.6: Conference-Specific Requirements\n\
    \n| Venue | Special Requirements |\n|-------|---------------------|\n| **NeurIPS**\
    \ | Paper checklist in appendix, lay summary if accepted |\n| **ICML** | Broader\
    \ Impact Statement (after conclusion, doesn't count toward limit) |\n| **ICLR**\
    \ | LLM disclosure required, reciprocal reviewing agreement |\n| **ACL** | Mandatory\
    \ Limitations section, Responsible NLP checklist |\n| **AAAI** | Strict style\
    \ file \u2014 no modifications whatsoever |\n| **COLM** | Frame contribution for\
    \ language model community |\n\n### Step 7.7: Conference Resubmission & Format\
    \ Conversion\n\nWhen converting between venues, **never copy LaTeX preambles between\
    \ templates**:\n\n```bash\n# 1. Start fresh with target template\ncp -r templates/icml2026/\
    \ new_submission/\n\n# 2. Copy ONLY content sections (not preamble)\n#    - Abstract\
    \ text, section content, figures, tables, bib entries\n\n# 3. Adjust for page\
    \ limits\n# 4. Add venue-specific required sections\n# 5. Update references\n\
    ```\n\n| From \u2192 To | Page Change | Key Adjustments |\n|-----------|-------------|-----------------|\n\
    | NeurIPS \u2192 ICML | 9 \u2192 8 | Cut 1 page, add Broader Impact |\n| ICML\
    \ \u2192 ICLR | 8 \u2192 9 | Expand experiments, add LLM disclosure |\n| NeurIPS\
    \ \u2192 ACL | 9 \u2192 8 | Restructure for NLP conventions, add Limitations |\n\
    | ICLR \u2192 AAAI | 9 \u2192 7 | Significant cuts, strict style adherence |\n\
    | Any \u2192 COLM | varies \u2192 9 | Reframe for language model focus |\n\nWhen\
    \ cutting pages: move proofs to appendix, condense related work, combine tables,\
    \ use subfigures.\nWhen expanding: add ablations, expand limitations, include\
    \ additional baselines, add qualitative examples.\n\n**After rejection**: Address\
    \ reviewer concerns in the new version, but don't include a \"changes\" section\
    \ or reference the previous submission (blind review).\n\n### Step 7.8: Camera-Ready\
    \ Preparation (Post-Acceptance)\n\nAfter acceptance, prepare the camera-ready\
    \ version:\n\n```\nCamera-Ready Checklist:\n- [ ] De-anonymize: add author names,\
    \ affiliations, email addresses\n- [ ] Add Acknowledgments section (funding, compute\
    \ grants, helpful reviewers)\n- [ ] Add public code/data URL (real GitHub, not\
    \ anonymous)\n- [ ] Address any mandatory revisions from meta-reviewer\n- [ ]\
    \ Switch template to camera-ready mode (if applicable \u2014 e.g., AAAI \\anon\
    \ \u2192 \\camera)\n- [ ] Add copyright notice if required by venue\n- [ ] Update\
    \ any \"anonymous\" placeholders in text\n- [ ] Verify final PDF compiles cleanly\n\
    - [ ] Check page limit for camera-ready (sometimes differs from submission)\n\
    - [ ] Upload supplementary materials (code, data, appendix) to venue portal\n\
    ```\n\n### Step 7.9: arXiv & Preprint Strategy\n\nPosting to arXiv is standard\
    \ practice in ML but has important timing and anonymity considerations.\n\n**Timing\
    \ decision tree:**\n\n| Situation | Recommendation |\n|-----------|---------------|\n\
    | Submitting to double-blind venue (NeurIPS, ICML, ACL) | Post to arXiv **after**\
    \ submission deadline, not before. Posting before can technically violate anonymity\
    \ policies, though enforcement varies. |\n| Submitting to ICLR | ICLR explicitly\
    \ allows arXiv posting before submission. But don't put author names in the submission\
    \ itself. |\n| Paper already on arXiv, submitting to new venue | Acceptable at\
    \ most venues. Do NOT update arXiv version during review with changes that reference\
    \ reviews. |\n| Workshop paper | arXiv is fine at any time \u2014 workshops are\
    \ typically not double-blind. |\n| Want to establish priority | Post immediately\
    \ if scooping is a concern \u2014 but accept the anonymity tradeoff. |\n\n**arXiv\
    \ category selection** (ML/AI papers):\n\n| Category | Code | Best For |\n|----------|------|----------|\n\
    | Machine Learning | `cs.LG` | General ML methods |\n| Computation and Language\
    \ | `cs.CL` | NLP, language models |\n| Artificial Intelligence | `cs.AI` | Reasoning,\
    \ planning, agents |\n| Computer Vision | `cs.CV` | Vision models |\n| Information\
    \ Retrieval | `cs.IR` | Search, recommendation |\n\n**List primary + 1-2 cross-listed\
    \ categories.** More categories = more visibility, but only cross-list where genuinely\
    \ relevant.\n\n**Versioning strategy:**\n- **v1**: Initial submission (matches\
    \ conference submission)\n- **v2**: Post-acceptance with camera-ready corrections\
    \ (add \"accepted at [Venue]\" to abstract)\n- Don't post v2 during the review\
    \ period with changes that clearly respond to reviewer feedback\n\n```bash\n#\
    \ Check if your paper's title is already taken on arXiv\n# (before choosing a\
    \ title)\npip install arxiv\npython -c \"\nimport arxiv\nresults = list(arxiv.Search(query='ti:\\\
    \"Your Exact Title\\\"', max_results=5).results())\nprint(f'Found {len(results)}\
    \ matches')\nfor r in results: print(f'  {r.title} ({r.published.year})')\n\"\n\
    ```\n\n### Step 7.10: Research Code Packaging\n\nReleasing clean, runnable code\
    \ significantly increases citations and reviewer trust. Package code alongside\
    \ the camera-ready submission.\n\n**Repository structure:**\n\n```\nyour-method/\n\
    \  README.md              # Setup, usage, reproduction instructions\n  requirements.txt\
    \       # Or environment.yml for conda\n  setup.py               # For pip-installable\
    \ packages\n  LICENSE                # MIT or Apache 2.0 recommended for research\n\
    \  configs/               # Experiment configurations\n  src/                \
    \   # Core method implementation\n  scripts/               # Training, evaluation,\
    \ analysis scripts\n    train.py\n    evaluate.py\n    reproduce_table1.sh  #\
    \ One script per main result\n  data/                  # Small data or download\
    \ scripts\n    download_data.sh\n  results/               # Expected outputs for\
    \ verification\n```\n\n**README template for research code:**\n\n```markdown\n\
    # [Paper Title]\n\nOfficial implementation of \"[Paper Title]\" (Venue Year).\n\
    \n## Setup\n[Exact commands to set up environment]\n\n## Reproduction\nTo reproduce\
    \ Table 1: `bash scripts/reproduce_table1.sh`\nTo reproduce Figure 2: `python\
    \ scripts/make_figure2.py`\n\n## Citation\n[BibTeX entry]\n```\n\n**Pre-release\
    \ checklist:**\n```\n- [ ] Code runs from a clean clone (test on fresh machine\
    \ or Docker)\n- [ ] All dependencies pinned to specific versions\n- [ ] No hardcoded\
    \ absolute paths\n- [ ] No API keys, credentials, or personal data in repo\n-\
    \ [ ] README covers setup, reproduction, and citation\n- [ ] LICENSE file present\
    \ (MIT or Apache 2.0 for max reuse)\n- [ ] Results are reproducible within expected\
    \ variance\n- [ ] .gitignore excludes data files, checkpoints, logs\n```\n\n**Anonymous\
    \ code for submission** (before acceptance):\n```bash\n# Use Anonymous GitHub\
    \ for double-blind review\n# https://anonymous.4open.science/\n# Upload your repo\
    \ \u2192 get an anonymous URL \u2192 put in paper\n```\n\n---\n\n## Phase 8: Post-Acceptance\
    \ Deliverables\n\n**Goal**: Maximize the impact of your accepted paper through\
    \ presentation materials and community engagement.\n\n### Step 8.1: Conference\
    \ Poster\n\nMost conferences require a poster session. Poster design principles:\n\
    \n| Element | Guideline |\n|---------|-----------|\n| **Size** | Check venue requirements\
    \ (typically 24\"x36\" or A0 portrait/landscape) |\n| **Content** | Title, authors,\
    \ 1-sentence contribution, method figure, 2-3 key results, conclusion |\n| **Flow**\
    \ | Top-left to bottom-right (Z-pattern) or columnar |\n| **Text** | Title readable\
    \ at 3m, body at 1m. No full paragraphs \u2014 bullet points only. |\n| **Figures**\
    \ | Reuse paper figures at higher resolution. Enlarge key result. |\n\n**Tools**:\
    \ LaTeX (`beamerposter` package), PowerPoint/Keynote, Figma, Canva.\n\n**Production**:\
    \ Order 2+ weeks before the conference. Fabric posters are lighter for travel.\
    \ Many conferences now support virtual/digital posters too.\n\n### Step 8.2: Conference\
    \ Talk / Spotlight\n\nIf awarded an oral or spotlight presentation:\n\n| Talk\
    \ Type | Duration | Content |\n|-----------|----------|---------|\n| **Spotlight**\
    \ | 5 min | Problem, approach, one key result. Rehearse to exactly 5 minutes.\
    \ |\n| **Oral** | 15-20 min | Full story: problem, approach, key results, ablations,\
    \ limitations. |\n| **Workshop talk** | 10-15 min | Adapt based on workshop audience\
    \ \u2014 may need more background. |\n\n**Slide design rules:**\n- One idea per\
    \ slide\n- Minimize text \u2014 speak the details, don't project them\n- Animate\
    \ key figures to build understanding step-by-step\n- Include a \"takeaway\" slide\
    \ at the end (single sentence contribution)\n- Prepare backup slides for anticipated\
    \ questions\n\n### Step 8.3: Blog Post / Social Media\n\nAn accessible summary\
    \ significantly increases impact:\n\n- **Twitter/X thread**: 5-8 tweets. Lead\
    \ with the result, not the method. Include Figure 1 and key result figure.\n-\
    \ **Blog post**: 800-1500 words. Written for ML practitioners, not reviewers.\
    \ Skip formalism, emphasize intuition and practical implications.\n- **Project\
    \ page**: HTML page with abstract, figures, demo, code link, BibTeX. Use GitHub\
    \ Pages.\n\n**Timing**: Post within 1-2 days of paper appearing on proceedings\
    \ or arXiv camera-ready.\n\n---\n\n## Workshop & Short Papers\n\nWorkshop papers\
    \ and short papers (e.g., ACL short papers, Findings papers) follow the same pipeline\
    \ but with different constraints and expectations.\n\n### Workshop Papers\n\n\
    | Property | Workshop | Main Conference |\n|----------|----------|-----------------|\n\
    | **Page limit** | 4-6 pages (typically) | 7-9 pages |\n| **Review standard**\
    \ | Lower bar for completeness | Must be complete, thorough |\n| **Review process**\
    \ | Usually single-blind or light review | Double-blind, rigorous |\n| **What's\
    \ valued** | Interesting ideas, preliminary results, position pieces | Complete\
    \ empirical story with strong baselines |\n| **arXiv** | Post anytime | Timing\
    \ matters (see arXiv strategy) |\n| **Contribution bar** | Novel direction, interesting\
    \ negative result, work-in-progress | Significant advance with strong evidence\
    \ |\n\n**When to target a workshop:**\n- Early-stage idea you want feedback on\
    \ before a full paper\n- Negative result that doesn't justify 8+ pages\n- Position\
    \ piece or opinion on a timely topic\n- Replication study or reproducibility report\n\
    \n### ACL Short Papers & Findings\n\nACL venues have distinct submission types:\n\
    \n| Type | Pages | What's Expected |\n|------|-------|-----------------|\n| **Long\
    \ paper** | 8 | Complete study, strong baselines, ablations |\n| **Short paper**\
    \ | 4 | Focused contribution: one clear point with evidence |\n| **Findings**\
    \ | 8 | Solid work that narrowly missed main conference |\n\n**Short paper strategy**:\
    \ Pick ONE claim and support it thoroughly. Don't try to compress a long paper\
    \ into 4 pages \u2014 write a different, more focused paper.\n\n---\n\n## Paper\
    \ Types Beyond Empirical ML\n\nThe main pipeline above targets empirical ML papers.\
    \ Other paper types require different structures and evidence standards. See [references/paper-types.md](references/paper-types.md)\
    \ for detailed guidance on each type.\n\n### Theory Papers\n\n**Structure**: Introduction\
    \ \u2192 Preliminaries (definitions, notation) \u2192 Main Results (theorems)\
    \ \u2192 Proof Sketches \u2192 Discussion \u2192 Full Proofs (appendix)\n\n**Key\
    \ differences from empirical papers:**\n- Contribution is a theorem, bound, or\
    \ impossibility result \u2014 not experimental numbers\n- Methods section replaced\
    \ by \"Preliminaries\" and \"Main Results\"\n- Proofs are the evidence, not experiments\
    \ (though empirical validation of theory is welcome)\n- Proof sketches in main\
    \ text, full proofs in appendix is standard practice\n- Experimental section is\
    \ optional but strengthens the paper if it validates theoretical predictions\n\
    \n**Proof writing principles:**\n- State theorems formally with all assumptions\
    \ explicit\n- Provide intuition before formal proof (\"The key insight is...\"\
    )\n- Proof sketches should convey the main idea in 0.5-1 page\n- Use `\\begin{proof}...\\\
    end{proof}` environments\n- Number assumptions and reference them in theorems:\
    \ \"Under Assumptions 1-3, ...\"\n\n### Survey / Tutorial Papers\n\n**Structure**:\
    \ Introduction \u2192 Taxonomy / Organization \u2192 Detailed Coverage \u2192\
    \ Open Problems \u2192 Conclusion\n\n**Key differences:**\n- Contribution is the\
    \ organization, synthesis, and identification of open problems \u2014 not new\
    \ methods\n- Must be comprehensive within scope (reviewers will check for missing\
    \ references)\n- Requires a clear taxonomy or organizational framework\n- Value\
    \ comes from connections between works that individual papers don't make\n- Best\
    \ venues: TMLR (survey track), JMLR, Foundations and Trends in ML, ACM Computing\
    \ Surveys\n\n### Benchmark Papers\n\n**Structure**: Introduction \u2192 Task Definition\
    \ \u2192 Dataset Construction \u2192 Baseline Evaluation \u2192 Analysis \u2192\
    \ Intended Use & Limitations\n\n**Key differences:**\n- Contribution is the benchmark\
    \ itself \u2014 it must fill a genuine evaluation gap\n- Dataset documentation\
    \ is mandatory, not optional (see Datasheets, Step 5.11)\n- Must demonstrate the\
    \ benchmark is challenging (baselines don't saturate it)\n- Must demonstrate the\
    \ benchmark measures what you claim it measures (construct validity)\n- Best venues:\
    \ NeurIPS Datasets & Benchmarks track, ACL (resource papers), LREC-COLING\n\n\
    ### Position Papers\n\n**Structure**: Introduction \u2192 Background \u2192 Thesis\
    \ / Argument \u2192 Supporting Evidence \u2192 Counterarguments \u2192 Implications\n\
    \n**Key differences:**\n- Contribution is an argument, not a result\n- Must engage\
    \ seriously with counterarguments\n- Evidence can be empirical, theoretical, or\
    \ logical analysis\n- Best venues: ICML (position track), workshops, TMLR\n\n\
    ---\n\n## Hermes Agent Integration\n\nThis skill is designed for the Hermes agent.\
    \ It uses Hermes tools, delegation, scheduling, and memory for the full research\
    \ lifecycle.\n\n### Related Skills\n\nCompose this skill with other Hermes skills\
    \ for specific phases:\n\n| Skill | When to Use | How to Load |\n|-------|-------------|-------------|\n\
    | **arxiv** | Phase 1 (Literature Review): searching arXiv, generating BibTeX,\
    \ finding related papers via Semantic Scholar | `skill_view(\"arxiv\")` |\n| **subagent-driven-development**\
    \ | Phase 5 (Drafting): parallel section writing with 2-stage review (spec compliance\
    \ then quality) | `skill_view(\"subagent-driven-development\")` |\n| **plan**\
    \ | Phase 0 (Setup): creating structured plans before execution. Writes to `.hermes/plans/`\
