governance:
  write_zone:
    staging_dir: "forge/pending_review"
    canonical_dir: "forge"
    promotion: operator_approval
    # P5 retention (promoted-artifact-persistence-v1): inert declared DATA —
    # persist-by-default, never silent expiry; archive_dir is the operator-
    # initiated purge verb's declared destination. No reader but the purge core.
    retention:
      policy: persist
      archive_dir: ".archive"
    # promoted-artifact-persistence-v1 P2 (Delta 1) — declarative poller
    # coverage: the P1 per-unit canonical subdirs (~/.grove/forge/<slug>/)
    # are wiki-ingested by the generic package adapter. Declaration DATA:
    # source_type is operator-editable; no code names this producer.
    ingest:
      surface: canonical_subdirs
      source_type: forge_package
  emission_preconditions:
    required_tool_classes:
    - class: skill_invocation
      min_calls: 1
    terminal_artifact:
      tool: write_file
      path_pattern: "*.md"
      # wiki-writer-structured-output-v1 P1 — emit_package contract (source
      # of truth; the harness DERIVES the registered tool schema from this
      # block, GATE-B F5). transport:tool = schema-bound JSON emission (the
      # sentinel free-text protocol is retired from this producer's prompt;
      # the harness still dual-reads both this phase, GATE-B F6). forge is
      # self-authored: it names its file set and carries identity in the
      # structured meta arg (slug + routing metadata → staged meta.json).
      emit:
        transport: tool
        files:
          required: [resume.md, cover-letter.md]
        meta:
          # forge-meta-admission-hotfix-v1 HF-1 — the emit floor now matches
          # the publish contract (_FORGE_META_REQUIRED): a slug-only meta was
          # admitted, staged as a defect, and dead-ended every portal verb
          # (260712-fractional live incident). The tool refuses the emit with
          # the missing keys named, so the model corrects and re-calls.
          # fleet-receipt-custody-v1 P1.1 — row_id REMOVED from the model-facing
          # floor: identity is minted by the runtime (the resolver's unit_id)
          # and bound at emit; the model is never asked to name what it worked
          # on. The staged meta.json SHAPE is unchanged — the runtime writes
          # row_id. A model-emitted row_id is an extra meta key: stripped and
          # recorded on the receipt (stripped_meta_keys), telemetry only.
          required_keys: [slug, company, role]
      # fleet-artifact-legibility-v1 C1 — package declaration (consumed by
      # the C2 package renderer; the card-level view falls back to .md this
      # commit). Data only.
      presentation:
        package:
          order: [resume.md, cover-letter.md]
          title_from_meta: [company, role]
  approval_handoff:
    mode: action_surface_publish
  # forge-unattended-publish-v1 P1 — publication-autonomy grant (INERT this
  # phase; no fire-point reads it yet — Phase 2 wires it). Fail-closed default:
  # absent ≡ false, and the project ships it false — the Foundation never grants
  # unattended publish in the bundled record. The operator grants it (per node)
  # via the ~/.grove/capabilities/state/ overlay, matching the enable-flag
  # override precedent. Its SOLE reader is the strict, deny-by-default
  # publication_unattended_authorized(); a corrupt overlay denies, never
  # resilient-falls-back to this value.
  publication:
    unattended: false
  # forge-quality-gate-v1 — the HOW-WELL gate (drafter-quality-checks-v1
  # machinery; FIRST rollout-by-config-flip: zero new code, this block is the
  # whole feature). Context-aware (A1): the evaluator receives the dispatch
  # payload's selected row (Role / Company / Persona / Rationale / Tier) and,
  # on revision runs, the operator's revision_directive — absent keys are
  # noted in the verdict, never a failure. The JD full text is NOT in the
  # payload (scout Link → JD capture is forge-jd-context-v1); rubric v1.1 is
  # RESERVED for JD-grounded criteria once that lands. career-corpus.md is a
  # worker read surface, not payload — the judge checks internal consistency
  # and specificity, not corpus provenance.
  quality_gate:
    rubric_version: "1.0"
    context_inputs: [rows, revision_directive]
    criteria:
      - "Every claim, skill, and accomplishment is internally consistent across resume and cover letter, specific, and bounded — no naked metrics, no unverifiable superlatives, no invented credentials"
      - "The package's strongest content maps to the task context's Role, Persona, and Rationale; ordering and emphasis reflect that positioning, not generic resume convention"
      - "Role-relevant terms appear only where the surrounding experience genuinely supports them — no unsupported keyword assembly"
      - "Reads as compelling, coherent prose to a human evaluator — specific, active, quantified where the material allows"
      - "Cover letter makes one specific case for fit tied to the named Company and Role from the task context, not a template"
    threshold: 0.9
    redraft_limit: 1
    evaluator_tier: "T-QA"
read_surfaces:
- corpus_file
