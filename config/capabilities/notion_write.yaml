# Notion MCP — WRITE capability (GRV-009 E4, mcp-migration-v1).
# Risk profile: write (remote mutation). Governs the YELLOW-zoned hosted
# Notion MCP tools:
#   mcp_notion_notion_create_pages, mcp_notion_notion_create_database,
#   mcp_notion_notion_update_page, mcp_notion_notion_move_pages,
#   mcp_notion_notion_duplicate_page, mcp_notion_notion_create_comment,
#   mcp_notion_notion_update_data_source, mcp_notion_notion_create_view,
#   mcp_notion_notion_update_view.
# Also the catch-all for unmapped mcp_notion_API_* variants (yellow fail-safe,
# per the GATE-A lock — unmapped MCP tools attribute here).
# Zone YELLOW — strict parity with zones.schema.yaml::tool_zones (Sprint 69).
id: notion_write
kind: mcp
trigger:
  # Strict parity with config/manifest.yaml notion unit's disclose-on-match
  # trigger (server-level; the read/write split is the zone, not the trigger).
  intents: [research, retrieval]
  keywords: [notion, page, database, workspace, doc]
  dock_affinity: []   # manifest notion unit declares dock_goal: null — empty, exactly as today
bindings:
  # A4 (GRV-009 E5 C-BACKFILL) — strict 1:1 tool ownership. The 9 YELLOW hosted
  # Notion MCP write tools (names per zones.schema.yaml::tool_zones, Sprint 69).
  # The unmapped mcp_notion_API_* catch-all stays a RUNTIME attribution fail-safe
  # (run_agent), not a static binding. toolset_key is null: hosted MCP, not a
  # CONFIGURABLE_TOOLSETS key — schema is pulled live from mcp.notion.com/mcp.
  tools:
    - mcp_notion_notion_create_pages
    - mcp_notion_notion_create_database
    - mcp_notion_notion_update_page
    - mcp_notion_notion_move_pages
    - mcp_notion_notion_duplicate_page
    - mcp_notion_notion_create_comment
    - mcp_notion_notion_update_data_source
    - mcp_notion_notion_create_view
    - mcp_notion_notion_update_view
  credentials: notion-oauth
  toolset_key: null
tier_rule:
  # D2/D3 parity: notion's EFFECTIVE exposure is T3 only — T2 ceiling
  # (exclude_mcp: [notion]) and T1 wildcard (exclude_mcp: ["*"]) deny it.
  eligible: [3]
  preferred: 3          # must be in eligible (dry-run validation)
  promotion_criteria: {}
  validation:           # inert placeholders — validation fires only on promotion (epic out-of-scope)
    strategy: shadow_compare
    confidence_threshold: 0.95
    shadow_window: 20
zone: yellow
telemetry:
  feed: intent_feed     # binding string per the E2 record pattern (unified feed = E3 capability_feed)
  track: [invocation, result, cost, latency, confidence, human_feedback]
context:
  disclosure: eager     # GRV-009 E4 C4 — the manifest index-pull line is retired;
                        # an eligible-tier trigger-matched turn discloses eagerly
                        # (no index backdoor). The record describes live behavior.
  dock_composition: none
  payload: |
    mcp_schema:notion

    Notion workspace MCP (hosted at https://mcp.notion.com/mcp, Hermes-managed
    OAuth) — WRITE operations (Yellow: each routes through the existing
    tool_zones approval gate, unchanged). This pointer binds the record to the
    ``notion`` MCP server.

    Write tools (Yellow): create_pages, create_database, update_page,
    move_pages, duplicate_page, create_comment, update_data_source,
    create_view, update_view. Mutations require operator approval.
lifecycle:
  state: approved          # migrated capability enters at the operator's locked gate
  provenance: migrated
  created_at: "2026-06-12T00:00:00+00:00"
  last_used: null
  use_count: 0
  flywheel_eligible: true
lineage:
  source_patterns: []
  parent_id: null
  decision_log:
    - actor: operator
      timestamp: "2026-06-12T00:00:00+00:00"
      from_state: migrated
      to_state: approved
      reason: "E4 migration — mcp-migration-v1: record replaces the notion manifest unit's write-side disclose-on-match + the exclude_mcp ceiling at the operator-locked gate (GATE-A)"
      evidence: ["config/manifest.yaml#notion", "zones.schema.yaml#Notion-MCP-bridge"]
failure:
  fallback: halt_and_surface
  diagnostic_context:
    - "capability: notion_write"
    - "subsystem: hosted Notion MCP (mcp.notion.com/mcp) via tools/mcp_tool.py"
    - "check: notion MCP server connected and OAuth valid (~/.grove auth); yellow-zone approval gate intact"
  circuit_breaker:
    threshold: 3
    window_seconds: 300
