  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: test-driven-development\n\
    description: \"TDD: enforce RED-GREEN-REFACTOR, tests before code.\"\nversion:\
    \ 1.1.0\nauthor: Hermes Agent (adapted from obra/superpowers)\nlicense: MIT\n\
    platforms: [linux, macos, windows]\nmetadata:\n  hermes:\n    tags: [testing,\
    \ tdd, development, quality, red-green-refactor]\n    related_skills: [systematic-debugging,\
    \ writing-plans, subagent-driven-development]\n---\n\n# Test-Driven Development\
    \ (TDD)\n\n## Overview\n\nWrite the test first. Watch it fail. Write minimal code\
    \ to pass.\n\n**Core principle:** If you didn't watch the test fail, you don't\
    \ know if it tests the right thing.\n\n**Violating the letter of the rules is\
    \ violating the spirit of the rules.**\n\n## When to Use\n\n**Always:**\n- New\
    \ features\n- Bug fixes\n- Refactoring\n- Behavior changes\n\n**Exceptions (ask\
    \ the user first):**\n- Throwaway prototypes\n- Generated code\n- Configuration\
    \ files\n\nThinking \"skip TDD just this once\"? Stop. That's rationalization.\n\
    \n## The Iron Law\n\n```\nNO PRODUCTION CODE WITHOUT A FAILING TEST FIRST\n```\n\
    \nWrite code before the test? Delete it. Start over.\n\n**No exceptions:**\n-\
    \ Don't keep it as \"reference\"\n- Don't \"adapt\" it while writing tests\n-\
    \ Don't look at it\n- Delete means delete\n\nImplement fresh from tests. Period.\n\
    \n## Red-Green-Refactor Cycle\n\n### RED \u2014 Write Failing Test\n\nWrite one\
    \ minimal test showing what should happen.\n\n**Good test:**\n```python\ndef test_retries_failed_operations_3_times():\n\
    \    attempts = 0\n    def operation():\n        nonlocal attempts\n        attempts\
    \ += 1\n        if attempts < 3:\n            raise Exception('fail')\n      \
    \  return 'success'\n\n    result = retry_operation(operation)\n\n    assert result\
    \ == 'success'\n    assert attempts == 3\n```\nClear name, tests real behavior,\
    \ one thing.\n\n**Bad test:**\n```python\ndef test_retry_works():\n    mock =\
    \ MagicMock()\n    mock.side_effect = [Exception(), Exception(), 'success']\n\
    \    result = retry_operation(mock)\n    assert result == 'success'  # What about\
    \ retry count? Timing?\n```\nVague name, tests mock not real code.\n\n**Requirements:**\n\
    - One behavior per test\n- Clear descriptive name (\"and\" in name? Split it)\n\
    - Real code, not mocks (unless truly unavoidable)\n- Name describes behavior,\
    \ not implementation\n\n### Verify RED \u2014 Watch It Fail\n\n**MANDATORY. Never\
    \ skip.**\n\n```bash\n# Use terminal tool to run the specific test\npytest tests/test_feature.py::test_specific_behavior\
    \ -v\n```\n\nConfirm:\n- Test fails (not errors from typos)\n- Failure message\
    \ is expected\n- Fails because the feature is missing\n\n**Test passes immediately?**\
    \ You're testing existing behavior. Fix the test.\n\n**Test errors?** Fix the\
    \ error, re-run until it fails correctly.\n\n### GREEN \u2014 Minimal Code\n\n\
    Write the simplest code to pass the test. Nothing more.\n\n**Good:**\n```python\n\
    def add(a, b):\n    return a + b  # Nothing extra\n```\n\n**Bad:**\n```python\n\
    def add(a, b):\n    result = a + b\n    logging.info(f\"Adding {a} + {b} = {result}\"\
    )  # Extra!\n    return result\n```\n\nDon't add features, refactor other code,\
    \ or \"improve\" beyond the test.\n\n**Cheating is OK in GREEN:**\n- Hardcode\
    \ return values\n- Copy-paste\n- Duplicate code\n- Skip edge cases\n\nWe'll fix\
    \ it in REFACTOR.\n\n### Verify GREEN \u2014 Watch It Pass\n\n**MANDATORY.**\n\
    \n```bash\n# Run the specific test\npytest tests/test_feature.py::test_specific_behavior\
    \ -v\n\n# Then run ALL tests to check for regressions\npytest tests/ -q\n```\n\
    \nConfirm:\n- Test passes\n- Other tests still pass\n- Output pristine (no errors,\
    \ warnings)\n\n**Test fails?** Fix the code, not the test.\n\n**Other tests fail?**\
    \ Fix regressions now.\n\n### REFACTOR \u2014 Clean Up\n\nAfter green only:\n\
    - Remove duplication\n- Improve names\n- Extract helpers\n- Simplify expressions\n\
    \nKeep tests green throughout. Don't add behavior.\n\n**If tests fail during refactor:**\
    \ Undo immediately. Take smaller steps.\n\n### Repeat\n\nNext failing test for\
    \ next behavior. One cycle at a time.\n\n## Why Order Matters\n\n**\"I'll write\
    \ tests after to verify it works\"**\n\nTests written after code pass immediately.\
    \ Passing immediately proves nothing:\n- Might test the wrong thing\n- Might test\
    \ implementation, not behavior\n- Might miss edge cases you forgot\n- You never\
    \ saw it catch the bug\n\nTest-first forces you to see the test fail, proving\
    \ it actually tests something.\n\n**\"I already manually tested all the edge cases\"\
    **\n\nManual testing is ad-hoc. You think you tested everything but:\n- No record\
    \ of what you tested\n- Can't re-run when code changes\n- Easy to forget cases\
    \ under pressure\n- \"It worked when I tried it\" \u2260 comprehensive\n\nAutomated\
    \ tests are systematic. They run the same way every time.\n\n**\"Deleting X hours\
    \ of work is wasteful\"**\n\nSunk cost fallacy. The time is already gone. Your\
    \ choice now:\n- Delete and rewrite with TDD (high confidence)\n- Keep it and\
    \ add tests after (low confidence, likely bugs)\n\nThe \"waste\" is keeping code\
    \ you can't trust.\n\n**\"TDD is dogmatic, being pragmatic means adapting\"**\n\
    \nTDD IS pragmatic:\n- Finds bugs before commit (faster than debugging after)\n\
    - Prevents regressions (tests catch breaks immediately)\n- Documents behavior\
    \ (tests show how to use code)\n- Enables refactoring (change freely, tests catch\
    \ breaks)\n\n\"Pragmatic\" shortcuts = debugging in production = slower.\n\n**\"\
    Tests after achieve the same goals \u2014 it's spirit not ritual\"**\n\nNo. Tests-after\
    \ answer \"What does this do?\" Tests-first answer \"What should this do?\"\n\n\
    Tests-after are biased by your implementation. You test what you built, not what's\
    \ required. Tests-first force edge case discovery before implementing.\n\n## Common\
    \ Rationalizations\n\n| Excuse | Reality |\n|--------|---------|\n| \"Too simple\
    \ to test\" | Simple code breaks. Test takes 30 seconds. |\n| \"I'll test after\"\
    \ | Tests passing immediately prove nothing. |\n| \"Tests after achieve same goals\"\
    \ | Tests-after = \"what does this do?\" Tests-first = \"what should this do?\"\
    \ |\n| \"Already manually tested\" | Ad-hoc \u2260 systematic. No record, can't\
    \ re-run. |\n| \"Deleting X hours is wasteful\" | Sunk cost fallacy. Keeping unverified\
    \ code is technical debt. |\n| \"Keep as reference, write tests first\" | You'll\
    \ adapt it. That's testing after. Delete means delete. |\n| \"Need to explore\
    \ first\" | Fine. Throw away exploration, start with TDD. |\n| \"Test hard = design\
    \ unclear\" | Listen to the test. Hard to test = hard to use. |\n| \"TDD will\
    \ slow me down\" | TDD faster than debugging. Pragmatic = test-first. |\n| \"\
    Manual test faster\" | Manual doesn't prove edge cases. You'll re-test every change.\
    \ |\n| \"Existing code has no tests\" | You're improving it. Add tests for the\
    \ code you touch. |\n\n## Red Flags \u2014 STOP and Start Over\n\nIf you catch\
    \ yourself doing any of these, delete the code and restart with TDD:\n\n- Code\
    \ before test\n- Test after implementation\n- Test passes immediately on first\
    \ run\n- Can't explain why test failed\n- Tests added \"later\"\n- Rationalizing\
    \ \"just this once\"\n- \"I already manually tested it\"\n- \"Tests after achieve\
    \ the same purpose\"\n- \"Keep as reference\" or \"adapt existing code\"\n- \"\
    Already spent X hours, deleting is wasteful\"\n- \"TDD is dogmatic, I'm being\
    \ pragmatic\"\n- \"This is different because...\"\n\n**All of these mean: Delete\
    \ code. Start over with TDD.**\n\n## Verification Checklist\n\nBefore marking\
    \ work complete:\n\n- [ ] Every new function/method has a test\n- [ ] Watched\
    \ each test fail before implementing\n- [ ] Each test failed for expected reason\
    \ (feature missing, not typo)\n- [ ] Wrote minimal code to pass each test\n- [\
    \ ] All tests pass\n- [ ] Output pristine (no errors, warnings)\n- [ ] Tests use\
    \ real code (mocks only if unavoidable)\n- [ ] Edge cases and errors covered\n\
    \nCan't check all boxes? You skipped TDD. Start over.\n\n## When Stuck\n\n| Problem\
    \ | Solution |\n|---------|----------|\n| Don't know how to test | Write the wished-for\
    \ API. Write the assertion first. Ask the user. |\n| Test too complicated | Design\
    \ too complicated. Simplify the interface. |\n| Must mock everything | Code too\
    \ coupled. Use dependency injection. |\n| Test setup huge | Extract helpers. Still\
    \ complex? Simplify the design. |\n\n## Hermes Agent Integration\n\n### Running\
    \ Tests\n\nUse the `terminal` tool to run tests at each step:\n\n```python\n#\
    \ RED \u2014 verify failure\nterminal(\"pytest tests/test_feature.py::test_name\
    \ -v\")\n\n# GREEN \u2014 verify pass\nterminal(\"pytest tests/test_feature.py::test_name\
    \ -v\")\n\n# Full suite \u2014 verify no regressions\nterminal(\"pytest tests/\
    \ -q\")\n```\n\n### With delegate_task\n\nWhen dispatching subagents for implementation,\
    \ enforce TDD in the goal:\n\n```python\ndelegate_task(\n    goal=\"Implement\
    \ [feature] using strict TDD\",\n    context=\"\"\"\n    Follow test-driven-development\
    \ skill:\n    1. Write failing test FIRST\n    2. Run test to verify it fails\n\
    \    3. Write minimal code to pass\n    4. Run test to verify it passes\n    5.\
    \ Refactor if needed\n    6. Commit\n\n    Project test command: pytest tests/\
    \ -q\n    Project structure: [describe relevant files]\n    \"\"\",\n    toolsets=['terminal',\
    \ 'file']\n)\n```\n\n### With systematic-debugging\n\nBug found? Write failing\
    \ test reproducing it. Follow TDD cycle. The test proves the fix and prevents\
    \ regression.\n\nNever fix bugs without a test.\n\n## Testing Anti-Patterns\n\n\
    - **Testing mock behavior instead of real behavior** \u2014 mocks should verify\
    \ interactions, not replace the system under test\n- **Testing implementation\
    \ details** \u2014 test behavior/results, not internal method calls\n- **Happy\
    \ path only** \u2014 always test edge cases, errors, and boundaries\n- **Brittle\
    \ tests** \u2014 tests should verify behavior, not structure; refactoring shouldn't\
    \ break them\n\n## Final Rule\n\n```\nProduction code \u2192 test exists and failed\
    \ first\nOtherwise \u2192 not TDD\n```\n\nNo exceptions without the user's explicit\
    \ permission.\n"
