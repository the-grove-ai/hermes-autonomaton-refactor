  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: airtable\ndescription:\
    \ Airtable REST API via curl. Records CRUD, filters, upserts.\nversion: 1.1.0\n\
    author: community\nlicense: MIT\nplatforms: [linux, macos, windows]\nprerequisites:\n\
    \  env_vars: [AIRTABLE_API_KEY]\n  commands: [curl]\nmetadata:\n  hermes:\n  \
    \  tags: [Airtable, Productivity, Database, API]\n    homepage: https://airtable.com/developers/web/api/introduction\n\
    ---\n\n# Airtable \u2014 Bases, Tables & Records\n\nWork with Airtable's REST\
    \ API directly via `curl` using the `terminal` tool. No MCP server, no OAuth flow,\
    \ no Python SDK \u2014 just `curl` and a personal access token.\n\n## Prerequisites\n\
    \n1. Create a **Personal Access Token (PAT)** at https://airtable.com/create/tokens\
    \ (tokens start with `pat...`).\n2. Grant these scopes (minimum):\n   - `data.records:read`\
    \ \u2014 read rows\n   - `data.records:write` \u2014 create / update / delete\
    \ rows\n   - `schema.bases:read` \u2014 list bases and tables\n3. **Important:**\
    \ in the same token UI, add each base you want to access to the token's **Access**\
    \ list. PATs are scoped per-base \u2014 a valid token on the wrong base returns\
    \ `403`.\n4. Store the token in `~/.hermes/.env` (or via `hermes setup`):\n  \
    \ ```\n   AIRTABLE_API_KEY=pat_your_token_here\n   ```\n\n> Note: legacy `key...`\
    \ API keys were deprecated Feb 2024. Only PATs and OAuth tokens work now.\n\n\
    ## API Basics\n\n- **Endpoint:** `https://api.airtable.com/v0`\n- **Auth header:**\
    \ `Authorization: Bearer $AIRTABLE_API_KEY`\n- **All requests** use JSON (`Content-Type:\
    \ application/json` for any POST/PATCH/PUT body).\n- **Object IDs:** bases `app...`,\
    \ tables `tbl...`, records `rec...`, fields `fld...`. IDs never change; names\
    \ can. Prefer IDs in automations.\n- **Rate limit:** 5 requests/sec/base. `429`\
    \ \u2192 back off. Burst on a single base will be throttled.\n\nBase curl pattern:\n\
    ```bash\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE?maxRecords=5\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\n`-s` suppresses curl's progress bar \u2014 keep it set for every call so\
    \ the tool output stays clean for Hermes. Pipe through `python3 -m json.tool`\
    \ (always present) or `jq` (if installed) for readable JSON.\n\n## Field Types\
    \ (request body shapes)\n\n| Field type | Write shape |\n|---|---|\n| Single line\
    \ text | `\"Name\": \"hello\"` |\n| Long text | `\"Notes\": \"multi\\nline\"`\
    \ |\n| Number | `\"Score\": 42` |\n| Checkbox | `\"Done\": true` |\n| Single select\
    \ | `\"Status\": \"Todo\"` (name must already exist unless `typecast: true`) |\n\
    | Multi-select | `\"Tags\": [\"urgent\", \"bug\"]` |\n| Date | `\"Due\": \"2026-04-01\"\
    ` |\n| DateTime (UTC) | `\"At\": \"2026-04-01T14:30:00.000Z\"` |\n| URL / Email\
    \ / Phone | `\"Link\": \"https://\u2026\"` |\n| Attachment | `\"Files\": [{\"\
    url\": \"https://\u2026\"}]` (Airtable fetches + rehosts) |\n| Linked record |\
    \ `\"Owner\": [\"recXXXXXXXXXXXXXX\"]` (array of record IDs) |\n| User | `\"AssignedTo\"\
    : {\"id\": \"usrXXXXXXXXXXXXXX\"}` |\n\nPass `\"typecast\": true` at the top level\
    \ of a create/update body to let Airtable auto-coerce values (e.g. create a new\
    \ select option on the fly, convert `\"42\"` \u2192 `42`).\n\n## Common Queries\n\
    \n### List bases the token can see\n```bash\ncurl -s \"https://api.airtable.com/v0/meta/bases\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\n### List tables + schema for a base\n```bash\ncurl -s \"https://api.airtable.com/v0/meta/bases/$BASE_ID/tables\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\nUse this BEFORE mutating \u2014 confirms exact field names and IDs, surfaces\
    \ `options.choices` for select fields, and shows primary-field names.\n\n### List\
    \ records (first 10)\n```bash\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE?maxRecords=10\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\n### Get a single record\n```bash\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE/$RECORD_ID\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\n### Filter records (filterByFormula)\nAirtable formulas must be URL-encoded.\
    \ Let Python stdlib do it \u2014 never hand-encode:\n```bash\nFORMULA=\"{Status}='Todo'\"\
    \nENC=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1],\
    \ safe=\"\"))' \"$FORMULA\")\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE?filterByFormula=$ENC&maxRecords=20\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\nUseful formula patterns:\n- Exact match: `{Email}='user@example.com'`\n\
    - Contains: `FIND('bug', LOWER({Title}))`\n- Multiple conditions: `AND({Status}='Todo',\
    \ {Priority}='High')`\n- Or: `OR({Owner}='alice', {Owner}='bob')`\n- Not empty:\
    \ `NOT({Assignee}='')`\n- Date comparison: `IS_AFTER({Due}, TODAY())`\n\n### Sort\
    \ + select specific fields\n```bash\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE?sort%5B0%5D%5Bfield%5D=Priority&sort%5B0%5D%5Bdirection%5D=asc&fields%5B%5D=Name&fields%5B%5D=Status\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\nSquare brackets in query params MUST be URL-encoded (`%5B` / `%5D`).\n\n\
    ### Use a named view\n```bash\ncurl -s \"https://api.airtable.com/v0/$BASE_ID/$TABLE?view=Grid%20view&maxRecords=50\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\nViews apply their saved filter + sort server-side.\n\n## Common Mutations\n\
    \n### Create a record\n```bash\ncurl -s -X POST \"https://api.airtable.com/v0/$BASE_ID/$TABLE\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" \\\n  -H \"Content-Type:\
    \ application/json\" \\\n  -d '{\"fields\":{\"Name\":\"New task\",\"Status\":\"\
    Todo\",\"Priority\":\"High\"}}' | python3 -m json.tool\n```\n\n### Create up to\
    \ 10 records in one call\n```bash\ncurl -s -X POST \"https://api.airtable.com/v0/$BASE_ID/$TABLE\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" \\\n  -H \"Content-Type:\
    \ application/json\" \\\n  -d '{\n    \"typecast\": true,\n    \"records\": [\n\
    \      {\"fields\": {\"Name\": \"Task A\", \"Status\": \"Todo\"}},\n      {\"\
    fields\": {\"Name\": \"Task B\", \"Status\": \"In progress\"}}\n    ]\n  }' |\
    \ python3 -m json.tool\n```\nBatch endpoints are capped at **10 records per request**.\
    \ For larger inserts, loop in batches of 10 with a short sleep to respect 5 req/sec/base.\n\
    \n### Update a record (PATCH \u2014 merges, preserves unchanged fields)\n```bash\n\
    curl -s -X PATCH \"https://api.airtable.com/v0/$BASE_ID/$TABLE/$RECORD_ID\" \\\
    \n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"fields\":{\"Status\":\"Done\"}}' | python3 -m json.tool\n```\n\n\
    ### Upsert by a merge field (no ID needed)\n```bash\ncurl -s -X PATCH \"https://api.airtable.com/v0/$BASE_ID/$TABLE\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" \\\n  -H \"Content-Type:\
    \ application/json\" \\\n  -d '{\n    \"performUpsert\": {\"fieldsToMergeOn\"\
    : [\"Email\"]},\n    \"records\": [\n      {\"fields\": {\"Email\": \"user@example.com\"\
    , \"Status\": \"Active\"}}\n    ]\n  }' | python3 -m json.tool\n```\n`performUpsert`\
    \ creates records whose merge-field values are new, patches records whose merge-field\
    \ values already exist. Great for idempotent syncs.\n\n### Delete a record\n```bash\n\
    curl -s -X DELETE \"https://api.airtable.com/v0/$BASE_ID/$TABLE/$RECORD_ID\" \\\
    \n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n```\n\
    \n### Delete up to 10 records in one call\n```bash\ncurl -s -X DELETE \"https://api.airtable.com/v0/$BASE_ID/$TABLE?records%5B%5D=rec1&records%5B%5D=rec2\"\
    \ \\\n  -H \"Authorization: Bearer $AIRTABLE_API_KEY\" | python3 -m json.tool\n\
    ```\n\n## Pagination\n\nList endpoints return at most **100 records per page**.\
    \ If the response includes `\"offset\": \"...\"`, pass it back on the next call.\
    \ Loop until the field is absent:\n\n```bash\nOFFSET=\"\"\nwhile :; do\n  URL=\"\
    https://api.airtable.com/v0/$BASE_ID/$TABLE?pageSize=100\"\n  [ -n \"$OFFSET\"\
    \ ] && URL=\"$URL&offset=$OFFSET\"\n  RESP=$(curl -s \"$URL\" -H \"Authorization:\
    \ Bearer $AIRTABLE_API_KEY\")\n  echo \"$RESP\" | python3 -c 'import json,sys;\
    \ d=json.load(sys.stdin); [print(r[\"id\"], r[\"fields\"].get(\"Name\",\"\"))\
    \ for r in d[\"records\"]]'\n  OFFSET=$(echo \"$RESP\" | python3 -c 'import json,sys;\
    \ d=json.load(sys.stdin); print(d.get(\"offset\",\"\"))')\n  [ -z \"$OFFSET\"\
    \ ] && break\ndone\n```\n\n## Typical Hermes Workflow\n\n1. **Confirm auth.**\
    \ `curl -s -o /dev/null -w \"%{http_code}\\n\" https://api.airtable.com/v0/meta/bases\
    \ -H \"Authorization: Bearer $AIRTABLE_API_KEY\"` \u2014 expect `200`.\n2. **Find\
    \ the base.** List bases (step above) OR ask the user for the `app...` ID directly\
    \ if the token lacks `schema.bases:read`.\n3. **Inspect the schema.** `GET /v0/meta/bases/$BASE_ID/tables`\
    \ \u2014 cache the exact field names and primary-field name locally in the session\
    \ before mutating anything.\n4. **Read before you write.** For \"update X where\
    \ Y\", `filterByFormula` first to resolve the `rec...` ID, then `PATCH /v0/$BASE_ID/$TABLE/$RECORD_ID`.\
    \ Never guess record IDs.\n5. **Batch writes.** Combine related creates into one\
    \ 10-record POST to stay under the 5 req/sec budget.\n6. **Destructive ops.**\
    \ Deletions can't be undone via API. If the user says \"delete all Xs\", echo\
    \ back the filter + record count and confirm before firing.\n\n## Pitfalls\n\n\
    - **`filterByFormula` MUST be URL-encoded.** Field names with spaces or non-ASCII\
    \ also need encoding (`{My Field}` \u2192 `%7BMy%20Field%7D`). Use Python stdlib\
    \ (pattern above) \u2014 never hand-escape.\n- **Empty fields are omitted from\
    \ responses.** A missing `\"Assignee\"` key doesn't mean the field doesn't exist\
    \ \u2014 it means this record's value is empty. Check the schema (step 3) before\
    \ concluding a field is missing.\n- **PATCH vs PUT.** `PATCH` merges supplied\
    \ fields into the record. `PUT` replaces the record entirely and clears any field\
    \ you didn't include. Default to `PATCH`.\n- **Single-select options must exist.**\
    \ Writing `\"Status\": \"Shipping\"` when `Shipping` isn't in the field's option\
    \ list errors with `INVALID_MULTIPLE_CHOICE_OPTIONS` unless you pass `\"typecast\"\
    : true` (which auto-creates the option).\n- **Per-base token scoping.** A `403`\
    \ on one base while another works means the token's Access list doesn't include\
    \ that base \u2014 not a scope or auth issue. Send the user to https://airtable.com/create/tokens\
    \ to grant it.\n- **Rate limits are per base, not per token.** 5 req/sec on `baseA`\
    \ and 5 req/sec on `baseB` is fine; 6 req/sec on `baseA` alone will throttle.\
    \ Monitor the `Retry-After` header on `429`.\n\n## Important Notes for Hermes\n\
    \n- **Always use the `terminal` tool with `curl`.** Do NOT use `web_extract` (it\
    \ can't send auth headers) or `browser_navigate` (needs UI auth and is slow).\n\
    - **`AIRTABLE_API_KEY` flows from `~/.hermes/.env` into the subprocess automatically**\
    \ when this skill is loaded \u2014 no need to re-export it before each `curl`\
    \ call.\n- **Escape curly braces in formulas carefully.** In a heredoc body, `{Status}`\
    \ is literal. In a shell argument, `{Status}` is safe outside `{...}` brace-expansion\
    \ context \u2014 but pass dynamic strings through `python3 urllib.parse.quote`\
    \ before splicing into a URL.\n- **Pretty-print with `python3 -m json.tool`**\
    \ (always present) rather than `jq` (optional). Only reach for `jq` when you need\
    \ filtering/projection.\n- **Pagination is per-page, not global.** Airtable's\
    \ 100-record cap is a hard limit; there is no way to bump it. Loop with `offset`\
    \ until the field is absent.\n- **Read the `errors` array** on non-2xx responses\
    \ \u2014 Airtable returns structured error codes like `AUTHENTICATION_REQUIRED`,\
    \ `INVALID_PERMISSIONS`, `MODEL_ID_NOT_FOUND`, `INVALID_MULTIPLE_CHOICE_OPTIONS`\
    \ that tell you exactly what's wrong.\n"
