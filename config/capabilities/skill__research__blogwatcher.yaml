  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: blogwatcher\ndescription:\
    \ \"Monitor blogs and RSS/Atom feeds via blogwatcher-cli tool.\"\nversion: 2.0.0\n\
    author: JulienTant (fork of Hyaxia/blogwatcher)\nlicense: MIT\nplatforms: [linux,\
    \ macos, windows]\nmetadata:\n  hermes:\n    tags: [RSS, Blogs, Feed-Reader, Monitoring]\n\
    \    homepage: https://github.com/JulienTant/blogwatcher-cli\nprerequisites:\n\
    \  commands: [blogwatcher-cli]\n---\n\n# Blogwatcher\n\nTrack blog and RSS/Atom\
    \ feed updates with the `blogwatcher-cli` tool. Supports automatic feed discovery,\
    \ HTML scraping fallback, OPML import, and read/unread article management.\n\n\
    ## Installation\n\nPick one method:\n\n- **Go:** `go install github.com/JulienTant/blogwatcher-cli/cmd/blogwatcher-cli@latest`\n\
    - **Docker:** `docker run --rm -v blogwatcher-cli:/data ghcr.io/julientant/blogwatcher-cli`\n\
    - **Binary (Linux amd64):** `curl -sL https://github.com/JulienTant/blogwatcher-cli/releases/latest/download/blogwatcher-cli_linux_amd64.tar.gz\
    \ | tar xz -C /usr/local/bin blogwatcher-cli`\n- **Binary (Linux arm64):** `curl\
    \ -sL https://github.com/JulienTant/blogwatcher-cli/releases/latest/download/blogwatcher-cli_linux_arm64.tar.gz\
    \ | tar xz -C /usr/local/bin blogwatcher-cli`\n- **Binary (macOS Apple Silicon):**\
    \ `curl -sL https://github.com/JulienTant/blogwatcher-cli/releases/latest/download/blogwatcher-cli_darwin_arm64.tar.gz\
    \ | tar xz -C /usr/local/bin blogwatcher-cli`\n- **Binary (macOS Intel):** `curl\
    \ -sL https://github.com/JulienTant/blogwatcher-cli/releases/latest/download/blogwatcher-cli_darwin_amd64.tar.gz\
    \ | tar xz -C /usr/local/bin blogwatcher-cli`\n\nAll releases: https://github.com/JulienTant/blogwatcher-cli/releases\n\
    \n### Docker with persistent storage\n\nBy default the database lives at `~/.blogwatcher-cli/blogwatcher-cli.db`.\
    \ In Docker this is lost on container restart. Use `BLOGWATCHER_DB` or a volume\
    \ mount to persist it:\n\n```bash\n# Named volume (simplest)\ndocker run --rm\
    \ -v blogwatcher-cli:/data -e BLOGWATCHER_DB=/data/blogwatcher-cli.db ghcr.io/julientant/blogwatcher-cli\
    \ scan\n\n# Host bind mount\ndocker run --rm -v /path/on/host:/data -e BLOGWATCHER_DB=/data/blogwatcher-cli.db\
    \ ghcr.io/julientant/blogwatcher-cli scan\n```\n\n### Migrating from the original\
    \ blogwatcher\n\nIf upgrading from `Hyaxia/blogwatcher`, move your database:\n\
    \n```bash\nmv ~/.blogwatcher/blogwatcher.db ~/.blogwatcher-cli/blogwatcher-cli.db\n\
    ```\n\nThe binary name changed from `blogwatcher` to `blogwatcher-cli`.\n\n##\
    \ Common Commands\n\n### Managing blogs\n\n- Add a blog: `blogwatcher-cli add\
    \ \"My Blog\" https://example.com`\n- Add with explicit feed: `blogwatcher-cli\
    \ add \"My Blog\" https://example.com --feed-url https://example.com/feed.xml`\n\
    - Add with HTML scraping: `blogwatcher-cli add \"My Blog\" https://example.com\
    \ --scrape-selector \"article h2 a\"`\n- List tracked blogs: `blogwatcher-cli\
    \ blogs`\n- Remove a blog: `blogwatcher-cli remove \"My Blog\" --yes`\n- Import\
    \ from OPML: `blogwatcher-cli import subscriptions.opml`\n\n### Scanning and reading\n\
    \n- Scan all blogs: `blogwatcher-cli scan`\n- Scan one blog: `blogwatcher-cli\
    \ scan \"My Blog\"`\n- List unread articles: `blogwatcher-cli articles`\n- List\
    \ all articles: `blogwatcher-cli articles --all`\n- Filter by blog: `blogwatcher-cli\
    \ articles --blog \"My Blog\"`\n- Filter by category: `blogwatcher-cli articles\
    \ --category \"Engineering\"`\n- Mark article read: `blogwatcher-cli read 1`\n\
    - Mark article unread: `blogwatcher-cli unread 1`\n- Mark all read: `blogwatcher-cli\
    \ read-all`\n- Mark all read for a blog: `blogwatcher-cli read-all --blog \"My\
    \ Blog\" --yes`\n\n## Environment Variables\n\nAll flags can be set via environment\
    \ variables with the `BLOGWATCHER_` prefix:\n\n| Variable | Description |\n|---|---|\n\
    | `BLOGWATCHER_DB` | Path to SQLite database file |\n| `BLOGWATCHER_WORKERS` |\
    \ Number of concurrent scan workers (default: 8) |\n| `BLOGWATCHER_SILENT` | Only\
    \ output \"scan done\" when scanning |\n| `BLOGWATCHER_YES` | Skip confirmation\
    \ prompts |\n| `BLOGWATCHER_CATEGORY` | Default filter for articles by category\
    \ |\n\n## Example Output\n\n```\n$ blogwatcher-cli blogs\nTracked blogs (1):\n\
    \n  xkcd\n    URL: https://xkcd.com\n    Feed: https://xkcd.com/atom.xml\n   \
    \ Last scanned: 2026-04-03 10:30\n```\n\n```\n$ blogwatcher-cli scan\nScanning\
    \ 1 blog(s)...\n\n  xkcd\n    Source: RSS | Found: 4 | New: 4\n\nFound 4 new article(s)\
    \ total!\n```\n\n```\n$ blogwatcher-cli articles\nUnread articles (2):\n\n  [1]\
    \ [new] Barrel - Part 13\n       Blog: xkcd\n       URL: https://xkcd.com/3095/\n\
    \       Published: 2026-04-02\n       Categories: Comics, Science\n\n  [2] [new]\
    \ Volcano Fact\n       Blog: xkcd\n       URL: https://xkcd.com/3094/\n      \
    \ Published: 2026-04-01\n       Categories: Comics\n```\n\n## Notes\n\n- Auto-discovers\
    \ RSS/Atom feeds from blog homepages when no `--feed-url` is provided.\n- Falls\
    \ back to HTML scraping if RSS fails and `--scrape-selector` is configured.\n\
    - Categories from RSS/Atom feeds are stored and can be used to filter articles.\n\
    - Import blogs in bulk from OPML files exported by Feedly, Inoreader, NewsBlur,\
    \ etc.\n- Database stored at `~/.blogwatcher-cli/blogwatcher-cli.db` by default\
    \ (override with `--db` or `BLOGWATCHER_DB`).\n- Use `blogwatcher-cli <command>\
    \ --help` to discover all flags and options.\n"
