# flywheel_write.yaml — Kaizen proposal apply/dismiss (governed) verb record.
# Added by agent-ux-critical-fixes sprint (P0). Restores approve_proposal /
# reject_proposal to the offered surface — the flywheel toolset was omitted
# during the Jun-12 declarative-resolution-v1 / E5 C-VERBS migration, so the
# operator's approval could never be applied (proposals persisted after
# "approval"). Yellow zone: the apply is governed by the Sovereign Prompt.
# family=flywheel  zone=yellow  tiers=[1,2,3]  disclosure=proactive  trigger=always
id: flywheel_write
kind: verb
trigger:
  intents: []
  keywords: []
  dock_affinity: []
  always: true
  disclosure: proactive
bindings:
  tools:
  - approve_proposal
  - reject_proposal
  - dismiss_proposal
  credentials: null
  toolset_key: null
tier_rule:
  eligible:
  - 1
  - 2
  - 3
  preferred: 2
  promotion_criteria: {}
  validation:
    strategy: shadow_compare
    confidence_threshold: 0.95
    shadow_window: 20
zone: yellow
telemetry:
  feed: intent_feed
  track:
  - invocation
  - result
  - cost
  - latency
  - confidence
  - human_feedback
context:
  disclosure: eager
  payload: 'Kaizen proposal apply/dismiss (governed, zone yellow). Tools: approve_proposal,
    reject_proposal (content is WRONG — permanent, feeds rejection memory),
    dismiss_proposal (stop surfacing — soft, does NOT feed rejection memory).

    '
  dock_composition: none
lifecycle:
  state: approved
  provenance: migrated
  created_at: '2026-06-23T00:00:00+00:00'
  last_used: null
  use_count: 0
  flywheel_eligible: true
lineage:
  source_patterns: []
  parent_id: null
  decision_log:
  - actor: operator
    timestamp: '2026-06-23T00:00:00+00:00'
    from_state: migrated
    to_state: approved
    reason: 'agent-ux-critical-fixes (P0): restore the flywheel apply tools to the
      offered surface; the flywheel toolset was omitted during declarative-resolution-v1
      / E5 C-VERBS migration'
    evidence:
    - config/zones.schema.yaml#tool_zones
failure:
  fallback: halt_and_surface
  diagnostic_context:
  - 'capability: flywheel_write'
  - 'subsystem: flywheel review tool (tools.flywheel_review_tool)'
  - 'check: tool registered + zone mapped in zones.schema.yaml'
  circuit_breaker:
    threshold: 3
    window_seconds: 300
