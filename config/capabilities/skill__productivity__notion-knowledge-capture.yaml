  payload: "---\nname: notion-knowledge-capture\ndescription: Transforms conversations\
    \ and discussions into structured documentation pages in Notion. Captures insights,\
    \ decisions, and knowledge from chat context, formats appropriately, and saves\
    \ to wikis or databases with proper organization and linking for easy discovery.\n\
    ---\n\n# Knowledge Capture\n\nTransforms conversations, discussions, and insights\
    \ into structured documentation in your Notion workspace. Captures knowledge from\
    \ chat context, formats it appropriately, and saves it to the right location with\
    \ proper organization and linking.\n\n## Quick Start\n\nWhen asked to save information\
    \ to Notion:\n\n1. **Extract content**: Identify key information from conversation\
    \ context\n2. **Structure information**: Organize into appropriate documentation\
    \ format\n3. **Determine location**: Use `mcp_notion_notion_search` to find appropriate\
    \ wiki page/database\n4. **Create page**: Use `mcp_notion_notion_create_pages`\
    \ to save content\n5. **Make discoverable**: Link from relevant hub pages, add\
    \ to databases, or update wiki navigation so others can find it\n\n## Knowledge\
    \ Capture Workflow\n\n### Step 1: Identify content to capture\n\n```\nFrom conversation\
    \ context, extract:\n- Key concepts and definitions\n- Decisions made and rationale\n\
    - How-to information and procedures\n- Important insights or learnings\n- Q&A\
    \ pairs\n- Examples and use cases\n```\n\n### Step 2: Determine content type\n\
    \n```\nClassify the knowledge:\n- Concept/Definition\n- How-to Guide\n- Decision\
    \ Record\n- FAQ Entry\n- Meeting Summary\n- Learning/Post-mortem\n- Reference\
    \ Documentation\n```\n\n\n### Step 3: Structure the content\n\n```\nFormat appropriately\
    \ based on content type:\n- Use templates for consistency\n- Add clear headings\
    \ and sections\n- Include examples where helpful\n- Add relevant metadata\n- Link\
    \ to related pages\n```\n\n\n### Step 4: Determine destination\n\n```\nWhere to\
    \ save:\n- Wiki page (general knowledge base)\n- Specific project page (project-specific\
    \ knowledge)\n- Documentation database (structured docs)\n- FAQ database (questions\
    \ and answers)\n- Decision log (architecture/product decisions)\n- Team wiki (team-specific\
    \ knowledge)\n```\n\n### Step 5: Create the page\n\n```\nUse mcp_notion_notion_create_pages:\n\
    - Set appropriate title\n- Use structured content from template\n- Set properties\
    \ if in database\n- Add tags/categories\n- Link to related pages\n```\n\n### Step\
    \ 6: Make content discoverable\n\n```\nLink the new page so others can find it:\n\
    \n1. Update hub/index pages:\n   - Add link to wiki table of contents page\n \
    \  - Add link from relevant project page\n   - Add link from category/topic page\
    \ (e.g., \"Engineering Docs\")\n   \n2. If page is in a database:\n   - Set appropriate\
    \ tags/categories\n   - Set status (e.g., \"Published\")\n   - Add to relevant\
    \ views\n   \n3. Optionally update parent page:\n   - If saved under a project,\
    \ add to project's \"Documentation\" section\n   - If in team wiki, ensure it's\
    \ linked from team homepage\n\nExample:\nmcp_notion_notion_update_page\npage_id:\
    \ \"team-wiki-homepage-id\"\ncommand: \"insert_content_after\"\nselection_with_ellipsis:\
    \ \"## How-To Guides...\"\nnew_str: \"- <mention-page url='...'>How to Deploy\
    \ to Production</mention-page>\"\n```\n\nThis step ensures the knowledge doesn't\
    \ become \"orphaned\" - it's properly connected to your workspace's navigation\
    \ structure.\n\n## Content Types\n\nChoose appropriate structure based on content:\n\
    \n**Concept**: Overview \u2192 Definition \u2192 Characteristics \u2192 Examples\
    \ \u2192 Use Cases \u2192 Related\n**How-To**: Overview \u2192 Prerequisites \u2192\
    \ Steps (numbered) \u2192 Verification \u2192 Troubleshooting \u2192 Related\n\
    **Decision**: Context \u2192 Decision \u2192 Rationale \u2192 Options Considered\
    \ \u2192 Consequences \u2192 Implementation\n**FAQ**: Short Answer \u2192 Detailed\
    \ Explanation \u2192 Examples \u2192 When to Use \u2192 Related Questions\n**Learning**:\
    \ What Happened \u2192 What Went Well \u2192 What Didn't \u2192 Root Causes \u2192\
    \ Learnings \u2192 Actions\n\n\n## Destination Patterns\n\n**General Wiki**: Standalone\
    \ page \u2192 add to index \u2192 tag \u2192 link from related pages\n\n**Project\
    \ Wiki**: Child of project page \u2192 link from project overview \u2192 tag with\
    \ project name\n\n**Documentation Database**: Use properties (Title, Type, Category,\
    \ Tags, Last Updated, Owner)\n\n**Decision Log Database**: Use properties (Decision,\
    \ Date, Status, Domain, Deciders, Impact)\n\n**FAQ Database**: Use properties\
    \ (Question, Category, Tags, Last Reviewed, Useful Count)\n\nSee [reference/database-best-practices.md](reference/database-best-practices.md)\
    \ for database selection guide and individual schema files.\n\n## Content Extraction\
    \ from Conversations\n\n**Chat Discussion**: Key points, conclusions, resources,\
    \ action items, Q&A\n\n**Problem-Solving**: Problem statement, approaches tried,\
    \ solution, why it worked, future considerations\n\n**Knowledge Sharing**: Concept\
    \ explained, examples, best practices, common pitfalls, resources\n\n**Decision\
    \ Discussion**: Question, options, trade-offs, decision, rationale, next steps\n\
    \n## Formatting Best Practices\n\n**Structure**: Use `#` (title), `##` (sections),\
    \ `###` (subsections) consistently\n\n**Writing**: Start with overview, use bullets,\
    \ keep paragraphs short, add examples\n\n**Linking**: Link related pages, mention\
    \ people, reference resources, create bidirectional links\n\n**Metadata**: Include\
    \ date, author, tags, status\n\n**Searchability**: Clear titles, natural keywords,\
    \ common search tags, image alt-text\n\n## Indexing and Organization\n\n**Wiki\
    \ Index**: Organize by sections (Getting Started, How-To Guides, Reference, FAQs,\
    \ Decisions) with page links\n\n**Category Pages**: Create landing pages with\
    \ overview, doc links, and recent updates\n\n**Tagging Strategy**: Use consistent\
    \ tags for technology/tools, topics, audience, and status\n\n## Update Management\n\
    \n**Create New**: Content is substantive (>2 paragraphs), will be referenced multiple\
    \ times, part of knowledge base, needs independent discovery\n\n**Update Existing**:\
    \ Adding to existing topic, correcting info, expanding concept, updating for changes\n\
    \n**Versioning**: Add update history section for significant changes (date, author,\
    \ what changed, why)\n\n## Best Practices\n\n1. **Capture promptly**: Document\
    \ while context is fresh\n2. **Structure consistently**: Use templates for similar\
    \ content\n3. **Link extensively**: Connect related knowledge\n4. **Write for\
    \ discovery**: Use searchable titles and tags\n5. **Include context**: Why this\
    \ matters, when to use\n6. **Add examples**: Concrete examples aid understanding\n\
    7. **Maintain**: Review and update periodically\n8. **Get feedback**: Ask if documentation\
    \ is helpful\n\n## Advanced Features\n\n**Documentation databases**: See [reference/database-best-practices.md](reference/database-best-practices.md)\
    \ for database schema patterns.\n\n## Common Issues\n\n**\"Not sure where to save\"\
    **: Default to general wiki, can move later\n**\"Content is fragmentary\"**: Group\
    \ related fragments into cohesive doc\n**\"Already exists\"**: Search first, update\
    \ existing if appropriate\n**\"Too informal\"**: Clean up language while preserving\
    \ insights\n\n## Examples\n\nSee [examples/](examples/) for complete workflows:\n\
    - [examples/conversation-to-faq.md](examples/conversation-to-faq.md) - FAQ from\
    \ Q&A\n- [examples/decision-capture.md](examples/decision-capture.md) - Decision\
    \ record\n- [examples/how-to-guide.md](examples/how-to-guide.md) - How-to from\
    \ discussion\n\n"
