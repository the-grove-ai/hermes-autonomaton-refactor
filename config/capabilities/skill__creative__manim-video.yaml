  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: manim-video\ndescription:\
    \ \"Manim CE animations: 3Blue1Brown math/algo videos.\"\nversion: 1.0.0\nplatforms:\
    \ [linux, macos, windows]\n---\n\n# Manim Video Production Pipeline\n\n## When\
    \ to use\n\nUse when users request: animated explanations, math animations, concept\
    \ visualizations, algorithm walkthroughs, technical explainers, 3Blue1Brown style\
    \ videos, or any programmatic animation with geometric/mathematical content. Creates\
    \ 3Blue1Brown-style explainer videos, algorithm visualizations, equation derivations,\
    \ architecture diagrams, and data stories using Manim Community Edition.\n\n##\
    \ Creative Standard\n\nThis is educational cinema. Every frame teaches. Every\
    \ animation reveals structure.\n\n**Before writing a single line of code**, articulate\
    \ the narrative arc. What misconception does this correct? What is the \"aha moment\"\
    ? What visual story takes the viewer from confusion to understanding? The user's\
    \ prompt is a starting point \u2014 interpret it with pedagogical ambition.\n\n\
    **Geometry before algebra.** Show the shape first, the equation second. Visual\
    \ memory encodes faster than symbolic memory. When the viewer sees the geometric\
    \ pattern before the formula, the equation feels earned.\n\n**First-render excellence\
    \ is non-negotiable.** The output must be visually clear and aesthetically cohesive\
    \ without revision rounds. If something looks cluttered, poorly timed, or like\
    \ \"AI-generated slides,\" it is wrong.\n\n**Opacity layering directs attention.**\
    \ Never show everything at full brightness. Primary elements at 1.0, contextual\
    \ elements at 0.4, structural elements (axes, grids) at 0.15. The brain processes\
    \ visual salience in layers.\n\n**Breathing room.** Every animation needs `self.wait()`\
    \ after it. The viewer needs time to absorb what just appeared. Never rush from\
    \ one animation to the next. A 2-second pause after a key reveal is never wasted.\n\
    \n**Cohesive visual language.** All scenes share a color palette, consistent typography\
    \ sizing, matching animation speeds. A technically correct video where every scene\
    \ uses random different colors is an aesthetic failure.\n\n## Prerequisites\n\n\
    Run `scripts/setup.sh` to verify all dependencies. Requires: Python 3.10+, Manim\
    \ Community Edition v0.20+ (`pip install manim`), LaTeX (`texlive-full` on Linux,\
    \ `mactex` on macOS), and ffmpeg. Reference docs tested against Manim CE v0.20.1.\n\
    \n## Modes\n\n| Mode | Input | Output | Reference |\n|------|-------|--------|-----------|\n\
    | **Concept explainer** | Topic/concept | Animated explanation with geometric\
    \ intuition | `references/scene-planning.md` |\n| **Equation derivation** | Math\
    \ expressions | Step-by-step animated proof | `references/equations.md` |\n| **Algorithm\
    \ visualization** | Algorithm description | Step-by-step execution with data structures\
    \ | `references/graphs-and-data.md` |\n| **Data story** | Data/metrics | Animated\
    \ charts, comparisons, counters | `references/graphs-and-data.md` |\n| **Architecture\
    \ diagram** | System description | Components building up with connections | `references/mobjects.md`\
    \ |\n| **Paper explainer** | Research paper | Key findings and methods animated\
    \ | `references/scene-planning.md` |\n| **3D visualization** | 3D concept | Rotating\
    \ surfaces, parametric curves, spatial geometry | `references/camera-and-3d.md`\
    \ |\n\n## Stack\n\nSingle Python script per project. No browser, no Node.js, no\
    \ GPU required.\n\n| Layer | Tool | Purpose |\n|-------|------|---------|\n| Core\
    \ | Manim Community Edition | Scene rendering, animation engine |\n| Math | LaTeX\
    \ (texlive/MiKTeX) | Equation rendering via `MathTex` |\n| Video I/O | ffmpeg\
    \ | Scene stitching, format conversion, audio muxing |\n| TTS | ElevenLabs / Qwen3-TTS\
    \ (optional) | Narration voiceover |\n\n## Pipeline\n\n```\nPLAN --> CODE -->\
    \ RENDER --> STITCH --> AUDIO (optional) --> REVIEW\n```\n\n1. **PLAN** \u2014\
    \ Write `plan.md` with narrative arc, scene list, visual elements, color palette,\
    \ voiceover script\n2. **CODE** \u2014 Write `script.py` with one class per scene,\
    \ each independently renderable\n3. **RENDER** \u2014 `manim -ql script.py Scene1\
    \ Scene2 ...` for draft, `-qh` for production\n4. **STITCH** \u2014 ffmpeg concat\
    \ of scene clips into `final.mp4`\n5. **AUDIO** (optional) \u2014 Add voiceover\
    \ and/or background music via ffmpeg. See `references/rendering.md`\n6. **REVIEW**\
    \ \u2014 Render preview stills, verify against plan, adjust\n\n## Project Structure\n\
    \n```\nproject-name/\n  plan.md                # Narrative arc, scene breakdown\n\
    \  script.py              # All scenes in one file\n  concat.txt             #\
    \ ffmpeg scene list\n  final.mp4              # Stitched output\n  media/    \
    \             # Auto-generated by Manim\n    videos/script/480p15/\n```\n\n##\
    \ Creative Direction\n\n### Color Palettes\n\n| Palette | Background | Primary\
    \ | Secondary | Accent | Use case |\n|---------|-----------|---------|-----------|--------|----------|\n\
    | **Classic 3B1B** | `#1C1C1C` | `#58C4DD` (BLUE) | `#83C167` (GREEN) | `#FFFF00`\
    \ (YELLOW) | General math/CS |\n| **Warm academic** | `#2D2B55` | `#FF6B6B` |\
    \ `#FFD93D` | `#6BCB77` | Approachable |\n| **Neon tech** | `#0A0A0A` | `#00F5FF`\
    \ | `#FF00FF` | `#39FF14` | Systems, architecture |\n| **Monochrome** | `#1A1A2E`\
    \ | `#EAEAEA` | `#888888` | `#FFFFFF` | Minimalist |\n\n### Animation Speed\n\n\
    | Context | run_time | self.wait() after |\n|---------|----------|-------------------|\n\
    | Title/intro appear | 1.5s | 1.0s |\n| Key equation reveal | 2.0s | 2.0s |\n\
    | Transform/morph | 1.5s | 1.5s |\n| Supporting label | 0.8s | 0.5s |\n| FadeOut\
    \ cleanup | 0.5s | 0.3s |\n| \"Aha moment\" reveal | 2.5s | 3.0s |\n\n### Typography\
    \ Scale\n\n| Role | Font size | Usage |\n|------|-----------|-------|\n| Title\
    \ | 48 | Scene titles, opening text |\n| Heading | 36 | Section headers within\
    \ a scene |\n| Body | 30 | Explanatory text |\n| Label | 24 | Annotations, axis\
    \ labels |\n| Caption | 20 | Subtitles, fine print |\n\n### Fonts\n\n**Use monospace\
    \ fonts for all text.** Manim's Pango renderer produces broken kerning with proportional\
    \ fonts at all sizes. See `references/visual-design.md` for full recommendations.\n\
    \n```python\nMONO = \"Menlo\"  # define once at top of file\n\nText(\"Fourier\
    \ Series\", font_size=48, font=MONO, weight=BOLD)  # titles\nText(\"n=1: sin(x)\"\
    , font_size=20, font=MONO)                  # labels\nMathTex(r\"\\nabla L\")\
    \                                            # math (uses LaTeX)\n```\n\nMinimum\
    \ `font_size=18` for readability.\n\n### Per-Scene Variation\n\nNever use identical\
    \ config for all scenes. For each scene:\n- **Different dominant color** from\
    \ the palette\n- **Different layout** \u2014 don't always center everything\n\
    - **Different animation entry** \u2014 vary between Write, FadeIn, GrowFromCenter,\
    \ Create\n- **Different visual weight** \u2014 some scenes dense, others sparse\n\
    \n## Workflow\n\n### Step 1: Plan (plan.md)\n\nBefore any code, write `plan.md`.\
    \ See `references/scene-planning.md` for the comprehensive template.\n\n### Step\
    \ 2: Code (script.py)\n\nOne class per scene. Every scene is independently renderable.\n\
    \n```python\nfrom manim import *\n\nBG = \"#1C1C1C\"\nPRIMARY = \"#58C4DD\"\n\
    SECONDARY = \"#83C167\"\nACCENT = \"#FFFF00\"\nMONO = \"Menlo\"\n\nclass Scene1_Introduction(Scene):\n\
    \    def construct(self):\n        self.camera.background_color = BG\n       \
    \ title = Text(\"Why Does This Work?\", font_size=48, color=PRIMARY, weight=BOLD,\
    \ font=MONO)\n        self.add_subcaption(\"Why does this work?\", duration=2)\n\
    \        self.play(Write(title), run_time=1.5)\n        self.wait(1.0)\n     \
    \   self.play(FadeOut(title), run_time=0.5)\n```\n\nKey patterns:\n- **Subtitles**\
    \ on every animation: `self.add_subcaption(\"text\", duration=N)` or `subcaption=\"\
    text\"` on `self.play()`\n- **Shared color constants** at file top for cross-scene\
    \ consistency\n- **`self.camera.background_color`** set in every scene\n- **Clean\
    \ exits** \u2014 FadeOut all mobjects at scene end: `self.play(FadeOut(Group(*self.mobjects)))`\n\
    \n### Step 3: Render\n\n```bash\nmanim -ql script.py Scene1_Introduction Scene2_CoreConcept\
    \  # draft\nmanim -qh script.py Scene1_Introduction Scene2_CoreConcept  # production\n\
    ```\n\n### Step 4: Stitch\n\n```bash\ncat > concat.txt << 'EOF'\nfile 'media/videos/script/480p15/Scene1_Introduction.mp4'\n\
    file 'media/videos/script/480p15/Scene2_CoreConcept.mp4'\nEOF\nffmpeg -y -f concat\
    \ -safe 0 -i concat.txt -c copy final.mp4\n```\n\n### Step 5: Review\n\n```bash\n\
    manim -ql --format=png -s script.py Scene2_CoreConcept  # preview still\n```\n\
    \n## Critical Implementation Notes\n\n### Raw Strings for LaTeX\n```python\n#\
    \ WRONG: MathTex(\"\\frac{1}{2}\")\n# RIGHT:\nMathTex(r\"\\frac{1}{2}\")\n```\n\
    \n### buff >= 0.5 for Edge Text\n```python\nlabel.to_edge(DOWN, buff=0.5)  # never\
    \ < 0.5\n```\n\n### FadeOut Before Replacing Text\n```python\nself.play(ReplacementTransform(note1,\
    \ note2))  # not Write(note2) on top\n```\n\n### Never Animate Non-Added Mobjects\n\
    ```python\nself.play(Create(circle))  # must add first\nself.play(circle.animate.set_color(RED))\
    \  # then animate\n```\n\n## Performance Targets\n\n| Quality | Resolution | FPS\
    \ | Speed |\n|---------|-----------|-----|-------|\n| `-ql` (draft) | 854x480\
    \ | 15 | 5-15s/scene |\n| `-qm` (medium) | 1280x720 | 30 | 15-60s/scene |\n| `-qh`\
    \ (production) | 1920x1080 | 60 | 30-120s/scene |\n\nAlways iterate at `-ql`.\
    \ Only render `-qh` for final output.\n\n## References\n\n| File | Contents |\n\
    |------|----------|\n| `references/animations.md` | Core animations, rate functions,\
    \ composition, `.animate` syntax, timing patterns |\n| `references/mobjects.md`\
    \ | Text, shapes, VGroup/Group, positioning, styling, custom mobjects |\n| `references/visual-design.md`\
    \ | 12 design principles, opacity layering, layout templates, color palettes |\n\
    | `references/equations.md` | LaTeX in Manim, TransformMatchingTex, derivation\
    \ patterns |\n| `references/graphs-and-data.md` | Axes, plotting, BarChart, animated\
    \ data, algorithm visualization |\n| `references/camera-and-3d.md` | MovingCameraScene,\
    \ ThreeDScene, 3D surfaces, camera control |\n| `references/scene-planning.md`\
    \ | Narrative arcs, layout templates, scene transitions, planning template |\n\
    | `references/rendering.md` | CLI reference, quality presets, ffmpeg, voiceover\
    \ workflow, GIF export |\n| `references/troubleshooting.md` | LaTeX errors, animation\
    \ errors, common mistakes, debugging |\n| `references/animation-design-thinking.md`\
    \ | When to animate vs show static, decomposition, pacing, narration sync |\n\
    | `references/updaters-and-trackers.md` | ValueTracker, add_updater, always_redraw,\
    \ time-based updaters, patterns |\n| `references/paper-explainer.md` | Turning\
    \ research papers into animations \u2014 workflow, templates, domain patterns\
    \ |\n| `references/decorations.md` | SurroundingRectangle, Brace, arrows, DashedLine,\
    \ Angle, annotation lifecycle |\n| `references/production-quality.md` | Pre-code,\
    \ pre-render, post-render checklists, spatial layout, color, tempo |\n\n---\n\n\
    ## Creative Divergence (use only when user requests experimental/creative/unique\
    \ output)\n\nIf the user asks for creative, experimental, or unconventional explanatory\
    \ approaches, select a strategy and reason through it BEFORE designing the animation.\n\
    \n- **SCAMPER** \u2014 when the user wants a fresh take on a standard explanation\n\
    - **Assumption Reversal** \u2014 when the user wants to challenge how something\
    \ is typically taught\n\n### SCAMPER Transformation\nTake a standard mathematical/technical\
    \ visualization and transform it:\n- **Substitute**: replace the standard visual\
    \ metaphor (number line \u2192 winding path, matrix \u2192 city grid)\n- **Combine**:\
    \ merge two explanation approaches (algebraic + geometric simultaneously)\n- **Reverse**:\
    \ derive backward \u2014 start from the result and deconstruct to axioms\n- **Modify**:\
    \ exaggerate a parameter to show why it matters (10x the learning rate, 1000x\
    \ the sample size)\n- **Eliminate**: remove all notation \u2014 explain purely\
    \ through animation and spatial relationships\n\n### Assumption Reversal\n1. List\
    \ what's \"standard\" about how this topic is visualized (left-to-right, 2D, discrete\
    \ steps, formal notation)\n2. Pick the most fundamental assumption\n3. Reverse\
    \ it (right-to-left derivation, 3D embedding of a 2D concept, continuous morphing\
    \ instead of steps, zero notation)\n4. Explore what the reversal reveals that\
    \ the standard approach hides\n"
