    \ 0].cpu().numpy())\n```\n\n### Text-to-sound with AudioGen\n\n```python\nfrom\
    \ audiocraft.models import AudioGen\n\n# Load AudioGen\nmodel = AudioGen.get_pretrained('facebook/audiogen-medium')\n\
    \nmodel.set_generation_params(duration=5)\n\n# Generate sound effects\ndescriptions\
