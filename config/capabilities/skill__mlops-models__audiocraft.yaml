    \ | Sampling temperature |\n| `cfg_coef` | 3.0 | Classifier-free guidance |\n\n\
    ## MusicGen usage\n\n### Text-to-music generation\n\n```python\nfrom audiocraft.models\
    \ import MusicGen\nimport torchaudio\n\nmodel = MusicGen.get_pretrained('facebook/musicgen-medium')\n\
    \n# Configure generation\nmodel.set_generation_params(\n    duration=30,     \
    \     # Up to 30 seconds\n    top_k=250,            # Sampling diversity\n   \
    \ top_p=0.0,            # 0 = use top_k only\n    temperature=1.0,      # Creativity\
    \ (higher = more varied)\n    cfg_coef=3.0          # Text adherence (higher =\
    \ stricter)\n)\n\n# Generate multiple samples\ndescriptions = [\n    \"epic orchestral\
    \ soundtrack with strings and brass\",\n    \"chill lo-fi hip hop beat with jazzy\
    \ piano\",\n    \"energetic rock song with electric guitar\"\n]\n\n# Generate\
    \ (returns [batch, channels, samples])\nwav = model.generate(descriptions)\n\n\
    # Save each\nfor i, audio in enumerate(wav):\n    torchaudio.save(f\"music_{i}.wav\"\
    , audio.cpu(), sample_rate=32000)\n```\n\n### Melody-conditioned generation\n\n\
    ```python\nfrom audiocraft.models import MusicGen\nimport torchaudio\n\n# Load\
    \ melody model\nmodel = MusicGen.get_pretrained('facebook/musicgen-melody')\n\
    model.set_generation_params(duration=30)\n\n# Load melody audio\nmelody, sr =\
    \ torchaudio.load(\"melody.wav\")\n\n# Generate with melody conditioning\ndescriptions\
    \ = [\"acoustic guitar folk song\"]\nwav = model.generate_with_chroma(descriptions,\
    \ melody, sr)\n\ntorchaudio.save(\"melody_conditioned.wav\", wav[0].cpu(), sample_rate=32000)\n\
    ```\n\n### Stereo generation\n\n```python\nfrom audiocraft.models import MusicGen\n\
    \n# Load stereo model\nmodel = MusicGen.get_pretrained('facebook/musicgen-stereo-medium')\n\
    model.set_generation_params(duration=15)\n\ndescriptions = [\"ambient electronic\
    \ music with wide stereo panning\"]\nwav = model.generate(descriptions)\n\n# wav\
    \ shape: [batch, 2, samples] for stereo\nprint(f\"Stereo shape: {wav.shape}\"\
    )  # [1, 2, 480000]\ntorchaudio.save(\"stereo.wav\", wav[0].cpu(), sample_rate=32000)\n\
    ```\n\n### Audio continuation\n\n```python\nfrom transformers import AutoProcessor,\
    \ MusicgenForConditionalGeneration\n\nprocessor = AutoProcessor.from_pretrained(\"\
    facebook/musicgen-medium\")\nmodel = MusicgenForConditionalGeneration.from_pretrained(\"\
    facebook/musicgen-medium\")\n\n# Load audio to continue\nimport torchaudio\naudio,\
    \ sr = torchaudio.load(\"intro.wav\")\n\n# Process with text and audio\ninputs\
    \ = processor(\n    audio=audio.squeeze().numpy(),\n    sampling_rate=sr,\n  \
    \  text=[\"continue with a epic chorus\"],\n    padding=True,\n    return_tensors=\"\
    pt\"\n)\n\n# Generate continuation\naudio_values = model.generate(**inputs, do_sample=True,\
    \ guidance_scale=3, max_new_tokens=512)\n```\n\n## MusicGen-Style usage\n\n###\
    \ Style-conditioned generation\n\n```python\nfrom audiocraft.models import MusicGen\n\
    \n# Load style model\nmodel = MusicGen.get_pretrained('facebook/musicgen-style')\n\
    \n# Configure generation with style\nmodel.set_generation_params(\n    duration=30,\n\
    \    cfg_coef=3.0,\n    cfg_coef_beta=5.0  # Style influence\n)\n\n# Configure\
    \ style conditioner\nmodel.set_style_conditioner_params(\n    eval_q=3,      \
    \    # RVQ quantizers (1-6)\n    excerpt_length=3.0  # Style excerpt length\n\
    )\n\n# Load style reference\nstyle_audio, sr = torchaudio.load(\"reference_style.wav\"\
    )\n\n# Generate with text + style\ndescriptions = [\"upbeat dance track\"]\nwav\
    \ = model.generate_with_style(descriptions, style_audio, sr)\n```\n\n### Style-only\
    \ generation (no text)\n\n```python\n# Generate matching style without text prompt\n\
    model.set_generation_params(\n    duration=30,\n    cfg_coef=3.0,\n    cfg_coef_beta=None\
    \  # Disable double CFG for style-only\n)\n\nwav = model.generate_with_style([None],\
    \ style_audio, sr)\n```\n\n## AudioGen usage\n\n### Sound effect generation\n\n\
    ```python\nfrom audiocraft.models import AudioGen\nimport torchaudio\n\nmodel\
    \ = AudioGen.get_pretrained('facebook/audiogen-medium')\nmodel.set_generation_params(duration=10)\n\
    \n# Generate various sounds\ndescriptions = [\n    \"thunderstorm with heavy rain\
    \ and lightning\",\n    \"busy city traffic with car horns\",\n    \"ocean waves\
    \ crashing on rocks\",\n    \"crackling campfire in forest\"\n]\n\nwav = model.generate(descriptions)\n\
    \nfor i, audio in enumerate(wav):\n    torchaudio.save(f\"sound_{i}.wav\", audio.cpu(),\
    \ sample_rate=16000)\n```\n\n## EnCodec usage\n\n### Audio compression\n\n```python\n\
    from audiocraft.models import CompressionModel\nimport torch\nimport torchaudio\n\
    \n# Load EnCodec\nmodel = CompressionModel.get_pretrained('facebook/encodec_32khz')\n\
    \n# Load audio\nwav, sr = torchaudio.load(\"audio.wav\")\n\n# Ensure correct sample\
    \ rate\nif sr != 32000:\n    resampler = torchaudio.transforms.Resample(sr, 32000)\n\
    \    wav = resampler(wav)\n\n# Encode to tokens\nwith torch.no_grad():\n    encoded\
    \ = model.encode(wav.unsqueeze(0))\n    codes = encoded[0]  # Audio codes\n\n\
    # Decode back to audio\nwith torch.no_grad():\n    decoded = model.decode(codes)\n\
    \ntorchaudio.save(\"reconstructed.wav\", decoded[0].cpu(), sample_rate=32000)\n\
    ```\n\n## Common workflows\n\n### Workflow 1: Music generation pipeline\n\n```python\n\
    import torch\nimport torchaudio\nfrom audiocraft.models import MusicGen\n\nclass\
    \ MusicGenerator:\n    def __init__(self, model_name=\"facebook/musicgen-medium\"\
    ):\n        self.model = MusicGen.get_pretrained(model_name)\n        self.sample_rate\
    \ = 32000\n\n    def generate(self, prompt, duration=30, temperature=1.0, cfg=3.0):\n\
    \        self.model.set_generation_params(\n            duration=duration,\n \
    \           top_k=250,\n            temperature=temperature,\n            cfg_coef=cfg\n\
    \        )\n\n        with torch.no_grad():\n            wav = self.model.generate([prompt])\n\
    \n        return wav[0].cpu()\n\n    def generate_batch(self, prompts, duration=30):\n\
    \        self.model.set_generation_params(duration=duration)\n\n        with torch.no_grad():\n\
    \            wav = self.model.generate(prompts)\n\n        return wav.cpu()\n\n\
    \    def save(self, audio, path):\n        torchaudio.save(path, audio, sample_rate=self.sample_rate)\n\
    \n# Usage\ngenerator = MusicGenerator()\naudio = generator.generate(\n    \"epic\
    \ cinematic orchestral music\",\n    duration=30,\n    temperature=1.0\n)\ngenerator.save(audio,\
    \ \"epic_music.wav\")\n```\n\n### Workflow 2: Sound design batch processing\n\n\
    ```python\nimport json\nfrom pathlib import Path\nfrom audiocraft.models import\
    \ AudioGen\nimport torchaudio\n\ndef batch_generate_sounds(sound_specs, output_dir):\n\
    \    \"\"\"\n    Generate multiple sounds from specifications.\n\n    Args:\n\
    \        sound_specs: list of {\"name\": str, \"description\": str, \"duration\"\
    : float}\n        output_dir: output directory path\n    \"\"\"\n    model = AudioGen.get_pretrained('facebook/audiogen-medium')\n\
    \    output_dir = Path(output_dir)\n    output_dir.mkdir(exist_ok=True)\n\n  \
    \  results = []\n\n    for spec in sound_specs:\n        model.set_generation_params(duration=spec.get(\"\
    duration\", 5))\n\n        wav = model.generate([spec[\"description\"]])\n\n \
    \       output_path = output_dir / f\"{spec['name']}.wav\"\n        torchaudio.save(str(output_path),\
    \ wav[0].cpu(), sample_rate=16000)\n\n        results.append({\n            \"\
    name\": spec[\"name\"],\n            \"path\": str(output_path),\n           \
    \ \"description\": spec[\"description\"]\n        })\n\n    return results\n\n\
    # Usage\nsounds = [\n    {\"name\": \"explosion\", \"description\": \"massive\
    \ explosion with debris\", \"duration\": 3},\n    {\"name\": \"footsteps\", \"\
    description\": \"footsteps on wooden floor\", \"duration\": 5},\n    {\"name\"\
    : \"door\", \"description\": \"wooden door creaking and closing\", \"duration\"\
    : 2}\n]\n\nresults = batch_generate_sounds(sounds, \"sound_effects/\")\n```\n\n\
    ### Workflow 3: Gradio demo\n\n```python\nimport gradio as gr\nimport torch\n\
    import torchaudio\nfrom audiocraft.models import MusicGen\n\nmodel = MusicGen.get_pretrained('facebook/musicgen-small')\n\
    \ndef generate_music(prompt, duration, temperature, cfg_coef):\n    model.set_generation_params(\n\
    \        duration=duration,\n        temperature=temperature,\n        cfg_coef=cfg_coef\n\
    \    )\n\n    with torch.no_grad():\n        wav = model.generate([prompt])\n\n\
    \    # Save to temp file\n    path = \"temp_output.wav\"\n    torchaudio.save(path,\
    \ wav[0].cpu(), sample_rate=32000)\n    return path\n\ndemo = gr.Interface(\n\
    \    fn=generate_music,\n    inputs=[\n        gr.Textbox(label=\"Music Description\"\
    , placeholder=\"upbeat electronic dance music\"),\n        gr.Slider(1, 30, value=8,\
    \ label=\"Duration (seconds)\"),\n        gr.Slider(0.5, 2.0, value=1.0, label=\"\
    Temperature\"),\n        gr.Slider(1.0, 10.0, value=3.0, label=\"CFG Coefficient\"\
    )\n    ],\n    outputs=gr.Audio(label=\"Generated Music\"),\n    title=\"MusicGen\
    \ Demo\"\n)\n\ndemo.launch()\n```\n\n## Performance optimization\n\n### Memory\
    \ optimization\n\n```python\n# Use smaller model\nmodel = MusicGen.get_pretrained('facebook/musicgen-small')\n\
    \n# Clear cache between generations\ntorch.cuda.empty_cache()\n\n# Generate shorter\
    \ durations\nmodel.set_generation_params(duration=10)  # Instead of 30\n\n# Use\
    \ half precision\nmodel = model.half()\n```\n\n### Batch processing efficiency\n\
    \n```python\n# Process multiple prompts at once (more efficient)\ndescriptions\
    \ = [\"prompt1\", \"prompt2\", \"prompt3\", \"prompt4\"]\nwav = model.generate(descriptions)\
    \  # Single batch\n\n# Instead of\nfor desc in descriptions:\n    wav = model.generate([desc])\
    \  # Multiple batches (slower)\n```\n\n### GPU memory requirements\n\n| Model\
    \ | FP32 VRAM | FP16 VRAM |\n|-------|-----------|-----------|\n| musicgen-small\
    \ | ~4GB | ~2GB |\n| musicgen-medium | ~8GB | ~4GB |\n| musicgen-large | ~16GB\
    \ | ~8GB |\n\n## Common issues\n\n| Issue | Solution |\n|-------|----------|\n\
    | CUDA OOM | Use smaller model, reduce duration |\n| Poor quality | Increase cfg_coef,\
    \ better prompts |\n| Generation too short | Check max duration setting |\n| Audio\
    \ artifacts | Try different temperature |\n| Stereo not working | Use stereo model\
    \ variant |\n\n## References\n\n- **[Advanced Usage](references/advanced-usage.md)**\
