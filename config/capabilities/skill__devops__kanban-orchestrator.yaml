  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: kanban-orchestrator\n\
    description: Decomposition playbook + anti-temptation rules for an orchestrator\
    \ profile routing work through Kanban. The \"don't do the work yourself\" rule\
    \ and the basic lifecycle are auto-injected into every kanban worker's system\
    \ prompt; this skill is the deeper playbook when you're specifically playing the\
    \ orchestrator role.\nversion: 3.0.0\nplatforms: [linux, macos, windows]\nmetadata:\n\
    \  hermes:\n    tags: [kanban, multi-agent, orchestration, routing]\n    related_skills:\
    \ [kanban-worker]\n---\n\n# Kanban Orchestrator \u2014 Decomposition Playbook\n\
    \n> The **core worker lifecycle** (including the `kanban_create` fan-out pattern\
    \ and the \"decompose, don't execute\" rule) is auto-injected into every kanban\
    \ process via the `KANBAN_GUIDANCE` system-prompt block. This skill is the deeper\
    \ playbook when you're an orchestrator profile whose whole job is routing.\n\n\
    ## Profiles are user-configured \u2014 not a fixed roster\n\nHermes setups vary\
    \ widely. Some users run a single profile that does everything; some run a small\
    \ fleet (`docker-worker`, `cron-worker`); some run a curated specialist team they've\
    \ named themselves. There is **no default specialist roster** \u2014 the orchestrator\
    \ skill does not know what profiles exist on this machine.\n\nBefore fanning out,\
    \ you must ground the decomposition in the profiles that actually exist. The dispatcher\
    \ silently fails to spawn unknown assignee names \u2014 it doesn't autocorrect,\
    \ doesn't suggest, doesn't fall back. So a card assigned to `researcher` on a\
    \ setup that only has `docker-worker` just sits in `ready` forever.\n\n**Step\
    \ 0: discover available profiles before planning.**\n\nUse one of these:\n\n-\
    \ `hermes profile list` \u2014 prints the table of profiles configured on this\
    \ machine. Run it through your terminal tool if you have one; otherwise ask the\
    \ user.\n- `kanban_list(assignee=\"<some-name>\")` \u2014 sanity-check a single\
    \ name. Returns an empty list (rather than an error) for an unknown assignee,\
    \ so this only confirms a name you're already considering.\n- **Just ask the user.**\
    \ \"What profiles do you have set up?\" is a fine first turn when the goal needs\
    \ more than one specialist.\n\nCache the result in your working memory for the\
    \ rest of the conversation. Re-asking every turn wastes a tool call.\n\n## When\
    \ to use the board (vs. just doing the work)\n\nCreate Kanban tasks when any of\
    \ these are true:\n\n1. **Multiple specialists are needed.** Research + analysis\
    \ + writing is three profiles.\n2. **The work should survive a crash or restart.**\
    \ Long-running, recurring, or important.\n3. **The user might want to interject.**\
    \ Human-in-the-loop at any step.\n4. **Multiple subtasks can run in parallel.**\
    \ Fan-out for speed.\n5. **Review / iteration is expected.** A reviewer profile\
    \ loops on drafter output.\n6. **The audit trail matters.** Board rows persist\
    \ in SQLite forever.\n\nIf *none* of those apply \u2014 it's a small one-shot\
    \ reasoning task \u2014 use `delegate_task` instead or answer the user directly.\n\
    \n## The anti-temptation rules\n\nYour job description says \"route, don't execute.\"\
    \ The rules that enforce that:\n\n- **Do not execute the work yourself.** Your\
    \ restricted toolset usually doesn't even include terminal/file/code/web for implementation.\
    \ If you find yourself \"just fixing this quickly\" \u2014 stop and create a task\
    \ for the right specialist.\n- **For any concrete task, create a Kanban task and\
    \ assign it.** Every single time.\n- **Split multi-lane requests before creating\
    \ cards.** A user prompt can contain several independent workstreams. Extract\
    \ those lanes first, then create one card per lane instead of bundling unrelated\
    \ work into a single implementer card.\n- **Run independent lanes in parallel.**\
    \ If two cards do not need each other's output, leave them unlinked so the dispatcher\
    \ can fan them out. Link only true data dependencies.\n- **Never create dependent\
    \ work as independent ready cards.** If a card must wait for another card, pass\
    \ `parents=[...]` in the original `kanban_create` call. Do not create it first\
    \ and link it later, and do not rely on prose like \"wait for T1\" inside the\
    \ body.\n- **If no specialist fits the available profiles, ask the user which\
    \ profile to create or which existing profile to use.** Do not invent profile\
    \ names; the dispatcher will silently drop unknown assignees.\n- **Decompose,\
    \ route, and summarize \u2014 that's the whole job.**\n\n## Decomposition playbook\n\
    \n### Step 1 \u2014 Understand the goal\n\nAsk clarifying questions if the goal\
    \ is ambiguous. Cheap to ask; expensive to spawn the wrong fleet.\n\n### Step\
    \ 2 \u2014 Sketch the task graph\n\nBefore creating anything, draft the graph\
    \ out loud (in your response to the user). Treat every concrete workstream as\
    \ a candidate card:\n\n1. Extract the lanes from the request.\n2. Map each lane\
    \ to one of the profiles you discovered in Step 0. If a lane doesn't fit any existing\
    \ profile, ask the user which to use or create.\n3. Decide whether each lane is\
    \ independent or gated by another lane.\n4. Create independent lanes as parallel\
    \ cards with no parent links.\n5. Create synthesis/review/integration cards with\
    \ parent links to the lanes they depend on. A child created with unfinished parents\
    \ starts in `todo`; the dispatcher promotes it to `ready` only after every parent\
    \ is done.\n\nExamples of prompts that should fan out (using placeholder profile\
    \ names \u2014 substitute whatever exists on the user's setup):\n\n- \"Build an\
    \ app\" \u2192 one card to a design-oriented profile for product/UI direction,\
    \ one or two cards to engineering profiles for implementation, plus a later integration/review\
    \ card if the user has a reviewer profile.\n- \"Fix blockers and check model variants\"\
    \ \u2192 one implementation card for the blocker fixes plus one discovery/research\
    \ card for config/source verification. A final reviewer card can depend on both.\n\
    - \"Research docs and implement\" \u2192 a docs-research card can run in parallel\
    \ with a codebase-discovery card; implementation waits only if it truly needs\
    \ those findings.\n- \"Analyze this screenshot and find the related code\" \u2192\
    \ one card to a vision-capable profile for the visual analysis while another searches\
    \ the codebase.\n\nWords like \"also,\" \"finally,\" or \"and\" do not automatically\
    \ imply a dependency. They often mean \"make sure this is covered before reporting\
    \ back.\" Only link tasks when one card cannot start until another card's output\
    \ exists.\n\nShow the graph to the user before creating cards. Let them correct\
    \ it \u2014 including which actual profile name should own each lane.\n\n### Step\
    \ 3 \u2014 Create tasks and link\n\nUse the profile names from Step 0. The example\
    \ below uses placeholders `<profile-A>`, `<profile-B>`, `<profile-C>` \u2014 replace\
    \ them with what the user actually has.\n\n```python\nt1 = kanban_create(\n  \
    \  title=\"research: Postgres cost vs current\",\n    assignee=\"<profile-A>\"\
    ,  # whichever profile handles research on this setup\n    body=\"Compare estimated\
    \ infrastructure costs, migration costs, and ongoing ops costs over a 3-year window.\
    \ Sources: AWS/GCP pricing, team time estimates, current Postgres bills from peers.\"\
    ,\n    tenant=os.environ.get(\"HERMES_TENANT\"),\n)[\"task_id\"]\n\nt2 = kanban_create(\n\
    \    title=\"research: Postgres performance vs current\",\n    assignee=\"<profile-A>\"\
    ,  # same profile, run in parallel\n    body=\"Compare query latency, throughput,\
    \ and scaling characteristics at our expected data volume (~500GB, 10k QPS peak).\
    \ Sources: benchmark papers, public case studies, pgbench results if easy.\",\n\
    )[\"task_id\"]\n\nt3 = kanban_create(\n    title=\"synthesize migration recommendation\"\
    ,\n    assignee=\"<profile-B>\",  # whichever profile does synthesis/analysis\n\
    \    body=\"Read the findings from T1 (cost) and T2 (performance). Produce a 1-page\
    \ recommendation with explicit trade-offs and a go/no-go call.\",\n    parents=[t1,\
    \ t2],\n)[\"task_id\"]\n\nt4 = kanban_create(\n    title=\"draft decision memo\"\
    ,\n    assignee=\"<profile-C>\",  # whichever profile drafts user-facing prose\n\
    \    body=\"Turn the analyst's recommendation into a 2-page memo for the CTO.\
    \ Match the tone of previous decision memos in the team's knowledge base.\",\n\
    \    parents=[t3],\n)[\"task_id\"]\n```\n\n`parents=[...]` gates promotion \u2014\
    \ children stay in `todo` until every parent reaches `done`, then auto-promote\
    \ to `ready`. No manual coordination needed; the dispatcher and dependency engine\
    \ handle it.\n\nIf the task graph has dependencies, create the parent cards first,\
    \ capture their returned ids, and include those ids in the child card's `parents`\
    \ list during the child `kanban_create` call. Avoid creating all cards in parallel\
    \ and linking them afterward; that creates a window where the dispatcher can claim\
    \ a child before its inputs exist.\n\n### Step 4 \u2014 Complete your own task\n\
    \nIf you were spawned as a task yourself (e.g. a planner profile was assigned\
    \ `T0: \"investigate Postgres migration\"`), mark it done with a summary of what\
    \ you created:\n\n```python\nkanban_complete(\n    summary=\"decomposed into T1-T4:\
    \ 2 research lanes in parallel, 1 synthesis on their outputs, 1 prose draft on\
    \ the recommendation\",\n    metadata={\n        \"task_graph\": {\n         \
    \   \"T1\": {\"assignee\": \"<profile-A>\", \"parents\": []},\n            \"\
    T2\": {\"assignee\": \"<profile-A>\", \"parents\": []},\n            \"T3\": {\"\
    assignee\": \"<profile-B>\", \"parents\": [\"T1\", \"T2\"]},\n            \"T4\"\
    : {\"assignee\": \"<profile-C>\", \"parents\": [\"T3\"]},\n        },\n    },\n\
    )\n```\n\n### Step 5 \u2014 Report back to the user\n\nTell them what you created\
    \ in plain prose, naming the actual profiles you used:\n\n> I've queued 4 tasks:\n\
    > - **T1** (`<profile-A>`): cost comparison\n> - **T2** (`<profile-A>`): performance\
    \ comparison, in parallel with T1\n> - **T3** (`<profile-B>`): synthesizes T1\
    \ + T2 into a recommendation\n> - **T4** (`<profile-C>`): turns T3 into a CTO\
    \ memo\n>\n> The dispatcher will pick up T1 and T2 now. T3 starts when both finish.\
    \ You'll get a gateway ping when T4 completes. Use the dashboard or `hermes kanban\
    \ tail <id>` to follow along.\n\n## Common patterns\n\n**Fan-out + fan-in (research\
    \ \u2192 synthesize):** N research-style cards with no parents, one synthesis\
    \ card with all of them as parents.\n\n**Parallel implementation + validation:**\
    \ one implementer card makes the change while one explorer/researcher card verifies\
    \ config, docs, or source mapping. A reviewer card can depend on both. Do not\
    \ make the implementer own unrelated verification just because the user mentioned\
    \ both in one sentence.\n\n**Pipeline with gates:** `planner \u2192 implementer\
    \ \u2192 reviewer`. Each stage's `parents=[previous_task]`. Reviewer blocks or\
    \ completes; if reviewer blocks, the operator unblocks with feedback and respawns.\n\
    \n**Same-profile queue:** N tasks, all assigned to the same profile, no dependencies\
    \ between them. Dispatcher serializes \u2014 that profile processes them in priority\
    \ order, accumulating experience in its own memory.\n\n**Human-in-the-loop:**\
    \ Any task can `kanban_block()` to wait for input. Dispatcher respawns after `/unblock`.\
    \ The comment thread carries the full context.\n\n## Pitfalls\n\n**Inventing profile\
    \ names that don't exist.** The dispatcher silently fails to spawn unknown assignees\
    \ \u2014 the card just sits in `ready` forever. Always assign to a profile from\
    \ your Step 0 discovery; ask the user if you're unsure.\n\n**Bundling independent\
    \ lanes into one card.** If the user asks for two independent outcomes, create\
    \ two cards. Example: \"fix blockers and check model variants\" is not one fixer\
    \ task; create a fixer/engineer card for the fixes and an explorer/researcher\
    \ card for the variant check, then optionally gate review on both.\n\n**Over-linking\
    \ because of wording.** \"Finally check X\" may still be parallel with implementation\
    \ if X is static config, docs, or source discovery. Link it after implementation\
    \ only when the check depends on the implementation result.\n\n**Forgetting dependency\
    \ links.** If the task graph says `research -> implement -> review`, do not create\
    \ all tasks as independent ready cards. Use parent links so implement/review cannot\
    \ run before their inputs exist.\n\n**Reassignment vs. new task.** If a reviewer\
    \ blocks with \"needs changes,\" create a NEW task linked from the reviewer's\
    \ task \u2014 don't re-run the same task with a stern look. The new task is assigned\
    \ to the original implementer profile.\n\n**Argument order for links.** `kanban_link(parent_id=...,\
    \ child_id=...)` \u2014 parent first. Mixing them up demotes the wrong task to\
    \ `todo`.\n\n**Don't pre-create the whole graph if the shape depends on intermediate\
    \ findings.** If T3's structure depends on what T1 and T2 find, let T3 exist as\
    \ a \"synthesize findings\" task whose own first step is to read parent handoffs\
    \ and plan the rest. Orchestrators can spawn orchestrators.\n\n**Tenant inheritance.**\
    \ If `HERMES_TENANT` is set in your env, pass `tenant=os.environ.get(\"HERMES_TENANT\"\
    )` on every `kanban_create` call so child tasks stay in the same namespace.\n\n\
    ## Recovering stuck workers\n\nWhen a worker profile keeps crashing, hallucinating,\
    \ or getting blocked by its own mistakes (usually: wrong model, missing skill,\
    \ broken credential), the kanban dashboard flags the task with a \u26A0 badge\
    \ and opens a **Recovery** section in the drawer. Three primary actions:\n\n1.\
    \ **Reclaim** (or `hermes kanban reclaim <task_id>`) \u2014 abort the running\
    \ worker immediately and reset the task to `ready`. The existing claim TTL is\
    \ ~15 min; this is the fast path out.\n2. **Reassign** (or `hermes kanban reassign\
    \ <task_id> <new-profile> --reclaim`) \u2014 switch the task to a different profile\
    \ (one that exists on this setup) and let the dispatcher pick it up with a fresh\
    \ worker.\n3. **Change profile model** \u2014 the dashboard prints a copy-paste\
    \ hint for `hermes -p <profile> model` since profile config lives on disk; edit\
    \ it in a terminal, then Reclaim to retry with the new model.\n\nHallucination\
    \ warnings appear on tasks where a worker's `kanban_complete(created_cards=[...])`\
    \ claim included card ids that don't exist or weren't created by the worker's\
    \ profile (the gate blocks the completion), or where the free-form summary references\
    \ `t_<hex>` ids that don't resolve (advisory prose scan, non-blocking). Both produce\
    \ audit events that persist even after recovery actions \u2014 the trail stays\
    \ for debugging.\n"
