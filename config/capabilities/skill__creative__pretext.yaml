  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: pretext\ndescription:\
    \ \"Use when building creative browser demos with @chenglou/pretext \u2014 DOM-free\
    \ text layout for ASCII art, typographic flow around obstacles, text-as-geometry\
    \ games, kinetic typography, and text-powered generative art. Produces single-file\
    \ HTML demos by default.\"\nversion: 1.0.0\nauthor: Hermes Agent\nlicense: MIT\n\
    platforms: [linux, macos, windows]\nmetadata:\n  hermes:\n    tags: [creative-coding,\
    \ typography, pretext, ascii-art, canvas, generative, text-layout, kinetic-typography]\n\
    \    related_skills: [p5js, claude-design, excalidraw, architecture-diagram]\n\
    ---\n\n# Pretext Creative Demos\n\n## Overview\n\n[`@chenglou/pretext`](https://github.com/chenglou/pretext)\
    \ is a 15KB zero-dependency TypeScript library by Cheng Lou (React core, ReasonML,\
    \ Midjourney) for **DOM-free multiline text measurement and layout**. It does\
    \ one thing: given `(text, font, width)`, return the line breaks, per-line widths,\
    \ per-grapheme positions, and total height \u2014 all via canvas measurement,\
    \ no reflow.\n\nThat sounds like plumbing. It is not. Because it is fast and geometric,\
    \ it is a **creative primitive**: you can reflow paragraphs around a moving sprite\
    \ at 60fps, build games whose level geometry is made of real words, drive ASCII\
    \ logos through prose, shatter text into particles with exact per-grapheme starting\
    \ positions, or pack shrink-wrapped multiline UI without any `getBoundingClientRect`\
    \ thrash.\n\nThis skill exists so Hermes can make **cool demos** with it \u2014\
    \ the kind people post to X. See `pretext.cool` and `chenglou.me/pretext` for\
    \ the community demo corpus.\n\n## When to Use\n\nUse when the user asks for:\n\
    - A \"pretext demo\" / \"cool pretext thing\" / \"text-as-X\"\n- Text flowing\
    \ around a moving shape (hero sections, editorial layouts, animated long-form\
    \ pages)\n- ASCII-art effects using **real words or prose**, not monospace rasters\n\
    - Games where the playfield / obstacles / bricks are made of text (Tetris-from-letters,\
    \ Breakout-of-prose)\n- Kinetic typography with per-glyph physics (shatter, scatter,\
    \ flock, flow)\n- Typographic generative art, especially with non-Latin scripts\
    \ or mixed scripts\n- Multiline \"shrink-wrap\" UI (smallest container width that\
    \ still fits the text)\n- Anything that would require knowing line breaks *before*\
    \ rendering\n\nDon't use for:\n- Static SVG/HTML pages where CSS already solves\
    \ layout \u2014 just use CSS\n- Rich text editors, general inline formatting engines\
    \ (pretext is intentionally narrow)\n- Image \u2192 text (use `ascii-art` / `ascii-video`\
    \ skills)\n- Pure canvas generative art with no text role \u2014 use `p5js`\n\n\
    ## Creative Standard\n\nThis is visual art rendered in a browser. Pretext returns\
    \ numbers; **you** draw the thing.\n\n- **Don't ship a \"hello world\" demo.**\
    \ The `hello-orb-flow.html` template is the *starting* point. Every delivered\
    \ demo must add intentional color, motion, composition, and one visual detail\
    \ the user didn't ask for but will appreciate.\n- **Dark backgrounds, warm cores,\
    \ considered palette.** Classic amber-on-black (CRT / terminal) works, but so\
    \ do cold-white-on-charcoal (editorial) and desaturated pastels (risograph). Pick\
    \ one and commit.\n- **Proportional fonts are the point.** Pretext's whole vibe\
    \ is \"not monospaced\" \u2014 lean into it. Use Iowan Old Style, Inter, JetBrains\
    \ Mono, Helvetica Neue, or a variable font. Never default sans.\n- **Real source/text,\
    \ not lorem ipsum.** The corpus should mean something. Short manifestos, poetry,\
    \ real source code, a found text, the library's own README \u2014 never `lorem\
    \ ipsum`.\n- **First-paint excellence.** No loading states, no blank frames. The\
    \ demo must look shippable the instant it opens.\n\n## Stack\n\nSingle self-contained\
    \ HTML file per demo. No build step.\n\n| Layer | Tool | Purpose |\n|-------|------|---------|\n\
    | Core | `@chenglou/pretext` via `esm.sh` CDN | Text measurement + line layout\
    \ |\n| Render | HTML5 Canvas 2D | Glyph rendering, per-frame composition |\n|\
    \ Segmentation | `Intl.Segmenter` (built-in) | Grapheme splitting for emoji /\
    \ CJK / combining marks |\n| Interaction | Raw DOM events | Mouse / touch / wheel\
    \ \u2014 no framework |\n\n```html\n<script type=\"module\">\nimport {\n  prepare,\
    \ layout,                   // use-case 1: simple height\n  prepareWithSegments,\
    \ layoutWithLines,  // use-case 2a: fixed-width lines\n  layoutNextLineRange,\
    \ materializeLineRange, // use-case 2b: streaming / variable width\n  measureLineStats,\
    \ walkLineRanges,  // stats without string allocation\n} from \"https://esm.sh/@chenglou/pretext@0.0.6\"\
    ;\n</script>\n```\n\nPin the version. `@0.0.6` at time of writing \u2014 check\
    \ [npm](https://www.npmjs.com/package/@chenglou/pretext) for the latest if demo\
    \ behavior is off.\n\n## The Two Use Cases\n\nAlmost everything reduces to one\
    \ of these two shapes. Learn both.\n\n### Use-case 1 \u2014 measure, then render\
    \ with CSS/DOM\n\n```js\nconst prepared = prepare(text, \"16px Inter\");\nconst\
    \ { height, lineCount } = layout(prepared, 320, 20);\n```\n\nYou still let the\
    \ browser draw the text. Pretext just tells you how tall the box will be at a\
    \ given width, **without** a DOM read. Use for:\n- Virtualized lists where rows\
    \ contain wrapping text\n- Masonry with precise card heights\n- \"Does this label\
    \ fit?\" dev-time checks\n- Preventing layout shift when remote text loads\n\n\
    **Keep `font` and `letterSpacing` exactly in sync with your CSS.** The canvas\
    \ `ctx.font` format (e.g. `\"16px Inter\"`, `\"500 17px 'JetBrains Mono'\"`) must\
    \ match the rendered CSS, or measurements drift.\n\n### Use-case 2 \u2014 measure\
    \ *and* render yourself\n\n```js\nconst prepared = prepareWithSegments(text, FONT);\n\
    const { lines } = layoutWithLines(prepared, 320, 26);\nfor (let i = 0; i < lines.length;\
    \ i++) {\n  ctx.fillText(lines[i].text, 0, i * 26);\n}\n```\n\nThis is where the\
    \ creative work lives. You own the drawing, so you can:\n- Render to canvas, SVG,\
    \ WebGL, or any coordinate system\n- Substitute per-glyph transforms (rotation,\
    \ jitter, scale, opacity)\n- Use line metadata (width, grapheme positions) as\
    \ geometry\n\nFor **variable-width-per-line** flow (text around a shape, text\
    \ in a donut band, text in a non-rectangular column):\n\n```js\nlet cursor = {\
    \ segmentIndex: 0, graphemeIndex: 0 };\nlet y = 0;\nwhile (true) {\n  const lineWidth\
    \ = widthAtY(y);  // your function: how wide is the corridor at this y?\n  const\
    \ range = layoutNextLineRange(prepared, cursor, lineWidth);\n  if (!range) break;\n\
    \  const line = materializeLineRange(prepared, range);\n  ctx.fillText(line.text,\
    \ leftEdgeAtY(y), y);\n  cursor = range.end;\n  y += lineHeight;\n}\n```\n\nThis\
    \ is the most important pattern in the whole library. It's what unlocks \"text\
    \ flowing around a dragged sprite\" \u2014 the demo that went viral on X.\n\n\
    ### Helpers worth knowing\n\n- `measureLineStats(prepared, maxWidth)` \u2192 `{\
    \ lineCount, maxLineWidth }` \u2014 the widest line, i.e. multiline shrink-wrap\
    \ width.\n- `walkLineRanges(prepared, maxWidth, callback)` \u2014 iterate lines\
    \ without allocating strings. Use for stats/physics over graphemes when you don't\
    \ need the characters.\n- `@chenglou/pretext/rich-inline` \u2014 the same system\
    \ but for paragraphs mixing fonts / chips / mentions. Import from the subpath.\n\
    \n## Demo Recipe Patterns\n\nThe community corpus (see `references/patterns.md`)\
    \ clusters into a handful of strong patterns. Pick one and riff \u2014 don't invent\
    \ a new category unless asked.\n\n| Pattern | Key API | Example idea |\n|---|---|---|\n\
    | **Reflow around obstacle** | `layoutNextLineRange` + per-row width function\
    \ | Editorial paragraph that parts around a dragged cursor sprite |\n| **Text-as-geometry\
    \ game** | `layoutWithLines` + per-line collision rects | Breakout where each\
    \ brick is a measured word |\n| **Shatter / particles** | `walkLineRanges` \u2192\
    \ per-grapheme (x,y) \u2192 physics | Sentence that explodes into letters on click\
    \ |\n| **ASCII obstacle typography** | `layoutNextLineRange` + measured per-row\
    \ obstacle spans | Bitmap ASCII logo, shape morphs, and draggable wire objects\
    \ that make text open around their actual geometry |\n| **Editorial multi-column**\
    \ | `layoutNextLineRange` per column + shared cursor | Animated magazine spread\
    \ with pull quotes |\n| **Kinetic type** | `layoutWithLines` + per-line transform\
    \ over time | Star Wars crawl, wave, bounce, glitch |\n| **Multiline shrink-wrap**\
    \ | `measureLineStats` | Quote card that auto-sizes to its tightest container\
    \ |\n\nSee `templates/donut-orbit.html` and `templates/hello-orb-flow.html` for\
    \ working single-file starters.\n\n## Workflow\n\n1. **Pick a pattern** from the\
    \ table above based on the user's brief.\n2. **Start from a template**:\n   -\
    \ `templates/hello-orb-flow.html` \u2014 text reflowing around a moving orb (reflow-around-obstacle\
    \ pattern)\n   - `templates/donut-orbit.html` \u2014 advanced example: measured\
    \ ASCII logo obstacles, draggable wire sphere/cube, morphing shape fields, selectable\
    \ DOM text, and dev-only controls\n   - `write_file` to a new `.html` in `/tmp/`\
    \ or the user's workspace.\n3. **Swap the corpus** for something intentional to\
    \ the brief. Real prose, 10-100 sentences, no lorem.\n4. **Tune the aesthetic**\
    \ \u2014 font, palette, composition, interaction. This is the work; don't skip\
    \ it.\n5. **Verify locally**:\n   ```sh\n   cd <dir-with-html> && python3 -m http.server\
    \ 8765\n   # then open http://localhost:8765/<file>.html\n   ```\n6. **Check the\
    \ console** \u2014 pretext will throw if `prepareWithSegments` is called with\
    \ a bad font string; `Intl.Segmenter` is available in every modern browser.\n\
    7. **Show the user the file path**, not just the code \u2014 they want to open\
    \ it.\n\n## Performance Notes\n\n- `prepare()` / `prepareWithSegments()` is the\
    \ expensive call. Do it **once** per text+font pair. Cache the handle.\n- On resize,\
    \ only rerun `layout()` / `layoutWithLines()` \u2014 never re-prepare.\n- For\
    \ per-frame animations where text doesn't change but geometry does, `layoutNextLineRange`\
    \ in a tight loop is cheap enough to do every frame at 60fps for normal-length\
    \ paragraphs.\n- When rendering ASCII masks per frame, keep a cell buffer (`Uint8Array`/typed\
    \ arrays), derive measured per-row obstacle spans from the cells or projected\
    \ geometry, merge spans, then feed those spans into `layoutNextLineRange` before\
    \ drawing text.\n- Keep visual animation and layout animation coupled. If a sphere\
    \ morphs into a cube, tween both the rendered cell buffer and the obstacle spans\
    \ with the same value; otherwise the demo looks painted-on instead of physically\
    \ reflowed.\n- For fades, prefer layer opacity over changing glyph intensity or\
    \ obstacle scale. Put transient ASCII sprites on their own canvas and fade the\
    \ canvas with CSS/GSAP opacity so geometry does not appear to shrink.\n- Canvas\
    \ `ctx.font` setting is surprisingly slow; set it **once** per frame if font doesn't\
    \ vary, not per `fillText` call.\n\n## Common Pitfalls\n\n1. **Drifting CSS/canvas\
    \ font strings.** `ctx.font = \"16px Inter\"` measured, but CSS says `font-family:\
    \ Inter, sans-serif; font-size: 16px`. Fine *if* Inter loads. If Inter 404s, CSS\
    \ falls back to sans-serif and measurements drift by 5-20%. Always `preload` the\
    \ font or use a web-safe family.\n\n2. **Re-preparing inside the animation loop.**\
    \ Only `layout*` is cheap. Re-calling `prepare` every frame will tank perf. Keep\
    \ the prepared handle in module scope.\n\n3. **Forgetting `Intl.Segmenter` for\
    \ grapheme splits.** Emoji, combining marks, CJK \u2014 `\"\xE9\".split(\"\")`\
    \ gives you two chars. Use `new Intl.Segmenter(undefined, { granularity: \"grapheme\"\
    \ })` when sampling individual visible glyphs.\n\n4. **`break: 'never'` chips\
    \ without `extraWidth`.** In `rich-inline`, if you use `break: 'never'` for an\
    \ atomic chip/mention, you must also supply `extraWidth` for the pill padding\
    \ \u2014 otherwise chip chrome overflows the container.\n\n5. **Using `@chenglou/pretext`\
    \ from `unpkg` with TypeScript-only entry.** Use `esm.sh` \u2014 it compiles the\
    \ TS exports to browser-ready ESM automatically. `unpkg` will 404 or serve raw\
    \ TS.\n\n6. **Monospace fallbacks silently erasing the whole point.** Users seeing\
    \ monospace-looking output often have a CSS `font-family` that fell through to\
    \ `monospace`. Verify the actual rendered font via DevTools.\n\n7. **Skipping\
    \ rows vs adjusting width** when flowing around a shape. If the corridor on this\
    \ row is too narrow to fit a line, *skip the row* (`y += lineHeight; continue;`)\
    \ rather than passing a tiny maxWidth to `layoutNextLineRange` \u2014 pretext\
    \ will return one-grapheme lines that look broken.\n\n8. **Shipping a cold demo.**\
    \ The default first-paint looks tutorial-grade. Add: vignette, subtle scanline,\
    \ idle auto-motion, one carefully chosen interactive response (drag, hover, scroll,\
    \ click). Without these, \"cool pretext demo\" lands as \"intern repro of the\
    \ README.\"\n\n## Verification Checklist\n\n- [ ] Demo is a single self-contained\
    \ `.html` file \u2014 opens by double-click or `python3 -m http.server`\n- [ ]\
    \ `@chenglou/pretext` imported via `esm.sh` with pinned version\n- [ ] Corpus\
    \ is real prose, not lorem ipsum, and matches the demo's concept\n- [ ] Font string\
    \ passed to `prepare` matches the CSS font exactly\n- [ ] `prepare()` / `prepareWithSegments()`\
    \ called once, not per frame\n- [ ] Dark background + considered palette \u2014\
    \ not the default white canvas\n- [ ] At least one interactive response (drag\
    \ / hover / scroll / click) or idle auto-motion\n- [ ] Tested locally with `python3\
    \ -m http.server` and confirmed no console errors\n- [ ] 60fps on a mid-tier laptop\
    \ (or graceful degradation documented)\n- [ ] One \"extra mile\" detail the user\
    \ didn't ask for\n\n## Reference: Community Demos\n\nClone these for inspiration\
    \ / patterns (all MIT-ish, linked from [pretext.cool](https://www.pretext.cool/)):\n\
    \n- **Pretext Breaker** \u2014 breakout with word-bricks \u2014 `github.com/rinesh/pretext-breaker`\n\
    - **Tetris \xD7 Pretext** \u2014 `github.com/shinichimochizuki/tetris-pretext`\n\
    - **Dragon animation** \u2014 `github.com/qtakmalay/PreTextExperiments`\n- **Somnai\
    \ editorial engine** \u2014 `github.com/somnai-dreams/pretext-demos`\n- **Bad\
    \ Apple!! ASCII** \u2014 `github.com/frmlinn/bad-apple-pretext`\n- **Drag-sprite\
    \ reflow** \u2014 `github.com/dokobot/pretext-demo`\n- **Alarmy editorial clock**\
    \ \u2014 `github.com/SmisLee/alarmy-pretext-demo`\n\nOfficial playground: [chenglou.me/pretext](https://chenglou.me/pretext/)\
    \ \u2014 accordion, bubbles, dynamic-layout, editorial-engine, justification-comparison,\
    \ masonry, markdown-chat, rich-note.\n"
