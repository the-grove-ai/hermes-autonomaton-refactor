  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: subagent-driven-development\n\
    description: \"Execute plans via delegate_task subagents (2-stage review).\"\n\
    version: 1.1.0\nauthor: Hermes Agent (adapted from obra/superpowers)\nlicense:\
    \ MIT\nplatforms: [linux, macos, windows]\nmetadata:\n  hermes:\n    tags: [delegation,\
    \ subagent, implementation, workflow, parallel]\n    related_skills: [writing-plans,\
    \ requesting-code-review, test-driven-development]\n---\n\n# Subagent-Driven Development\n\
    \n## Overview\n\nExecute implementation plans by dispatching fresh subagents per\
    \ task with systematic two-stage review.\n\n**Core principle:** Fresh subagent\
    \ per task + two-stage review (spec then quality) = high quality, fast iteration.\n\
    \n## When to Use\n\nUse this skill when:\n- You have an implementation plan (from\
    \ writing-plans skill or user requirements)\n- Tasks are mostly independent\n\
    - Quality and spec compliance are important\n- You want automated review between\
    \ tasks\n\n**vs. manual execution:**\n- Fresh context per task (no confusion from\
    \ accumulated state)\n- Automated review process catches issues early\n- Consistent\
    \ quality checks across all tasks\n- Subagents can ask questions before starting\
    \ work\n\n## The Process\n\n### 1. Read and Parse Plan\n\nRead the plan file.\
    \ Extract ALL tasks with their full text and context upfront. Create a todo list:\n\
    \n```python\n# Read the plan\nread_file(\"docs/plans/feature-plan.md\")\n\n# Create\
    \ todo list with all tasks\ntodo([\n    {\"id\": \"task-1\", \"content\": \"Create\
    \ User model with email field\", \"status\": \"pending\"},\n    {\"id\": \"task-2\"\
    , \"content\": \"Add password hashing utility\", \"status\": \"pending\"},\n \
    \   {\"id\": \"task-3\", \"content\": \"Create login endpoint\", \"status\": \"\
    pending\"},\n])\n```\n\n**Key:** Read the plan ONCE. Extract everything. Don't\
    \ make subagents read the plan file \u2014 provide the full task text directly\
    \ in context.\n\n### 2. Per-Task Workflow\n\nFor EACH task in the plan:\n\n####\
    \ Step 1: Dispatch Implementer Subagent\n\nUse `delegate_task` with complete context:\n\
    \n```python\ndelegate_task(\n    goal=\"Implement Task 1: Create User model with\
    \ email and password_hash fields\",\n    context=\"\"\"\n    TASK FROM PLAN:\n\
    \    - Create: src/models/user.py\n    - Add User class with email (str) and password_hash\
    \ (str) fields\n    - Use bcrypt for password hashing\n    - Include __repr__\
    \ for debugging\n\n    FOLLOW TDD:\n    1. Write failing test in tests/models/test_user.py\n\
    \    2. Run: pytest tests/models/test_user.py -v (verify FAIL)\n    3. Write minimal\
    \ implementation\n    4. Run: pytest tests/models/test_user.py -v (verify PASS)\n\
    \    5. Run: pytest tests/ -q (verify no regressions)\n    6. Commit: git add\
    \ -A && git commit -m \"feat: add User model with password hashing\"\n\n    PROJECT\
    \ CONTEXT:\n    - Python 3.11, Flask app in src/app.py\n    - Existing models\
    \ in src/models/\n    - Tests use pytest, run from project root\n    - bcrypt\
    \ already in requirements.txt\n    \"\"\",\n    toolsets=['terminal', 'file']\n\
    )\n```\n\n#### Step 2: Dispatch Spec Compliance Reviewer\n\nAfter the implementer\
    \ completes, verify against the original spec:\n\n```python\ndelegate_task(\n\
    \    goal=\"Review if implementation matches the spec from the plan\",\n    context=\"\
    \"\"\n    ORIGINAL TASK SPEC:\n    - Create src/models/user.py with User class\n\
    \    - Fields: email (str), password_hash (str)\n    - Use bcrypt for password\
    \ hashing\n    - Include __repr__\n\n    CHECK:\n    - [ ] All requirements from\
    \ spec implemented?\n    - [ ] File paths match spec?\n    - [ ] Function signatures\
    \ match spec?\n    - [ ] Behavior matches expected?\n    - [ ] Nothing extra added\
    \ (no scope creep)?\n\n    OUTPUT: PASS or list of specific spec gaps to fix.\n\
    \    \"\"\",\n    toolsets=['file']\n)\n```\n\n**If spec issues found:** Fix gaps,\
    \ then re-run spec review. Continue only when spec-compliant.\n\n#### Step 3:\
    \ Dispatch Code Quality Reviewer\n\nAfter spec compliance passes:\n\n```python\n\
    delegate_task(\n    goal=\"Review code quality for Task 1 implementation\",\n\
    \    context=\"\"\"\n    FILES TO REVIEW:\n    - src/models/user.py\n    - tests/models/test_user.py\n\
    \n    CHECK:\n    - [ ] Follows project conventions and style?\n    - [ ] Proper\
    \ error handling?\n    - [ ] Clear variable/function names?\n    - [ ] Adequate\
    \ test coverage?\n    - [ ] No obvious bugs or missed edge cases?\n    - [ ] No\
    \ security issues?\n\n    OUTPUT FORMAT:\n    - Critical Issues: [must fix before\
    \ proceeding]\n    - Important Issues: [should fix]\n    - Minor Issues: [optional]\n\
    \    - Verdict: APPROVED or REQUEST_CHANGES\n    \"\"\",\n    toolsets=['file']\n\
    )\n```\n\n**If quality issues found:** Fix issues, re-review. Continue only when\
    \ approved.\n\n#### Step 4: Mark Complete\n\n```python\ntodo([{\"id\": \"task-1\"\
    , \"content\": \"Create User model with email field\", \"status\": \"completed\"\
    }], merge=True)\n```\n\n### 3. Final Review\n\nAfter ALL tasks are complete, dispatch\
    \ a final integration reviewer:\n\n```python\ndelegate_task(\n    goal=\"Review\
    \ the entire implementation for consistency and integration issues\",\n    context=\"\
    \"\"\n    All tasks from the plan are complete. Review the full implementation:\n\
    \    - Do all components work together?\n    - Any inconsistencies between tasks?\n\
    \    - All tests passing?\n    - Ready for merge?\n    \"\"\",\n    toolsets=['terminal',\
    \ 'file']\n)\n```\n\n### 4. Verify and Commit\n\n```bash\n# Run full test suite\n\
    pytest tests/ -q\n\n# Review all changes\ngit diff --stat\n\n# Final commit if\
    \ needed\ngit add -A && git commit -m \"feat: complete [feature name] implementation\"\
    \n```\n\n## Task Granularity\n\n**Each task = 2-5 minutes of focused work.**\n\
    \n**Too big:**\n- \"Implement user authentication system\"\n\n**Right size:**\n\
    - \"Create User model with email and password fields\"\n- \"Add password hashing\
    \ function\"\n- \"Create login endpoint\"\n- \"Add JWT token generation\"\n- \"\
    Create registration endpoint\"\n\n## Red Flags \u2014 Never Do These\n\n- Start\
    \ implementation without a plan\n- Skip reviews (spec compliance OR code quality)\n\
    - Proceed with unfixed critical/important issues\n- Dispatch multiple implementation\
    \ subagents for tasks that touch the same files\n- Make subagent read the plan\
    \ file (provide full text in context instead)\n- Skip scene-setting context (subagent\
    \ needs to understand where the task fits)\n- Ignore subagent questions (answer\
    \ before letting them proceed)\n- Accept \"close enough\" on spec compliance\n\
    - Skip review loops (reviewer found issues \u2192 implementer fixes \u2192 review\
    \ again)\n- Let implementer self-review replace actual review (both are needed)\n\
    - **Start code quality review before spec compliance is PASS** (wrong order)\n\
    - Move to next task while either review has open issues\n\n## Handling Issues\n\
    \n### If Subagent Asks Questions\n\n- Answer clearly and completely\n- Provide\
    \ additional context if needed\n- Don't rush them into implementation\n\n### If\
    \ Reviewer Finds Issues\n\n- Implementer subagent (or a new one) fixes them\n\
    - Reviewer reviews again\n- Repeat until approved\n- Don't skip the re-review\n\
    \n### If Subagent Fails a Task\n\n- Dispatch a new fix subagent with specific\
    \ instructions about what went wrong\n- Don't try to fix manually in the controller\
    \ session (context pollution)\n\n## Efficiency Notes\n\n**Why fresh subagent per\
    \ task:**\n- Prevents context pollution from accumulated state\n- Each subagent\
    \ gets clean, focused context\n- No confusion from prior tasks' code or reasoning\n\
    \n**Why two-stage review:**\n- Spec review catches under/over-building early\n\
    - Quality review ensures the implementation is well-built\n- Catches issues before\
    \ they compound across tasks\n\n**Cost trade-off:**\n- More subagent invocations\
    \ (implementer + 2 reviewers per task)\n- But catches issues early (cheaper than\
    \ debugging compounded problems later)\n\n## Integration with Other Skills\n\n\
    ### With writing-plans\n\nThis skill EXECUTES plans created by the writing-plans\
    \ skill:\n1. User requirements \u2192 writing-plans \u2192 implementation plan\n\
    2. Implementation plan \u2192 subagent-driven-development \u2192 working code\n\
    \n### With test-driven-development\n\nImplementer subagents should follow TDD:\n\
    1. Write failing test first\n2. Implement minimal code\n3. Verify test passes\n\
    4. Commit\n\nInclude TDD instructions in every implementer context.\n\n### With\
    \ requesting-code-review\n\nThe two-stage review process IS the code review. For\
    \ final integration review, use the requesting-code-review skill's review dimensions.\n\
    \n### With systematic-debugging\n\nIf a subagent encounters bugs during implementation:\n\
    1. Follow systematic-debugging process\n2. Find root cause before fixing\n3. Write\
    \ regression test\n4. Resume implementation\n\n## Example Workflow\n\n```\n[Read\
    \ plan: docs/plans/auth-feature.md]\n[Create todo list with 5 tasks]\n\n--- Task\
    \ 1: Create User model ---\n[Dispatch implementer subagent]\n  Implementer: \"\
    Should email be unique?\"\n  You: \"Yes, email must be unique\"\n  Implementer:\
    \ Implemented, 3/3 tests passing, committed.\n\n[Dispatch spec reviewer]\n  Spec\
    \ reviewer: \u2705 PASS \u2014 all requirements met\n\n[Dispatch quality reviewer]\n\
    \  Quality reviewer: \u2705 APPROVED \u2014 clean code, good tests\n\n[Mark Task\
    \ 1 complete]\n\n--- Task 2: Password hashing ---\n[Dispatch implementer subagent]\n\
    \  Implementer: No questions, implemented, 5/5 tests passing.\n\n[Dispatch spec\
    \ reviewer]\n  Spec reviewer: \u274C Missing: password strength validation (spec\
    \ says \"min 8 chars\")\n\n[Implementer fixes]\n  Implementer: Added validation,\
    \ 7/7 tests passing.\n\n[Dispatch spec reviewer again]\n  Spec reviewer: \u2705\
    \ PASS\n\n[Dispatch quality reviewer]\n  Quality reviewer: Important: Magic number\
    \ 8, extract to constant\n  Implementer: Extracted MIN_PASSWORD_LENGTH constant\n\
    \  Quality reviewer: \u2705 APPROVED\n\n[Mark Task 2 complete]\n\n... (continue\
    \ for all tasks)\n\n[After all tasks: dispatch final integration reviewer]\n[Run\
    \ full test suite: all passing]\n[Done!]\n```\n\n## Remember\n\n```\nFresh subagent\
    \ per task\nTwo-stage review every time\nSpec compliance FIRST\nCode quality SECOND\n\
    Never skip reviews\nCatch issues early\n```\n\n**Quality is not an accident. It's\
    \ the result of systematic process.**\n\n## Further reading (load when relevant)\n\
    \nWhen the orchestration involves significant context usage, long review loops,\
    \ or complex validation checkpoints, load these references for the specific discipline:\n\
    \n- **`references/context-budget-discipline.md`** \u2014 Four-tier context degradation\
    \ model (PEAK / GOOD / DEGRADING / POOR), read-depth rules that scale with context\
    \ window size, and early warning signs of silent degradation. Load when a run\
    \ will clearly consume significant context (multi-phase plans, many subagents,\
    \ large artifacts).\n- **`references/gates-taxonomy.md`** \u2014 The four canonical\
    \ gate types (Pre-flight, Revision, Escalation, Abort) with behavior, recovery,\
    \ and examples. Load when designing or reviewing any workflow that has validation\
    \ checkpoints \u2014 use the vocabulary explicitly so each gate has defined entry,\
    \ failure behavior, and resumption rules.\n\nBoth references adapted from gsd-build/get-shit-done\
    \ (MIT \xA9 2025 Lex Christopherson).\n"
