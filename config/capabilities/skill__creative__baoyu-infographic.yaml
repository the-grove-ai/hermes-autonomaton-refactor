    ---\n\n# Infographic Generator\n\nAdapted from [baoyu-infographic](https://github.com/JimLiu/baoyu-skills)\
    \ for Hermes Agent's tool ecosystem.\n\nTwo dimensions: **layout** (information\
    \ structure) \xD7 **style** (visual aesthetics). Freely combine any layout with\
    \ any style.\n\n## When to Use\n\nTrigger this skill when the user asks to create\
    \ an infographic, visual summary, information graphic, or uses terms like \"\u4FE1\
    \u606F\u56FE\", \"\u53EF\u89C6\u5316\", or \"\u9AD8\u5BC6\u5EA6\u4FE1\u606F\u5927\
    \u56FE\". The user provides content (text, file path, URL, or topic) and optionally\
    \ specifies layout, style, aspect ratio, or language.\n\n## Options\n\n| Option\
    \ | Values |\n|--------|--------|\n| Layout | 21 options (see Layout Gallery),\
    \ default: bento-grid |\n| Style | 21 options (see Style Gallery), default: craft-handmade\
    \ |\n| Aspect | Named: landscape (16:9), portrait (9:16), square (1:1). Custom:\
    \ any W:H ratio (e.g., 3:4, 4:3, 2.35:1) |\n| Language | en, zh, ja, etc. |\n\n\
    ## Layout Gallery\n\n| Layout | Best For |\n|--------|----------|\n| `linear-progression`\
    \ | Timelines, processes, tutorials |\n| `binary-comparison` | A vs B, before-after,\
    \ pros-cons |\n| `comparison-matrix` | Multi-factor comparisons |\n| `hierarchical-layers`\
    \ | Pyramids, priority levels |\n| `tree-branching` | Categories, taxonomies |\n\
    | `hub-spoke` | Central concept with related items |\n| `structural-breakdown`\
    \ | Exploded views, cross-sections |\n| `bento-grid` | Multiple topics, overview\
    \ (default) |\n| `iceberg` | Surface vs hidden aspects |\n| `bridge` | Problem-solution\
    \ |\n| `funnel` | Conversion, filtering |\n| `isometric-map` | Spatial relationships\
    \ |\n| `dashboard` | Metrics, KPIs |\n| `periodic-table` | Categorized collections\
    \ |\n| `comic-strip` | Narratives, sequences |\n| `story-mountain` | Plot structure,\
    \ tension arcs |\n| `jigsaw` | Interconnected parts |\n| `venn-diagram` | Overlapping\
    \ concepts |\n| `winding-roadmap` | Journey, milestones |\n| `circular-flow` |\
    \ Cycles, recurring processes |\n| `dense-modules` | High-density modules, data-rich\
    \ guides |\n\nFull definitions: `references/layouts/<layout>.md`\n\n## Style Gallery\n\
    \n| Style | Description |\n|-------|-------------|\n| `craft-handmade` | Hand-drawn,\
    \ paper craft (default) |\n| `claymation` | 3D clay figures, stop-motion |\n|\
    \ `kawaii` | Japanese cute, pastels |\n| `storybook-watercolor` | Soft painted,\
    \ whimsical |\n| `chalkboard` | Chalk on black board |\n| `cyberpunk-neon` | Neon\
    \ glow, futuristic |\n| `bold-graphic` | Comic style, halftone |\n| `aged-academia`\
    \ | Vintage science, sepia |\n| `corporate-memphis` | Flat vector, vibrant |\n\
    | `technical-schematic` | Blueprint, engineering |\n| `origami` | Folded paper,\
    \ geometric |\n| `pixel-art` | Retro 8-bit |\n| `ui-wireframe` | Grayscale interface\
    \ mockup |\n| `subway-map` | Transit diagram |\n| `ikea-manual` | Minimal line\
    \ art |\n| `knolling` | Organized flat-lay |\n| `lego-brick` | Toy brick construction\
    \ |\n| `pop-laboratory` | Blueprint grid, coordinate markers, lab precision |\n\
    | `morandi-journal` | Hand-drawn doodle, warm Morandi tones |\n| `retro-pop-grid`\
    \ | 1970s retro pop art, Swiss grid, thick outlines |\n| `hand-drawn-edu` | Macaron\
    \ pastels, hand-drawn wobble, stick figures |\n\nFull definitions: `references/styles/<style>.md`\n\
    \n## Recommended Combinations\n\n| Content Type | Layout + Style |\n|--------------|----------------|\n\
    | Timeline/History | `linear-progression` + `craft-handmade` |\n| Step-by-step\
    \ | `linear-progression` + `ikea-manual` |\n| A vs B | `binary-comparison` + `corporate-memphis`\
    \ |\n| Hierarchy | `hierarchical-layers` + `craft-handmade` |\n| Overlap | `venn-diagram`\
    \ + `craft-handmade` |\n| Conversion | `funnel` + `corporate-memphis` |\n| Cycles\
    \ | `circular-flow` + `craft-handmade` |\n| Technical | `structural-breakdown`\
    \ + `technical-schematic` |\n| Metrics | `dashboard` + `corporate-memphis` |\n\
    | Educational | `bento-grid` + `chalkboard` |\n| Journey | `winding-roadmap` +\
    \ `storybook-watercolor` |\n| Categories | `periodic-table` + `bold-graphic` |\n\
    | Product Guide | `dense-modules` + `morandi-journal` |\n| Technical Guide | `dense-modules`\
    \ + `pop-laboratory` |\n| Trendy Guide | `dense-modules` + `retro-pop-grid` |\n\
    | Educational Diagram | `hub-spoke` + `hand-drawn-edu` |\n| Process Tutorial |\
    \ `linear-progression` + `hand-drawn-edu` |\n\nDefault: `bento-grid` + `craft-handmade`\n\
    \n## Keyword Shortcuts\n\nWhen user input contains these keywords, **auto-select**\
    \ the associated layout and offer associated styles as top recommendations in\
    \ Step 3. Skip content-based layout inference for matched keywords.\n\nIf a shortcut\
    \ has **Prompt Notes**, append them to the generated prompt (Step 5) as additional\
    \ style instructions.\n\n| User Keyword | Layout | Recommended Styles | Default\
    \ Aspect | Prompt Notes |\n|--------------|--------|--------------------|----------------|--------------|\n\
    | \u9AD8\u5BC6\u5EA6\u4FE1\u606F\u5927\u56FE / high-density-info | `dense-modules`\
    \ | `morandi-journal`, `pop-laboratory`, `retro-pop-grid` | portrait | \u2014\
    \ |\n| \u4FE1\u606F\u56FE / infographic | `bento-grid` | `craft-handmade` | landscape\
    \ | Minimalist: clean canvas, ample whitespace, no complex background textures.\
    \ Simple cartoon elements and icons only. |\n\n## Output Structure\n\n```\ninfographic/{topic-slug}/\n\
    \u251C\u2500\u2500 source-{slug}.{ext}\n\u251C\u2500\u2500 analysis.md\n\u251C\
    \u2500\u2500 structured-content.md\n\u251C\u2500\u2500 prompts/infographic.md\n\
    \u2514\u2500\u2500 infographic.png\n```\n\nSlug: 2-4 words kebab-case from topic.\
    \ Conflict: append `-YYYYMMDD-HHMMSS`.\n\n## Core Principles\n\n- Preserve source\
    \ data faithfully \u2014 no summarization or rephrasing (but **strip any credentials,\
    \ API keys, tokens, or secrets** before including in outputs)\n- Define learning\
    \ objectives before structuring content\n- Structure for visual communication\
    \ (headlines, labels, visual elements)\n\n## Workflow\n\n### Step 1: Analyze Content\n\
    \n**Load references**: Read `references/analysis-framework.md` from this skill.\n\
    \n1. Save source content (file path or paste \u2192 `source.md` using `write_file`)\n\
    \   - **Backup rule**: If `source.md` exists, rename to `source-backup-YYYYMMDD-HHMMSS.md`\n\
    2. Analyze: topic, data type, complexity, tone, audience\n3. Detect source language\
    \ and user language\n4. Extract design instructions from user input\n5. Save analysis\
    \ to `analysis.md`\n   - **Backup rule**: If `analysis.md` exists, rename to `analysis-backup-YYYYMMDD-HHMMSS.md`\n\
    \nSee `references/analysis-framework.md` for detailed format.\n\n### Step 2: Generate\
    \ Structured Content \u2192 `structured-content.md`\n\nTransform content into\
    \ infographic structure:\n1. Title and learning objectives\n2. Sections with:\
    \ key concept, content (verbatim), visual element, text labels\n3. Data points\
    \ (all statistics/quotes copied exactly)\n4. Design instructions from user\n\n\
    **Rules**: Markdown only. No new information. Preserve data faithfully. Strip\
    \ any credentials or secrets from output.\n\nSee `references/structured-content-template.md`\
    \ for detailed format.\n\n### Step 3: Recommend Combinations\n\n**3.1 Check Keyword\
    \ Shortcuts first**: If user input matches a keyword from the **Keyword Shortcuts**\
    \ table, auto-select the associated layout and prioritize associated styles as\
    \ top recommendations. Skip content-based layout inference.\n\n**3.2 Otherwise**,\
    \ recommend 3-5 layout\xD7style combinations based on:\n- Data structure \u2192\
    \ matching layout\n- Content tone \u2192 matching style\n- Audience expectations\n\
    - User design instructions\n\n### Step 4: Confirm Options\n\nUse the `clarify`\
    \ tool to confirm options with the user. Since `clarify` handles one question\
    \ at a time, ask the most important question first:\n\n**Q1 \u2014 Combination**:\
    \ Present 3+ layout\xD7style combos with rationale. Ask user to pick one.\n\n\
    **Q2 \u2014 Aspect**: Ask for aspect ratio preference (landscape/portrait/square\
    \ or custom W:H).\n\n**Q3 \u2014 Language** (only if source \u2260 user language):\
    \ Ask which language the text content should use.\n\n### Step 5: Generate Prompt\
    \ \u2192 `prompts/infographic.md`\n\n**Backup rule**: If `prompts/infographic.md`\
    \ exists, rename to `prompts/infographic-backup-YYYYMMDD-HHMMSS.md`\n\n**Load\
    \ references**: Read the selected layout from `references/layouts/<layout>.md`\
    \ and style from `references/styles/<style>.md`.\n\nCombine:\n1. Layout definition\
    \ from `references/layouts/<layout>.md`\n2. Style definition from `references/styles/<style>.md`\n\
    3. Base template from `references/base-prompt.md`\n4. Structured content from\
    \ Step 2\n5. All text in confirmed language\n\n**Aspect ratio resolution** for\
    \ `{{ASPECT_RATIO}}`:\n- Named presets \u2192 ratio string: landscape\u2192`16:9`,\
    \ portrait\u2192`9:16`, square\u2192`1:1`\n- Custom W:H ratios \u2192 use as-is\
    \ (e.g., `3:4`, `4:3`, `2.35:1`)\n\nSave the assembled prompt to `prompts/infographic.md`\
    \ using `write_file`.\n\n### Step 6: Generate Image\n\nUse the `image_generate`\
    \ tool with the assembled prompt from Step 5.\n\n- Map aspect ratio to image_generate's\
    \ format: `16:9` \u2192 `landscape`, `9:16` \u2192 `portrait`, `1:1` \u2192 `square`\n\
    - For custom ratios, pick the closest named aspect\n- On failure, auto-retry once\n\
    - Save the resulting image URL/path to the output directory\n\n### Step 7: Output\
    \ Summary\n\nReport: topic, layout, style, aspect, language, output path, files\
    \ created.\n\n## References\n\n- `references/analysis-framework.md` \u2014 Analysis\
    \ methodology\n- `references/structured-content-template.md` \u2014 Content format\n\
    - `references/base-prompt.md` \u2014 Prompt template\n- `references/layouts/<layout>.md`\
    \ \u2014 21 layout definitions\n- `references/styles/<style>.md` \u2014 21 style\
    \ definitions\n\n## Pitfalls\n\n1. **Data integrity is paramount** \u2014 never\
    \ summarize, paraphrase, or alter source statistics. \"73% increase\" must stay\
    \ \"73% increase\", not \"significant increase\".\n2. **Strip secrets** \u2014\
    \ always scan source content for API keys, tokens, or credentials before including\
    \ in any output file.\n3. **One message per section** \u2014 each infographic\
    \ section should convey one clear concept. Overloading sections reduces readability.\n\
    4. **Style consistency** \u2014 the style definition from the references file\
    \ must be applied consistently across the entire infographic. Don't mix styles.\n\
    5. **image_generate aspect ratios** \u2014 the tool only supports `landscape`,\
    \ `portrait`, and `square`. Custom ratios like `3:4` should map to the nearest\
    \ option (portrait in that case).\n"
