  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: ascii-video\ndescription:\
    \ \"ASCII video: convert video/audio to colored ASCII MP4/GIF.\"\nplatforms: [linux,\
    \ macos, windows]\n---\n\n# ASCII Video Production Pipeline\n\n## When to use\n\
    \nUse when users request: ASCII video, text art video, terminal-style video, character\
    \ art animation, retro text visualization, audio visualizer in ASCII, converting\
    \ video to ASCII art, matrix-style effects, or any animated ASCII output.\n\n\
    ## What's inside\n\nProduction pipeline for ASCII art video \u2014 any format.\
    \ Converts video/audio/images/generative input into colored ASCII character video\
    \ output (MP4, GIF, image sequence). Covers: video-to-ASCII conversion, audio-reactive\
    \ music visualizers, generative ASCII art animations, hybrid video+audio reactive,\
    \ text/lyrics overlays, real-time terminal rendering.\n\n## Creative Standard\n\
    \nThis is visual art. ASCII characters are the medium; cinema is the standard.\n\
    \n**Before writing a single line of code**, articulate the creative concept. What\
    \ is the mood? What visual story does this tell? What makes THIS project different\
    \ from every other ASCII video? The user's prompt is a starting point \u2014 interpret\
    \ it with creative ambition, not literal transcription.\n\n**First-render excellence\
    \ is non-negotiable.** The output must be visually striking without requiring\
    \ revision rounds. If something looks generic, flat, or like \"AI-generated ASCII\
    \ art,\" it is wrong \u2014 rethink the creative concept before shipping.\n\n\
    **Go beyond the reference vocabulary.** The effect catalogs, shader presets, and\
    \ palette libraries in the references are a starting vocabulary. For every project,\
    \ combine, modify, and invent new patterns. The catalog is a palette of paints\
    \ \u2014 you write the painting.\n\n**Be proactively creative.** Extend the skill's\
    \ vocabulary when the project calls for it. If the references don't have what\
    \ the vision demands, build it. Include at least one visual moment the user didn't\
    \ ask for but will appreciate \u2014 a transition, an effect, a color choice that\
    \ elevates the whole piece.\n\n**Cohesive aesthetic over technical correctness.**\
    \ All scenes in a video must feel connected by a unifying visual language \u2014\
    \ shared color temperature, related character palettes, consistent motion vocabulary.\
    \ A technically correct video where every scene uses a random different effect\
    \ is an aesthetic failure.\n\n**Dense, layered, considered.** Every frame should\
    \ reward viewing. Never flat black backgrounds. Always multi-grid composition.\
    \ Always per-scene variation. Always intentional color.\n\n## Modes\n\n| Mode\
    \ | Input | Output | Reference |\n|------|-------|--------|-----------|\n| **Video-to-ASCII**\
    \ | Video file | ASCII recreation of source footage | `references/inputs.md` \xA7\
    \ Video Sampling |\n| **Audio-reactive** | Audio file | Generative visuals driven\
    \ by audio features | `references/inputs.md` \xA7 Audio Analysis |\n| **Generative**\
    \ | None (or seed params) | Procedural ASCII animation | `references/effects.md`\
    \ |\n| **Hybrid** | Video + audio | ASCII video with audio-reactive overlays |\
    \ Both input refs |\n| **Lyrics/text** | Audio + text/SRT | Timed text with visual\
    \ effects | `references/inputs.md` \xA7 Text/Lyrics |\n| **TTS narration** | Text\
    \ quotes + TTS API | Narrated testimonial/quote video with typed text | `references/inputs.md`\
    \ \xA7 TTS Integration |\n\n## Stack\n\nSingle self-contained Python script per\
    \ project. No GPU required.\n\n| Layer | Tool | Purpose |\n|-------|------|---------|\n\
    | Core | Python 3.10+, NumPy | Math, array ops, vectorized effects |\n| Signal\
    \ | SciPy | FFT, peak detection (audio modes) |\n| Imaging | Pillow (PIL) | Font\
    \ rasterization, frame decoding, image I/O |\n| Video I/O | ffmpeg (CLI) | Decode\
    \ input, encode output, mux audio |\n| Parallel | concurrent.futures | N workers\
    \ for batch/clip rendering |\n| TTS | ElevenLabs API (optional) | Generate narration\
    \ clips |\n| Optional | OpenCV | Video frame sampling, edge detection |\n\n##\
    \ Pipeline Architecture\n\nEvery mode follows the same 6-stage pipeline:\n\n```\n\
    INPUT \u2192 ANALYZE \u2192 SCENE_FN \u2192 TONEMAP \u2192 SHADE \u2192 ENCODE\n\
    ```\n\n1. **INPUT** \u2014 Load/decode source material (video frames, audio samples,\
    \ images, or nothing)\n2. **ANALYZE** \u2014 Extract per-frame features (audio\
    \ bands, video luminance/edges, motion vectors)\n3. **SCENE_FN** \u2014 Scene\
    \ function renders to pixel canvas (`uint8 H,W,3`). Composes multiple character\
    \ grids via `_render_vf()` + pixel blend modes. See `references/composition.md`\n\
    4. **TONEMAP** \u2014 Percentile-based adaptive brightness normalization. See\
    \ `references/composition.md` \xA7 Adaptive Tonemap\n5. **SHADE** \u2014 Post-processing\
    \ via `ShaderChain` + `FeedbackBuffer`. See `references/shaders.md`\n6. **ENCODE**\
    \ \u2014 Pipe raw RGB frames to ffmpeg for H.264/GIF encoding\n\n## Creative Direction\n\
    \n### Aesthetic Dimensions\n\n| Dimension | Options | Reference |\n|-----------|---------|-----------|\n\
    | **Character palette** | Density ramps, block elements, symbols, scripts (katakana,\
    \ Greek, runes, braille), project-specific | `architecture.md` \xA7 Palettes |\n\
    | **Color strategy** | HSV, OKLAB/OKLCH, discrete RGB palettes, auto-generated\
    \ harmony, monochrome, temperature | `architecture.md` \xA7 Color System |\n|\
    \ **Background texture** | Sine fields, fBM noise, domain warp, voronoi, reaction-diffusion,\
    \ cellular automata, video | `effects.md` |\n| **Primary effects** | Rings, spirals,\
    \ tunnel, vortex, waves, interference, aurora, fire, SDFs, strange attractors\
    \ | `effects.md` |\n| **Particles** | Sparks, snow, rain, bubbles, runes, orbits,\
    \ flocking boids, flow-field followers, trails | `effects.md` \xA7 Particles |\n\
    | **Shader mood** | Retro CRT, clean modern, glitch art, cinematic, dreamy, industrial,\
    \ psychedelic | `shaders.md` |\n| **Grid density** | xs(8px) through xxl(40px),\
    \ mixed per layer | `architecture.md` \xA7 Grid System |\n| **Coordinate space**\
    \ | Cartesian, polar, tiled, rotated, fisheye, M\xF6bius, domain-warped | `effects.md`\
    \ \xA7 Transforms |\n| **Feedback** | Zoom tunnel, rainbow trails, ghostly echo,\
    \ rotating mandala, color evolution | `composition.md` \xA7 Feedback |\n| **Masking**\
    \ | Circle, ring, gradient, text stencil, animated iris/wipe/dissolve | `composition.md`\
    \ \xA7 Masking |\n| **Transitions** | Crossfade, wipe, dissolve, glitch cut, iris,\
    \ mask-based reveal | `shaders.md` \xA7 Transitions |\n\n### Per-Section Variation\n\
    \nNever use the same config for the entire video. For each section/scene:\n- **Different\
    \ background effect** (or compose 2-3)\n- **Different character palette** (match\
    \ the mood)\n- **Different color strategy** (or at minimum a different hue)\n\
    - **Vary shader intensity** (more bloom during peaks, more grain during quiet)\n\
    - **Different particle types** if particles are active\n\n### Project-Specific\
    \ Invention\n\nFor every project, invent at least one of:\n- A custom character\
    \ palette matching the theme\n- A custom background effect (combine/modify existing\
    \ building blocks)\n- A custom color palette (discrete RGB set matching the brand/mood)\n\
    - A custom particle character set\n- A novel scene transition or visual moment\n\
    \nDon't just pick from the catalog. The catalog is vocabulary \u2014 you write\
    \ the poem.\n\n## Workflow\n\n### Step 1: Creative Vision\n\nBefore any code,\
    \ articulate the creative concept:\n\n- **Mood/atmosphere**: What should the viewer\
    \ feel? Energetic, meditative, chaotic, elegant, ominous?\n- **Visual story**:\
    \ What happens over the duration? Build tension? Transform? Dissolve?\n- **Color\
    \ world**: Warm/cool? Monochrome? Neon? Earth tones? What's the dominant hue?\n\
    - **Character texture**: Dense data? Sparse stars? Organic dots? Geometric blocks?\n\
    - **What makes THIS different**: What's the one thing that makes this project\
    \ unique?\n- **Emotional arc**: How do scenes progress? Open with energy, build\
    \ to climax, resolve?\n\nMap the user's prompt to aesthetic choices. A \"chill\
    \ lo-fi visualizer\" demands different everything from a \"glitch cyberpunk data\
    \ stream.\"\n\n### Step 2: Technical Design\n\n- **Mode** \u2014 which of the\
    \ 6 modes above\n- **Resolution** \u2014 landscape 1920x1080 (default), portrait\
    \ 1080x1920, square 1080x1080 @ 24fps\n- **Hardware detection** \u2014 auto-detect\
    \ cores/RAM, set quality profile. See `references/optimization.md`\n- **Sections**\
    \ \u2014 map timestamps to scene functions, each with its own effect/palette/color/shader\
    \ config\n- **Output format** \u2014 MP4 (default), GIF (640x360 @ 15fps), PNG\
    \ sequence\n\n### Step 3: Build the Script\n\nSingle Python file. Components (with\
    \ references):\n\n1. **Hardware detection + quality profile** \u2014 `references/optimization.md`\n\
    2. **Input loader** \u2014 mode-dependent; `references/inputs.md`\n3. **Feature\
    \ analyzer** \u2014 audio FFT, video luminance, or synthetic\n4. **Grid + renderer**\
    \ \u2014 multi-density grids with bitmap cache; `references/architecture.md`\n\
    5. **Character palettes** \u2014 multiple per project; `references/architecture.md`\
    \ \xA7 Palettes\n6. **Color system** \u2014 HSV + discrete RGB + harmony generation;\
    \ `references/architecture.md` \xA7 Color\n7. **Scene functions** \u2014 each\
    \ returns `canvas (uint8 H,W,3)`; `references/scenes.md`\n8. **Tonemap** \u2014\
    \ adaptive brightness normalization; `references/composition.md`\n9. **Shader\
    \ pipeline** \u2014 `ShaderChain` + `FeedbackBuffer`; `references/shaders.md`\n\
    10. **Scene table + dispatcher** \u2014 time \u2192 scene function + config; `references/scenes.md`\n\
    11. **Parallel encoder** \u2014 N-worker clip rendering with ffmpeg pipes\n12.\
    \ **Main** \u2014 orchestrate full pipeline\n\n### Step 4: Quality Verification\n\
    \n- **Test frames first**: render single frames at key timestamps before full\
    \ render\n- **Brightness check**: `canvas.mean() > 8` for all ASCII content. If\
    \ dark, lower gamma\n- **Visual coherence**: do all scenes feel like they belong\
    \ to the same video?\n- **Creative vision check**: does the output match the concept\
    \ from Step 1? If it looks generic, go back\n\n## Critical Implementation Notes\n\
    \n### Brightness \u2014 Use `tonemap()`, Not Linear Multipliers\n\nThis is the\
    \ #1 visual issue. ASCII on black is inherently dark. **Never use `canvas * N`\
    \ multipliers** \u2014 they clip highlights. Use adaptive tonemap:\n\n```python\n\
    def tonemap(canvas, gamma=0.75):\n    f = canvas.astype(np.float32)\n    lo, hi\
    \ = np.percentile(f[::4, ::4], [1, 99.5])\n    if hi - lo < 10: hi = lo + 10\n\
    \    f = np.clip((f - lo) / (hi - lo), 0, 1) ** gamma\n    return (f * 255).astype(np.uint8)\n\
    ```\n\nPipeline: `scene_fn() \u2192 tonemap() \u2192 FeedbackBuffer \u2192 ShaderChain\
    \ \u2192 ffmpeg`\n\nPer-scene gamma: default 0.75, solarize 0.55, posterize 0.50,\
    \ bright scenes 0.85. Use `screen` blend (not `overlay`) for dark layers.\n\n\
    ### Font Cell Height\n\nmacOS Pillow: `textbbox()` returns wrong height. Use `font.getmetrics()`:\
    \ `cell_height = ascent + descent`. See `references/troubleshooting.md`.\n\n###\
    \ ffmpeg Pipe Deadlock\n\nNever `stderr=subprocess.PIPE` with long-running ffmpeg\
    \ \u2014 buffer fills at 64KB and deadlocks. Redirect to file. See `references/troubleshooting.md`.\n\
    \n### Font Compatibility\n\nNot all Unicode chars render in all fonts. Validate\
    \ palettes at init \u2014 render each char, check for blank output. See `references/troubleshooting.md`.\n\
    \n### Per-Clip Architecture\n\nFor segmented videos (quotes, scenes, chapters),\
    \ render each as a separate clip file for parallel rendering and selective re-rendering.\
    \ See `references/scenes.md`.\n\n## Performance Targets\n\n| Component | Budget\
    \ |\n|-----------|--------|\n| Feature extraction | 1-5ms |\n| Effect function\
    \ | 2-15ms |\n| Character render | 80-150ms (bottleneck) |\n| Shader pipeline\
    \ | 5-25ms |\n| **Total** | ~100-200ms/frame |\n\n## References\n\n| File | Contents\
    \ |\n|------|----------|\n| `references/architecture.md` | Grid system, resolution\
    \ presets, font selection, character palettes (20+), color system (HSV + OKLAB\
    \ + discrete RGB + harmony generation), `_render_vf()` helper, GridLayer class\
    \ |\n| `references/composition.md` | Pixel blend modes (20 modes), `blend_canvas()`,\
    \ multi-grid composition, adaptive `tonemap()`, `FeedbackBuffer`, `PixelBlendStack`,\
    \ masking/stencil system |\n| `references/effects.md` | Effect building blocks:\
    \ value field generators, hue fields, noise/fBM/domain warp, voronoi, reaction-diffusion,\
    \ cellular automata, SDFs, strange attractors, particle systems, coordinate transforms,\
    \ temporal coherence |\n| `references/shaders.md` | `ShaderChain`, `_apply_shader_step()`\
    \ dispatch, 38 shader catalog, audio-reactive scaling, transitions, tint presets,\
    \ output format encoding, terminal rendering |\n| `references/scenes.md` | Scene\
    \ protocol, `Renderer` class, `SCENES` table, `render_clip()`, beat-synced cutting,\
    \ parallel rendering, design patterns (layer hierarchy, directional arcs, visual\
    \ metaphors, compositional techniques), complete scene examples at every complexity\
    \ level, scene design checklist |\n| `references/inputs.md` | Audio analysis (FFT,\
    \ bands, beats), video sampling, image conversion, text/lyrics, TTS integration\
    \ (ElevenLabs, voice assignment, audio mixing) |\n| `references/optimization.md`\
    \ | Hardware detection, quality profiles, vectorized patterns, parallel rendering,\
    \ memory management, performance budgets |\n| `references/troubleshooting.md`\
    \ | NumPy broadcasting traps, blend mode pitfalls, multiprocessing/pickling, brightness\
    \ diagnostics, ffmpeg issues, font problems, common mistakes |\n\n---\n\n## Creative\
    \ Divergence (use only when user requests experimental/creative/unique output)\n\
    \nIf the user asks for creative, experimental, surprising, or unconventional output,\
    \ select the strategy that best fits and reason through its steps BEFORE generating\
    \ code.\n\n- **Forced Connections** \u2014 when the user wants cross-domain inspiration\
    \ (\"make it look organic,\" \"industrial aesthetic\")\n- **Conceptual Blending**\
    \ \u2014 when the user names two things to combine (\"ocean meets music,\" \"\
    space + calligraphy\")\n- **Oblique Strategies** \u2014 when the user is maximally\
    \ open (\"surprise me,\" \"something I've never seen\")\n\n### Forced Connections\n\
    1. Pick a domain unrelated to the visual goal (weather systems, microbiology,\
    \ architecture, fluid dynamics, textile weaving)\n2. List its core visual/structural\
    \ elements (erosion \u2192 gradual reveal; mitosis \u2192 splitting duplication;\
    \ weaving \u2192 interlocking patterns)\n3. Map those elements onto ASCII characters\
    \ and animation patterns\n4. Synthesize \u2014 what does \"erosion\" or \"crystallization\"\
    \ look like in a character grid?\n\n### Conceptual Blending\n1. Name two distinct\
    \ visual/conceptual spaces (e.g., ocean waves + sheet music)\n2. Map correspondences\
    \ (crests = high notes, troughs = rests, foam = staccato)\n3. Blend selectively\
    \ \u2014 keep the most interesting mappings, discard forced ones\n4. Develop emergent\
    \ properties that exist only in the blend\n\n### Oblique Strategies\n1. Draw one:\
    \ \"Honor thy error as a hidden intention\" / \"Use an old idea\" / \"What would\
    \ your closest friend do?\" / \"Emphasize the flaws\" / \"Turn it upside down\"\
    \ / \"Only a part, not the whole\" / \"Reverse\"\n2. Interpret the directive against\
    \ the current ASCII animation challenge\n3. Apply the lateral insight to the visual\
    \ design before writing code\n"
