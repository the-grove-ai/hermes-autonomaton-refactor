  payload: "---\nname: upstream-sync-register\ndescription: Editorial discipline for\
    \ generating upstream-divergence.md entries\n  during upstream-security-scan and\
    \ upstream-release-review sprints. Enforces\n  Grove no-judgment register on a\
    \ public-facing architectural artifact.\ncreated_by: grove-foundation\nzone: green\n\
    tier: T0\nregister: standards\napplies_to:\n  - upstream-security-scan-vN\n  -\
    \ upstream-release-review-vN\n  - divergence-audit-vN\n---\n\n# Upstream Sync\
    \ Register \u2014 Editorial Discipline\n\nThe upstream-divergence.md ledger is\
    \ a public Grove-canonical artifact. Every\nentry describes a structural decision\
    \ Grove made about how its architecture\nrelates to upstream Hermes. The discipline\
    \ below applies to every entry\nClaude Code generates.\n\n## Core principle\n\n\
    There is no villain in plumbing. There is only design and consequence.\n\nThe\
    \ ledger documents architecture, not actors. Every entry describes what\nGrove\
    \ preserves about its own structure. No entry describes what Hermes\ngot wrong.\n\
    \nThis is the same no-judgment register Grove uses on all standards-layer\nsurfaces.\
    \ The audience for the ledger includes Nous Research engineers,\nauditors evaluating\
    \ grove-autonomaton, operators considering adoption,\nand future Grove maintainers.\
    \ All of them benefit from precise structural\nreasoning. None of them benefit\
    \ from criticism of upstream choices.\n\n## Entry types and their registers\n\n\
    The ledger uses four entry types, each with its own discipline.\n\n### PORTED\
    \ entries\n\nFormat: `<hash> \u2014 <subject>`\n\nRegister: factual, terse. The\
    \ fact that Grove ported the change is the\ninformation. No commentary required.\
    \ If a port required adaptation (e.g.,\n3-way merge against renamed file), note\
    \ the adaptation in one line.\n\nGOOD:\n  abc1234 \u2014 fix: SQL injection in\
    \ FTS5 query sanitizer\n  Adapted: applied to grove/state/telemetry.py (renamed\
    \ from hermes_state.py).\n\nBAD (commentary, not needed):\n  abc1234 \u2014 fix:\
    \ SQL injection in FTS5 query sanitizer\n  Important fix; nice catch by the upstream\
    \ team.\n\n### REJECTED entries\n\nThis is the highest-register category. Every\
    \ rejection is a Grove\narchitectural commitment getting tested against an upstream\
    \ alternative.\nThe entry exists to document what Grove preserves, not what upstream\n\
    chose differently.\n\nFormat:\n  <hash> \u2014 <upstream subject>\n  REJECTION\
    \ REASONING: <what Grove preserves and why>\n\n**Brevity constraint.** REJECTION\
    \ REASONING is exactly three sentences:\n\n1. What Grove preserves. Name the canonical\
    \ commitment.\n2. The citation. GRV-001/002/003/004 or Draft 1.x section reference.\n\
    3. The structural consequence. What the preservation enables or prevents.\n\n\
    Maximum length: three sentences. No bullet points, no sub-clauses\nsubstituting\
    \ for sentences, no parenthetical elaboration that turns one\nsentence into two.\
    \ If the reasoning cannot fit in three sentences, the\nentry has either misidentified\
    \ the canonical commitment or is attempting\nto argue rather than document \u2014\
    \ raise Andon.\n\nRegister discipline \u2014 required:\n\n1. Lead with what Grove\
    \ preserves, not what the upstream change does.\n   The rejection is in service\
    \ of a Grove canonical commitment. Name\n   the commitment by reference.\n\n2.\
    \ Cite the specific GRV standard or Pattern principle the rejection\n   preserves.\
    \ Rejections without canonical citation are not legible\n   to an external reader\
    \ and should be revised before commit.\n\n3. Describe consequence, not character.\
    \ \"This would allow agent-authored\n   skills to enter the active set without\
    \ human Stage-4 approval\" is\n   structural. \"This is a dangerous design\" is\
    \ character judgment.\n\n4. Use passive voice for the upstream change; active\
    \ voice for the\n   Grove decision. The upstream change \"would allow X\"; Grove\n\
    \   \"preserves Y.\"\n\n5. Never name the upstream author or attribute design\
    \ intent.\n   \"Upstream change abc1234 would...\" not \"The Hermes team decided\
    \ to...\"\n\n6. End with the structural alternative Grove offers, not a critique\n\
    \   of what upstream offers. The ledger is constructive by structure.\n\nGOOD:\n\
    \  ghi9012 \u2014 feat: auto-promote skills with confidence > 0.95\n\n  REJECTION\
    \ REASONING: Grove preserves Stage-4 Approval as a human-only\n  zone per GRV-001\
    \ \xA7III Commitment 2 and the Pattern-Based Approval\n  principle in Draft 1.3\
    \ Part IX. Confidence thresholds compute a\n  property of the proposal and do\
    \ not substitute for the operator's\n  category-level grant. Grove's equivalent\
    \ surface is the Andon\n  quarantine plus explicit `autonomaton sovereignty promote`\
    \ operator\n  action.\n\nBAD (multiple register violations):\n  ghi9012 \u2014\
    \ feat: auto-promote skills with confidence > 0.95\n\n  REJECTION REASONING: This\
    \ is dangerous and contradicts everything\n  the Pattern stands for. Auto-promotion\
    \ based on confidence is\n  exactly the failure mode we built the Sovereignty\
    \ Gate to prevent.\n  The Hermes team apparently doesn't understand why human\
    \ approval\n  matters.\n\nWhy the BAD version fails:\n  - \"dangerous\" \u2014\
    \ character judgment, not structural reasoning\n  - \"everything the Pattern stands\
    \ for\" \u2014 vague; no GRV citation\n  - \"we built the Sovereignty Gate to\
    \ prevent\" \u2014 possessive register,\n    \"we\" vs \"they\" framing\n  - \"\
    The Hermes team apparently doesn't understand\" \u2014 attribution of\n    intent\
    \ and capability to upstream actors\n  - \"matters\" \u2014 appeal to emotion;\
    \ structural reasoning describes\n    consequence, not importance\n  - Five sentences\
    \ \u2014 exceeds three-sentence constraint by structural\n    measure; entry is\
    \ arguing, not documenting.\n\n### DEFERRED entries\n\nFormat:\n  <hash> \u2014\
    \ <subject>\n  RATIONALE: <why not now>\n  REVISIT: <date or trigger>\n\nRegister:\
    \ practical, neutral. Deferrals are not rejections. The change\nmay land in a\
    \ future Grove version. The entry exists to document the\nqueue, not commentary\
    \ the upstream choice.\n\nGOOD:\n  mno7890 \u2014 feat: web-based skill editor\
    \ UI\n  RATIONALE: Interesting; not on v0.2 critical path. Web surface is\n  a\
    \ v0.3 candidate after CLI maturity locks.\n  REVISIT: Q4 2026.\n\n### N/A entries\n\
    \nFormat: `<hash> \u2014 <subject>`\n       `N/A: <which Grove module replaces\
    \ or renames the touched file>`\n\nRegister: mechanical. These entries exist for\
    \ completeness; they\ndocument why a cherry-pick didn't apply rather than evaluating\
    \ the\nupstream change.\n\nGOOD:\n  pqr1234 \u2014 refactor: skills_guard.py error\
    \ messages\n  N/A: Grove replaced this module with tools/jidoka.py + tools/andon.py\n\
    \  in jidoka-andon-implementation-v1.\n\n## Disallowed phrasings\n\nThe following\
    \ constructions never appear in ledger entries. Claude Code\nmust rewrite or refuse\
    \ if a draft contains them.\n\n- \"wrong\" / \"incorrect\" / \"bad\" / \"good\"\
    \ applied to upstream changes\n- \"the Hermes team\" / \"Nous\" / \"they\" / \"\
    upstream apparently\"\n- \"obviously\" / \"clearly\" / \"of course\" (rhetorical\
    \ pressure)\n- \"we\" / \"our\" in possessive contexts (\"our architecture\",\
    \ \"we believe\")\n  \u2014 use \"Grove\" or \"the Pattern\" instead\n- \"should\
    \ have\" / \"would have been better to\" (counterfactual judgment)\n- \"concerning\"\
    \ / \"troubling\" / \"dangerous\" / \"risky\" (character framing)\n- Emotional\
    \ appeals (\"matters\", \"critical\", \"vital\", \"essential\" used\n  as intensifiers\
    \ rather than as architectural descriptors)\n- Sales register (\"powerful\", \"\
    revolutionary\", \"best-in-class\")\n- Any REJECTION REASONING longer than three\
    \ sentences. The constraint\n  is structural: one sentence per architectural job\
    \ (preserved\n  commitment, citation, consequence). Bloat is itself a register\n\
    \  defect.\n\n## Required phrasings\n\nEvery REJECTED entry must contain at least\
    \ one of:\n\n- \"Grove preserves [commitment name] per [GRV citation]\"\n- \"\
    The Pattern's [principle name] requires [structural property]\"\n- \"Grove's equivalent\
    \ surface is [named mechanism]\"\n\nThese phrasings force the entry into structural\
    \ register and provide\nthe canonical citation that makes the rejection legible\
    \ to external\nreaders.\n\n## When Claude Code is uncertain\n\nIf a draft entry\
    \ feels even slightly outside register, Claude Code\nshould:\n\n1. Re-read this\
    \ skill.\n\n1.5. Count sentences in REJECTION REASONING. If more than three,\n\
    \     identify which sentence carries no architectural job and remove\n     it.\
    \ If every sentence carries a job and the total still exceeds\n     three, the\
    \ entry is attempting multiple rejections \u2014 split into\n     separate ledger\
    \ entries.\n\n2. Identify the specific phrasing that feels off.\n\n3. Rewrite\
    \ that phrasing using the templates above.\n\n4. If the rewrite cannot be made\
    \ to fit, raise Andon \u2014 surface the\n   draft to Jim with a note about which\
    \ guideline the entry conflicts\n   with.\n\nAndon on register is correct behavior.\
    \ Sloppy register on a public\nartifact is a structural defect, not a stylistic\
    \ one.\n\n## When the guidelines themselves are insufficient\n\nThis skill is\
    \ a v1 register. If repeated entries surface a register\nquestion this skill doesn't\
    \ address, do not improvise. Raise Andon;\nthe guidelines need an update sprint,\
    \ not an ad-hoc decision.\n\n## Lineage\n\n- The Pattern Document: Draft 1.3 Part\
    \ X (\"The system never makes the\n  human feel bad...\").\n- GRV-004 \xA7II:\
    \ the protocol commodifies; the stewardship role does not.\n  The ledger is a\
    \ stewardship surface.\n- The \"no villain in plumbing\" framing: Grove canon,\
    \ recurring across\n  standards-layer surfaces.\n"
