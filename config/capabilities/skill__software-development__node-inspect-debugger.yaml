  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: node-inspect-debugger\n\
    description: \"Debug Node.js via --inspect + Chrome DevTools Protocol CLI.\"\n\
    version: 1.0.0\nauthor: Hermes Agent\nlicense: MIT\nplatforms: [linux, macos,\
    \ windows]\nmetadata:\n  hermes:\n    tags: [debugging, nodejs, node-inspect,\
    \ cdp, breakpoints, ui-tui]\n    related_skills: [systematic-debugging, python-debugpy,\
    \ debugging-hermes-tui-commands]\n---\n\n# Node.js Inspect Debugger\n\n## Overview\n\
    \nWhen `console.log` isn't enough, drive Node's built-in V8 inspector programmatically\
    \ from the terminal. You get real breakpoints, step in/over/out, call-stack walking,\
    \ local/closure scope dumps, and arbitrary expression evaluation in the paused\
    \ frame.\n\nTwo tools, pick one:\n\n- **`node inspect`** \u2014 built-in, zero\
    \ install, CLI REPL. Best for quick poking.\n- **`ndb` / CDP via `chrome-remote-interface`**\
    \ \u2014 scriptable from Node/Python; best when you want to automate many breakpoints,\
    \ collect state across runs, or debug non-interactively from an agent loop.\n\n\
    **Prefer `node inspect` first.** It's always available and the REPL is fast.\n\
    \n## When to Use\n\n- A Node test fails and you need to see intermediate state\n\
    - ui-tui crashes or behaves wrong and you want to inspect React/Ink state pre-render\n\
    - tui_gateway child processes (`_SlashWorker`, PTY bridge workers) misbehave\n\
    - You need to inspect a value in a closure that `console.log` can't reach without\
    \ patching\n- Perf: attach to a running process to capture a CPU profile or heap\
    \ snapshot\n\n**Don't use for:** things `console.log` solves in under a minute.\
    \ Breakpoint-driven debugging is heavier; use it when the payoff is real.\n\n\
    ## Quick Reference: `node inspect` REPL\n\nLaunch paused on first line:\n\n```bash\n\
    node inspect path/to/script.js\n# or with tsx\nnode --inspect-brk $(which tsx)\
    \ path/to/script.ts\n```\n\nThe `debug>` prompt accepts:\n\n| Command | Action\
    \ |\n|---|---|\n| `c` or `cont` | continue |\n| `n` or `next` | step over |\n\
    | `s` or `step` | step into |\n| `o` or `out` | step out |\n| `pause` | pause\
    \ running code |\n| `sb('file.js', 42)` | set breakpoint at file.js line 42 |\n\
    | `sb(42)` | set breakpoint at line 42 of current file |\n| `sb('functionName')`\
    \ | break when function is called |\n| `cb('file.js', 42)` | clear breakpoint\
    \ |\n| `breakpoints` | list all breakpoints |\n| `bt` | backtrace (call stack)\
    \ |\n| `list(5)` | show 5 lines of source around current position |\n| `watch('expr')`\
    \ | evaluate expr on every pause |\n| `watchers` | show watched expressions |\n\
    | `repl` | drop into REPL in current scope (Ctrl+C to exit REPL) |\n| `exec expr`\
    \ | evaluate expression once |\n| `restart` | restart script |\n| `kill` | kill\
    \ the script |\n| `.exit` | quit debugger |\n\n**In the `repl` sub-mode:** type\
    \ any JS expression, including access to locals/closure variables. `Ctrl+C` exits\
    \ back to `debug>`.\n\n## Attaching to a Running Process\n\nWhen the process is\
    \ already running (e.g. a long-lived dev server or the TUI gateway):\n\n```bash\n\
    # 1. Send SIGUSR1 to enable the inspector on an existing process\nkill -SIGUSR1\
    \ <pid>\n# Node prints: Debugger listening on ws://127.0.0.1:9229/<uuid>\n\n#\
    \ 2. Attach the debugger CLI\nnode inspect -p <pid>\n# or by URL\nnode inspect\
    \ ws://127.0.0.1:9229/<uuid>\n```\n\nTo start a process with the inspector from\
    \ the beginning:\n\n```bash\nnode --inspect script.js           # listen on 127.0.0.1:9229,\
    \ keep running\nnode --inspect-brk script.js       # listen AND pause on first\
    \ line\nnode --inspect=0.0.0.0:9230 script.js   # custom host:port\n```\n\nFor\
    \ TypeScript via tsx:\n\n```bash\nnode --inspect-brk --import tsx script.ts\n\
    # or older tsx\nnode --inspect-brk -r tsx/cjs script.ts\n```\n\n## Programmatic\
    \ CDP (scripting from terminal)\n\nWhen you want to automate \u2014 set many breakpoints,\
    \ capture scope state, script a repro \u2014 use `chrome-remote-interface`:\n\n\
    ```bash\nnpm i -g chrome-remote-interface        # or project-local\n# Start your\
    \ target:\nnode --inspect-brk=9229 target.js &\n```\n\nDriver script (save as\
    \ `/tmp/cdp-debug.js`):\n\n```javascript\nconst CDP = require('chrome-remote-interface');\n\
    \n(async () => {\n  const client = await CDP({ port: 9229 });\n  const { Debugger,\
    \ Runtime } = client;\n\n  Debugger.paused(async ({ callFrames, reason }) => {\n\
    \    const top = callFrames[0];\n    console.log(`PAUSED: ${reason} @ ${top.url}:${top.location.lineNumber\
    \ + 1}`);\n\n    // Walk scopes for locals\n    for (const scope of top.scopeChain)\
    \ {\n      if (scope.type === 'local' || scope.type === 'closure') {\n       \
    \ const { result } = await Runtime.getProperties({\n          objectId: scope.object.objectId,\n\
    \          ownProperties: true,\n        });\n        for (const p of result)\
    \ {\n          console.log(`  ${scope.type}.${p.name} =`, p.value?.value ?? p.value?.description);\n\
    \        }\n      }\n    }\n\n    // Evaluate an expression in the paused frame\n\
    \    const { result } = await Debugger.evaluateOnCallFrame({\n      callFrameId:\
    \ top.callFrameId,\n      expression: 'typeof state !== \"undefined\" ? JSON.stringify(state)\
    \ : \"n/a\"',\n    });\n    console.log('state =', result.value ?? result.description);\n\
    \n    await Debugger.resume();\n  });\n\n  await Runtime.enable();\n  await Debugger.enable();\n\
    \n  // Set a breakpoint by URL regex + line\n  await Debugger.setBreakpointByUrl({\n\
    \    urlRegex: '.*app\\\\.tsx$',\n    lineNumber: 119,       // 0-indexed\n  \
    \  columnNumber: 0,\n  });\n\n  await Runtime.runIfWaitingForDebugger();\n})();\n\
    ```\n\nRun it:\n\n```bash\nnode /tmp/cdp-debug.js\n```\n\nHermes-specific note:\
    \ `chrome-remote-interface` is NOT in `ui-tui/package.json`. Install it to a throwaway\
    \ location if you don't want to dirty the project:\n\n```bash\nmkdir -p /tmp/cdp-tools\
    \ && cd /tmp/cdp-tools && npm i chrome-remote-interface\nNODE_PATH=/tmp/cdp-tools/node_modules\
    \ node /tmp/cdp-debug.js\n```\n\n## Debugging Hermes ui-tui\n\nThe TUI is built\
    \ Ink + tsx. Two common scenarios:\n\n### Debugging a single Ink component under\
    \ dev\n\n`ui-tui/package.json` has `npm run dev` (tsx --watch). Add `--inspect-brk`\
    \ by running tsx directly:\n\n```bash\ncd /home/bb/hermes-agent/ui-tui\nnpm run\
    \ build    # produce dist/ once so transpile isn't needed on first load\nnode\
    \ --inspect-brk dist/entry.js\n# In another terminal:\nnode inspect -p <node pid>\n\
    ```\n\nThen inside `debug>`:\n\n```\nsb('dist/app.js', 220)     # or wherever\
    \ the suspect render is\ncont\n```\n\nWhen it pauses, `repl` \u2192 inspect `props`,\
    \ state refs, `useInput` handler values, etc.\n\n### Debugging a running `hermes\
    \ --tui`\n\nThe TUI spawns Node from the Python CLI. Easiest path:\n\n```bash\n\
    # 1. Launch TUI\nhermes --tui &\nTUI_PID=$(pgrep -f 'ui-tui/dist/entry' | head\
    \ -1)\n\n# 2. Enable inspector on that Node PID\nkill -SIGUSR1 \"$TUI_PID\"\n\n\
    # 3. Find the WS URL\ncurl -s http://127.0.0.1:9229/json/list | jq -r '.[0].webSocketDebuggerUrl'\n\
    \n# 4. Attach\nnode inspect ws://127.0.0.1:9229/<uuid>\n```\n\nInteracting with\
    \ the TUI (typing in its window) continues to advance execution; your debugger\
    \ can pause it on a breakpoint at any `sb(...)`.\n\n### Debugging `_SlashWorker`\
    \ / PTY child processes\n\nThose are Python, not Node \u2014 use the `python-debugpy`\
    \ skill for them. Only Node portions (Ink UI, tui_gateway client, tsx-run tests\
    \ under `ui-tui/`) use this skill.\n\n## Running Vitest Tests Under the Debugger\n\
    \n```bash\ncd /home/bb/hermes-agent/ui-tui\n# Run a single test file paused on\
    \ entry\nnode --inspect-brk ./node_modules/vitest/vitest.mjs run --no-file-parallelism\
    \ src/app/foo.test.tsx\n```\n\nIn another terminal: `node inspect -p <pid>`, then\
    \ `sb('src/app/foo.tsx', 42)`, `cont`.\n\nUse `--no-file-parallelism` (vitest)\
    \ or `--runInBand` (jest) so only one worker exists \u2014 debugging a pool is\
    \ painful.\n\n## Heap Snapshots & CPU Profiles (Non-interactive)\n\nFrom the CDP\
    \ driver above, swap Debugger for `HeapProfiler` / `Profiler`:\n\n```javascript\n\
    // CPU profile for 5 seconds\nawait client.Profiler.enable();\nawait client.Profiler.start();\n\
    await new Promise(r => setTimeout(r, 5000));\nconst { profile } = await client.Profiler.stop();\n\
    require('fs').writeFileSync('/tmp/cpu.cpuprofile', JSON.stringify(profile));\n\
    // Open /tmp/cpu.cpuprofile in Chrome DevTools \u2192 Performance tab\n```\n\n\
    ```javascript\n// Heap snapshot\nawait client.HeapProfiler.enable();\nconst chunks\
    \ = [];\nclient.HeapProfiler.addHeapSnapshotChunk(({ chunk }) => chunks.push(chunk));\n\
    await client.HeapProfiler.takeHeapSnapshot({ reportProgress: false });\nrequire('fs').writeFileSync('/tmp/heap.heapsnapshot',\
    \ chunks.join(''));\n```\n\n## Common Pitfalls\n\n1. **Wrong line numbers in TS\
    \ source.** Breakpoints hit the emitted JS, not the `.ts`. Either (a) break in\
    \ the built `dist/*.js`, or (b) enable sourcemaps (`node --enable-source-maps`)\
    \ and use `sb('src/app.tsx', N)` \u2014 but only with CDP clients that follow\
    \ sourcemaps. `node inspect` CLI does not.\n\n2. **`--inspect` vs `--inspect-brk`.**\
    \ `--inspect` starts the inspector but doesn't pause; your script races past your\
    \ first breakpoint if you attach too late. Use `--inspect-brk` when you need to\
    \ set breakpoints before any code runs.\n\n3. **Port collisions.** Default is\
    \ `9229`. If multiple Node processes are inspecting, pass `--inspect=0` (random\
    \ port) and read the actual URL from `/json/list`:\n   ```bash\n   curl -s http://127.0.0.1:9229/json/list\
    \   # lists all inspectable targets on the host\n   ```\n\n4. **Child processes.**\
    \ `--inspect` on a parent does NOT inspect its children. Use `NODE_OPTIONS='--inspect-brk'\
    \ node parent.js` to propagate to every child; be aware they all need unique ports\
    \ (Node auto-increments when `NODE_OPTIONS='--inspect'` is inherited).\n\n5. **Background\
    \ kills.** If you `Ctrl+C` out of `node inspect` while the target is paused, the\
    \ target stays paused. Either `cont` first, or `kill` the target explicitly.\n\
    \n6. **Running `node inspect` through an agent terminal.** It's a PTY-friendly\
    \ REPL. In Hermes, launch it with `terminal(pty=true)` or `background=true` +\
    \ `process(action='submit', data='...')`. Non-PTY foreground mode will work for\
    \ one-shot commands but not for interactive stepping.\n\n7. **Security.** `--inspect=0.0.0.0:9229`\
    \ exposes arbitrary code execution. Always bind to `127.0.0.1` (the default) unless\
    \ you have an isolated network.\n\n## Verification Checklist\n\nAfter setting\
    \ up a debug session, verify:\n\n- [ ] `curl -s http://127.0.0.1:9229/json/list`\
    \ returns exactly the target you expect\n- [ ] First breakpoint actually hits\
    \ (if it doesn't, you likely missed `--inspect-brk` or attached after execution\
    \ completed)\n- [ ] Source listing at pause shows the right file (mismatch = sourcemap\
    \ issue, see pitfall 1)\n- [ ] `exec process.pid` in `repl` returns the PID you\
    \ meant to attach to\n\n## One-Shot Recipes\n\n**\"Why is this variable undefined\
    \ at line X?\"**\n```bash\nnode --inspect-brk script.js &\nnode inspect -p $!\n\
    # debug>\nsb('script.js', X)\ncont\n# paused. Now:\nrepl\n> myVariable\n> Object.keys(this)\n\
    ```\n\n**\"What's the call path into this function?\"**\n```\ndebug> sb('suspectFn')\n\
    debug> cont\n# paused on entry\ndebug> bt\n```\n\n**\"This async chain hangs \u2014\
    \ where?\"**\n```\n# Start with --inspect (no -brk), let it run to the hang, then:\n\
    debug> pause\ndebug> bt\n# Now you see the stuck frame\n```\n"
