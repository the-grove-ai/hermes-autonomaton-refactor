  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: ideation\ntitle:\
    \ Creative Ideation \u2014 Constraint-Driven Project Generation\ndescription:\
    \ \"Generate project ideas via creative constraints.\"\nversion: 1.0.0\nauthor:\
    \ SHL0MS\nlicense: MIT\nplatforms: [linux, macos, windows]\nmetadata:\n  hermes:\n\
    \    tags: [Creative, Ideation, Projects, Brainstorming, Inspiration]\n    category:\
    \ creative\n    requires_toolsets: []\n---\n\n# Creative Ideation\n\n## When to\
    \ use\n\nUse when the user says 'I want to build something', 'give me a project\
    \ idea', 'I'm bored', 'what should I make', 'inspire me', or any variant of 'I\
    \ have tools but no direction'. Works for code, art, hardware, writing, tools,\
    \ and anything that can be made.\n\nGenerate project ideas through creative constraints.\
    \ Constraint + direction = creativity.\n\n## How It Works\n\n1. **Pick a constraint**\
    \ from the library below \u2014 random, or matched to the user's domain/mood\n\
    2. **Interpret it broadly** \u2014 a coding prompt can become a hardware project,\
    \ an art prompt can become a CLI tool\n3. **Generate 3 concrete project ideas**\
    \ that satisfy the constraint\n4. **If they pick one, build it** \u2014 create\
    \ the project, write the code, ship it\n\n## The Rule\n\nEvery prompt is interpreted\
    \ as broadly as possible. \"Does this include X?\" \u2192 Yes. The prompts provide\
    \ direction and mild constraint. Without either, there is no creativity.\n\n##\
    \ Constraint Library\n\n### For Developers\n\n**Solve your own itch:**\nBuild\
    \ the tool you wished existed this week. Under 50 lines. Ship it today.\n\n**Automate\
    \ the annoying thing:**\nWhat's the most tedious part of your workflow? Script\
    \ it away. Two hours to fix a problem that costs you five minutes a day.\n\n**The\
    \ CLI tool that should exist:**\nThink of a command you've wished you could type.\
    \ `git undo-that-thing-i-just-did`. `docker why-is-this-broken`. `npm explain-yourself`.\
    \ Now build it.\n\n**Nothing new except glue:**\nMake something entirely from\
    \ existing APIs, libraries, and datasets. The only original contribution is how\
    \ you connect them.\n\n**Frankenstein week:**\nTake something that does X and\
    \ make it do Y. A git repo that plays music. A Dockerfile that generates poetry.\
    \ A cron job that sends compliments.\n\n**Subtract:**\nHow much can you remove\
    \ from a codebase before it breaks? Strip a tool to its minimum viable function.\
    \ Delete until only the essence remains.\n\n**High concept, low effort:**\nA deep\
    \ idea, lazily executed. The concept should be brilliant. The implementation should\
    \ take an afternoon. If it takes longer, you're overthinking it.\n\n### For Makers\
    \ & Artists\n\n**Blatantly copy something:**\nPick something you admire \u2014\
    \ a tool, an artwork, an interface. Recreate it from scratch. The learning is\
    \ in the gap between your version and theirs.\n\n**One million of something:**\n\
    One million is both a lot and not that much. One million pixels is a 1MB photo.\
    \ One million API calls is a Tuesday. One million of anything becomes interesting\
    \ at scale.\n\n**Make something that dies:**\nA website that loses a feature every\
    \ day. A chatbot that forgets. A countdown to nothing. An exercise in rot, killing,\
    \ or letting go.\n\n**Do a lot of math:**\nGenerative geometry, shader golf, mathematical\
    \ art, computational origami. Time to re-learn what an arcsin is.\n\n### For Anyone\n\
    \n**Text is the universal interface:**\nBuild something where text is the only\
    \ interface. No buttons, no graphics, just words in and words out. Text can go\
    \ in and out of almost anything.\n\n**Start at the punchline:**\nThink of something\
    \ that would be a funny sentence. Work backwards to make it real. \"I taught my\
    \ thermostat to gaslight me\" \u2192 now build it.\n\n**Hostile UI:**\nMake something\
    \ intentionally painful to use. A password field that requires 47 conditions.\
    \ A form where every label lies. A CLI that judges your commands.\n\n**Take two:**\n\
    Remember an old project. Do it again from scratch. No looking at the original.\
    \ See what changed about how you think.\n\nSee `references/full-prompt-library.md`\
    \ for 30+ additional constraints across communication, scale, philosophy, transformation,\
    \ and more.\n\n## Matching Constraints to Users\n\n| User says | Pick from |\n\
    |-----------|-----------|\n| \"I want to build something\" (no direction) | Random\
    \ \u2014 any constraint |\n| \"I'm learning [language]\" | Blatantly copy something,\
    \ Automate the annoying thing |\n| \"I want something weird\" | Hostile UI, Frankenstein\
    \ week, Start at the punchline |\n| \"I want something useful\" | Solve your own\
    \ itch, The CLI that should exist, Automate the annoying thing |\n| \"I want something\
    \ beautiful\" | Do a lot of math, One million of something |\n| \"I'm burned out\"\
    \ | High concept low effort, Make something that dies |\n| \"Weekend project\"\
    \ | Nothing new except glue, Start at the punchline |\n| \"I want a challenge\"\
    \ | One million of something, Subtract, Take two |\n\n## Output Format\n\n```\n\
    ## Constraint: [Name]\n> [The constraint, one sentence]\n\n### Ideas\n\n1. **[One-line\
    \ pitch]**\n   [2-3 sentences: what you'd build and why it's interesting]\n  \
    \ \u23F1 [weekend / week / month] \u2022 \U0001F527 [stack]\n\n2. **[One-line\
    \ pitch]**\n   [2-3 sentences]\n   \u23F1 ... \u2022 \U0001F527 ...\n\n3. **[One-line\
    \ pitch]**\n   [2-3 sentences]\n   \u23F1 ... \u2022 \U0001F527 ...\n```\n\n##\
    \ Example\n\n```\n## Constraint: The CLI tool that should exist\n> Think of a\
    \ command you've wished you could type. Now build it.\n\n### Ideas\n\n1. **`git\
    \ whatsup` \u2014 show what happened while you were away**\n   Compares your last\
    \ active commit to HEAD and summarizes what changed,\n   who committed, and what\
    \ PRs merged. Like a morning standup from your repo.\n   \u23F1 weekend \u2022\
    \ \U0001F527 Python, GitPython, click\n\n2. **`explain 503` \u2014 HTTP status\
    \ codes for humans**\n   Pipe any status code or error message and get a plain-English\
    \ explanation\n   with common causes and fixes. Pulls from a curated database,\
    \ not an LLM.\n   \u23F1 weekend \u2022 \U0001F527 Rust or Go, static dataset\n\
    \n3. **`deps why <package>` \u2014 why is this in my dependency tree**\n   Traces\
    \ a transitive dependency back to the direct dependency that pulled\n   it in.\
    \ Answers \"why do I have 47 copies of lodash\" in one command.\n   \u23F1 weekend\
    \ \u2022 \U0001F527 Node.js, npm/yarn lockfile parsing\n```\n\nAfter the user\
    \ picks one, start building \u2014 create the project, write the code, iterate.\n\
    \n## Attribution\n\nConstraint approach inspired by [wttdotm.com/prompts.html](https://wttdotm.com/prompts.html).\
    \ Adapted and expanded for software development and general-purpose ideation.\n"
