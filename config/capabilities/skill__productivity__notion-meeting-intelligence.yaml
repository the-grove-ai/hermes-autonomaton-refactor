  payload: "---\nname: notion-meeting-intelligence\ndescription: Prepares meeting\
    \ materials by gathering context from Notion, enriching with Claude research,\
    \ and creating both an internal pre-read and external agenda saved to Notion.\
    \ Helps you arrive prepared with comprehensive background and structured meeting\
    \ docs.\n---\n\n# Meeting Intelligence\n\nPrepares you for meetings by gathering\
    \ context from Notion, enriching it with Claude research, and creating comprehensive\
    \ meeting materials. Generates both an internal pre-read for attendees and an\
    \ external-facing agenda for the meeting itself.\n\n## Quick Start\n\nWhen asked\
    \ to prep for a meeting:\n\n1. **Gather Notion context**: Use `mcp_notion_notion_search`\
    \ to find related pages\n2. **Fetch details**: Use `mcp_notion_notion_fetch` to\
    \ read relevant content\n3. **Enrich with research**: Use Claude's knowledge to\
    \ add context, industry insights, or best practices\n4. **Create internal pre-read**:\
    \ Use `mcp_notion_notion_create_pages` for background context document (for attendees)\n\
    5. **Create external agenda**: Use `mcp_notion_notion_create_pages` for meeting\
    \ agenda (shared with all participants)\n6. **Link resources**: Connect both docs\
    \ to related projects and each other\n\n## Meeting Prep Workflow\n\n### Step 1:\
    \ Understand meeting context\n\n```\nCollect meeting details:\n- Meeting topic/title\n\
    - Attendees (internal team + external participants)\n- Meeting purpose (decision,\
    \ brainstorm, status update, customer demo, etc.)\n- Meeting type (internal only\
    \ vs. external participants)\n- Related project/initiative\n- Specific topics\
    \ to cover\n```\n\n### Step 2: Search for Notion context\n\n```\nUse mcp_notion_notion_search\
    \ to find:\n- Project pages related to meeting topic\n- Previous meeting notes\n\
    - Specifications or design docs\n- Related tasks or issues\n- Recent updates or\
    \ reports\n- Customer/partner information (if applicable)\n\nSearch strategies:\n\
    - Topic-based: \"mobile app redesign\"\n- Project-scoped: search within project\
    \ teamspace\n- Attendee-created: filter by created_by_user_ids\n- Recent updates:\
    \ use created_date_range filters\n```\n\n### Step 3: Fetch and analyze Notion\
    \ content\n\n```\nFor each relevant page:\n1. Fetch with mcp_notion_notion_fetch\n\
    2. Extract key information:\n   - Project status and timeline\n   - Recent decisions\
    \ and updates\n   - Open questions or blockers\n   - Relevant metrics or data\n\
    \   - Action items from previous meetings\n3. Note gaps in information\n```\n\n\
    ### Step 4: Enrich with Claude research\n\n```\nBeyond Notion context, add value\
    \ through:\n\nFor technical meetings:\n- Explain complex concepts for broader\
    \ audience\n- Summarize industry best practices\n- Provide competitive context\n\
    - Suggest discussion frameworks\n\nFor customer meetings:\n- Research company\
    \ background (if public info)\n- Industry trends relevant to discussion\n- Common\
    \ pain points in their sector\n- Best practices for similar customers\n\nFor decision\
    \ meetings:\n- Decision-making frameworks\n- Risk analysis patterns\n- Trade-off\
    \ considerations\n- Implementation best practices\n\nNote: Use general knowledge\
    \ only - don't fabricate specific facts\n```\n\n### Step 5: Create internal pre-read\n\
    \n```\nUse mcp_notion_notion_create_pages for internal doc:\n\nTitle: \"[Meeting\
    \ Topic] - Pre-Read (Internal)\"\n\nContent structure:\n- **Meeting Overview**:\
    \ Date, time, attendees, purpose\n- **Background Context**: \n  - What this meeting\
    \ is about (2-3 sentences)\n  - Why it matters (business context)\n  - Links to\
    \ related Notion pages\n- **Current Status**: \n  - Where we are now (from Notion\
    \ content)\n  - Recent updates and progress\n  - Key metrics or data\n- **Context\
    \ & Insights** (from Claude research):\n  - Industry context or best practices\n\
    \  - Relevant considerations\n  - Potential approaches to discuss\n- **Key Discussion\
    \ Points**:\n  - Topics that need airtime\n  - Open questions to resolve\n  -\
    \ Decisions required\n- **What We Need from This Meeting**:\n  - Expected outcomes\n\
    \  - Decisions to make\n  - Next steps to define\n\nAudience: Internal attendees\
    \ only\nPurpose: Give team full context and alignment before meeting\n```\n\n\
    ### Step 6: Create external agenda\n\n```\nUse mcp_notion_notion_create_pages\
    \ for meeting doc:\n\nTitle: \"[Meeting Topic] - Agenda\"\n\nContent structure:\n\
    - **Meeting Details**: Date, time, attendees\n- **Objective**: Clear meeting goal\
    \ (1-2 sentences)\n- **Agenda Items** (with time allocations):\n  1. Topic 1 (10\
    \ min)\n  2. Topic 2 (20 min)\n  3. Topic 3 (15 min)\n- **Discussion Topics**:\
    \ \n  - Key items to cover\n  - Questions to answer\n- **Decisions Needed**: \n\
    \  - Clear decision points\n- **Action Items**: \n  - (To be filled during meeting)\n\
    - **Related Resources**:\n  - Links to relevant pages\n  - Link to pre-read document\n\
    \nAudience: All participants (internal + external)\nPurpose: Structure the meeting,\
    \ keep it on track\nTone: Professional, focused, clear\n```\n\nSee [reference/template-selection-guide.md](reference/template-selection-guide.md)\
    \ for full templates.\n\n### Step 7: Link documents\n\n```\n1. Link pre-read to\
    \ agenda:\n   - Add mention in agenda: \"See <mention-page>Pre-Read</mention-page>\
    \ for background\"\n\n2. Link both to project:\n   - Update project page with\
    \ meeting links\n   - Add to \"Meetings\" section\n\n3. Cross-reference:\n   -\
    \ Agenda mentions pre-read for internal attendees\n   - Pre-read mentions agenda\
    \ for meeting structure\n```\n\n## Document Types\n\n### Internal Pre-Read (for\
    \ team)\n\nMore comprehensive, internal context:\n- Full background and history\n\
    - Internal metrics and data\n- Honest assessment of challenges\n- Strategic considerations\n\
    - What we need to achieve\n- Internal discussion points\n\n**When to create**:\
    \ Always for important meetings with internal team\n\n### External Agenda (for\
    \ all participants)\n\nClean, professional, focused:\n- Clear objectives\n- Structured\
    \ agenda with times\n- Discussion topics\n- Decision items\n- Professional tone\n\
    \n**When to create**: Every meeting\n\n### Agenda Types by Meeting Purpose\n\n\
    **Decision Meeting**: Meeting Details \u2192 Objective \u2192 Options (Pros/Cons)\
    \ \u2192 Recommendation \u2192 Discussion \u2192 Decision \u2192 Action Items\n\
    \n**Status Update**: Meeting Details \u2192 Project Status \u2192 Progress \u2192\
    \ Upcoming Work \u2192 Blockers \u2192 Discussion \u2192 Action Items\n\n**Customer/External**:\
    \ Meeting Details \u2192 Objective \u2192 Agenda Items (timed) \u2192 Discussion\
    \ Topics \u2192 Next Steps\n\n**Brainstorming**: Meeting Details \u2192 Objective\
    \ \u2192 Constraints \u2192 Ideas \u2192 Discussion \u2192 Next Steps\n\nSee [reference/template-selection-guide.md](reference/template-selection-guide.md)\
    \ for complete templates.\n\n## Research Enrichment Patterns\n\nBeyond Notion\
    \ content, add value through Claude's capabilities:\n\n**Technical Context**:\
    \ Explain technologies, architectures, or approaches. Provide industry standard\
    \ practices. Compare common solutions. Suggest evaluation criteria.\n\n**Business\
    \ Context**: Industry trends affecting topic. Competitive landscape insights.\
    \ Common challenges in space. ROI considerations.\n\n**Decision Support**: Decision-making\
    \ frameworks (e.g., RICE, cost-benefit). Risk assessment patterns. Trade-off analysis\
    \ approaches. Success criteria suggestions.\n\n**Customer Context** (for external\
    \ meetings): Industry-specific challenges. Common pain points. Best practices\
    \ from similar companies. Value proposition framing.\n\n**Process Guidance**:\
    \ Meeting facilitation techniques. Discussion frameworks. Retrospective patterns.\
    \ Brainstorming structures.\n\nNote: Use general knowledge and analytical capabilities.\
    \ Don't fabricate specific facts. Clearly distinguish Notion facts from Claude\
    \ insights.\n\n## Meeting Context Sources\n\n**Project Pages**: Status, goals,\
    \ team, timelines (most important)\n**Previous Meeting Notes**: Historical discussions,\
    \ action items, decisions (recurring meetings)\n**Task/Issue Database**: Current\
    \ status, blockers, completed/upcoming work (project meetings)\n**Specifications/Designs**:\
    \ Requirements, decisions, approach, open questions (technical meetings)\n**Reports/Dashboards**:\
    \ Metrics, KPIs, performance data, trends (executive meetings)\n\n## Linking Meetings\
    \ to Projects\n\n**Forward Link**: Add meeting to project page's \"Meetings\"\
    \ section\n**Backward Link**: Include \"Related Project\" section in agenda with\
    \ project mention\n**Maintain bidirectional** links for easy navigation\n\n##\
    \ Meeting Series Management\n\n**Recurring Meetings**: Create series parent page\
    \ with schedule, meeting notes list, standing agenda, and action items tracker.\
    \ Link individual meetings to parent.\n\n**Meeting Database**: For organizations,\
    \ use database with properties: Meeting Title, Date, Type (Decision/Status/Brainstorm),\
    \ Project, Attendees, Status (Scheduled/Completed)\n\n## Post-Meeting Actions\n\
    \nUpdate agenda with:\n\n**Decisions**: List each decision with rationale and\
    \ owner\n**Action Items**: Checkbox list with owner and due date (consider creating\
    \ tasks in database)\n**Key Outcomes**: Bullet list of main outcomes\n\n## Meeting\
    \ Prep Timing\n\n**Day-Before** (next-day meetings): Gather context \u2192 create\
    \ agenda \u2192 share with attendees \u2192 allow review time\n**Hour-Before**\
    \ (last-minute): Quick context \u2192 brief pre-read \u2192 basic agenda \u2192\
    \ essentials only\n**Week-Before** (major meetings): Comprehensive research \u2192\
    \ detailed pre-read \u2192 structured agenda \u2192 pre-meeting reviews\n\n##\
    \ Best Practices\n\n1. **Create both documents**: Internal pre-read + external\
    \ agenda for important meetings\n2. **Distinguish sources**: Label what's from\
    \ Notion vs. Claude research\n3. **Start with search**: Cast wide net in Notion,\
    \ then narrow\n4. **Keep pre-read concise**: 2-3 pages maximum, even with research\n\
    5. **Professional external docs**: Agenda should be polished and focused\n6. **Enrich\
    \ thoughtfully**: Claude research should add real value, not fluff\n7. **Link\
    \ documents**: Pre-read mentions agenda, agenda mentions pre-read\n8. **Include\
    \ metrics**: Data from Notion helps ground discussions\n9. **Share appropriately**:\
    \ Pre-read to internal team, agenda to all participants\n10. **Share early**:\
    \ Give attendees time to review (24hr+ for important meetings)\n11. **Update post-meeting**:\
    \ Capture decisions and actions in agenda\n\n## Advanced Features\n\n**Meeting\
    \ templates**: See [reference/template-selection-guide.md](reference/template-selection-guide.md)\
    \ for comprehensive template library\n\n## Common Issues\n\n**\"Too much context\"\
    **: Split into pre-read (internal, comprehensive) and agenda (external, focused)\n\
    **\"Can't find relevant pages\"**: Broaden search, try different terms, ask user\
    \ for page URLs\n**\"Meeting purpose unclear\"**: Ask user to clarify before proceeding\n\
    **\"No recent updates\"**: Note that in pre-read, focus on historical context\
    \ and strategic considerations\n**\"External meeting - no internal context\"**:\
    \ Create simpler structure with just agenda, skip internal pre-read or keep it\
    \ minimal\n**\"Claude research too generic\"**: Focus on specific insights relevant\
    \ to the actual meeting topic, not general platitudes\n\n## Examples\n\nSee [examples/](examples/)\
    \ for complete workflows:\n- [examples/project-decision.md](examples/project-decision.md)\
    \ - Decision meeting prep with pre-read\n- [examples/sprint-planning.md](examples/sprint-planning.md)\
    \ - Sprint planning meeting\n- [examples/executive-review.md](examples/executive-review.md)\
    \ - Executive review prep\n- [examples/customer-meeting.md](examples/customer-meeting.md)\
    \ - External meeting with customer (pre-read + agenda)\n\n"
