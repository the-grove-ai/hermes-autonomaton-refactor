    \n---\n\n# Pixel Art\n\nConvert any image into retro pixel art, then optionally\
    \ animate it into a short\nMP4 or GIF with era-appropriate effects (rain, fireflies,\
    \ snow, embers).\n\nTwo scripts ship with this skill:\n\n- `scripts/pixel_art.py`\
    \ \u2014 photo \u2192 pixel-art PNG (Floyd-Steinberg dithering)\n- `scripts/pixel_art_video.py`\
    \ \u2014 pixel-art PNG \u2192 animated MP4 (+ optional GIF)\n\nEach is importable\
    \ or runnable directly. Presets snap to hardware palettes\nwhen you want era-accurate\
    \ colors (NES, Game Boy, PICO-8, etc.), or use\nadaptive N-color quantization\
    \ for arcade/SNES-style looks.\n\n## When to Use\n\n- User wants retro pixel art\
    \ from a source image\n- User asks for NES / Game Boy / PICO-8 / C64 / arcade\
    \ / SNES styling\n- User wants a short looping animation (rain scene, night sky,\
    \ snow, etc.)\n- Posters, album covers, social posts, sprites, characters, avatars\n\
    \n## Workflow\n\nBefore generating, confirm the style with the user. Different\
    \ presets produce\nvery different outputs and regenerating is costly.\n\n### Step\
    \ 1 \u2014 Offer a style\n\nCall `clarify` with 4 representative presets. Pick\
    \ the set based on what the\nuser asked for \u2014 don't just dump all 14.\n\n\
    Default menu when the user's intent is unclear:\n\n```python\nclarify(\n    question=\"\
    Which pixel-art style do you want?\",\n    choices=[\n        \"arcade \u2014\
    \ bold, chunky 80s cabinet feel (16 colors, 8px)\",\n        \"nes \u2014 Nintendo\
    \ 8-bit hardware palette (54 colors, 8px)\",\n        \"gameboy \u2014 4-shade\
    \ green Game Boy DMG\",\n        \"snes \u2014 cleaner 16-bit look (32 colors,\
    \ 4px)\",\n    ],\n)\n```\n\nWhen the user already named an era (e.g. \"80s arcade\"\
    , \"Gameboy\"), skip\n`clarify` and use the matching preset directly.\n\n### Step\
    \ 2 \u2014 Offer animation (optional)\n\nIf the user asked for a video/GIF, or\
    \ the output might benefit from motion,\nask which scene:\n\n```python\nclarify(\n\
    \    question=\"Want to animate it? Pick a scene or skip.\",\n    choices=[\n\
    \        \"night \u2014 stars + fireflies + leaves\",\n        \"urban \u2014\
    \ rain + neon pulse\",\n        \"snow \u2014 falling snowflakes\",\n        \"\
    skip \u2014 just the image\",\n    ],\n)\n```\n\nDo NOT call `clarify` more than\
    \ twice in a row. One for style, one for scene if\nanimation is on the table.\
    \ If the user explicitly asked for a specific style\nand scene in their message,\
    \ skip `clarify` entirely.\n\n### Step 3 \u2014 Generate\n\nRun `pixel_art()`\
    \ first; if animation was requested, chain into\n`pixel_art_video()` on the result.\n\
    \n## Preset Catalog\n\n| Preset | Era | Palette | Block | Best for |\n|--------|-----|---------|-------|----------|\n\
    | `arcade` | 80s arcade | adaptive 16 | 8px | Bold posters, hero art |\n| `snes`\
    \ | 16-bit | adaptive 32 | 4px | Characters, detailed scenes |\n| `nes` | 8-bit\
    \ | NES (54) | 8px | True NES look |\n| `gameboy` | DMG handheld | 4 green shades\
    \ | 8px | Monochrome Game Boy |\n| `gameboy_pocket` | Pocket handheld | 4 grey\
    \ shades | 8px | Mono GB Pocket |\n| `pico8` | PICO-8 | 16 fixed | 6px | Fantasy-console\
    \ look |\n| `c64` | Commodore 64 | 16 fixed | 8px | 8-bit home computer |\n| `apple2`\
    \ | Apple II hi-res | 6 fixed | 10px | Extreme retro, 6 colors |\n| `teletext`\
    \ | BBC Teletext | 8 pure | 10px | Chunky primary colors |\n| `mspaint` | Windows\
    \ MS Paint | 24 fixed | 8px | Nostalgic desktop |\n| `mono_green` | CRT phosphor\
    \ | 2 green | 6px | Terminal/CRT aesthetic |\n| `mono_amber` | CRT amber | 2 amber\
    \ | 6px | Amber monitor look |\n| `neon` | Cyberpunk | 10 neons | 6px | Vaporwave/cyber\
    \ |\n| `pastel` | Soft pastel | 10 pastels | 6px | Kawaii / gentle |\n\nNamed\
    \ palettes live in `scripts/palettes.py` (see `references/palettes.md` for\nthe\
    \ complete list \u2014 28 named palettes total). Any preset can be overridden:\n\
    \n```python\npixel_art(\"in.png\", \"out.png\", preset=\"snes\", palette=\"PICO_8\"\
    , block=6)\n```\n\n## Scene Catalog (for video)\n\n| Scene | Effects |\n|-------|---------|\n\
    | `night` | Twinkling stars + fireflies + drifting leaves |\n| `dusk` | Fireflies\
    \ + sparkles |\n| `tavern` | Dust motes + warm sparkles |\n| `indoor` | Dust motes\
    \ |\n| `urban` | Rain + neon pulse |\n| `nature` | Leaves + fireflies |\n| `magic`\
    \ | Sparkles + fireflies |\n| `storm` | Rain + lightning |\n| `underwater` | Bubbles\
    \ + light sparkles |\n| `fire` | Embers + sparkles |\n| `snow` | Snowflakes +\
    \ sparkles |\n| `desert` | Heat shimmer + dust |\n\n## Invocation Patterns\n\n\
    ### Python (import)\n\n```python\nimport sys\nsys.path.insert(0, \"/home/teknium/.hermes/skills/creative/pixel-art/scripts\"\
    )\nfrom pixel_art import pixel_art\nfrom pixel_art_video import pixel_art_video\n\
    \n# 1. Convert to pixel art\npixel_art(\"/path/to/photo.jpg\", \"/tmp/pixel.png\"\
    , preset=\"nes\")\n\n# 2. Animate (optional)\npixel_art_video(\n    \"/tmp/pixel.png\"\
    ,\n    \"/tmp/pixel.mp4\",\n    scene=\"night\",\n    duration=6,\n    fps=15,\n\
    \    seed=42,\n    export_gif=True,\n)\n```\n\n### CLI\n\n```bash\ncd /home/teknium/.hermes/skills/creative/pixel-art/scripts\n\
    \npython pixel_art.py in.jpg out.png --preset gameboy\npython pixel_art.py in.jpg\
    \ out.png --preset snes --palette PICO_8 --block 6\n\npython pixel_art_video.py\
    \ out.png out.mp4 --scene night --duration 6 --gif\n```\n\n## Pipeline Rationale\n\
    \n**Pixel conversion:**\n1. Boost contrast/color/sharpness (stronger for smaller\
    \ palettes)\n2. Posterize to simplify tonal regions before quantization\n3. Downscale\
    \ by `block` with `Image.NEAREST` (hard pixels, no interpolation)\n4. Quantize\
    \ with Floyd-Steinberg dithering \u2014 against either an adaptive\n   N-color\
    \ palette OR a named hardware palette\n5. Upscale back with `Image.NEAREST`\n\n\
    Quantizing AFTER downscale keeps dithering aligned with the final pixel grid.\n\
    Quantizing before would waste error-diffusion on detail that disappears.\n\n**Video\
    \ overlay:**\n- Copies the base frame each tick (static background)\n- Overlays\
    \ stateless-per-frame particle draws (one function per effect)\n- Encodes via\
    \ ffmpeg `libx264 -pix_fmt yuv420p -crf 18`\n- Optional GIF via `palettegen` +\
    \ `paletteuse`\n\n## Dependencies\n\n- Python 3.9+\n- Pillow (`pip install Pillow`)\n\
    - ffmpeg on PATH (only needed for video \u2014 Hermes installs package this)\n\
    \n## Pitfalls\n\n- Pallet keys are case-sensitive (`\"NES\"`, `\"PICO_8\"`, `\"\
    GAMEBOY_ORIGINAL\"`).\n- Very small sources (<100px wide) collapse under 8-10px\
    \ blocks. Upscale the\n  source first if it's tiny.\n- Fractional `block` or `palette`\
    \ will break quantization \u2014 keep them positive ints.\n- Animation particle\
    \ counts are tuned for ~640x480 canvases. On very large\n  images you may want\
    \ a second pass with a different seed for density.\n- `mono_green` / `mono_amber`\
    \ force `color=0.0` (desaturate). If you override\n  and keep chroma, the 2-color\
    \ palette can produce stripes on smooth regions.\n- `clarify` loop: call it at\
    \ most twice per turn (style, then scene). Don't\n  pepper the user with more\
    \ picks.\n\n## Verification\n\n- PNG is created at the output path\n- Clear square\
    \ pixel blocks visible at the preset's block size\n- Color count matches preset\
    \ (eyeball the image or run `Image.open(p).getcolors()`)\n- Video is a valid MP4\
    \ (`ffprobe` can open it) with non-zero size\n\n## Attribution\n\nNamed hardware\
    \ palettes and the procedural animation loops in `pixel_art_video.py`\nare ported\
