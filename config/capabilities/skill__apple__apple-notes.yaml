    \    # Move note to folder (interactive)\n```\n\n### Export Notes\n\n```bash\n\
    memo notes -ex                    # Export to HTML/Markdown\n```\n\n## Limitations\n\
    \n- Cannot edit notes containing images or attachments\n- Interactive prompts\
    \ require terminal access (use pty=true if needed)\n- macOS only \u2014 requires\
    \ Apple Notes.app\n\n## Rules\n\n1. Prefer Apple Notes when user wants cross-device\
    \ sync (iPhone/iPad/Mac)\n2. Use the `memory` tool for agent-internal notes that\
    \ don't need to sync\n3. Use the `obsidian` skill for Markdown-native knowledge\
