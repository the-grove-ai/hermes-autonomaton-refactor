    prerequisites:\n  commands: [memo]\n---\n\n# Apple Notes\n\nUse `memo` to manage\
    \ Apple Notes directly from the terminal. Notes sync across all Apple devices\
    \ via iCloud.\n\n## Prerequisites\n\n- **macOS** with Notes.app\n- Install: `brew\
    \ tap antoniorodr/memo && brew install antoniorodr/memo/memo`\n- Grant Automation\
    \ access to Notes.app when prompted (System Settings \u2192 Privacy \u2192 Automation)\n\
    \n## When to Use\n\n- User asks to create, view, or search Apple Notes\n- Saving\
    \ information to Notes.app for cross-device access\n- Organizing notes into folders\n\
    - Exporting notes to Markdown/HTML\n\n## When NOT to Use\n\n- Obsidian vault management\
    \ \u2192 use the `obsidian` skill\n- Bear Notes \u2192 separate app (not supported\
    \ here)\n- Quick agent-only notes \u2192 use the `memory` tool instead\n\n## Quick\
    \ Reference\n\n### View Notes\n\n```bash\nmemo notes                        #\
    \ List all notes\nmemo notes -f \"Folder Name\"       # Filter by folder\nmemo\
    \ notes -s \"query\"             # Search notes (fuzzy)\n```\n\n### Create Notes\n\
    \n```bash\nmemo notes -a                     # Interactive editor\nmemo notes\
    \ -a \"Note Title\"        # Quick add with title\n```\n\n### Edit Notes\n\n```bash\n\
    memo notes -e                     # Interactive selection to edit\n```\n\n###\
    \ Delete Notes\n\n```bash\nmemo notes -d                     # Interactive selection\
