  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: himalaya\ndescription:\
    \ \"Himalaya CLI: IMAP/SMTP email from terminal.\"\nversion: 1.1.0\nauthor: community\n\
    license: MIT\nplatforms: [linux, macos, windows]\nmetadata:\n  hermes:\n    tags:\
    \ [Email, IMAP, SMTP, CLI, Communication]\n    homepage: https://github.com/pimalaya/himalaya\n\
    prerequisites:\n  commands: [himalaya]\n---\n\n# Himalaya Email CLI\n\nHimalaya\
    \ is a CLI email client that lets you manage emails from the terminal using IMAP,\
    \ SMTP, Notmuch, or Sendmail backends.\n\n## References\n\n- `references/configuration.md`\
    \ (config file setup + IMAP/SMTP authentication)\n- `references/message-composition.md`\
    \ (MML syntax for composing emails)\n\n## Prerequisites\n\n1. Himalaya CLI installed\
    \ (`himalaya --version` to verify)\n2. A configuration file at `~/.config/himalaya/config.toml`\n\
    3. IMAP/SMTP credentials configured (password stored securely)\n\n### Installation\n\
    \n```bash\n# Pre-built binary (Linux/macOS \u2014 recommended)\ncurl -sSL https://raw.githubusercontent.com/pimalaya/himalaya/master/install.sh\
    \ | PREFIX=~/.local sh\n\n# macOS via Homebrew\nbrew install himalaya\n\n# Or\
    \ via cargo (any platform with Rust)\ncargo install himalaya --locked\n```\n\n\
    ## Configuration Setup\n\nRun the interactive wizard to set up an account:\n\n\
    ```bash\nhimalaya account configure\n```\n\nOr create `~/.config/himalaya/config.toml`\
    \ manually:\n\n```toml\n[accounts.personal]\nemail = \"you@example.com\"\ndisplay-name\
    \ = \"Your Name\"\ndefault = true\n\nbackend.type = \"imap\"\nbackend.host = \"\
    imap.example.com\"\nbackend.port = 993\nbackend.encryption.type = \"tls\"\nbackend.login\
    \ = \"you@example.com\"\nbackend.auth.type = \"password\"\nbackend.auth.cmd =\
    \ \"pass show email/imap\"  # or use keyring\n\nmessage.send.backend.type = \"\
    smtp\"\nmessage.send.backend.host = \"smtp.example.com\"\nmessage.send.backend.port\
    \ = 587\nmessage.send.backend.encryption.type = \"start-tls\"\nmessage.send.backend.login\
    \ = \"you@example.com\"\nmessage.send.backend.auth.type = \"password\"\nmessage.send.backend.auth.cmd\
    \ = \"pass show email/smtp\"\n\n# Folder aliases (himalaya v1.2.0+ syntax). Required\
    \ whenever the\n# server's folder names don't match himalaya's canonical names\n\
    # (inbox/sent/drafts/trash). Gmail is the common case \u2014 see\n# `references/configuration.md`\
    \ for the `[Gmail]/Sent Mail` mapping.\nfolder.aliases.inbox = \"INBOX\"\nfolder.aliases.sent\
    \ = \"Sent\"\nfolder.aliases.drafts = \"Drafts\"\nfolder.aliases.trash = \"Trash\"\
    \n```\n\n> **Heads up on the alias syntax.** Pre-v1.2.0 docs used a\n> `[accounts.NAME.folder.alias]`\
    \ sub-section (singular `alias`).\n> v1.2.0 silently ignores that form \u2014\
    \ TOML parses fine, but the\n> alias resolver never reads it, so every lookup\
    \ falls through to\n> the canonical name. On Gmail this means save-to-Sent fails\
    \ *after*\n> SMTP delivery succeeds, and `himalaya message send` exits non-zero.\n\
    > Any caller (agent, script, user) that retries on that exit code\n> will re-run\
    \ the entire send \u2014 including SMTP \u2014 producing duplicate\n> emails to\
    \ recipients. Always use `folder.aliases.X` (plural, dotted\n> keys, directly\
    \ under `[accounts.NAME]`).\n\n## Hermes Integration Notes\n\n- **Reading, listing,\
    \ searching, moving, deleting** all work directly through the terminal tool\n\
    - **Composing/replying/forwarding** \u2014 piped input (`cat << EOF | himalaya\
    \ template send`) is recommended for reliability. Interactive `$EDITOR` mode works\
    \ with `pty=true` + background + process tool, but requires knowing the editor\
    \ and its commands\n- Use `--output json` for structured output that's easier\
    \ to parse programmatically\n- The `himalaya account configure` wizard requires\
    \ interactive input \u2014 use PTY mode: `terminal(command=\"himalaya account\
    \ configure\", pty=true)`\n\n## Common Operations\n\n### List Folders\n\n```bash\n\
    himalaya folder list\n```\n\n### List Emails\n\nList emails in INBOX (default):\n\
    \n```bash\nhimalaya envelope list\n```\n\nList emails in a specific folder:\n\n\
    ```bash\nhimalaya envelope list --folder \"Sent\"\n```\n\nList with pagination:\n\
    \n```bash\nhimalaya envelope list --page 1 --page-size 20\n```\n\n### Search Emails\n\
    \n```bash\nhimalaya envelope list from john@example.com subject meeting\n```\n\
    \n### Read an Email\n\nRead email by ID (shows plain text):\n\n```bash\nhimalaya\
    \ message read 42\n```\n\nExport raw MIME:\n\n```bash\nhimalaya message export\
    \ 42 --full\n```\n\n### Reply to an Email\n\nTo reply non-interactively from Hermes,\
    \ read the original message, compose a reply, and pipe it:\n\n```bash\n# Get the\
    \ reply template, edit it, and send\nhimalaya template reply 42 | sed 's/^$/\\\
    nYour reply text here\\n/' | himalaya template send\n```\n\nOr build the reply\
    \ manually:\n\n```bash\ncat << 'EOF' | himalaya template send\nFrom: you@example.com\n\
    To: sender@example.com\nSubject: Re: Original Subject\nIn-Reply-To: <original-message-id>\n\
    \nYour reply here.\nEOF\n```\n\nReply-all (interactive \u2014 needs $EDITOR, use\
    \ template approach above instead):\n\n```bash\nhimalaya message reply 42 --all\n\
    ```\n\n### Forward an Email\n\n```bash\n# Get forward template and pipe with modifications\n\
    himalaya template forward 42 | sed 's/^To:.*/To: newrecipient@example.com/' |\
    \ himalaya template send\n```\n\n### Write a New Email\n\n**Non-interactive (use\
    \ this from Hermes)** \u2014 pipe the message via stdin:\n\n```bash\ncat << 'EOF'\
    \ | himalaya template send\nFrom: you@example.com\nTo: recipient@example.com\n\
    Subject: Test Message\n\nHello from Himalaya!\nEOF\n```\n\nOr with headers flag:\n\
    \n```bash\nhimalaya message write -H \"To:recipient@example.com\" -H \"Subject:Test\"\
    \ \"Message body here\"\n```\n\nNote: `himalaya message write` without piped input\
    \ opens `$EDITOR`. This works with `pty=true` + background mode, but piping is\
    \ simpler and more reliable.\n\n### Move/Copy Emails\n\nMove to folder:\n\n```bash\n\
    himalaya message move 42 \"Archive\"\n```\n\nCopy to folder:\n\n```bash\nhimalaya\
    \ message copy 42 \"Important\"\n```\n\n### Delete an Email\n\n```bash\nhimalaya\
    \ message delete 42\n```\n\n### Manage Flags\n\nAdd flag:\n\n```bash\nhimalaya\
    \ flag add 42 --flag seen\n```\n\nRemove flag:\n\n```bash\nhimalaya flag remove\
    \ 42 --flag seen\n```\n\n## Multiple Accounts\n\nList accounts:\n\n```bash\nhimalaya\
    \ account list\n```\n\nUse a specific account:\n\n```bash\nhimalaya --account\
    \ work envelope list\n```\n\n## Attachments\n\nSave attachments from a message:\n\
    \n```bash\nhimalaya attachment download 42\n```\n\nSave to specific directory:\n\
    \n```bash\nhimalaya attachment download 42 --dir ~/Downloads\n```\n\n## Output\
    \ Formats\n\nMost commands support `--output` for structured output:\n\n```bash\n\
    himalaya envelope list --output json\nhimalaya envelope list --output plain\n\
    ```\n\n## Debugging\n\nEnable debug logging:\n\n```bash\nRUST_LOG=debug himalaya\
    \ envelope list\n```\n\nFull trace with backtrace:\n\n```bash\nRUST_LOG=trace\
    \ RUST_BACKTRACE=1 himalaya envelope list\n```\n\n## Tips\n\n- Use `himalaya --help`\
    \ or `himalaya <command> --help` for detailed usage.\n- Message IDs are relative\
    \ to the current folder; re-list after folder changes.\n- For composing rich emails\
    \ with attachments, use MML syntax (see `references/message-composition.md`).\n\
    - Store passwords securely using `pass`, system keyring, or a command that outputs\
    \ the password.\n"
