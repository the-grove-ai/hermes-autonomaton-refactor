  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: linear\ndescription:\
    \ \"Linear: manage issues, projects, teams via GraphQL + curl.\"\nversion: 1.0.0\n\
    author: Hermes Agent\nlicense: MIT\nplatforms: [linux, macos, windows]\nprerequisites:\n\
    \  env_vars: [LINEAR_API_KEY]\n  commands: [curl]\nmetadata:\n  hermes:\n    tags:\
    \ [Linear, Project Management, Issues, GraphQL, API, Productivity]\n---\n\n# Linear\
    \ \u2014 Issue & Project Management\n\nManage Linear issues, projects, and teams\
    \ directly via the GraphQL API using `curl`. No MCP server, no OAuth flow, no\
    \ extra dependencies.\n\n## Setup\n\n1. Get a personal API key from **Linear Settings\
    \ > Account > Security & access > Personal API keys** (URL: https://linear.app/settings/account/security).\
    \ Note: the org-level *Settings > API* page only shows OAuth apps and workspace-member\
    \ keys, not personal keys.\n2. Set `LINEAR_API_KEY` in your environment (via `hermes\
    \ setup` or your env config)\n\n## API Basics\n\n- **Endpoint:** `https://api.linear.app/graphql`\
    \ (POST)\n- **Auth header:** `Authorization: $LINEAR_API_KEY` (no \"Bearer\" prefix\
    \ for API keys)\n- **All requests are POST** with `Content-Type: application/json`\n\
    - **Both UUIDs and short identifiers** (e.g., `ENG-123`) work for `issue(id:)`\n\
    \nBase curl pattern:\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ viewer { id name } }\"}' | python3 -m json.tool\n\
    ```\n\n## Python helper script (ergonomic alternative)\n\nFor faster one-liners\
    \ that don't need hand-written GraphQL, this skill ships a stdlib Python CLI at\
    \ `scripts/linear_api.py`. Zero dependencies. Same auth (reads `LINEAR_API_KEY`).\n\
    \n```bash\nSCRIPT=$(dirname \"$(find ~/.hermes -path '*skills/productivity/linear/scripts/linear_api.py'\
    \ 2>/dev/null | head -1)\")/linear_api.py\n\npython3 \"$SCRIPT\" whoami\npython3\
    \ \"$SCRIPT\" list-teams\npython3 \"$SCRIPT\" get-issue ENG-42\npython3 \"$SCRIPT\"\
    \ get-document 38359beef67c      # fetch a doc by slugId from the URL\npython3\
    \ \"$SCRIPT\" raw 'query { viewer { name } }'\n```\n\nAll subcommands: `whoami`,\
    \ `list-teams`, `list-projects`, `list-states`, `list-issues`, `get-issue`, `search-issues`,\
    \ `create-issue`, `update-issue`, `update-status`, `add-comment`, `list-documents`,\
    \ `get-document`, `search-documents`, `raw`. Run with `--help` for flags.\n\n\
    Use the script when: you want a quick answer without crafting GraphQL. Use curl\
    \ when: you need a query the script doesn't wrap, or you want to compose filters\
    \ inline.\n\n## Workflow States\n\nLinear uses `WorkflowState` objects with a\
    \ `type` field. **6 state types:**\n\n| Type | Description |\n|------|-------------|\n\
    | `triage` | Incoming issues needing review |\n| `backlog` | Acknowledged but\
    \ not yet planned |\n| `unstarted` | Planned/ready but not started |\n| `started`\
    \ | Actively being worked on |\n| `completed` | Done |\n| `canceled` | Won't do\
    \ |\n\nEach team has its own named states (e.g., \"In Progress\" is type `started`).\
    \ To change an issue's status, you need the `stateId` (UUID) of the target state\
    \ \u2014 query workflow states first.\n\n**Priority values:** 0 = None, 1 = Urgent,\
    \ 2 = High, 3 = Medium, 4 = Low\n\n## Common Queries\n\n### Get current user\n\
    ```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization:\
    \ $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    query\": \"{ viewer { id name email } }\"}' | python3 -m json.tool\n```\n\n###\
    \ List teams\n```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H\
    \ \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ teams { nodes { id name key } } }\"}' | python3 -m\
    \ json.tool\n```\n\n### List workflow states for a team\n```bash\ncurl -s -X POST\
    \ https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\
    \n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"{ workflowStates(filter:\
    \ { team: { key: { eq: \\\"ENG\\\" } } }) { nodes { id name type } } }\"}' | python3\
    \ -m json.tool\n```\n\n### List issues (first 20)\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ issues(first: 20) { nodes { identifier title priority\
    \ state { name type } assignee { name } team { key } url } pageInfo { hasNextPage\
    \ endCursor } } }\"}' | python3 -m json.tool\n```\n\n### List my assigned issues\n\
    ```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization:\
    \ $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    query\": \"{ viewer { assignedIssues(first: 25) { nodes { identifier title state\
    \ { name type } priority url } } } }\"}' | python3 -m json.tool\n```\n\n### Get\
    \ a single issue (by identifier like ENG-123)\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ issue(id: \\\"ENG-123\\\") { id identifier title description\
    \ priority state { id name type } assignee { id name } team { key } project {\
    \ name } labels { nodes { name } } comments { nodes { body user { name } createdAt\
    \ } } url } }\"}' | python3 -m json.tool\n```\n\n### Search issues by text\n```bash\n\
    curl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"{ issueSearch(query:\
    \ \\\"bug login\\\", first: 10) { nodes { identifier title state { name } assignee\
    \ { name } url } } }\"}' | python3 -m json.tool\n```\n\n### Filter issues by state\
    \ type\n```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization:\
    \ $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    query\": \"{ issues(filter: { state: { type: { in: [\\\"started\\\"] } } }, first:\
    \ 20) { nodes { identifier title state { name } assignee { name } } } }\"}' |\
    \ python3 -m json.tool\n```\n\n### Filter by team and assignee\n```bash\ncurl\
    \ -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"{ issues(filter:\
    \ { team: { key: { eq: \\\"ENG\\\" } }, assignee: { email: { eq: \\\"user@example.com\\\
    \" } } }, first: 20) { nodes { identifier title state { name } priority } } }\"\
    }' | python3 -m json.tool\n```\n\n### List projects\n```bash\ncurl -s -X POST\
    \ https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\
    \n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"{ projects(first:\
    \ 20) { nodes { id name description progress lead { name } teams { nodes { key\
    \ } } url } } }\"}' | python3 -m json.tool\n```\n\n### List team members\n```bash\n\
    curl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"{ users\
    \ { nodes { id name email active } } }\"}' | python3 -m json.tool\n```\n\n###\
    \ List labels\n```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H\
    \ \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ issueLabels { nodes { id name color } } }\"}' | python3\
    \ -m json.tool\n```\n\n## Common Mutations\n\n### Create an issue\n```bash\ncurl\
    \ -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"query\": \"mutation($input:\
    \ IssueCreateInput!) { issueCreate(input: $input) { success issue { id identifier\
    \ title url } } }\",\n    \"variables\": {\n      \"input\": {\n        \"teamId\"\
    : \"TEAM_UUID\",\n        \"title\": \"Fix login bug\",\n        \"description\"\
    : \"Users cannot login with SSO\",\n        \"priority\": 2\n      }\n    }\n\
    \  }' | python3 -m json.tool\n```\n\n### Update issue status\nFirst get the target\
    \ state UUID from the workflow states query above, then:\n```bash\ncurl -s -X\
    \ POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"mutation\
    \ { issueUpdate(id: \\\"ENG-123\\\", input: { stateId: \\\"STATE_UUID\\\" }) {\
    \ success issue { identifier state { name type } } } }\"}' | python3 -m json.tool\n\
    ```\n\n### Assign an issue\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"mutation { issueUpdate(id: \\\"ENG-123\\\", input: {\
    \ assigneeId: \\\"USER_UUID\\\" }) { success issue { identifier assignee { name\
    \ } } } }\"}' | python3 -m json.tool\n```\n\n### Set priority\n```bash\ncurl -s\
    \ -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"mutation\
    \ { issueUpdate(id: \\\"ENG-123\\\", input: { priority: 1 }) { success issue {\
    \ identifier priority } } }\"}' | python3 -m json.tool\n```\n\n### Add a comment\n\
    ```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization:\
    \ $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    query\": \"mutation { commentCreate(input: { issueId: \\\"ISSUE_UUID\\\", body:\
    \ \\\"Investigated. Root cause is X.\\\" }) { success comment { id body } } }\"\
    }' | python3 -m json.tool\n```\n\n### Set due date\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"mutation { issueUpdate(id: \\\"ENG-123\\\", input: {\
    \ dueDate: \\\"2026-04-01\\\" }) { success issue { identifier dueDate } } }\"\
    }' | python3 -m json.tool\n```\n\n### Add labels to an issue\n```bash\ncurl -s\
    \ -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"mutation\
    \ { issueUpdate(id: \\\"ENG-123\\\", input: { labelIds: [\\\"LABEL_UUID_1\\\"\
    , \\\"LABEL_UUID_2\\\"] }) { success issue { identifier labels { nodes { name\
    \ } } } } }\"}' | python3 -m json.tool\n```\n\n### Add issue to a project\n```bash\n\
    curl -s -X POST https://api.linear.app/graphql \\\n  -H \"Authorization: $LINEAR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\": \"mutation\
    \ { issueUpdate(id: \\\"ENG-123\\\", input: { projectId: \\\"PROJECT_UUID\\\"\
    \ }) { success issue { identifier project { name } } } }\"}' | python3 -m json.tool\n\
    ```\n\n### Create a project\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"query\": \"mutation($input: ProjectCreateInput!) { projectCreate(input:\
    \ $input) { success project { id name url } } }\",\n    \"variables\": {\n   \
    \   \"input\": {\n        \"name\": \"Q2 Auth Overhaul\",\n        \"description\"\
    : \"Replace legacy auth with OAuth2 and PKCE\",\n        \"teamIds\": [\"TEAM_UUID\"\
    ]\n      }\n    }\n  }' | python3 -m json.tool\n```\n\n## Documents\n\nLinear\
    \ **Documents** are prose docs (RFCs, specs, notes) stored alongside issues. They\
    \ have their own `documents` root query and `document(id:)` single-fetch.\n\n\
    ### Document URLs and `slugId`\n\nDocument URLs look like:\n```\nhttps://linear.app/<workspace>/document/<slug>-<hexSlugId>\n\
    ```\n\nThe trailing hex segment is the `slugId`. Example: `https://linear.app/nousresearch/document/rfc-hermes-permission-gateway-discord-38359beef67c`\
    \ \u2192 `slugId` is `38359beef67c`.\n\n**Important schema detail:** the Markdown\
    \ body is in the `content` field. The ProseMirror JSON is in `contentState` (not\
    \ `contentData` \u2014 that field does not exist and the API returns 400).\n\n\
    ### Fetch a document by slugId\n\n`document(id:)` only accepts UUIDs. To fetch\
    \ by the URL's hex slug, filter the collection:\n\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"query($s: String!) { documents(filter: { slugId: { eq:\
    \ $s } }, first: 1) { nodes { id title content contentState slugId url creator\
    \ { name } project { name } updatedAt } } }\", \"variables\": {\"s\": \"38359beef67c\"\
    }}' \\\n  | python3 -m json.tool\n```\n\nOr via the Python helper:\n```bash\n\
    python3 scripts/linear_api.py get-document 38359beef67c\n```\n\n### Fetch a document\
    \ by UUID\n\n```bash\ncurl -s -X POST https://api.linear.app/graphql \\\n  -H\
    \ \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ document(id: \\\"11700cff-b514-4db3-afcc-3ed1afacba1c\\\
    \") { title content url } }\"}' \\\n  | python3 -m json.tool\n```\n\n### List\
    \ recent documents\n\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ documents(first: 25, orderBy: updatedAt) { nodes {\
    \ id title slugId url updatedAt project { name } } } }\"}' \\\n  | python3 -m\
    \ json.tool\n```\n\n### Search documents by title\n\nLinear's schema has no `searchDocuments`\
    \ root. Use a title-substring filter instead:\n\n```bash\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ documents(filter: { title: { containsIgnoreCase: \\\
    \"RFC\\\" } }, first: 25) { nodes { title slugId url } } }\"}' \\\n  | python3\
    \ -m json.tool\n```\n\n## Pagination\n\nLinear uses Relay-style cursor pagination:\n\
    \n```bash\n# First page\ncurl -s -X POST https://api.linear.app/graphql \\\n \
    \ -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ issues(first: 20) { nodes { identifier title } pageInfo\
    \ { hasNextPage endCursor } } }\"}' | python3 -m json.tool\n\n# Next page \u2014\
    \ use endCursor from previous response\ncurl -s -X POST https://api.linear.app/graphql\
    \ \\\n  -H \"Authorization: $LINEAR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\"query\": \"{ issues(first: 20, after: \\\"CURSOR_FROM_PREVIOUS\\\
    \") { nodes { identifier title } pageInfo { hasNextPage endCursor } } }\"}' |\
    \ python3 -m json.tool\n```\n\nDefault page size: 50. Max: 250. Always use `first:\
    \ N` to limit results.\n\n## Filtering Reference\n\nComparators: `eq`, `neq`,\
    \ `in`, `nin`, `lt`, `lte`, `gt`, `gte`, `contains`, `startsWith`, `containsIgnoreCase`\n\
    \nCombine filters with `or: [...]` for OR logic (default is AND within a filter\
    \ object).\n\n## Typical Workflow\n\n1. **Query teams** to get team IDs and keys\n\
    2. **Query workflow states** for target team to get state UUIDs\n3. **List or\
    \ search issues** to find what needs work\n4. **Create issues** with team ID,\
    \ title, description, priority\n5. **Update status** by setting `stateId` to the\
    \ target workflow state\n6. **Add comments** to track progress\n7. **Mark complete**\
    \ by setting `stateId` to the team's \"completed\" type state\n\n## Rate Limits\n\
    \n- 5,000 requests/hour per API key\n- 3,000,000 complexity points/hour\n- Use\
    \ `first: N` to limit results and reduce complexity cost\n- Monitor `X-RateLimit-Requests-Remaining`\
    \ response header\n\n## Important Notes\n\n- Always use `terminal` tool with `curl`\
    \ for API calls \u2014 do NOT use `web_extract` or `browser`\n- Always check the\
    \ `errors` array in GraphQL responses \u2014 HTTP 200 can still contain errors\n\
    - If `stateId` is omitted when creating issues, Linear defaults to the first backlog\
    \ state\n- The `description` field supports Markdown\n- Use `python3 -m json.tool`\
    \ or `jq` to format JSON responses for readability\n"
