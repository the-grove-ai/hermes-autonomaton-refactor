  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: spike\ndescription:\
    \ \"Throwaway experiments to validate an idea before build.\"\nversion: 1.0.0\n\
    author: Hermes Agent (adapted from gsd-build/get-shit-done)\nlicense: MIT\nplatforms:\
    \ [linux, macos, windows]\nmetadata:\n  hermes:\n    tags: [spike, prototype,\
    \ experiment, feasibility, throwaway, exploration, research, planning, mvp, proof-of-concept]\n\
    \    related_skills: [sketch, writing-plans, subagent-driven-development, plan]\n\
    ---\n\n# Spike\n\nUse this skill when the user wants to **feel out an idea** before\
    \ committing to a real build \u2014 validating feasibility, comparing approaches,\
    \ or surfacing unknowns that no amount of research will answer. Spikes are disposable\
    \ by design. Throw them away once they've paid their debt.\n\nLoad this when the\
    \ user says things like \"let me try this\", \"I want to see if X works\", \"\
    spike this out\", \"before I commit to Y\", \"quick prototype of Z\", \"is this\
    \ even possible?\", or \"compare A vs B\".\n\n## When NOT to use this\n\n- The\
    \ answer is knowable from docs or reading code \u2014 just do research, don't\
    \ build\n- The work is production path \u2014 use `writing-plans` / `plan` instead\n\
    - The idea is already validated \u2014 jump straight to implementation\n\n## If\
    \ the user has the full GSD system installed\n\nIf `gsd-spike` shows up as a sibling\
    \ skill (installed via `npx get-shit-done-cc --hermes`), prefer **`gsd-spike`**\
    \ when the user wants the full GSD workflow: persistent `.planning/spikes/` state,\
    \ MANIFEST tracking across sessions, Given/When/Then verdict format, and commit\
    \ patterns that integrate with the rest of GSD. This skill is the lightweight\
    \ standalone version for users who don't have (or don't want) the full system.\n\
    \n## Core method\n\nRegardless of scale, every spike follows this loop:\n\n```\n\
    decompose  \u2192  research  \u2192  build  \u2192  verdict\n   \u2191__________________________________________\u2193\
    \n                  iterate on findings\n```\n\n### 1. Decompose\n\nBreak the\
    \ user's idea into **2-5 independent feasibility questions**. Each question is\
    \ one spike. Present them as a table with Given/When/Then framing:\n\n| # | Spike\
    \ | Validates (Given/When/Then) | Risk |\n|---|-------|----------------------------|------|\n\
    | 001 | websocket-streaming | Given a WS connection, when LLM streams tokens,\
    \ then client receives chunks < 100ms | High |\n| 002a | pdf-parse-pdfjs | Given\
    \ a multi-page PDF, when parsed with pdfjs, then structured text is extractable\
    \ | Medium |\n| 002b | pdf-parse-camelot | Given a multi-page PDF, when parsed\
    \ with camelot, then structured text is extractable | Medium |\n\n**Spike types:**\n\
    - **standard** \u2014 one approach answering one question\n- **comparison** \u2014\
    \ same question, different approaches (shared number, letter suffix `a`/`b`/`c`)\n\
    \n**Good spike questions:** specific feasibility with observable output.\n**Bad\
    \ spike questions:** too broad, no observable output, or just \"read the docs\
    \ about X\".\n\n**Order by risk.** The spike most likely to kill the idea runs\
    \ first. No point prototyping the easy parts if the hard part doesn't work.\n\n\
    **Skip decomposition** only if the user already knows exactly what they want to\
    \ spike and says so. Then take their idea as a single spike.\n\n### 2. Align (for\
    \ multi-spike ideas)\n\nPresent the spike table. Ask: \"Build all in this order,\
    \ or adjust?\" Let the user drop, reorder, or re-frame before you write any code.\n\
    \n### 3. Research (per spike, before building)\n\nSpikes are not research-free\
    \ \u2014 you research enough to pick the right approach, then you build. Per spike:\n\
    \n1. **Brief it.** 2-3 sentences: what this spike is, why it matters, key risk.\n\
    2. **Surface competing approaches** if there's real choice:\n\n   | Approach |\
    \ Tool/Library | Pros | Cons | Status |\n   |----------|-------------|------|------|--------|\n\
    \   | ... | ... | ... | ... | maintained / abandoned / beta |\n\n3. **Pick one.**\
    \ State why. If 2+ are credible, build quick variants within the spike.\n4. **Skip\
    \ research** for pure logic with no external dependencies.\n\nUse Hermes tools\
    \ for the research step:\n\n- `web_search(\"python websocket streaming libraries\
    \ 2025\")` \u2014 find candidates\n- `web_extract(urls=[\"https://websockets.readthedocs.io/...\"\
    ])` \u2014 read the actual docs (returns markdown)\n- `terminal(\"pip show websockets\
    \ | grep Version\")` \u2014 check what's installed in the project's venv\n\nFor\
    \ libraries without docs pages, clone and read their `README.md` / `examples/`\
    \ via `read_file`. Context7 MCP (if the user has it configured) is also a good\
    \ source \u2014 `mcp_*_resolve-library-id` then `mcp_*_query-docs`.\n\n### 4.\
    \ Build\n\nOne directory per spike. Keep it standalone.\n\n```\nspikes/\n\u251C\
    \u2500\u2500 001-websocket-streaming/\n\u2502   \u251C\u2500\u2500 README.md\n\
    \u2502   \u2514\u2500\u2500 main.py\n\u251C\u2500\u2500 002a-pdf-parse-pdfjs/\n\
    \u2502   \u251C\u2500\u2500 README.md\n\u2502   \u2514\u2500\u2500 parse.js\n\u2514\
    \u2500\u2500 002b-pdf-parse-camelot/\n    \u251C\u2500\u2500 README.md\n    \u2514\
    \u2500\u2500 parse.py\n```\n\n**Bias toward something the user can interact with.**\
    \ Spikes fail when the only output is a log line that says \"it works.\" The user\
    \ wants to *feel* the spike working. Default choices, in order of preference:\n\
    \n1. A runnable CLI that takes input and prints observable output\n2. A minimal\
    \ HTML page that demonstrates the behavior\n3. A small web server with one endpoint\n\
    4. A unit test that exercises the question with recognizable assertions\n\n**Depth\
    \ over speed.** Never declare \"it works\" after one happy-path run. Test edge\
    \ cases. Follow surprising findings. The verdict is only trustworthy when the\
    \ investigation was honest.\n\n**Avoid** unless the spike specifically requires\
    \ it: complex package management, build tools/bundlers, Docker, env files, config\
    \ systems. Hardcode everything \u2014 it's a spike.\n\n**Building one spike**\
    \ \u2014 a typical tool sequence:\n\n```\nterminal(\"mkdir -p spikes/001-websocket-streaming\"\
    )\nwrite_file(\"spikes/001-websocket-streaming/README.md\", \"# 001: websocket-streaming\\\
    n\\n...\")\nwrite_file(\"spikes/001-websocket-streaming/main.py\", \"...\")\n\
    terminal(\"cd spikes/001-websocket-streaming && python3 main.py\")\n# Observe\
    \ output, iterate.\n```\n\n**Parallel comparison spikes (002a / 002b) \u2014 delegate.**\
    \ When two approaches can run in parallel and both need real engineering (not\
    \ 10-line prototypes), fan out with `delegate_task`:\n\n```\ndelegate_task(tasks=[\n\
    \    {\"goal\": \"Build 002a-pdf-parse-pdfjs: ...\", \"toolsets\": [\"terminal\"\
    , \"file\", \"web\"]},\n    {\"goal\": \"Build 002b-pdf-parse-camelot: ...\",\
    \ \"toolsets\": [\"terminal\", \"file\", \"web\"]},\n])\n```\n\nEach subagent\
    \ returns its own verdict; you write the head-to-head.\n\n### 5. Verdict\n\nEach\
    \ spike's `README.md` closes with:\n\n```markdown\n## Verdict: VALIDATED | PARTIAL\
    \ | INVALIDATED\n\n### What worked\n- ...\n\n### What didn't\n- ...\n\n### Surprises\n\
    - ...\n\n### Recommendation for the real build\n- ...\n```\n\n**VALIDATED** =\
    \ the core question was answered yes, with evidence.\n**PARTIAL** = it works under\
    \ constraints X, Y, Z \u2014 document them.\n**INVALIDATED** = doesn't work, for\
    \ this reason. This is a successful spike.\n\n## Comparison spikes\n\nWhen two\
    \ approaches answer the same question (002a / 002b), build them **back to back**,\
    \ then do a head-to-head comparison at the end:\n\n```markdown\n## Head-to-head:\
    \ pdfjs vs camelot\n\n| Dimension | pdfjs (002a) | camelot (002b) |\n|-----------|--------------|----------------|\n\
    | Extraction quality | 9/10 structured | 7/10 table-only |\n| Setup complexity\
    \ | npm install, 1 line | pip + ghostscript |\n| Perf on 100-page PDF | 3s | 18s\
    \ |\n| Handles rotated text | no | yes |\n\n**Winner:** pdfjs for our use case.\
    \ Camelot if we need table-first extraction later.\n```\n\n## Frontier mode (picking\
    \ what to spike next)\n\nIf spikes already exist and the user says \"what should\
    \ I spike next?\", walk the existing directories and look for:\n\n- **Integration\
    \ risks** \u2014 two validated spikes that touch the same resource but were tested\
    \ independently\n- **Data handoffs** \u2014 spike A's output was assumed compatible\
    \ with spike B's input; never proven\n- **Gaps in the vision** \u2014 capabilities\
    \ assumed but unproven\n- **Alternative approaches** \u2014 different angles for\
    \ PARTIAL or INVALIDATED spikes\n\nPropose 2-4 candidates as Given/When/Then.\
    \ Let the user pick.\n\n## Output\n\n- Create `spikes/` (or `.planning/spikes/`\
    \ if the user is using GSD conventions) in the repo root\n- One dir per spike:\
    \ `NNN-descriptive-name/`\n- `README.md` per spike captures question, approach,\
    \ results, verdict\n- Keep the code throwaway \u2014 a spike that takes 2 days\
    \ to \"clean up for production\" was a bad spike\n\n## Attribution\n\nAdapted\
    \ from the GSD (Get Shit Done) project's `/gsd-spike` workflow \u2014 MIT \xA9\
    \ 2025 Lex Christopherson ([gsd-build/get-shit-done](https://github.com/gsd-build/get-shit-done)).\
    \ The full GSD system offers persistent spike state, MANIFEST tracking, and integration\
    \ with a broader spec-driven development pipeline; install with `npx get-shit-done-cc\
    \ --hermes --global`.\n"
