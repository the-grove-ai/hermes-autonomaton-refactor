  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: hermes-agent-skill-authoring\n\
    description: \"Author in-repo SKILL.md: frontmatter, validator, structure.\"\n\
    version: 1.0.0\nauthor: Hermes Agent\nlicense: MIT\nplatforms: [linux, macos,\
    \ windows]\nmetadata:\n  hermes:\n    tags: [skills, authoring, hermes-agent,\
    \ conventions, skill-md]\n    related_skills: [writing-plans, requesting-code-review]\n\
    ---\n\n# Authoring Hermes-Agent Skills (in-repo)\n\n## Overview\n\nThere are two\
    \ places a SKILL.md can live:\n\n1. **User-local:** `~/.hermes/skills/<maybe-category>/<name>/SKILL.md`\
    \ \u2014 personal, not shared. Created via `skill_manage(action='create')`.\n\
    2. **In-repo (this skill is about this case):** `/home/bb/hermes-agent/skills/<category>/<name>/SKILL.md`\
    \ \u2014 committed, shipped with the package. Use `write_file` + `git add`. `skill_manage(action='create')`\
    \ does NOT target this tree.\n\n## When to Use\n\n- User asks you to add a skill\
    \ \"in this branch / repo / commit\"\n- You're committing a reusable workflow\
    \ that should ship with hermes-agent\n- You're editing an existing skill under\
    \ `/home/bb/hermes-agent/skills/` (use `patch` for small edits, `write_file` for\
    \ rewrites; `skill_manage` still works for patch on in-repo skills, but not for\
    \ `create`)\n\n## Required Frontmatter\n\nSource of truth: `tools/skill_manager_tool.py::_validate_frontmatter`.\
    \ Hard requirements:\n\n- Starts with `---` as the first bytes (no leading blank\
    \ line).\n- Closes with `\\n---\\n` before the body.\n- Parses as a YAML mapping.\n\
    - `name` field present.\n- `description` field present, \u2264 **1024 chars**\
    \ (`MAX_DESCRIPTION_LENGTH`).\n- Non-empty body after the closing `---`.\n\nPeer-matched\
    \ shape used by every skill under `skills/software-development/`:\n\n```yaml\n\
    ---\nname: my-skill-name               # lowercase, hyphens, \u226464 chars (MAX_NAME_LENGTH)\n\
    description: Use when <trigger>. <one-line behavior>.\nversion: 1.0.0\nauthor:\
    \ Hermes Agent\nlicense: MIT\nmetadata:\n  hermes:\n    tags: [short, descriptive,\
    \ tags]\n    related_skills: [other-skill, another-skill]\n---\n```\n\n`version`\
    \ / `author` / `license` / `metadata` are NOT enforced by the validator, but every\
    \ peer has them \u2014 omit and your skill sticks out.\n\n## Size Limits\n\n-\
    \ Description: \u2264 1024 chars (enforced).\n- Full SKILL.md: \u2264 100,000\
    \ chars (enforced as `MAX_SKILL_CONTENT_CHARS`, ~36k tokens).\n- Peer skills in\
    \ `software-development/` sit at **8-14k chars**. Aim for that range. If you're\
    \ pushing past 20k, split into `references/*.md` and reference them from SKILL.md.\n\
    \n## Peer-Matched Structure\n\nEvery in-repo skill follows roughly:\n\n```\n#\
    \ <Title>\n\n## Overview\nOne or two paragraphs: what and why.\n\n## When to Use\n\
    - Bulleted triggers\n- \"Don't use for:\" counter-triggers\n\n## <Topic sections\
    \ specific to the skill>\n- Quick-reference tables are common\n- Code blocks with\
    \ exact commands\n- Hermes-specific recipes (tests via scripts/run_tests.sh, ui-tui\
    \ paths, etc.)\n\n## Common Pitfalls\nNumbered list of mistakes and their fixes.\n\
    \n## Verification Checklist\n- [ ] Checkbox list of post-action verifications\n\
    \n## One-Shot Recipes (optional)\nNamed scenarios \u2192 concrete command sequences.\n\
    ```\n\nNot every section is mandatory, but `Overview` + `When to Use` + actionable\
    \ body + pitfalls are the minimum for the skill to feel like a peer.\n\n## Directory\
    \ Placement\n\n```\nskills/<category>/<skill-name>/SKILL.md\n```\n\nCategories\
    \ currently in repo (confirm with `ls skills/`): `autonomous-ai-agents`, `creative`,\
    \ `data-science`, `devops`, `dogfood`, `email`, `gaming`, `github`, `leisure`,\
    \ `mcp`, `media`, `mlops/*`, `note-taking`, `productivity`, `red-teaming`, `research`,\
    \ `smart-home`, `social-media`, `software-development`.\n\nPick the closest existing\
    \ category. Don't invent new top-level categories casually.\n\n## Workflow\n\n\
    1. **Survey peers** in the target category:\n   ```\n   ls skills/<category>/\n\
    \   ```\n   Read 2-3 peer SKILL.md files to match tone and structure.\n2. **Check\
    \ validator constraints** in `tools/skill_manager_tool.py` if unsure.\n3. **Draft**\
    \ with `write_file` to `skills/<category>/<name>/SKILL.md`.\n4. **Validate locally**:\n\
    \   ```python\n   import yaml, re, pathlib\n   content = pathlib.Path(\"skills/<category>/<name>/SKILL.md\"\
    ).read_text()\n   assert content.startswith(\"---\")\n   m = re.search(r'\\n---\\\
    s*\\n', content[3:])\n   fm = yaml.safe_load(content[3:m.start()+3])\n   assert\
    \ \"name\" in fm and \"description\" in fm\n   assert len(fm[\"description\"])\
    \ <= 1024\n   assert len(content) <= 100_000\n   ```\n5. **Git add + commit**\
    \ on the active branch.\n6. **Note:** the CURRENT session's skill loader is cached\
    \ \u2014 `skill_view` / `skills_list` will not see the new skill until a new session.\
    \ This is expected, not a bug.\n\n## Cross-Referencing Other Skills\n\n`metadata.hermes.related_skills`\
    \ unions both trees (`skills/` in-repo and `~/.hermes/skills/`) at load time.\
    \ You CAN reference a user-local skill from an in-repo skill, but it won't resolve\
    \ for other users who clone the repo fresh. Prefer referencing only in-repo skills\
    \ from in-repo skills. If a frequently-referenced skill lives only in `~/.hermes/skills/`,\
    \ consider promoting it to the repo.\n\n## Editing Existing In-Repo Skills\n\n\
    - **Small fix (typo, added pitfall, tightened trigger):** `skill_manage(action='patch',\
    \ name=..., old_string=..., new_string=...)` works fine on in-repo skills.\n-\
    \ **Major rewrite:** `write_file` the whole SKILL.md. `skill_manage(action='edit')`\
    \ also works but requires supplying the full new content.\n- **Adding supporting\
    \ files:** `write_file` to `skills/<category>/<name>/references/<file>.md`, `templates/<file>`,\
    \ or `scripts/<file>`. `skill_manage(action='write_file')` also works and enforces\
    \ the references/templates/scripts/assets subdir allowlist.\n- **Always commit**\
    \ the edit \u2014 in-repo skills are source, not runtime state.\n\n## Common Pitfalls\n\
    \n1. **Using `skill_manage(action='create')` for an in-repo skill.** It writes\
    \ to `~/.hermes/skills/`, not the repo tree. Use `write_file` for in-repo creation.\n\
    \n2. **Leading whitespace before `---`.** The validator checks `content.startswith(\"\
    ---\")`; any leading blank line or BOM fails validation.\n\n3. **Description too\
    \ generic.** Peer descriptions start with \"Use when ...\" and describe the *trigger\
    \ class*, not the one task. \"Use when debugging X\" > \"Debug X\".\n\n4. **Forgetting\
    \ the author/license/metadata block.** Not validator-enforced, but every peer\
    \ has it; omitting makes the skill look half-finished.\n\n5. **Writing a skill\
    \ that duplicates a peer.** Before creating, `ls skills/<category>/` and open\
    \ 2-3 peers. Prefer extending an existing skill to creating a narrow sibling.\n\
    \n6. **Expecting the current session to see the new skill.** It won't. The skill\
    \ loader is initialized at session start. Verify in a fresh session or via `skill_view`\
    \ using the exact path.\n\n7. **Linking to skills that don't exist in-repo.**\
    \ `related_skills: [some-user-local-skill]` works for you but breaks for other\
    \ clones. Prefer only in-repo links.\n\n## Verification Checklist\n\n- [ ] File\
    \ is at `skills/<category>/<name>/SKILL.md` (not in `~/.hermes/skills/`)\n- [\
    \ ] Frontmatter starts at byte 0 with `---`, closes with `\\n---\\n`\n- [ ] `name`,\
    \ `description`, `version`, `author`, `license`, `metadata.hermes.{tags, related_skills}`\
    \ all present\n- [ ] Name \u2264 64 chars, lowercase + hyphens\n- [ ] Description\
    \ \u2264 1024 chars and starts with \"Use when ...\"\n- [ ] Total file \u2264\
    \ 100,000 chars (aim for 8-15k)\n- [ ] Structure: `# Title` \u2192 `## Overview`\
    \ \u2192 `## When to Use` \u2192 body \u2192 `## Common Pitfalls` \u2192 `## Verification\
    \ Checklist`\n- [ ] `related_skills` references resolve in-repo (or are explicitly\
    \ OK to be user-local)\n- [ ] `git add skills/<category>/<name>/ && git commit`\
    \ completed on the intended branch\n"
