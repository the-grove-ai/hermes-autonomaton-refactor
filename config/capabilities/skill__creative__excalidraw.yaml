  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: excalidraw\ndescription:\
    \ \"Hand-drawn Excalidraw JSON diagrams (arch, flow, seq).\"\nversion: 1.0.0\n\
    author: Hermes Agent\nlicense: MIT\ndependencies: []\nplatforms: [linux, macos,\
    \ windows]\nmetadata:\n  hermes:\n    tags: [Excalidraw, Diagrams, Flowcharts,\
    \ Architecture, Visualization, JSON]\n    related_skills: []\n\n---\n\n# Excalidraw\
    \ Diagram Skill\n\nCreate diagrams by writing standard Excalidraw element JSON\
    \ and saving as `.excalidraw` files. These files can be drag-and-dropped onto\
    \ [excalidraw.com](https://excalidraw.com) for viewing and editing. No accounts,\
    \ no API keys, no rendering libraries -- just JSON.\n\n## When to use\n\nGenerate\
    \ `.excalidraw` files for architecture diagrams, flowcharts, sequence diagrams,\
    \ concept maps, and more. Files can be opened at excalidraw.com or uploaded for\
    \ shareable links.\n\n## Workflow\n\n1. **Load this skill** (you already did)\n\
    2. **Write the elements JSON** -- an array of Excalidraw element objects\n3. **Save\
    \ the file** using `write_file` to create a `.excalidraw` file\n4. **Optionally\
    \ upload** for a shareable link using `scripts/upload.py` via `terminal`\n\n###\
    \ Saving a Diagram\n\nWrap your elements array in the standard `.excalidraw` envelope\
    \ and save with `write_file`:\n\n```json\n{\n  \"type\": \"excalidraw\",\n  \"\
    version\": 2,\n  \"source\": \"hermes-agent\",\n  \"elements\": [ ...your elements\
    \ array here... ],\n  \"appState\": {\n    \"viewBackgroundColor\": \"#ffffff\"\
    \n  }\n}\n```\n\nSave to any path, e.g. `~/diagrams/my_diagram.excalidraw`.\n\n\
    ### Uploading for a Shareable Link\n\nRun the upload script (located in this skill's\
    \ `scripts/` directory) via terminal:\n\n```bash\npython skills/diagramming/excalidraw/scripts/upload.py\
    \ ~/diagrams/my_diagram.excalidraw\n```\n\nThis uploads to excalidraw.com (no\
    \ account needed) and prints a shareable URL. Requires the `cryptography` pip\
    \ package (`pip install cryptography`).\n\n---\n\n## Element Format Reference\n\
    \n### Required Fields (all elements)\n`type`, `id` (unique string), `x`, `y`,\
    \ `width`, `height`\n\n### Defaults (skip these -- they're applied automatically)\n\
    - `strokeColor`: `\"#1e1e1e\"`\n- `backgroundColor`: `\"transparent\"`\n- `fillStyle`:\
    \ `\"solid\"`\n- `strokeWidth`: `2`\n- `roughness`: `1` (hand-drawn look)\n- `opacity`:\
    \ `100`\n\nCanvas background is white.\n\n### Element Types\n\n**Rectangle**:\n\
    ```json\n{ \"type\": \"rectangle\", \"id\": \"r1\", \"x\": 100, \"y\": 100, \"\
    width\": 200, \"height\": 100 }\n```\n- `roundness: { \"type\": 3 }` for rounded\
    \ corners\n- `backgroundColor: \"#a5d8ff\"`, `fillStyle: \"solid\"` for filled\n\
    \n**Ellipse**:\n```json\n{ \"type\": \"ellipse\", \"id\": \"e1\", \"x\": 100,\
    \ \"y\": 100, \"width\": 150, \"height\": 150 }\n```\n\n**Diamond**:\n```json\n\
    { \"type\": \"diamond\", \"id\": \"d1\", \"x\": 100, \"y\": 100, \"width\": 150,\
    \ \"height\": 150 }\n```\n\n**Labeled shape (container binding)** -- create a\
    \ text element bound to the shape:\n\n> **WARNING:** Do NOT use `\"label\": {\
    \ \"text\": \"...\" }` on shapes. This is NOT a valid\n> Excalidraw property and\
    \ will be silently ignored, producing blank shapes. You MUST\n> use the container\
    \ binding approach below.\n\nThe shape needs `boundElements` listing the text,\
    \ and the text needs `containerId` pointing back:\n```json\n{ \"type\": \"rectangle\"\
    , \"id\": \"r1\", \"x\": 100, \"y\": 100, \"width\": 200, \"height\": 80,\n  \"\
    roundness\": { \"type\": 3 }, \"backgroundColor\": \"#a5d8ff\", \"fillStyle\"\
    : \"solid\",\n  \"boundElements\": [{ \"id\": \"t_r1\", \"type\": \"text\" }]\
    \ },\n{ \"type\": \"text\", \"id\": \"t_r1\", \"x\": 105, \"y\": 110, \"width\"\
    : 190, \"height\": 25,\n  \"text\": \"Hello\", \"fontSize\": 20, \"fontFamily\"\
    : 1, \"strokeColor\": \"#1e1e1e\",\n  \"textAlign\": \"center\", \"verticalAlign\"\
    : \"middle\",\n  \"containerId\": \"r1\", \"originalText\": \"Hello\", \"autoResize\"\
    : true }\n```\n- Works on rectangle, ellipse, diamond\n- Text is auto-centered\
    \ by Excalidraw when `containerId` is set\n- The text `x`/`y`/`width`/`height`\
    \ are approximate -- Excalidraw recalculates them on load\n- `originalText` should\
    \ match `text`\n- Always include `fontFamily: 1` (Virgil/hand-drawn font)\n\n\
    **Labeled arrow** -- same container binding approach:\n```json\n{ \"type\": \"\
    arrow\", \"id\": \"a1\", \"x\": 300, \"y\": 150, \"width\": 200, \"height\": 0,\n\
    \  \"points\": [[0,0],[200,0]], \"endArrowhead\": \"arrow\",\n  \"boundElements\"\
    : [{ \"id\": \"t_a1\", \"type\": \"text\" }] },\n{ \"type\": \"text\", \"id\"\
    : \"t_a1\", \"x\": 370, \"y\": 130, \"width\": 60, \"height\": 20,\n  \"text\"\
    : \"connects\", \"fontSize\": 16, \"fontFamily\": 1, \"strokeColor\": \"#1e1e1e\"\
    ,\n  \"textAlign\": \"center\", \"verticalAlign\": \"middle\",\n  \"containerId\"\
    : \"a1\", \"originalText\": \"connects\", \"autoResize\": true }\n```\n\n**Standalone\
    \ text** (titles and annotations only -- no container):\n```json\n{ \"type\":\
    \ \"text\", \"id\": \"t1\", \"x\": 150, \"y\": 138, \"text\": \"Hello\", \"fontSize\"\
    : 20,\n  \"fontFamily\": 1, \"strokeColor\": \"#1e1e1e\", \"originalText\": \"\
    Hello\", \"autoResize\": true }\n```\n- `x` is the LEFT edge. To center at position\
    \ `cx`: `x = cx - (text.length * fontSize * 0.5) / 2`\n- Do NOT rely on `textAlign`\
    \ or `width` for positioning\n\n**Arrow**:\n```json\n{ \"type\": \"arrow\", \"\
    id\": \"a1\", \"x\": 300, \"y\": 150, \"width\": 200, \"height\": 0,\n  \"points\"\
    : [[0,0],[200,0]], \"endArrowhead\": \"arrow\" }\n```\n- `points`: `[dx, dy]`\
    \ offsets from element `x`, `y`\n- `endArrowhead`: `null` | `\"arrow\"` | `\"\
    bar\"` | `\"dot\"` | `\"triangle\"`\n- `strokeStyle`: `\"solid\"` (default) |\
    \ `\"dashed\"` | `\"dotted\"`\n\n### Arrow Bindings (connect arrows to shapes)\n\
    \n```json\n{\n  \"type\": \"arrow\", \"id\": \"a1\", \"x\": 300, \"y\": 150, \"\
    width\": 150, \"height\": 0,\n  \"points\": [[0,0],[150,0]], \"endArrowhead\"\
    : \"arrow\",\n  \"startBinding\": { \"elementId\": \"r1\", \"fixedPoint\": [1,\
    \ 0.5] },\n  \"endBinding\": { \"elementId\": \"r2\", \"fixedPoint\": [0, 0.5]\
    \ }\n}\n```\n\n`fixedPoint` coordinates: `top=[0.5,0]`, `bottom=[0.5,1]`, `left=[0,0.5]`,\
    \ `right=[1,0.5]`\n\n### Drawing Order (z-order)\n- Array order = z-order (first\
    \ = back, last = front)\n- Emit progressively: background zones \u2192 shape \u2192\
    \ its bound text \u2192 its arrows \u2192 next shape\n- BAD: all rectangles, then\
    \ all texts, then all arrows\n- GOOD: bg_zone \u2192 shape1 \u2192 text_for_shape1\
    \ \u2192 arrow1 \u2192 arrow_label_text \u2192 shape2 \u2192 text_for_shape2 \u2192\
    \ ...\n- Always place the bound text element immediately after its container shape\n\
    \n### Sizing Guidelines\n\n**Font sizes:**\n- Minimum `fontSize`: **16** for body\
    \ text, labels, descriptions\n- Minimum `fontSize`: **20** for titles and headings\n\
    - Minimum `fontSize`: **14** for secondary annotations only (sparingly)\n- NEVER\
    \ use `fontSize` below 14\n\n**Element sizes:**\n- Minimum shape size: 120x60\
    \ for labeled rectangles/ellipses\n- Leave 20-30px gaps between elements minimum\n\
    - Prefer fewer, larger elements over many tiny ones\n\n### Color Palette\n\nSee\
    \ `references/colors.md` for full color tables. Quick reference:\n\n| Use | Fill\
    \ Color | Hex |\n|-----|-----------|-----|\n| Primary / Input | Light Blue | `#a5d8ff`\
    \ |\n| Success / Output | Light Green | `#b2f2bb` |\n| Warning / External | Light\
    \ Orange | `#ffd8a8` |\n| Processing / Special | Light Purple | `#d0bfff` |\n\
    | Error / Critical | Light Red | `#ffc9c9` |\n| Notes / Decisions | Light Yellow\
    \ | `#fff3bf` |\n| Storage / Data | Light Teal | `#c3fae8` |\n\n### Tips\n- Use\
    \ the color palette consistently across the diagram\n- **Text contrast is CRITICAL**\
    \ -- never use light gray on white backgrounds. Minimum text color on white: `#757575`\n\
    - Do NOT use emoji in text -- they don't render in Excalidraw's font\n- For dark\
    \ mode diagrams, see `references/dark-mode.md`\n- For larger examples, see `references/examples.md`\n\
    \n\n"
