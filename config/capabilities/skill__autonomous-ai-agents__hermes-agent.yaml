    /insights [days]     Usage analytics\n/gquota              Show Google Gemini\
    \ Code Assist quota usage (CLI)\n/status              Session info (gateway)\n\
    /profile             Active profile info\n/debug               Upload debug report\
    \ (system info + logs) and get shareable links\n```\n\n### Exit\n```\n/quit (/exit,\
    \ /q)    Exit CLI\n```\n\n---\n\n## Key Paths & Config\n\n```\n~/.hermes/config.yaml\
    \       Main configuration\n~/.hermes/.env              API keys and secrets\n\
    $HERMES_HOME/skills/        Installed skills\n~/.hermes/sessions/         Session\
    \ transcripts\n~/.hermes/logs/             Gateway and error logs\n~/.hermes/auth.json\
    \         OAuth tokens and credential pools\n~/.hermes/hermes-agent/     Source\
    \ code (if git-installed)\n```\n\nProfiles use `~/.hermes/profiles/<name>/` with\
    \ the same layout.\n\n### Config Sections\n\nEdit with `hermes config edit` or\
    \ `hermes config set section.key value`.\n\n| Section | Key options |\n|---------|-------------|\n\
    | `model` | `default`, `provider`, `base_url`, `api_key`, `context_length` |\n\
