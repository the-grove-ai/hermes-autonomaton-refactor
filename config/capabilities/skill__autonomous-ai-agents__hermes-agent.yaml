    \ |\n| Nous Portal | OAuth | `hermes auth` |\n| OpenAI Codex | OAuth | `hermes\
    \ auth` |\n| GitHub Copilot | Token | `COPILOT_GITHUB_TOKEN` |\n| Google Gemini\
    \ | API key | `GOOGLE_API_KEY` or `GEMINI_API_KEY` |\n| DeepSeek | API key | `DEEPSEEK_API_KEY`\
    \ |\n| xAI / Grok | API key | `XAI_API_KEY` |\n| Hugging Face | Token | `HF_TOKEN`\
    \ |\n| Z.AI / GLM | API key | `GLM_API_KEY` |\n| MiniMax | API key | `MINIMAX_API_KEY`\
    \ |\n| MiniMax CN | API key | `MINIMAX_CN_API_KEY` |\n| Kimi / Moonshot | API\
    \ key | `KIMI_API_KEY` |\n| Alibaba / DashScope | API key | `DASHSCOPE_API_KEY`\
    \ |\n| Xiaomi MiMo | API key | `XIAOMI_API_KEY` |\n| Kilo Code | API key | `KILOCODE_API_KEY`\
    \ |\n| AI Gateway (Vercel) | API key | `AI_GATEWAY_API_KEY` |\n| OpenCode Zen\
    \ | API key | `OPENCODE_ZEN_API_KEY` |\n| OpenCode Go | API key | `OPENCODE_GO_API_KEY`\
    \ |\n| Qwen OAuth | OAuth | `hermes login --provider qwen-oauth` |\n| Custom endpoint\
    \ | Config | `model.base_url` + `model.api_key` in config.yaml |\n| GitHub Copilot\
    \ ACP | External | `COPILOT_CLI_PATH` or Copilot CLI |\n\nFull provider docs:\
    \ https://hermes-agent.nousresearch.com/docs/integrations/providers\n\n### Toolsets\n\
    \nEnable/disable via `hermes tools` (interactive) or `hermes tools enable/disable\
    \ NAME`.\n\n| Toolset | What it provides |\n|---------|-----------------|\n| `web`\
    \ | Web search and content extraction |\n| `search` | Web search only (subset\
    \ of `web`) |\n| `browser` | Browser automation (Browserbase, Camofox, or local\
    \ Chromium) |\n| `terminal` | Shell commands and process management |\n| `file`\
    \ | File read/write/search/patch |\n| `code_execution` | Sandboxed Python execution\
    \ |\n| `vision` | Image analysis |\n| `image_gen` | AI image generation |\n| `video`\
    \ | Video analysis and generation |\n| `tts` | Text-to-speech |\n| `skills` |\
    \ Skill browsing and management |\n| `memory` | Persistent cross-session memory\
    \ |\n| `session_search` | Search past conversations |\n| `delegation` | Subagent\
    \ task delegation |\n| `cronjob` | Scheduled task management |\n| `clarify` |\
    \ Ask user clarifying questions |\n| `messaging` | Cross-platform message sending\
    \ |\n| `todo` | In-session task planning and tracking |\n| `kanban` | Multi-agent\
    \ work-queue tools (gated to workers) |\n| `debugging` | Extra introspection/debug\
    \ tools (off by default) |\n| `safe` | Minimal, low-risk toolset for locked-down\
    \ sessions |\n| `spotify` | Spotify playback and playlist control |\n| `homeassistant`\
    \ | Smart home control (off by default) |\n| `discord` | Discord integration tools\
    \ |\n| `discord_admin` | Discord admin/moderation tools |\n| `feishu_doc` | Feishu\
    \ (Lark) document tools |\n| `feishu_drive` | Feishu (Lark) drive tools |\n| `yuanbao`\
    \ | Yuanbao integration tools |\n| `rl` | Reinforcement learning tools (off by\
    \ default) |\n| `moa` | Mixture of Agents (off by default) |\n\nFull enumeration\
    \ lives in `toolsets.py` as the `TOOLSETS` dict; `_HERMES_CORE_TOOLS` is the default\
    \ bundle most platforms inherit from.\n\nTool changes take effect on `/reset`\
    \ (new session). They do NOT apply mid-conversation to preserve prompt caching.\n\
    \n---\n\n## Security & Privacy Toggles\n\nCommon \"why is Hermes doing X to my\
    \ output / tool calls / commands?\" toggles \u2014 and the exact commands to change\
    \ them. Most of these need a fresh session (`/reset` in chat, or start a new `hermes`\
    \ invocation) because they're read once at startup.\n\n### Secret redaction in\
    \ tool output\n\nSecret redaction is **off by default** \u2014 tool output (terminal\
    \ stdout, `read_file`, web content, subagent summaries, etc.) passes through unmodified.\
    \ If the user wants Hermes to auto-mask strings that look like API keys, tokens,\
    \ and secrets before they enter the conversation context and logs:\n\n```bash\n\
    hermes config set security.redact_secrets true       # enable globally\n```\n\n\
    **Restart required.** `security.redact_secrets` is snapshotted at import time\
    \ \u2014 toggling it mid-session (e.g. via `export HERMES_REDACT_SECRETS=true`\
    \ from a tool call) will NOT take effect for the running process. Tell the user\
    \ to run `hermes config set security.redact_secrets true` in a terminal, then\
    \ start a new session. This is deliberate \u2014 it prevents an LLM from flipping\
    \ the toggle on itself mid-task.\n\nDisable again with:\n```bash\nhermes config\
    \ set security.redact_secrets false\n```\n\n### PII redaction in gateway messages\n\
    \nSeparate from secret redaction. When enabled, the gateway hashes user IDs and\
    \ strips phone numbers from the session context before it reaches the model:\n\
    \n```bash\nhermes config set privacy.redact_pii true    # enable\nhermes config\
    \ set privacy.redact_pii false   # disable (default)\n```\n\n### Command approval\
    \ prompts\n\nBy default (`approvals.mode: manual`), Hermes prompts the user before\
    \ running shell commands flagged as destructive (`rm -rf`, `git reset --hard`,\
    \ etc.). The modes are:\n\n- `manual` \u2014 always prompt (default)\n- `smart`\
    \ \u2014 use an auxiliary LLM to auto-approve low-risk commands, prompt on high-risk\n\
    - `off` \u2014 skip all approval prompts (equivalent to `--yolo`)\n\n```bash\n\
    hermes config set approvals.mode smart       # recommended middle ground\nhermes\
    \ config set approvals.mode off         # bypass everything (not recommended)\n\
    ```\n\nPer-invocation bypass without changing config:\n- `hermes --yolo \u2026\
    `\n- `export HERMES_YOLO_MODE=1`\n\nNote: YOLO / `approvals.mode: off` does NOT\
    \ turn off secret redaction. They are independent.\n\n### Shell hooks allowlist\n\
    \nSome shell-hook integrations require explicit allowlisting before they fire.\
    \ Managed via `~/.hermes/shell-hooks-allowlist.json` \u2014 prompted interactively\
    \ the first time a hook wants to run.\n\n### Disabling the web/browser/image-gen\
    \ tools\n\nTo keep the model away from network or media tools entirely, open `hermes\
    \ tools` and toggle per-platform. Takes effect on next session (`/reset`). See\
    \ the Tools & Skills section above.\n\n---\n\n## Voice & Transcription\n\n###\
    \ STT (Voice \u2192 Text)\n\nVoice messages from messaging platforms are auto-transcribed.\n\
    \nProvider priority (auto-detected):\n1. **Local faster-whisper** \u2014 free,\
    \ no API key: `pip install faster-whisper`\n2. **Groq Whisper** \u2014 free tier:\
    \ set `GROQ_API_KEY`\n3. **OpenAI Whisper** \u2014 paid: set `VOICE_TOOLS_OPENAI_KEY`\n\
    4. **Mistral Voxtral** \u2014 set `MISTRAL_API_KEY`\n\nConfig:\n```yaml\nstt:\n\
    \  enabled: true\n  provider: local        # local, groq, openai, mistral\n  local:\n\
    \    model: base          # tiny, base, small, medium, large-v3\n```\n\n### TTS\
    \ (Text \u2192 Voice)\n\n| Provider | Env var | Free? |\n|----------|---------|-------|\n\
    | Edge TTS | None | Yes (default) |\n| ElevenLabs | `ELEVENLABS_API_KEY` | Free\
    \ tier |\n| OpenAI | `VOICE_TOOLS_OPENAI_KEY` | Paid |\n| MiniMax | `MINIMAX_API_KEY`\
    \ | Paid |\n| Mistral (Voxtral) | `MISTRAL_API_KEY` | Paid |\n| NeuTTS (local)\
    \ | None (`pip install neutts[all]` + `espeak-ng`) | Free |\n\nVoice commands:\
    \ `/voice on` (voice-to-voice), `/voice tts` (always voice), `/voice off`.\n\n\
    ---\n\n## Spawning Additional Hermes Instances\n\nRun additional Hermes processes\
    \ as fully independent subprocesses \u2014 separate sessions, tools, and environments.\n\
    \n### When to Use This vs delegate_task\n\n| | `delegate_task` | Spawning `hermes`\
    \ process |\n|-|-----------------|--------------------------|\n| Isolation | Separate\
    \ conversation, shared process | Fully independent process |\n| Duration | Minutes\
    \ (bounded by parent loop) | Hours/days |\n| Tool access | Subset of parent's\
    \ tools | Full tool access |\n| Interactive | No | Yes (PTY mode) |\n| Use case\
    \ | Quick parallel subtasks | Long autonomous missions |\n\n### One-Shot Mode\n\
    \n```\nterminal(command=\"hermes chat -q 'Research GRPO papers and write summary\
    \ to ~/research/grpo.md'\", timeout=300)\n\n# Background for long tasks:\nterminal(command=\"\
    hermes chat -q 'Set up CI/CD for ~/myapp'\", background=true)\n```\n\n### Interactive\
    \ PTY Mode (via tmux)\n\nHermes uses prompt_toolkit, which requires a real terminal.\
    \ Use tmux for interactive spawning:\n\n```\n# Start\nterminal(command=\"tmux\
    \ new-session -d -s agent1 -x 120 -y 40 'hermes'\", timeout=10)\n\n# Wait for\
    \ startup, then send a message\nterminal(command=\"sleep 8 && tmux send-keys -t\
    \ agent1 'Build a FastAPI auth service' Enter\", timeout=15)\n\n# Read output\n\
    terminal(command=\"sleep 20 && tmux capture-pane -t agent1 -p\", timeout=5)\n\n\
    # Send follow-up\nterminal(command=\"tmux send-keys -t agent1 'Add rate limiting\
    \ middleware' Enter\", timeout=5)\n\n# Exit\nterminal(command=\"tmux send-keys\
    \ -t agent1 '/exit' Enter && sleep 2 && tmux kill-session -t agent1\", timeout=10)\n\
    ```\n\n### Multi-Agent Coordination\n\n```\n# Agent A: backend\nterminal(command=\"\
    tmux new-session -d -s backend -x 120 -y 40 'hermes -w'\", timeout=10)\nterminal(command=\"\
    sleep 8 && tmux send-keys -t backend 'Build REST API for user management' Enter\"\
    , timeout=15)\n\n# Agent B: frontend\nterminal(command=\"tmux new-session -d -s\
    \ frontend -x 120 -y 40 'hermes -w'\", timeout=10)\nterminal(command=\"sleep 8\
    \ && tmux send-keys -t frontend 'Build React dashboard for user management' Enter\"\
    , timeout=15)\n\n# Check progress, relay context between them\nterminal(command=\"\
    tmux capture-pane -t backend -p | tail -30\", timeout=5)\nterminal(command=\"\
    tmux send-keys -t frontend 'Here is the API schema from the backend agent: ...'\
    \ Enter\", timeout=5)\n```\n\n### Session Resume\n\n```\n# Resume most recent\
    \ session\nterminal(command=\"tmux new-session -d -s resumed 'hermes --continue'\"\
    , timeout=10)\n\n# Resume specific session\nterminal(command=\"tmux new-session\
    \ -d -s resumed 'hermes --resume 20260225_143052_a1b2c3'\", timeout=10)\n```\n\
    \n### Tips\n\n- **Prefer `delegate_task` for quick subtasks** \u2014 less overhead\
    \ than spawning a full process\n- **Use `-w` (worktree mode)** when spawning agents\
    \ that edit code \u2014 prevents git conflicts\n- **Set timeouts** for one-shot\
    \ mode \u2014 complex tasks can take 5-10 minutes\n- **Use `hermes chat -q` for\
    \ fire-and-forget** \u2014 no PTY needed\n- **Use tmux for interactive sessions**\
    \ \u2014 raw PTY mode has `\\r` vs `\\n` issues with prompt_toolkit\n- **For scheduled\
    \ tasks**, use the `cronjob` tool instead of spawning \u2014 handles delivery\
    \ and retry\n\n---\n\n## Durable & Background Systems\n\nFour systems run alongside\
    \ the main conversation loop. Quick reference\nhere; full developer notes live\
    \ in `AGENTS.md`, user-facing docs under\n`website/docs/user-guide/features/`.\n\
    \n### Delegation (`delegate_task`)\n\nSynchronous subagent spawn \u2014 the parent\
    \ waits for the child's summary\nbefore continuing its own loop. Isolated context\
    \ + terminal session.\n\n- **Single:** `delegate_task(goal, context, toolsets)`.\n\
    - **Batch:** `delegate_task(tasks=[{goal, ...}, ...])` runs children in\n  parallel,\
    \ capped by `delegation.max_concurrent_children` (default 3).\n- **Roles:** `leaf`\
    \ (default; cannot re-delegate) vs `orchestrator`\n  (can spawn its own workers,\
    \ bounded by `delegation.max_spawn_depth`).\n- **Not durable.** If the parent\
    \ is interrupted, the child is\n  cancelled. For work that must outlive the turn,\
    \ use `cronjob` or\n  `terminal(background=True, notify_on_complete=True)`.\n\n\
    Config: `delegation.*` in `config.yaml`.\n\n### Cron (scheduled jobs)\n\nDurable\
    \ scheduler \u2014 `cron/jobs.py` + `cron/scheduler.py`. Drive it via\nthe `cronjob`\
    \ tool, the `hermes cron` CLI (`list`, `add`, `edit`,\n`pause`, `resume`, `run`,\
    \ `remove`), or the `/cron` slash command.\n\n- **Schedules:** duration (`\"30m\"\
    `, `\"2h\"`), \"every\" phrase\n  (`\"every monday 9am\"`), 5-field cron (`\"\
    0 9 * * *\"`), or ISO timestamp.\n- **Per-job knobs:** `skills`, `model`/`provider`\
    \ override, `script`\n  (pre-run data collection; `no_agent=True` makes the script\
    \ the whole\n  job), `context_from` (chain job A's output into job B), `workdir`\n\
    \  (run in a specific dir with its `AGENTS.md` / `CLAUDE.md` loaded),\n  multi-platform\
    \ delivery.\n- **Invariants:** 3-minute hard interrupt per run, `.tick.lock` file\n\
    \  prevents duplicate ticks across processes, cron sessions pass\n  `skip_memory=True`\
    \ by default, and cron deliveries are framed with a\n  header/footer instead of\
    \ being mirrored into the target gateway\n  session (keeps role alternation intact).\n\
    \nUser docs: https://hermes-agent.nousresearch.com/docs/user-guide/features/cron\n\
    \n### Curator (skill lifecycle)\n\nBackground maintenance for agent-created skills.\
    \ Tracks usage, marks\nidle skills stale, archives stale ones, keeps a pre-run\
    \ tar.gz backup\nso nothing is lost.\n\n- **CLI:** `hermes curator <verb>` \u2014\
    \ `status`, `run`, `pause`, `resume`,\n  `pin`, `unpin`, `archive`, `restore`,\
    \ `prune`, `backup`, `rollback`.\n- **Slash:** `/curator <subcommand>` mirrors\
    \ the CLI.\n- **Scope:** only touches skills with `created_by: \"agent\"` provenance.\n\
    \  Bundled + hub-installed skills are off-limits. **Never deletes** \u2014\n \
    \ max destructive action is archive. Pinned skills are exempt from\n  every auto-transition\
    \ and every LLM review pass.\n- **Telemetry:** sidecar at `~/.hermes/skills/.usage.json`\
    \ holds\n  per-skill `use_count`, `view_count`, `patch_count`,\n  `last_activity_at`,\
    \ `state`, `pinned`.\n\nConfig: `curator.*` (`enabled`, `interval_hours`, `min_idle_hours`,\n\
    `stale_after_days`, `archive_after_days`, `backup.*`).\nUser docs: https://hermes-agent.nousresearch.com/docs/user-guide/features/curator\n\
    \n### Kanban (multi-agent work queue)\n\nDurable SQLite board for multi-profile\
    \ / multi-worker collaboration.\nUsers drive it via `hermes kanban <verb>`; dispatcher-spawned\
    \ workers\nsee a focused `kanban_*` toolset gated by `HERMES_KANBAN_TASK` so the\n\
    schema footprint is zero outside worker processes.\n\n- **CLI verbs (common):**\
    \ `init`, `create`, `list` (alias `ls`),\n  `show`, `assign`, `link`, `unlink`,\
    \ `comment`, `complete`, `block`,\n  `unblock`, `archive`, `tail`. Less common:\
    \ `watch`, `stats`, `runs`,\n  `log`, `dispatch`, `daemon`, `gc`.\n- **Worker\
    \ toolset:** `kanban_show`, `kanban_complete`, `kanban_block`,\n  `kanban_heartbeat`,\
    \ `kanban_comment`, `kanban_create`, `kanban_link`.\n- **Dispatcher** runs inside\
    \ the gateway by default\n  (`kanban.dispatch_in_gateway: true`) \u2014 reclaims\
    \ stale claims,\n  promotes ready tasks, atomically claims, spawns assigned profiles.\n\
    \  Auto-blocks a task after ~5 consecutive spawn failures.\n- **Isolation:** board\
    \ is the hard boundary (workers get\n  `HERMES_KANBAN_BOARD` pinned in env); tenant\
    \ is a soft namespace\n  within a board for workspace-path + memory-key isolation.\n\
    \nUser docs: https://hermes-agent.nousresearch.com/docs/user-guide/features/kanban\n\
    \n---\n\n## Windows-Specific Quirks\n\nHermes runs natively on Windows (PowerShell,\
    \ cmd, Windows Terminal, git-bash\nmintty, VS Code integrated terminal). Most\
    \ of it just works, but a handful\nof differences between Win32 and POSIX have\
    \ bitten us \u2014 document new ones\nhere as you hit them so the next person\
    \ (or the next session) doesn't\nrediscover them from scratch.\n\n### Input /\
    \ Keybindings\n\n**Alt+Enter doesn't insert a newline.** Windows Terminal intercepts\
    \ Alt+Enter\nat the terminal layer to toggle fullscreen \u2014 the keystroke never\
    \ reaches\nprompt_toolkit. Use **Ctrl+Enter** instead. Windows Terminal delivers\n\
    Ctrl+Enter as LF (`c-j`), distinct from plain Enter (`c-m` / CR), and the\nCLI\
    \ binds `c-j` to newline insertion on `win32` only (see\n`_bind_prompt_submit_keys`\
    \ + the Windows-only `c-j` binding in `cli.py`).\nSide effect: the raw Ctrl+J\
    \ keystroke also inserts a newline on Windows \u2014\nunavoidable, because Windows\
    \ Terminal collapses Ctrl+Enter and Ctrl+J to\nthe same keycode at the Win32 console\
    \ API layer. No conflicting binding\nexisted for Ctrl+J on Windows, so this is\
    \ a harmless side effect.\n\nmintty / git-bash behaves the same (fullscreen on\
    \ Alt+Enter) unless you\ndisable Alt+Fn shortcuts in Options \u2192 Keys. Easier\
    \ to just use Ctrl+Enter.\n\n**Diagnosing keybindings.** Run `python scripts/keystroke_diagnostic.py`\n\
    (repo root) to see exactly how prompt_toolkit identifies each keystroke\nin the\
    \ current terminal. Answers questions like \"does Shift+Enter come\nthrough as\
    \ a distinct key?\" (almost never \u2014 most terminals collapse it\nto plain\
    \ Enter) or \"what byte sequence is my terminal sending for\nCtrl+Enter?\" This\
    \ is how the Ctrl+Enter = c-j fact was established.\n\n### Config / Files\n\n\
    **HTTP 400 \"No models provided\" on first run.** `config.yaml` was saved\nwith\
    \ a UTF-8 BOM (common when Windows apps write it). Re-save as UTF-8\nwithout BOM.\
    \ `hermes config edit` writes without BOM; manual edits in\nNotepad are the usual\
    \ culprit.\n\n### `execute_code` / Sandbox\n\n**WinError 10106** (\"The requested\
    \ service provider could not be loaded\nor initialized\") from the sandbox child\
    \ process \u2014 it can't create an\n`AF_INET` socket, so the loopback-TCP RPC\
    \ fallback fails before\n`connect()`. Root cause is usually **not** a broken Winsock\
    \ LSP; it's\nHermes's own env scrubber dropping `SYSTEMROOT` / `WINDIR` / `COMSPEC`\n\
    from the child env. Python's `socket` module needs `SYSTEMROOT` to locate\n`mswsock.dll`.\
    \ Fixed via the `_WINDOWS_ESSENTIAL_ENV_VARS` allowlist in\n`tools/code_execution_tool.py`.\
    \ If you still hit it, echo `os.environ`\ninside an `execute_code` block to confirm\
    \ `SYSTEMROOT` is set. Full\ndiagnostic recipe in `references/execute-code-sandbox-env-windows.md`.\n\
    \n### Testing / Contributing\n\n**`scripts/run_tests.sh` doesn't work as-is on\
    \ Windows** \u2014 it looks for\nPOSIX venv layouts (`.venv/bin/activate`). The\
    \ Hermes-installed venv at\n`venv/Scripts/` has no pip or pytest either (stripped\
    \ for install size).\nWorkaround: install `pytest + pytest-xdist + pyyaml` into\
    \ a system Python\n3.11 user site, then invoke pytest directly with `PYTHONPATH`\
    \ set:\n\n```bash\n\"/c/Program Files/Python311/python\" -m pip install --user\
    \ pytest pytest-xdist pyyaml\nexport PYTHONPATH=\"$(pwd)\"\n\"/c/Program Files/Python311/python\"\
    \ -m pytest tests/foo/test_bar.py -v --tb=short -n 0\n```\n\nUse `-n 0`, not `-n\
    \ 4` \u2014 `pyproject.toml`'s default `addopts` already\nincludes `-n`, and the\
    \ wrapper's CI-parity guarantees don't apply off POSIX.\n\n**POSIX-only tests\
    \ need skip guards.** Common markers already in the codebase:\n- Symlinks \u2014\
    \ elevated privileges on Windows\n- `0o600` file modes \u2014 POSIX mode bits\
    \ not enforced on NTFS by default\n- `signal.SIGALRM` \u2014 Unix-only (see `tests/conftest.py::_enforce_test_timeout`)\n\
    - Winsock / Windows-specific regressions \u2014 `@pytest.mark.skipif(sys.platform\
    \ != \"win32\", ...)`\n\nUse the existing skip-pattern style (`sys.platform ==\
    \ \"win32\"` or\n`sys.platform.startswith(\"win\")`) to stay consistent with the\
    \ rest of the\nsuite.\n\n### Path / Filesystem\n\n**Line endings.** Git may warn\
    \ `LF will be replaced by CRLF the next time\nGit touches it`. Cosmetic \u2014\
    \ the repo's `.gitattributes` normalizes. Don't\nlet editors auto-convert committed\
    \ POSIX-newline files to CRLF.\n\n**Forward slashes work almost everywhere.**\
    \ `C:/Users/...` is accepted by\nevery Hermes tool and most Windows APIs. Prefer\
    \ forward slashes in code\nand logs \u2014 avoids shell-escaping backslashes in\
    \ bash.\n\n---\n\n## Troubleshooting\n\n### Voice not working\n1. Check `stt.enabled:\
    \ true` in config.yaml\n2. Verify provider: `pip install faster-whisper` or set\
    \ API key\n3. In gateway: `/restart`. In CLI: exit and relaunch.\n\n### Tool not\
    \ available\n1. `hermes tools` \u2014 check if toolset is enabled for your platform\n\
    2. Some tools need env vars (check `.env`)\n3. `/reset` after enabling tools\n\
    \n### Model/provider issues\n1. `hermes doctor` \u2014 check config and dependencies\n\
    2. `hermes login` \u2014 re-authenticate OAuth providers\n3. Check `.env` has\
    \ the right API key\n4. **Copilot 403**: `gh auth login` tokens do NOT work for\
    \ Copilot API. You must use the Copilot-specific OAuth device code flow via `hermes\
    \ model` \u2192 GitHub Copilot.\n\n### Changes not taking effect\n- **Tools/skills:**\
    \ `/reset` starts a new session with updated toolset\n- **Config changes:** In\
    \ gateway: `/restart`. In CLI: exit and relaunch.\n- **Code changes:** Restart\
    \ the CLI or gateway process\n\n### Skills not showing\n1. `hermes skills list`\
    \ \u2014 verify installed\n2. `hermes skills config` \u2014 check platform enablement\n\
    3. Load explicitly: `/skill name` or `hermes -s name`\n\n### Gateway issues\n\
    Check logs first:\n```bash\ngrep -i \"failed to send\\|error\" ~/.hermes/logs/gateway.log\
    \ | tail -20\n```\n\nCommon gateway problems:\n- **Gateway dies on SSH logout**:\
    \ Enable linger: `sudo loginctl enable-linger $USER`\n- **Gateway dies on WSL2\
    \ close**: WSL2 requires `systemd=true` in `/etc/wsl.conf` for systemd services\
    \ to work. Without it, gateway falls back to `nohup` (dies when session closes).\n\
    - **Gateway crash loop**: Reset the failed state: `systemctl --user reset-failed\
    \ hermes-gateway`\n\n### Platform-specific issues\n- **Discord bot silent**: Must\
    \ enable **Message Content Intent** in Bot \u2192 Privileged Gateway Intents.\n\
    - **Slack bot only works in DMs**: Must subscribe to `message.channels` event.\
    \ Without it, the bot ignores public channels.\n- **Windows-specific issues**\
    \ (`Alt+Enter` newline, WinError 10106, UTF-8 BOM config, test suite, line endings):\
    \ see the dedicated **Windows-Specific Quirks** section above.\n\n### Auxiliary\
    \ models not working\nIf `auxiliary` tasks (vision, compression, session_search)\
    \ fail silently, the `auto` provider can't find a backend. Either set `OPENROUTER_API_KEY`\
    \ or `GOOGLE_API_KEY`, or explicitly configure each auxiliary task's provider:\n\
    ```bash\nhermes config set auxiliary.vision.provider <your_provider>\nhermes config\
    \ set auxiliary.vision.model <model_name>\n```\n\n---\n\n## Where to Find Things\n\
