    \n---\n\n## Contributor Quick Reference\n\nFor occasional contributors and PR\
    \ authors. Full developer docs: https://hermes-agent.nousresearch.com/docs/developer-guide/\n\
    \n### Project Layout\n\n```\nhermes-agent/\n\u251C\u2500\u2500 run_agent.py  \
    \        # AIAgent \u2014 core conversation loop\n\u251C\u2500\u2500 model_tools.py\
    \        # Tool discovery and dispatch\n\u251C\u2500\u2500 toolsets.py       \
    \    # Toolset definitions\n\u251C\u2500\u2500 cli.py                # Interactive\
    \ CLI (HermesCLI)\n\u251C\u2500\u2500 hermes_state.py       # SQLite session store\n\
    \u251C\u2500\u2500 agent/                # Prompt builder, context compression,\
    \ memory, model routing, credential pooling, skill dispatch\n\u251C\u2500\u2500\
    \ hermes_cli/           # CLI subcommands, config, setup, commands\n\u2502   \u251C\
    \u2500\u2500 commands.py       # Slash command registry (CommandDef)\n\u2502 \
    \  \u251C\u2500\u2500 config.py         # DEFAULT_CONFIG, env var definitions\n\
    \u2502   \u2514\u2500\u2500 main.py           # CLI entry point and argparse\n\
    \u251C\u2500\u2500 tools/                # One file per tool\n\u2502   \u2514\u2500\
    \u2500 registry.py       # Central tool registry\n\u251C\u2500\u2500 gateway/\
    \              # Messaging gateway\n\u2502   \u2514\u2500\u2500 platforms/   \
    \     # Platform adapters (telegram, discord, etc.)\n\u251C\u2500\u2500 cron/\
    \                 # Job scheduler\n\u251C\u2500\u2500 tests/                #\
    \ ~3000 pytest tests\n\u2514\u2500\u2500 website/              # Docusaurus docs\
    \ site\n```\n\nConfig: `~/.hermes/config.yaml` (settings), `~/.hermes/.env` (API\
    \ keys).\n\n### Adding a Tool (3 files)\n\n**1. Create `tools/your_tool.py`:**\n\
    ```python\nimport json, os\nfrom tools.registry import registry\n\ndef check_requirements()\
    \ -> bool:\n    return bool(os.getenv(\"EXAMPLE_API_KEY\"))\n\ndef example_tool(param:\
    \ str, task_id: str = None) -> str:\n    return json.dumps({\"success\": True,\
    \ \"data\": \"...\"})\n\nregistry.register(\n    name=\"example_tool\",\n    toolset=\"\
    example\",\n    schema={\"name\": \"example_tool\", \"description\": \"...\",\
    \ \"parameters\": {...}},\n    handler=lambda args, **kw: example_tool(\n    \
    \    param=args.get(\"param\", \"\"), task_id=kw.get(\"task_id\")),\n    check_fn=check_requirements,\n\
    \    requires_env=[\"EXAMPLE_API_KEY\"],\n)\n```\n\n**2. Add to `toolsets.py`**\
    \ \u2192 `_HERMES_CORE_TOOLS` list.\n\nAuto-discovery: any `tools/*.py` file with\
    \ a top-level `registry.register()` call is imported automatically \u2014 no manual\
    \ list needed.\n\nAll handlers must return JSON strings. Use `get_hermes_home()`\
    \ for paths, never hardcode `~/.hermes`.\n\n### Adding a Slash Command\n\n1. Add\
    \ `CommandDef` to `COMMAND_REGISTRY` in `hermes_cli/commands.py`\n2. Add handler\
    \ in `cli.py` \u2192 `process_command()`\n3. (Optional) Add gateway handler in\
    \ `gateway/run.py`\n\nAll consumers (help text, autocomplete, Telegram menu, Slack\
    \ mapping) derive from the central registry automatically.\n\n### Agent Loop (High\
    \ Level)\n\n```\nrun_conversation():\n  1. Build system prompt\n  2. Loop while\
    \ iterations < max:\n     a. Call LLM (OpenAI-format messages + tool schemas)\n\
    \     b. If tool_calls \u2192 dispatch each via handle_function_call() \u2192\
    \ append results \u2192 continue\n     c. If text response \u2192 return\n  3.\
    \ Context compression triggers automatically near token limit\n```\n\n### Testing\n\
    \n```bash\npython -m pytest tests/ -o 'addopts=' -q   # Full suite\npython -m\
    \ pytest tests/tools/ -q            # Specific area\n```\n\n- Tests auto-redirect\
    \ `HERMES_HOME` to temp dirs \u2014 never touch real `~/.hermes/`\n- Run full\
    \ suite before pushing any change\n- Use `-o 'addopts='` to clear any baked-in\
    \ pytest flags\n\n**Windows contributors:** `scripts/run_tests.sh` currently looks\
    \ for POSIX venvs (`.venv/bin/activate` / `venv/bin/activate`) and will error\
    \ out on Windows where the layout is `venv/Scripts/activate` + `python.exe`. The\
    \ Hermes-installed venv at `venv/Scripts/` also has no `pip` or `pytest` \u2014\
    \ it's stripped for end-user install size. Workaround: install pytest + pytest-xdist\
    \ + pyyaml into a system Python 3.11 user site (`/c/Program Files/Python311/python\
    \ -m pip install --user pytest pytest-xdist pyyaml`), then run tests directly:\n\
    \n```bash\nexport PYTHONPATH=\"$(pwd)\"\n\"/c/Program Files/Python311/python\"\
    \ -m pytest tests/tools/test_foo.py -v --tb=short -n 0\n```\n\nUse `-n 0` (not\
    \ `-n 4`) because `pyproject.toml`'s default `addopts` already includes `-n`,\
    \ and the wrapper's CI-parity story doesn't apply off-POSIX.\n\n**Cross-platform\
    \ test guards:** tests that use POSIX-only syscalls need a skip marker. Common\
    \ ones already in the codebase:\n- Symlink creation \u2192 `@pytest.mark.skipif(sys.platform\
    \ == \"win32\", reason=\"Symlinks require elevated privileges on Windows\")` (see\
    \ `tests/cron/test_cron_script.py`)\n- POSIX file modes (0o600, etc.) \u2192 `@pytest.mark.skipif(sys.platform.startswith(\"\
    win\"), reason=\"POSIX mode bits not enforced on Windows\")` (see `tests/hermes_cli/test_auth_toctou_file_modes.py`)\n\
    - `signal.SIGALRM` \u2192 Unix-only (see `tests/conftest.py::_enforce_test_timeout`)\n\
    - Live Winsock / Windows-specific regression tests \u2192 `@pytest.mark.skipif(sys.platform\
    \ != \"win32\", reason=\"Windows-specific regression\")`\n\n**Monkeypatching `sys.platform`\
    \ is not enough** when the code under test also calls `platform.system()` / `platform.release()`\
    \ / `platform.mac_ver()`. Those functions re-read the real OS independently, so\
    \ a test that sets `sys.platform = \"linux\"` on a Windows runner will still see\
    \ `platform.system() == \"Windows\"` and route through the Windows branch. Patch\
    \ all three together:\n\n```python\nmonkeypatch.setattr(sys, \"platform\", \"\
    linux\")\nmonkeypatch.setattr(platform, \"system\", lambda: \"Linux\")\nmonkeypatch.setattr(platform,\
    \ \"release\", lambda: \"6.8.0-generic\")\n```\n\nSee `tests/agent/test_prompt_builder.py::TestEnvironmentHints`\
    \ for a worked example.\n\n### Extending the system prompt's execution-environment\
    \ block\n\nFactual guidance about the host OS, user home, cwd, terminal backend,\
    \ and shell (bash vs. PowerShell on Windows) is emitted from `agent/prompt_builder.py::build_environment_hints()`.\
    \ This is also where the WSL hint and per-backend probe logic live. The convention:\n\
    \n- **Local terminal backend** \u2192 emit host info (OS, `$HOME`, cwd) + Windows-specific\
    \ notes (hostname \u2260 username, `terminal` uses bash not PowerShell).\n- **Remote\
    \ terminal backend** (anything in `_REMOTE_TERMINAL_BACKENDS`: `docker, singularity,\
    \ modal, daytona, ssh, vercel_sandbox, managed_modal`) \u2192 **suppress** host\
    \ info entirely and describe only the backend. A live `uname`/`whoami`/`pwd` probe\
    \ runs inside the backend via `tools.environments.get_environment(...).execute(...)`,\
    \ cached per process in `_BACKEND_PROBE_CACHE`, with a static fallback if the\
    \ probe times out.\n- **Key fact for prompt authoring:** when `TERMINAL_ENV !=\
    \ \"local\"`, *every* file tool (`read_file`, `write_file`, `patch`, `search_files`)\
    \ runs inside the backend container, not on the host. The system prompt must never\
    \ describe the host in that case \u2014 the agent can't touch it.\n\nFull design\
    \ notes, the exact emitted strings, and testing pitfalls:\n`references/prompt-builder-environment-hints.md`.\n\
    \n**Refactor-safety pattern (POSIX-equivalence guard):** when you extract inline\
    \ logic into a helper that adds Windows/platform-specific behavior, keep a `_legacy_<name>`\
    \ oracle function in the test file that's a verbatim copy of the old code, then\
    \ parametrize-diff against it. Example: `tests/tools/test_code_execution_windows_env.py::TestPosixEquivalence`.\
    \ This locks in the invariant that POSIX behavior is bit-for-bit identical and\
    \ makes any future drift fail loudly with a clear diff.\n\n### Commit Conventions\n\
    \n```\ntype: concise subject line\n\nOptional body.\n```\n\nTypes: `fix:`, `feat:`,\
    \ `refactor:`, `docs:`, `chore:`\n\n### Key Rules\n\n- **Never break prompt caching**\
    \ \u2014 don't change context, tools, or system prompt mid-conversation\n- **Message\
    \ role alternation** \u2014 never two assistant or two user messages in a row\n\
    - Use `get_hermes_home()` from `hermes_constants` for all paths (profile-safe)\n\
    - Config values go in `config.yaml`, secrets go in `.env`\n- New tools need a\
    \ `check_fn` so they only appear when requirements are met\n"
