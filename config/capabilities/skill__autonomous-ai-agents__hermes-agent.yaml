    \    related_skills: [claude-code, codex, opencode]\n---\n\n# Hermes Agent\n\n\
    Hermes Agent is an open-source AI agent framework by Nous Research that runs in\
    \ your terminal, messaging platforms, and IDEs. It belongs to the same category\
    \ as Claude Code (Anthropic), Codex (OpenAI), and OpenClaw \u2014 autonomous coding\
    \ and task-execution agents that use tool calling to interact with your system.\
    \ Hermes works with any LLM provider (OpenRouter, Anthropic, OpenAI, DeepSeek,\
    \ local models, and 15+ others) and runs on Linux, macOS, and WSL.\n\nWhat makes\
    \ Hermes different:\n\n- **Self-improving through skills** \u2014 Hermes learns\
    \ from experience by saving reusable procedures as skills. When it solves a complex\
    \ problem, discovers a workflow, or gets corrected, it can persist that knowledge\
    \ as a skill document that loads into future sessions. Skills accumulate over\
    \ time, making the agent better at your specific tasks and environment.\n- **Persistent\
    \ memory across sessions** \u2014 remembers who you are, your preferences, environment\
    \ details, and lessons learned. Pluggable memory backends (built-in, Honcho, Mem0,\
    \ and more) let you choose how memory works.\n- **Multi-platform gateway** \u2014\
    \ the same agent runs on Telegram, Discord, Slack, WhatsApp, Signal, Matrix, Email,\
    \ and 10+ other platforms with full tool access, not just chat.\n- **Provider-agnostic**\
    \ \u2014 swap models and providers mid-workflow without changing anything else.\
    \ Credential pools rotate across multiple API keys automatically.\n- **Profiles**\
    \ \u2014 run multiple independent Hermes instances with isolated configs, sessions,\
    \ skills, and memory.\n- **Extensible** \u2014 plugins, MCP servers, custom tools,\
    \ webhook triggers, cron scheduling, and the full Python ecosystem.\n\nPeople\
    \ use Hermes for software development, research, system administration, data analysis,\
    \ content creation, home automation, and anything else that benefits from an AI\
    \ agent with persistent context and full system access.\n\n**This skill helps\
    \ you work with Hermes Agent effectively** \u2014 setting it up, configuring features,\
    \ spawning additional agent instances, troubleshooting issues, finding the right\
    \ commands and settings, and understanding how the system works when you need\
    \ to extend or contribute to it.\n\n**Docs:** https://hermes-agent.nousresearch.com/docs/\n\
    \n## Quick Start\n\n```bash\n# Install\ncurl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh\
    \ | bash\n\n# Interactive chat (default)\nhermes\n\n# Single query\nhermes chat\
    \ -q \"What is the capital of France?\"\n\n# Setup wizard\nhermes setup\n\n# Change\
    \ model/provider\nhermes model\n\n# Check health\nhermes doctor\n```\n\n---\n\n\
    ## CLI Reference\n\n### Global Flags\n\n```\nhermes [flags] [command]\n\n  --version,\
    \ -V             Show version\n  --resume, -r SESSION      Resume session by ID\
    \ or title\n  --continue, -c [NAME]     Resume by name, or most recent session\n\
    \  --worktree, -w            Isolated git worktree mode (parallel agents)\n  --skills,\
    \ -s SKILL        Preload skills (comma-separate or repeat)\n  --profile, -p NAME\
    \        Use a named profile\n  --yolo                    Skip dangerous command\
    \ approval\n  --pass-session-id         Include session ID in system prompt\n\
    ```\n\nNo subcommand defaults to `chat`.\n\n### Chat\n\n```\nhermes chat [flags]\n\
    \  -q, --query TEXT          Single query, non-interactive\n  -m, --model MODEL\
    \         Model (e.g. anthropic/claude-sonnet-4)\n  -t, --toolsets LIST      \
    \ Comma-separated toolsets\n  --provider PROVIDER       Force provider (openrouter,\
    \ anthropic, nous, etc.)\n  -v, --verbose             Verbose output\n  -Q, --quiet\
    \               Suppress banner, spinner, tool previews\n  --checkpoints     \
    \        Enable filesystem checkpoints (/rollback)\n  --source TAG           \
    \   Session source tag (default: cli)\n```\n\n### Configuration\n\n```\nhermes\
    \ setup [section]      Interactive wizard (model|terminal|gateway|tools|agent)\n\
    hermes model                Interactive model/provider picker\nhermes config \
    \              View current config\nhermes config edit          Open config.yaml\
    \ in $EDITOR\nhermes config set KEY VAL   Set a config value\nhermes config path\
    \          Print config.yaml path\nhermes config env-path      Print .env path\n\
    hermes config check         Check for missing/outdated config\nhermes config migrate\
    \       Update config with new options\nhermes login [--provider P] OAuth login\
    \ (nous, openai-codex)\nhermes logout               Clear stored auth\nhermes\
    \ doctor [--fix]       Check dependencies and config\nhermes status [--all]  \
    \     Show component status\n```\n\n### Tools & Skills\n\n```\nhermes tools  \
    \              Interactive tool enable/disable (curses UI)\nhermes tools list\
    \           Show all tools and status\nhermes tools enable NAME    Enable a toolset\n\
    hermes tools disable NAME   Disable a toolset\n\nhermes skills list          List\
    \ installed skills\nhermes skills search QUERY  Search the skills hub\nhermes\
    \ skills install ID    Install a skill (ID can be a hub identifier OR a direct\
