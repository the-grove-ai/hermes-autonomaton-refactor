    \ gateway restart      Restart the service\nhermes gateway status       Check\
    \ status\nhermes gateway setup        Configure platforms\n```\n\nSupported platforms:\
    \ Telegram, Discord, Slack, WhatsApp, Signal, Email, SMS, Matrix, Mattermost,\
