    \ `show_reasoning`, `show_cost` |\n| `stt` | `enabled`, `provider` (local/groq/openai/mistral)\
    \ |\n| `tts` | `provider` (edge/elevenlabs/openai/minimax/mistral/neutts) |\n\
    | `memory` | `memory_enabled`, `user_profile_enabled`, `provider` |\n| `security`\
    \ | `tirith_enabled`, `website_blocklist` |\n| `delegation` | `model`, `provider`,\
    \ `base_url`, `api_key`, `max_iterations` (50), `reasoning_effort` |\n| `checkpoints`\
    \ | `enabled`, `max_snapshots` (50) |\n\nFull config reference: https://hermes-agent.nousresearch.com/docs/user-guide/configuration\n\
    \n### Providers\n\n20+ providers supported. Set via `hermes model` or `hermes\
