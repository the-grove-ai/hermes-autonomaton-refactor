    hermes claw migrate         Migrate from OpenClaw\nhermes uninstall          \
    \  Uninstall Hermes\n```\n\n---\n\n## Slash Commands (In-Session)\n\nType these\
    \ during an interactive chat session. New commands land fairly\noften; if something\
    \ below looks stale, run `/help` in-session for the\nauthoritative list or see\
    \ the [live slash commands reference](https://hermes-agent.nousresearch.com/docs/reference/slash-commands).\n\
    The registry of record is `hermes_cli/commands.py` \u2014 every consumer\n(autocomplete,\
    \ Telegram menu, Slack mapping, `/help`) derives from it.\n\n### Session Control\n\
    ```\n/new (/reset)        Fresh session\n/clear               Clear screen + new\
    \ session (CLI)\n/retry               Resend last message\n/undo             \
    \   Remove last exchange\n/title [name]        Name the session\n/compress   \
