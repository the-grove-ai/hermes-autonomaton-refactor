    \ skills uninstall N   Remove a hub skill\nhermes skills publish PATH  Publish\
    \ to registry\nhermes skills browse        Browse all available skills\nhermes\
    \ skills tap add REPO  Add a GitHub repo as skill source\n```\n\n### MCP Servers\n\
    \n```\nhermes mcp serve            Run Hermes as an MCP server\nhermes mcp add\
    \ NAME         Add an MCP server (--url or --command)\nhermes mcp remove NAME\
