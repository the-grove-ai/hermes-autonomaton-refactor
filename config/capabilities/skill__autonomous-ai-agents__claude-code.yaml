    \n# Claude Code \u2014 Hermes Orchestration Guide\n\nDelegate coding tasks to\
    \ [Claude Code](https://code.claude.com/docs/en/cli-reference) (Anthropic's autonomous\
    \ coding agent CLI) via the Hermes terminal. Claude Code v2.x can read files,\
    \ write code, run shell commands, spawn subagents, and manage git workflows autonomously.\n\
    \n## Prerequisites\n\n- **Install:** `npm install -g @anthropic-ai/claude-code`\n\
    - **Auth:** run `claude` once to log in (browser OAuth for Pro/Max, or set `ANTHROPIC_API_KEY`)\n\
    - **Console auth:** `claude auth login --console` for API key billing\n- **SSO\
    \ auth:** `claude auth login --sso` for Enterprise\n- **Check status:** `claude\
    \ auth status` (JSON) or `claude auth status --text` (human-readable)\n- **Health\
    \ check:** `claude doctor` \u2014 checks auto-updater and installation health\n\
    - **Version check:** `claude --version` (requires v2.x+)\n- **Update:** `claude\
    \ update` or `claude upgrade`\n\n## Two Orchestration Modes\n\nHermes interacts\
    \ with Claude Code in two fundamentally different ways. Choose based on the task.\n\
    \n### Mode 1: Print Mode (`-p`) \u2014 Non-Interactive (PREFERRED for most tasks)\n\
    \nPrint mode runs a one-shot task, returns the result, and exits. No PTY needed.\
    \ No interactive prompts. This is the cleanest integration path.\n\n```\nterminal(command=\"\
    claude -p 'Add error handling to all API calls in src/' --allowedTools 'Read,Edit'\
    \ --max-turns 10\", workdir=\"/path/to/project\", timeout=120)\n```\n\n**When\
    \ to use print mode:**\n- One-shot coding tasks (fix a bug, add a feature, refactor)\n\
    - CI/CD automation and scripting\n- Structured data extraction with `--json-schema`\n\
    - Piped input processing (`cat file | claude -p \"analyze this\"`)\n- Any task\
    \ where you don't need multi-turn conversation\n\n**Print mode skips ALL interactive\
    \ dialogs** \u2014 no workspace trust prompt, no permission confirmations. This\
    \ makes it ideal for automation.\n\n### Mode 2: Interactive PTY via tmux \u2014\
    \ Multi-Turn Sessions\n\nInteractive mode gives you a full conversational REPL\
    \ where you can send follow-up prompts, use slash commands, and watch Claude work\
    \ in real time. **Requires tmux orchestration.**\n\n```\n# Start a tmux session\n\
    terminal(command=\"tmux new-session -d -s claude-work -x 140 -y 40\")\n\n# Launch\
    \ Claude Code inside it\nterminal(command=\"tmux send-keys -t claude-work 'cd\
    \ /path/to/project && claude' Enter\")\n\n# Wait for startup, then send your task\n\
    # (after ~3-5 seconds for the welcome screen)\nterminal(command=\"sleep 5 && tmux\
    \ send-keys -t claude-work 'Refactor the auth module to use JWT tokens' Enter\"\
    )\n\n# Monitor progress by capturing the pane\nterminal(command=\"sleep 15 &&\
    \ tmux capture-pane -t claude-work -p -S -50\")\n\n# Send follow-up tasks\nterminal(command=\"\
    tmux send-keys -t claude-work 'Now add unit tests for the new JWT code' Enter\"\
    )\n\n# Exit when done\nterminal(command=\"tmux send-keys -t claude-work '/exit'\
    \ Enter\")\n```\n\n**When to use interactive mode:**\n- Multi-turn iterative work\
    \ (refactor \u2192 review \u2192 fix \u2192 test cycle)\n- Tasks requiring human-in-the-loop\
    \ decisions\n- Exploratory coding sessions\n- When you need to use Claude's slash\
    \ commands (`/compact`, `/review`, `/model`)\n\n## PTY Dialog Handling (CRITICAL\
    \ for Interactive Mode)\n\nClaude Code presents up to two confirmation dialogs\
    \ on first launch. You MUST handle these via tmux send-keys:\n\n### Dialog 1:\
    \ Workspace Trust (first visit to a directory)\n```\n\u276F 1. Yes, I trust this\
    \ folder    \u2190 DEFAULT (just press Enter)\n  2. No, exit\n```\n**Handling:**\
    \ `tmux send-keys -t <session> Enter` \u2014 default selection is correct.\n\n\
    ### Dialog 2: Bypass Permissions Warning (only with --dangerously-skip-permissions)\n\
    ```\n\u276F 1. No, exit                    \u2190 DEFAULT (WRONG choice!)\n  2.\
    \ Yes, I accept\n```\n**Handling:** Must navigate DOWN first, then Enter:\n```\n\
    tmux send-keys -t <session> Down && sleep 0.3 && tmux send-keys -t <session> Enter\n\
    ```\n\n### Robust Dialog Handling Pattern\n```\n# Launch with permissions bypass\n\
    terminal(command=\"tmux send-keys -t claude-work 'claude --dangerously-skip-permissions\
    \ \\\"your task\\\"' Enter\")\n\n# Handle trust dialog (Enter for default \"Yes\"\
    )\nterminal(command=\"sleep 4 && tmux send-keys -t claude-work Enter\")\n\n# Handle\
    \ permissions dialog (Down then Enter for \"Yes, I accept\")\nterminal(command=\"\
    sleep 3 && tmux send-keys -t claude-work Down && sleep 0.3 && tmux send-keys -t\
    \ claude-work Enter\")\n\n# Now wait for Claude to work\nterminal(command=\"sleep\
    \ 15 && tmux capture-pane -t claude-work -p -S -60\")\n```\n\n**Note:** After\
    \ the first trust acceptance for a directory, the trust dialog won't appear again.\
    \ Only the permissions dialog recurs each time you use `--dangerously-skip-permissions`.\n\
    \n## CLI Subcommands\n\n| Subcommand | Purpose |\n|------------|---------|\n|\
    \ `claude` | Start interactive REPL |\n| `claude \"query\"` | Start REPL with\
    \ initial prompt |\n| `claude -p \"query\"` | Print mode (non-interactive, exits\
    \ when done) |\n| `cat file \\| claude -p \"query\"` | Pipe content as stdin context\
    \ |\n| `claude -c` | Continue the most recent conversation in this directory |\n\
    | `claude -r \"id\"` | Resume a specific session by ID or name |\n| `claude auth\
    \ login` | Sign in (add `--console` for API billing, `--sso` for Enterprise) |\n\
    | `claude auth status` | Check login status (returns JSON; `--text` for human-readable)\
    \ |\n| `claude mcp add <name> -- <cmd>` | Add an MCP server |\n| `claude mcp list`\
    \ | List configured MCP servers |\n| `claude mcp remove <name>` | Remove an MCP\
    \ server |\n| `claude agents` | List configured agents |\n| `claude doctor` |\
    \ Run health checks on installation and auto-updater |\n| `claude update` / `claude\
    \ upgrade` | Update Claude Code to latest version |\n| `claude remote-control`\
    \ | Start server to control Claude from claude.ai or mobile app |\n| `claude install\
    \ [target]` | Install native build (stable, latest, or specific version) |\n|\
    \ `claude setup-token` | Set up long-lived auth token (requires subscription)\
    \ |\n| `claude plugin` / `claude plugins` | Manage Claude Code plugins |\n| `claude\
    \ auto-mode` | Inspect auto mode classifier configuration |\n\n## Print Mode Deep\
    \ Dive\n\n### Structured JSON Output\n```\nterminal(command=\"claude -p 'Analyze\
    \ auth.py for security issues' --output-format json --max-turns 5\", workdir=\"\
    /project\", timeout=120)\n```\n\nReturns a JSON object with:\n```json\n{\n  \"\
    type\": \"result\",\n  \"subtype\": \"success\",\n  \"result\": \"The analysis\
    \ text...\",\n  \"session_id\": \"75e2167f-...\",\n  \"num_turns\": 3,\n  \"total_cost_usd\"\
    : 0.0787,\n  \"duration_ms\": 10276,\n  \"stop_reason\": \"end_turn\",\n  \"terminal_reason\"\
    : \"completed\",\n  \"usage\": { \"input_tokens\": 5, \"output_tokens\": 603,\
    \ ... },\n  \"modelUsage\": { \"claude-sonnet-4-6\": { \"costUSD\": 0.078, \"\
    contextWindow\": 200000 } }\n}\n```\n\n**Key fields:** `session_id` for resumption,\
    \ `num_turns` for agentic loop count, `total_cost_usd` for spend tracking, `subtype`\
    \ for success/error detection (`success`, `error_max_turns`, `error_budget`).\n\
    \n### Streaming JSON Output\nFor real-time token streaming, use `stream-json`\
    \ with `--verbose`:\n```\nterminal(command=\"claude -p 'Write a summary' --output-format\
    \ stream-json --verbose --include-partial-messages\", timeout=60)\n```\n\nReturns\
    \ newline-delimited JSON events. Filter with jq for live text:\n```\nclaude -p\
    \ \"Explain X\" --output-format stream-json --verbose --include-partial-messages\
    \ | \\\n  jq -rj 'select(.type == \"stream_event\" and .event.delta.type? == \"\
    text_delta\") | .event.delta.text'\n```\n\nStream events include `system/api_retry`\
    \ with `attempt`, `max_retries`, and `error` fields (e.g., `rate_limit`, `billing_error`).\n\
    \n### Bidirectional Streaming\nFor real-time input AND output streaming:\n```\n\
    claude -p \"task\" --input-format stream-json --output-format stream-json --replay-user-messages\n\
    ```\n`--replay-user-messages` re-emits user messages on stdout for acknowledgment.\n\
    \n### Piped Input\n```\n# Pipe a file for analysis\nterminal(command=\"cat src/auth.py\
    \ | claude -p 'Review this code for bugs' --max-turns 1\", timeout=60)\n\n# Pipe\
    \ multiple files\nterminal(command=\"cat src/*.py | claude -p 'Find all TODO comments'\
    \ --max-turns 1\", timeout=60)\n\n# Pipe command output\nterminal(command=\"git\
    \ diff HEAD~3 | claude -p 'Summarize these changes' --max-turns 1\", timeout=60)\n\
    ```\n\n### JSON Schema for Structured Extraction\n```\nterminal(command=\"claude\
    \ -p 'List all functions in src/' --output-format json --json-schema '{\\\"type\\\
    \":\\\"object\\\",\\\"properties\\\":{\\\"functions\\\":{\\\"type\\\":\\\"array\\\
    \",\\\"items\\\":{\\\"type\\\":\\\"string\\\"}}},\\\"required\\\":[\\\"functions\\\
    \"]}' --max-turns 5\", workdir=\"/project\", timeout=90)\n```\n\nParse `structured_output`\
    \ from the JSON result. Claude validates output against the schema before returning.\n\
    \n### Session Continuation\n```\n# Start a task\nterminal(command=\"claude -p\
    \ 'Start refactoring the database layer' --output-format json --max-turns 10 >\
    \ /tmp/session.json\", workdir=\"/project\", timeout=180)\n\n# Resume with session\
    \ ID\nterminal(command=\"claude -p 'Continue and add connection pooling' --resume\
    \ $(cat /tmp/session.json | python3 -c 'import json,sys; print(json.load(sys.stdin)[\\\
    \"session_id\\\"])') --max-turns 5\", workdir=\"/project\", timeout=120)\n\n#\
    \ Or resume the most recent session in the same directory\nterminal(command=\"\
    claude -p 'What did you do last time?' --continue --max-turns 1\", workdir=\"\
    /project\", timeout=30)\n\n# Fork a session (new ID, keeps history)\nterminal(command=\"\
    claude -p 'Try a different approach' --resume <id> --fork-session --max-turns\
    \ 10\", workdir=\"/project\", timeout=120)\n```\n\n### Bare Mode for CI/Scripting\n\
    ```\nterminal(command=\"claude --bare -p 'Run all tests and report failures' --allowedTools\
    \ 'Read,Bash' --max-turns 10\", workdir=\"/project\", timeout=180)\n```\n\n`--bare`\
    \ skips hooks, plugins, MCP discovery, and CLAUDE.md loading. Fastest startup.\
    \ Requires `ANTHROPIC_API_KEY` (skips OAuth).\n\nTo selectively load context in\
    \ bare mode:\n| To load | Flag |\n|---------|------|\n| System prompt additions\
    \ | `--append-system-prompt \"text\"` or `--append-system-prompt-file path` |\n\
    | Settings | `--settings <file-or-json>` |\n| MCP servers | `--mcp-config <file-or-json>`\
    \ |\n| Custom agents | `--agents '<json>'` |\n\n### Fallback Model for Overload\n\
    ```\nterminal(command=\"claude -p 'task' --fallback-model haiku --max-turns 5\"\
    , timeout=90)\n```\nAutomatically falls back to the specified model when the default\
    \ is overloaded (print mode only).\n\n## Complete CLI Flags Reference\n\n### Session\
    \ & Environment\n| Flag | Effect |\n|------|--------|\n| `-p, --print` | Non-interactive\
    \ one-shot mode (exits when done) |\n| `-c, --continue` | Resume most recent conversation\
    \ in current directory |\n| `-r, --resume <id>` | Resume specific session by ID\
    \ or name (interactive picker if no ID) |\n| `--fork-session` | When resuming,\
    \ create new session ID instead of reusing original |\n| `--session-id <uuid>`\
    \ | Use a specific UUID for the conversation |\n| `--no-session-persistence` |\
    \ Don't save session to disk (print mode only) |\n| `--add-dir <paths...>` | Grant\
    \ Claude access to additional working directories |\n| `-w, --worktree [name]`\
    \ | Run in an isolated git worktree at `.claude/worktrees/<name>` |\n| `--tmux`\
    \ | Create a tmux session for the worktree (requires `--worktree`) |\n| `--ide`\
    \ | Auto-connect to a valid IDE on startup |\n| `--chrome` / `--no-chrome` | Enable/disable\
    \ Chrome browser integration for web testing |\n| `--from-pr [number]` | Resume\
    \ session linked to a specific GitHub PR |\n| `--file <specs...>` | File resources\
    \ to download at startup (format: `file_id:relative_path`) |\n\n### Model & Performance\n\
    | Flag | Effect |\n|------|--------|\n| `--model <alias>` | Model selection: `sonnet`,\
    \ `opus`, `haiku`, or full name like `claude-sonnet-4-6` |\n| `--effort <level>`\
    \ | Reasoning depth: `low`, `medium`, `high`, `max`, `auto` | Both |\n| `--max-turns\
    \ <n>` | Limit agentic loops (print mode only; prevents runaway) |\n| `--max-budget-usd\
    \ <n>` | Cap API spend in dollars (print mode only) |\n| `--fallback-model <model>`\
    \ | Auto-fallback when default model is overloaded (print mode only) |\n| `--betas\
    \ <betas...>` | Beta headers to include in API requests (API key users only) |\n\
    \n### Permission & Safety\n| Flag | Effect |\n|------|--------|\n| `--dangerously-skip-permissions`\
    \ | Auto-approve ALL tool use (file writes, bash, network, etc.) |\n| `--allow-dangerously-skip-permissions`\
    \ | Enable bypass as an *option* without enabling it by default |\n| `--permission-mode\
    \ <mode>` | `default`, `acceptEdits`, `plan`, `auto`, `dontAsk`, `bypassPermissions`\
    \ |\n| `--allowedTools <tools...>` | Whitelist specific tools (comma or space-separated)\
    \ |\n| `--disallowedTools <tools...>` | Blacklist specific tools |\n| `--tools\
    \ <tools...>` | Override built-in tool set (`\"\"` = none, `\"default\"` = all,\
    \ or tool names) |\n\n### Output & Input Format\n| Flag | Effect |\n|------|--------|\n\
    | `--output-format <fmt>` | `text` (default), `json` (single result object), `stream-json`\
    \ (newline-delimited) |\n| `--input-format <fmt>` | `text` (default) or `stream-json`\
    \ (real-time streaming input) |\n| `--json-schema <schema>` | Force structured\
    \ JSON output matching a schema |\n| `--verbose` | Full turn-by-turn output |\n\
    | `--include-partial-messages` | Include partial message chunks as they arrive\
    \ (stream-json + print) |\n| `--replay-user-messages` | Re-emit user messages\
    \ on stdout (stream-json bidirectional) |\n\n### System Prompt & Context\n| Flag\
    \ | Effect |\n|------|--------|\n| `--append-system-prompt <text>` | **Add** to\
    \ the default system prompt (preserves built-in capabilities) |\n| `--append-system-prompt-file\
    \ <path>` | **Add** file contents to the default system prompt |\n| `--system-prompt\
    \ <text>` | **Replace** the entire system prompt (use --append instead usually)\
    \ |\n| `--system-prompt-file <path>` | **Replace** the system prompt with file\
    \ contents |\n| `--bare` | Skip hooks, plugins, MCP discovery, CLAUDE.md, OAuth\
    \ (fastest startup) |\n| `--agents '<json>'` | Define custom subagents dynamically\
    \ as JSON |\n| `--mcp-config <path>` | Load MCP servers from JSON file (repeatable)\
    \ |\n| `--strict-mcp-config` | Only use MCP servers from `--mcp-config`, ignoring\
    \ all other MCP configs |\n| `--settings <file-or-json>` | Load additional settings\
    \ from a JSON file or inline JSON |\n| `--setting-sources <sources>` | Comma-separated\
    \ sources to load: `user`, `project`, `local` |\n| `--plugin-dir <paths...>` |\
    \ Load plugins from directories for this session only |\n| `--disable-slash-commands`\
    \ | Disable all skills/slash commands |\n\n### Debugging\n| Flag | Effect |\n\
    |------|--------|\n| `-d, --debug [filter]` | Enable debug logging with optional\
    \ category filter (e.g., `\"api,hooks\"`, `\"!1p,!file\"`) |\n| `--debug-file\
    \ <path>` | Write debug logs to file (implicitly enables debug mode) |\n\n###\
    \ Agent Teams\n| Flag | Effect |\n|------|--------|\n| `--teammate-mode <mode>`\
    \ | How agent teams display: `auto`, `in-process`, or `tmux` |\n| `--brief` |\
    \ Enable `SendUserMessage` tool for agent-to-user communication |\n\n### Tool\
    \ Name Syntax for --allowedTools / --disallowedTools\n```\nRead              \
    \      # All file reading\nEdit                    # File editing (existing files)\n\
    Write                   # File creation (new files)\nBash                    #\
    \ All shell commands\nBash(git *)             # Only git commands\nBash(git commit\
    \ *)      # Only git commit commands\nBash(npm run lint:*)    # Pattern matching\
    \ with wildcards\nWebSearch               # Web search capability\nWebFetch  \
    \              # Web page fetching\nmcp__<server>__<tool>   # Specific MCP tool\n\
    ```\n\n## Settings & Configuration\n\n### Settings Hierarchy (highest to lowest\
    \ priority)\n1. **CLI flags** \u2014 override everything\n2. **Local project:**\
    \ `.claude/settings.local.json` (personal, gitignored)\n3. **Project:** `.claude/settings.json`\
    \ (shared, git-tracked)\n4. **User:** `~/.claude/settings.json` (global)\n\n###\
    \ Permissions in Settings\n```json\n{\n  \"permissions\": {\n    \"allow\": [\"\
    Bash(npm run lint:*)\", \"WebSearch\", \"Read\"],\n    \"ask\": [\"Write(*.ts)\"\
    , \"Bash(git push*)\"],\n    \"deny\": [\"Read(.env)\", \"Bash(rm -rf *)\"]\n\
    \  }\n}\n```\n\n### Memory Files (CLAUDE.md) Hierarchy\n1. **Global:** `~/.claude/CLAUDE.md`\
    \ \u2014 applies to all projects\n2. **Project:** `./CLAUDE.md` \u2014 project-specific\
    \ context (git-tracked)\n3. **Local:** `.claude/CLAUDE.local.md` \u2014 personal\
    \ project overrides (gitignored)\n\nUse the `#` prefix in interactive mode to\
    \ quickly add to memory: `# Always use 2-space indentation`.\n\n## Interactive\
    \ Session: Slash Commands\n\n### Session & Context\n| Command | Purpose |\n|---------|---------|\n\
    | `/help` | Show all commands (including custom and MCP commands) |\n| `/compact\
    \ [focus]` | Compress context to save tokens; CLAUDE.md survives compaction. E.g.,\
    \ `/compact focus on auth logic` |\n| `/clear` | Wipe conversation history for\
    \ a fresh start |\n| `/context` | Visualize context usage as a colored grid with\
    \ optimization tips |\n| `/cost` | View token usage with per-model and cache-hit\
    \ breakdowns |\n| `/resume` | Switch to or resume a different session |\n| `/rewind`\
    \ | Revert to a previous checkpoint in conversation or code |\n| `/btw <question>`\
    \ | Ask a side question without adding to context cost |\n| `/status` | Show version,\
    \ connectivity, and session info |\n| `/todos` | List tracked action items from\
    \ the conversation |\n| `/exit` or `Ctrl+D` | End session |\n\n### Development\
    \ & Review\n| Command | Purpose |\n|---------|---------|\n| `/review` | Request\
    \ code review of current changes |\n| `/security-review` | Perform security analysis\
    \ of current changes |\n| `/plan [description]` | Enter Plan mode with auto-start\
    \ for task planning |\n| `/loop [interval]` | Schedule recurring tasks within\
    \ the session |\n| `/batch` | Auto-create worktrees for large parallel changes\
    \ (5-30 worktrees) |\n\n### Configuration & Tools\n| Command | Purpose |\n|---------|---------|\n\
    | `/model [model]` | Switch models mid-session (use arrow keys to adjust effort)\
    \ |\n| `/effort [level]` | Set reasoning effort: `low`, `medium`, `high`, `max`,\
    \ or `auto` |\n| `/init` | Create a CLAUDE.md file for project memory |\n| `/memory`\
    \ | Open CLAUDE.md for editing |\n| `/config` | Open interactive settings configuration\
    \ |\n| `/permissions` | View/update tool permissions |\n| `/agents` | Manage specialized\
    \ subagents |\n| `/mcp` | Interactive UI to manage MCP servers |\n| `/add-dir`\
    \ | Add additional working directories (useful for monorepos) |\n| `/usage` |\
    \ Show plan limits and rate limit status |\n| `/voice` | Enable push-to-talk voice\
    \ mode (20 languages; hold Space to record, release to send) |\n| `/release-notes`\
    \ | Interactive picker for version release notes |\n\n### Custom Slash Commands\n\
    Create `.claude/commands/<name>.md` (project-shared) or `~/.claude/commands/<name>.md`\
    \ (personal):\n\n```markdown\n# .claude/commands/deploy.md\nRun the deploy pipeline:\n\
    1. Run all tests\n2. Build the Docker image\n3. Push to registry\n4. Update the\
    \ $ARGUMENTS environment (default: staging)\n```\n\nUsage: `/deploy production`\
    \ \u2014 `$ARGUMENTS` is replaced with the user's input.\n\n### Skills (Natural\
    \ Language Invocation)\nUnlike slash commands (manually invoked), skills in `.claude/skills/`\
    \ are markdown guides that Claude invokes automatically via natural language when\
    \ the task matches:\n\n```markdown\n# .claude/skills/database-migration.md\nWhen\
    \ asked to create or modify database migrations:\n1. Use Alembic for migration\
    \ generation\n2. Always create a rollback function\n3. Test migrations against\
    \ a local database copy\n```\n\n## Interactive Session: Keyboard Shortcuts\n\n\
    ### General Controls\n| Key | Action |\n|-----|--------|\n| `Ctrl+C` | Cancel\
    \ current input or generation |\n| `Ctrl+D` | Exit session |\n| `Ctrl+R` | Reverse\
    \ search command history |\n| `Ctrl+B` | Background a running task |\n| `Ctrl+V`\
    \ | Paste image into conversation |\n| `Ctrl+O` | Transcript mode \u2014 see Claude's\
    \ thinking process |\n| `Ctrl+G` or `Ctrl+X Ctrl+E` | Open prompt in external\
    \ editor |\n| `Esc Esc` | Rewind conversation or code state / summarize |\n\n\
    ### Mode Toggles\n| Key | Action |\n|-----|--------|\n| `Shift+Tab` | Cycle permission\
    \ modes (Normal \u2192 Auto-Accept \u2192 Plan) |\n| `Alt+P` | Switch model |\n\
    | `Alt+T` | Toggle thinking mode |\n| `Alt+O` | Toggle Fast Mode |\n\n### Multiline\
    \ Input\n| Key | Action |\n|-----|--------|\n| `\\` + `Enter` | Quick newline\
    \ |\n| `Shift+Enter` | Newline (alternative) |\n| `Ctrl+J` | Newline (alternative)\
    \ |\n\n### Input Prefixes\n| Prefix | Action |\n|--------|--------|\n| `!` | Execute\
    \ bash directly, bypassing AI (e.g., `!npm test`). Use `!` alone to toggle shell\
    \ mode. |\n| `@` | Reference files/directories with autocomplete (e.g., `@./src/api/`)\
    \ |\n| `#` | Quick add to CLAUDE.md memory (e.g., `# Use 2-space indentation`)\
    \ |\n| `/` | Slash commands |\n\n### Pro Tip: \"ultrathink\"\nUse the keyword\
    \ \"ultrathink\" in your prompt for maximum reasoning effort on a specific turn.\
    \ This triggers the deepest thinking mode regardless of the current `/effort`\
    \ setting.\n\n## PR Review Pattern\n\n### Quick Review (Print Mode)\n```\nterminal(command=\"\
    cd /path/to/repo && git diff main...feature-branch | claude -p 'Review this diff\
    \ for bugs, security issues, and style problems. Be thorough.' --max-turns 1\"\
    , timeout=60)\n```\n\n### Deep Review (Interactive + Worktree)\n```\nterminal(command=\"\
    tmux new-session -d -s review -x 140 -y 40\")\nterminal(command=\"tmux send-keys\
    \ -t review 'cd /path/to/repo && claude -w pr-review' Enter\")\nterminal(command=\"\
    sleep 5 && tmux send-keys -t review Enter\")  # Trust dialog\nterminal(command=\"\
    sleep 2 && tmux send-keys -t review 'Review all changes vs main. Check for bugs,\
    \ security issues, race conditions, and missing tests.' Enter\")\nterminal(command=\"\
    sleep 30 && tmux capture-pane -t review -p -S -60\")\n```\n\n### PR Review from\
    \ Number\n```\nterminal(command=\"claude -p 'Review this PR thoroughly' --from-pr\
    \ 42 --max-turns 10\", workdir=\"/path/to/repo\", timeout=120)\n```\n\n### Claude\
    \ Worktree with tmux\n```\nterminal(command=\"claude -w feature-x --tmux\", workdir=\"\
    /path/to/repo\")\n```\nCreates an isolated git worktree at `.claude/worktrees/feature-x`\
    \ AND a tmux session for it. Uses iTerm2 native panes when available; add `--tmux=classic`\
    \ for traditional tmux.\n\n## Parallel Claude Instances\n\nRun multiple independent\
    \ Claude tasks simultaneously:\n\n```\n# Task 1: Fix backend\nterminal(command=\"\
    tmux new-session -d -s task1 -x 140 -y 40 && tmux send-keys -t task1 'cd ~/project\
    \ && claude -p \\\"Fix the auth bug in src/auth.py\\\" --allowedTools \\\"Read,Edit\\\
    \" --max-turns 10' Enter\")\n\n# Task 2: Write tests\nterminal(command=\"tmux\
    \ new-session -d -s task2 -x 140 -y 40 && tmux send-keys -t task2 'cd ~/project\
    \ && claude -p \\\"Write integration tests for the API endpoints\\\" --allowedTools\
    \ \\\"Read,Write,Bash\\\" --max-turns 15' Enter\")\n\n# Task 3: Update docs\n\
    terminal(command=\"tmux new-session -d -s task3 -x 140 -y 40 && tmux send-keys\
    \ -t task3 'cd ~/project && claude -p \\\"Update README.md with the new API endpoints\\\
    \" --allowedTools \\\"Read,Edit\\\" --max-turns 5' Enter\")\n\n# Monitor all\n\
    terminal(command=\"sleep 30 && for s in task1 task2 task3; do echo '=== '$s' ===';\
    \ tmux capture-pane -t $s -p -S -5 2>/dev/null; done\")\n```\n\n## CLAUDE.md \u2014\
    \ Project Context File\n\nClaude Code auto-loads `CLAUDE.md` from the project\
    \ root. Use it to persist project context:\n\n```markdown\n# Project: My API\n\
    \n## Architecture\n- FastAPI backend with SQLAlchemy ORM\n- PostgreSQL database,\
    \ Redis cache\n- pytest for testing with 90% coverage target\n\n## Key Commands\n\
    - `make test` \u2014 run full test suite\n- `make lint` \u2014 ruff + mypy\n-\
    \ `make dev` \u2014 start dev server on :8000\n\n## Code Standards\n- Type hints\
    \ on all public functions\n- Docstrings in Google style\n- 2-space indentation\
    \ for YAML, 4-space for Python\n- No wildcard imports\n```\n\n**Be specific.**\
    \ Instead of \"Write good code\", use \"Use 2-space indentation for JS\" or \"\
    Name test files with `.test.ts` suffix.\" Specific instructions save correction\
    \ cycles.\n\n### Rules Directory (Modular CLAUDE.md)\nFor projects with many rules,\
    \ use the rules directory instead of one massive CLAUDE.md:\n- **Project rules:**\
    \ `.claude/rules/*.md` \u2014 team-shared, git-tracked\n- **User rules:** `~/.claude/rules/*.md`\
    \ \u2014 personal, global\n\nEach `.md` file in the rules directory is loaded\
    \ as additional context. This is cleaner than cramming everything into a single\
    \ CLAUDE.md.\n\n### Auto-Memory\nClaude automatically stores learned project context\
    \ in `~/.claude/projects/<project>/memory/`.\n- **Limit:** 25KB or 200 lines per\
    \ project\n- This is separate from CLAUDE.md \u2014 it's Claude's own notes about\
    \ the project, accumulated across sessions\n\n## Custom Subagents\n\nDefine specialized\
    \ agents in `.claude/agents/` (project), `~/.claude/agents/` (personal), or via\
    \ `--agents` CLI flag (session):\n\n### Agent Location Priority\n1. `.claude/agents/`\
    \ \u2014 project-level, team-shared\n2. `--agents` CLI flag \u2014 session-specific,\
    \ dynamic\n3. `~/.claude/agents/` \u2014 user-level, personal\n\n### Creating\
    \ an Agent\n```markdown\n# .claude/agents/security-reviewer.md\n---\nname: security-reviewer\n\
    description: Security-focused code review\nmodel: opus\ntools: [Read, Bash]\n\
    ---\nYou are a senior security engineer. Review code for:\n- Injection vulnerabilities\
    \ (SQL, XSS, command injection)\n- Authentication/authorization flaws\n- Secrets\
    \ in code\n- Unsafe deserialization\n```\n\nInvoke via: `@security-reviewer review\
    \ the auth module`\n\n### Dynamic Agents via CLI\n```\nterminal(command=\"claude\
    \ --agents '{\\\"reviewer\\\": {\\\"description\\\": \\\"Reviews code\\\", \\\"\
    prompt\\\": \\\"You are a code reviewer focused on performance\\\"}}' -p 'Use\
    \ @reviewer to check auth.py'\", timeout=120)\n```\n\nClaude can orchestrate multiple\
    \ agents: \"Use @db-expert to optimize queries, then @security to audit the changes.\"\
    \n\n## Hooks \u2014 Automation on Events\n\nConfigure in `.claude/settings.json`\
    \ (project) or `~/.claude/settings.json` (global):\n\n```json\n{\n  \"hooks\"\
    : {\n    \"PostToolUse\": [{\n      \"matcher\": \"Write(*.py)\",\n      \"hooks\"\
    : [{\"type\": \"command\", \"command\": \"ruff check --fix $CLAUDE_FILE_PATHS\"\
    }]\n    }],\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\"\
    : [{\"type\": \"command\", \"command\": \"if echo \\\"$CLAUDE_TOOL_INPUT\\\" |\
    \ grep -q 'rm -rf'; then echo 'Blocked!' && exit 2; fi\"}]\n    }],\n    \"Stop\"\
    : [{\n      \"hooks\": [{\"type\": \"command\", \"command\": \"echo 'Claude finished\
    \ a response' >> /tmp/claude-activity.log\"}]\n    }]\n  }\n}\n```\n\n### All\
    \ 8 Hook Types\n| Hook | When it fires | Common use |\n|------|--------------|------------|\n\
    | `UserPromptSubmit` | Before Claude processes a user prompt | Input validation,\
    \ logging |\n| `PreToolUse` | Before tool execution | Security gates, block dangerous\
    \ commands (exit 2 = block) |\n| `PostToolUse` | After a tool finishes | Auto-format\
    \ code, run linters |\n| `Notification` | On permission requests or input waits\
    \ | Desktop notifications, alerts |\n| `Stop` | When Claude finishes a response\
    \ | Completion logging, status updates |\n| `SubagentStop` | When a subagent completes\
    \ | Agent orchestration |\n| `PreCompact` | Before context memory is cleared |\
    \ Backup session transcripts |\n| `SessionStart` | When a session begins | Load\
    \ dev context (e.g., `git status`) |\n\n### Hook Environment Variables\n| Variable\
    \ | Content |\n|----------|---------|\n| `CLAUDE_PROJECT_DIR` | Current project\
    \ path |\n| `CLAUDE_FILE_PATHS` | Files being modified |\n| `CLAUDE_TOOL_INPUT`\
    \ | Tool parameters as JSON |\n\n### Security Hook Examples\n```json\n{\n  \"\
    PreToolUse\": [{\n    \"matcher\": \"Bash\",\n    \"hooks\": [{\"type\": \"command\"\
    , \"command\": \"if echo \\\"$CLAUDE_TOOL_INPUT\\\" | grep -qE 'rm -rf|git push.*--force|:(){\
    \ :|:& };:'; then echo 'Dangerous command blocked!' && exit 2; fi\"}]\n  }]\n\
    }\n```\n\n## MCP Integration\n\nAdd external tool servers for databases, APIs,\
    \ and services:\n\n```\n# GitHub integration\nterminal(command=\"claude mcp add\
    \ -s user github -- npx @modelcontextprotocol/server-github\", timeout=30)\n\n\
    # PostgreSQL queries\nterminal(command=\"claude mcp add -s local postgres -- npx\
    \ @anthropic-ai/server-postgres --connection-string postgresql://localhost/mydb\"\
    , timeout=30)\n\n# Puppeteer for web testing\nterminal(command=\"claude mcp add\
    \ puppeteer -- npx @anthropic-ai/server-puppeteer\", timeout=30)\n```\n\n### MCP\
    \ Scopes\n| Flag | Scope | Storage |\n|------|-------|---------|\n| `-s user`\
    \ | Global (all projects) | `~/.claude.json` |\n| `-s local` | This project (personal)\
    \ | `.claude/settings.local.json` (gitignored) |\n| `-s project` | This project\
    \ (team-shared) | `.claude/settings.json` (git-tracked) |\n\n### MCP in Print/CI\
    \ Mode\n```\nterminal(command=\"claude --bare -p 'Query database' --mcp-config\
    \ mcp-servers.json --strict-mcp-config\", timeout=60)\n```\n`--strict-mcp-config`\
    \ ignores all MCP servers except those from `--mcp-config`.\n\nReference MCP resources\
    \ in chat: `@github:issue://123`\n\n### MCP Limits & Tuning\n- **Tool descriptions:**\
    \ 2KB cap per server for tool descriptions and server instructions\n- **Result\
    \ size:** Default capped; use `maxResultSizeChars` annotation to allow up to **500K**\
    \ characters for large outputs\n- **Output tokens:** `export MAX_MCP_OUTPUT_TOKENS=50000`\
    \ \u2014 cap output from MCP servers to prevent context flooding\n- **Transports:**\
    \ `stdio` (local process), `http` (remote), `sse` (server-sent events)\n\n## Monitoring\
    \ Interactive Sessions\n\n### Reading the TUI Status\n```\n# Periodic capture\
    \ to check if Claude is still working or waiting for input\nterminal(command=\"\
    tmux capture-pane -t dev -p -S -10\")\n```\n\nLook for these indicators:\n- `\u276F\
    ` at bottom = waiting for your input (Claude is done or asking a question)\n-\
    \ `\u25CF` lines = Claude is actively using tools (reading, writing, running commands)\n\
    - `\u23F5\u23F5 bypass permissions on` = status bar showing permissions mode\n\
    - `\u25D0 medium \xB7 /effort` = current effort level in status bar\n- `ctrl+o\
    \ to expand` = tool output was truncated (can be expanded interactively)\n\n###\
    \ Context Window Health\nUse `/context` in interactive mode to see a colored grid\
    \ of context usage. Key thresholds:\n- **< 70%** \u2014 Normal operation, full\
    \ precision\n- **70-85%** \u2014 Precision starts dropping, consider `/compact`\n\
    - **> 85%** \u2014 Hallucination risk spikes significantly, use `/compact` or\
    \ `/clear`\n\n## Environment Variables\n\n| Variable | Effect |\n|----------|--------|\n\
    | `ANTHROPIC_API_KEY` | API key for authentication (alternative to OAuth) |\n\
    | `CLAUDE_CODE_EFFORT_LEVEL` | Default effort: `low`, `medium`, `high`, `max`,\
    \ or `auto` |\n| `MAX_THINKING_TOKENS` | Cap thinking tokens (set to `0` to disable\
    \ thinking entirely) |\n| `MAX_MCP_OUTPUT_TOKENS` | Cap output from MCP servers\
    \ (default varies; set e.g., `50000`) |\n| `CLAUDE_CODE_NO_FLICKER=1` | Enable\
    \ alt-screen rendering to eliminate terminal flicker |\n| `CLAUDE_CODE_SUBPROCESS_ENV_SCRUB`\
    \ | Strip credentials from sub-processes for security |\n\n## Cost & Performance\
    \ Tips\n\n1. **Use `--max-turns`** in print mode to prevent runaway loops. Start\
    \ with 5-10 for most tasks.\n2. **Use `--max-budget-usd`** for cost caps. Note:\
    \ minimum ~$0.05 for system prompt cache creation.\n3. **Use `--effort low`**\
    \ for simple tasks (faster, cheaper). `high` or `max` for complex reasoning.\n\
    4. **Use `--bare`** for CI/scripting to skip plugin/hook discovery overhead.\n\
    5. **Use `--allowedTools`** to restrict to only what's needed (e.g., `Read` only\
    \ for reviews).\n6. **Use `/compact`** in interactive sessions when context gets\
    \ large.\n7. **Pipe input** instead of having Claude read files when you just\
    \ need analysis of known content.\n8. **Use `--model haiku`** for simple tasks\
    \ (cheaper) and `--model opus` for complex multi-step work.\n9. **Use `--fallback-model\
    \ haiku`** in print mode to gracefully handle model overload.\n10. **Start new\
    \ sessions for distinct tasks** \u2014 sessions last 5 hours; fresh context is\
    \ more efficient.\n11. **Use `--no-session-persistence`** in CI to avoid accumulating\
    \ saved sessions on disk.\n\n## Pitfalls & Gotchas\n\n1. **Interactive mode REQUIRES\
    \ tmux** \u2014 Claude Code is a full TUI app. Using `pty=true` alone in Hermes\
    \ terminal works but tmux gives you `capture-pane` for monitoring and `send-keys`\
    \ for input, which is essential for orchestration.\n2. **`--dangerously-skip-permissions`\
    \ dialog defaults to \"No, exit\"** \u2014 you must send Down then Enter to accept.\
    \ Print mode (`-p`) skips this entirely.\n3. **`--max-budget-usd` minimum is ~$0.05**\
    \ \u2014 system prompt cache creation alone costs this much. Setting lower will\
    \ error immediately.\n4. **`--max-turns` is print-mode only** \u2014 ignored in\
    \ interactive sessions.\n5. **Claude may use `python` instead of `python3`** \u2014\
    \ on systems without a `python` symlink, Claude's bash commands will fail on first\
    \ try but it self-corrects.\n6. **Session resumption requires same directory**\
    \ \u2014 `--continue` finds the most recent session for the current working directory.\n\
    7. **`--json-schema` needs enough `--max-turns`** \u2014 Claude must read files\
    \ before producing structured output, which takes multiple turns.\n8. **Trust\
    \ dialog only appears once per directory** \u2014 first-time only, then cached.\n\
    9. **Background tmux sessions persist** \u2014 always clean up with `tmux kill-session\
    \ -t <name>` when done.\n10. **Slash commands (like `/commit`) only work in interactive\
    \ mode** \u2014 in `-p` mode, describe the task in natural language instead.\n\
    11. **`--bare` skips OAuth** \u2014 requires `ANTHROPIC_API_KEY` env var or an\
    \ `apiKeyHelper` in settings.\n12. **Context degradation is real** \u2014 AI output\
    \ quality measurably degrades above 70% context window usage. Monitor with `/context`\
    \ and proactively `/compact`.\n\n## Rules for Hermes Agents\n\n1. **Prefer print\
    \ mode (`-p`) for single tasks** \u2014 cleaner, no dialog handling, structured\
    \ output\n2. **Use tmux for multi-turn interactive work** \u2014 the only reliable\
    \ way to orchestrate the TUI\n3. **Always set `workdir`** \u2014 keep Claude focused\
    \ on the right project directory\n4. **Set `--max-turns` in print mode** \u2014\
    \ prevents infinite loops and runaway costs\n5. **Monitor tmux sessions** \u2014\
    \ use `tmux capture-pane -t <session> -p -S -50` to check progress\n6. **Look\
    \ for the `\u276F` prompt** \u2014 indicates Claude is waiting for input (done\
    \ or asking a question)\n7. **Clean up tmux sessions** \u2014 kill them when done\
    \ to avoid resource leaks\n8. **Report results to user** \u2014 after completion,\
    \ summarize what Claude did and what changed\n9. **Don't kill slow sessions**\
    \ \u2014 Claude may be doing multi-step work; check progress instead\n10. **Use\
    \ `--allowedTools`** \u2014 restrict capabilities to what the task actually needs\n"
