    \ Load this whenever\n  you're starting from an official template.\n\n**Scripts\
    \ (`scripts/`):**\n\n| Script | Purpose |\n|--------|---------|\n| `_common.py`\
    \ | Shared HTTP, cloud routing, node catalogs (don't run directly) |\n| `hardware_check.py`\
    \ | Probe GPU/VRAM/disk \u2192 recommend local vs Comfy Cloud |\n| `comfyui_setup.sh`\
    \ | Hardware check + comfy-cli + ComfyUI install + launch + verify |\n| `extract_schema.py`\
    \ | Read a workflow \u2192 list controllable params + model deps |\n| `check_deps.py`\
    \ | Check workflow against running server \u2192 list missing nodes/models |\n\
    | `auto_fix_deps.py` | Run check_deps then `comfy node install` / `comfy model\
    \ download` |\n| `run_workflow.py` | Inject params, submit, monitor, download\
    \ outputs (HTTP or WS) |\n| `run_batch.py` | Submit a workflow N times with sweeps,\
    \ parallel up to your tier |\n| `ws_monitor.py` | Real-time WebSocket viewer for\
    \ executing jobs (live progress) |\n| `health_check.py` | Verification checklist\
    \ runner \u2014 comfy-cli + server + models + smoke test |\n| `fetch_logs.py`\
    \ | Pull traceback / status messages for a given prompt_id |\n\n**Example workflows\
    \ (`workflows/`):** SD 1.5, SDXL, Flux Dev, SDXL img2img,\nSDXL inpaint, ESRGAN\
    \ upscale, AnimateDiff video, Wan T2V. See\n`workflows/README.md`.\n\n## When\
    \ to Use\n\n- User asks to generate images with Stable Diffusion, SDXL, Flux,\
