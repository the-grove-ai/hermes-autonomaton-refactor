    \n# ComfyUI\n\nGenerate images, video, audio, and 3D content through ComfyUI using\
    \ the\nofficial `comfy-cli` for setup/lifecycle and direct REST/WebSocket API\n\
    for workflow execution.\n\n## What's in this skill\n\n**Reference docs (`references/`):**\n\
    \n- `official-cli.md` \u2014 every `comfy ...` command, with flags\n- `rest-api.md`\
    \ \u2014 REST + WebSocket endpoints (local + cloud), payload schemas\n- `workflow-format.md`\
