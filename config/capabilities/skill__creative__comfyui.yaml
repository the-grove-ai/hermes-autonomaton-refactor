    \u2500\u2510\n\u2502 Layer 2: REST/WebSocket API + skill scripts         \u2502\
    \n\u2502   Workflow execution, param injection, monitoring   \u2502\n\u2502  \
    \ POST /api/prompt, GET /api/view, WS /ws           \u2502\n\u2502   \u2192 run_workflow.py,\
    \ run_batch.py, ws_monitor.py    \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n**Why two layers?**\
    \ The official CLI is excellent for installation and server\nmanagement but has\
    \ minimal workflow execution support. The REST/WS API fills\nthat gap \u2014 the\
    \ scripts handle param injection, execution monitoring, and\noutput download that\
    \ the CLI doesn't do.\n\n## Quick Start\n\n### Detect environment\n\n```bash\n\
    # What's available?\ncommand -v comfy >/dev/null 2>&1 && echo \"comfy-cli: installed\"\
    \ncurl -s http://127.0.0.1:8188/system_stats 2>/dev/null && echo \"server: running\"\
    \n\n# Can this machine run ComfyUI locally? (GPU/VRAM/disk check)\npython3 scripts/hardware_check.py\n\
    ```\n\nIf nothing is installed, see **Setup & Onboarding** below \u2014 but always\
    \ run the\nhardware check first.\n\n### One-line health check\n\n```bash\npython3\
    \ scripts/health_check.py\n# \u2192 JSON: comfy_cli on PATH? server reachable?\
    \ at least one checkpoint? smoke-test passes?\n```\n\n## Core Workflow\n\n###\
    \ Step 1: Get a workflow JSON in API format\n\nWorkflows must be in API format\
    \ (each node has `class_type`). They come from:\n\n- ComfyUI web UI \u2192 **Workflow\
    \ \u2192 Export (API)** (newer UI) or\n  the legacy \"Save (API Format)\" button\
    \ (older UI)\n- This skill's `workflows/` directory (ready-to-run examples)\n\
    - Community downloads (civitai, Reddit, Discord) \u2014 usually editor format,\n\
    \  must be loaded into ComfyUI then re-exported\n\nEditor format (top-level `nodes`\
    \ and `links` arrays) is **not directly\nexecutable**. The scripts detect this\
    \ and tell you to re-export.\n\n### Step 2: See what's controllable\n\n```bash\n\
    python3 scripts/extract_schema.py workflow_api.json --summary-only\n# \u2192 {\"\
    parameter_count\": 12, \"has_negative_prompt\": true, \"has_seed\": true, ...}\n\
    \npython3 scripts/extract_schema.py workflow_api.json\n# \u2192 full schema with\
    \ parameters, model deps, embedding refs\n```\n\n### Step 3: Run with parameters\n\
    \n```bash\n# Local (defaults to http://127.0.0.1:8188)\npython3 scripts/run_workflow.py\
    \ \\\n  --workflow workflow_api.json \\\n  --args '{\"prompt\": \"a beautiful\
    \ sunset over mountains\", \"seed\": -1, \"steps\": 30}' \\\n  --output-dir ./outputs\n\
    \n# Cloud (export API key once; uses correct /api routing automatically)\nexport\
    \ COMFY_CLOUD_API_KEY=\"comfyui-...\"\npython3 scripts/run_workflow.py \\\n  --workflow\
    \ workflow_api.json \\\n  --args '{\"prompt\": \"...\"}' \\\n  --host https://cloud.comfy.org\
    \ \\\n  --output-dir ./outputs\n\n# Real-time progress via WebSocket (requires\
    \ `pip install websocket-client`)\npython3 scripts/run_workflow.py \\\n  --workflow\
    \ flux_dev.json \\\n  --args '{\"prompt\": \"...\"}' \\\n  --ws\n\n# img2img /\
    \ inpaint: pass --input-image to upload + reference automatically\npython3 scripts/run_workflow.py\
    \ \\\n  --workflow sdxl_img2img.json \\\n  --input-image image=./photo.png \\\n\
    \  --args '{\"prompt\": \"make it watercolor\", \"denoise\": 0.6}'\n\n# Batch\
    \ / sweep: 8 random seeds, parallel up to cloud tier limit\npython3 scripts/run_batch.py\
    \ \\\n  --workflow sdxl.json \\\n  --args '{\"prompt\": \"abstract\"}' \\\n  --count\
    \ 8 --randomize-seed --parallel 3 \\\n  --output-dir ./outputs/batch\n```\n\n\
    `-1` for `seed` (or omitting it with `--randomize-seed`) generates a fresh\nrandom\
    \ seed per run.\n\n### Step 4: Present results\n\nThe scripts emit JSON to stdout\
    \ describing every output file:\n\n```json\n{\n  \"status\": \"success\",\n  \"\
    prompt_id\": \"abc-123\",\n  \"outputs\": [\n    {\"file\": \"./outputs/sdxl_00001_.png\"\
    , \"node_id\": \"9\",\n     \"type\": \"image\", \"filename\": \"sdxl_00001_.png\"\
    }\n  ]\n}\n```\n\n## Decision Tree\n\n| User says | Tool | Command |\n|-----------|------|---------|\n\
    | **Lifecycle (use comfy-cli)** | | |\n| \"install ComfyUI\" | comfy-cli | `bash\
    \ scripts/comfyui_setup.sh` |\n| \"start ComfyUI\" | comfy-cli | `comfy launch\
