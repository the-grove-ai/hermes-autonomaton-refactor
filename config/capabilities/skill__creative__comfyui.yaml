    \ video/audio/3D generation via AnimateDiff, Hunyuan, Wan, AudioCraft, etc.\n\n\
    ## Architecture: Two Layers\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
