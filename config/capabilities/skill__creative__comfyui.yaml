    \ |\n| \"free GPU memory\" | REST | `curl -X POST http://HOST:8188/free` |\n\n\
    ## Setup & Onboarding\n\nWhen a user asks to set up ComfyUI, **the FIRST thing\
    \ to do is ask whether\nthey want Comfy Cloud (hosted, zero install, API key)\
    \ or Local (install\nComfyUI on their machine)**. Don't start running install\
    \ commands or hardware\nchecks until they've answered.\n\n**Official docs:** https://docs.comfy.org/installation\n\
    **CLI docs:** https://docs.comfy.org/comfy-cli/getting-started\n**Cloud docs:**\
    \ https://docs.comfy.org/get_started/cloud\n**Cloud API:** https://docs.comfy.org/development/cloud/overview\n\
    \n### Step 0: Ask Local vs Cloud (ALWAYS FIRST)\n\nSuggested script:\n\n> \"Do\
    \ you want to run ComfyUI locally on your machine, or use Comfy Cloud?\n>\n> -\
    \ **Comfy Cloud** \u2014 hosted on RTX 6000 Pro GPUs, all common models pre-installed,\n\
    >   zero setup. Requires an API key (paid subscription required to actually run\n\
    >   workflows; free tier is read-only). Best if you don't have a capable GPU.\n\
    > - **Local** \u2014 free, but your machine MUST meet the hardware requirements:\n\
    >   - NVIDIA GPU with **\u22656 GB VRAM** (\u22658 GB for SDXL, \u226512 GB for\
    \ Flux/video), OR\n>   - AMD GPU with ROCm support (Linux), OR\n>   - Apple Silicon\
    \ Mac (M1+) with **\u226516 GB unified memory** (\u226532 GB recommended).\n>\
    \   - Intel Macs and machines with no GPU will NOT work \u2014 use Cloud instead.\n\
    >\n> Which would you like?\"\n\nRouting:\n\n- **Cloud** \u2192 skip to **Path\
    \ A**.\n- **Local** \u2192 run hardware check first, then pick a path from Paths\
    \ B\u2013E based on the verdict.\n- **Unsure** \u2192 run the hardware check and\
    \ let the verdict decide.\n\n### Step 1: Verify Hardware (ONLY if user chose local)\n\
    \n```bash\npython3 scripts/hardware_check.py --json\n# Optional: also probe `torch`\
    \ for actual CUDA/MPS:\npython3 scripts/hardware_check.py --json --check-pytorch\n\
    ```\n\n| Verdict    | Meaning                                                \
    \       | Action |\n|------------|---------------------------------------------------------------|--------|\n\
    | `ok`       | \u22658 GB VRAM (discrete) OR \u226532 GB unified (Apple Silicon)\
    \       | Local install \u2014 use `comfy_cli_flag` from report |\n| `marginal`\
    \ | SD1.5 works; SDXL tight; Flux/video unlikely                  | Local OK for\
    \ light workflows, else **Path A (Cloud)** |\n| `cloud`    | No usable GPU, <6\
    \ GB VRAM, <16 GB Apple unified, Intel Mac, Rosetta Python | **Switch to Cloud**\
    \ unless user explicitly forces local |\n\nThe script also surfaces `wsl: true`\
    \ (WSL2 with NVIDIA passthrough) and\n`rosetta: true` (x86_64 Python on Apple\
    \ Silicon \u2014 must reinstall as ARM64).\n\nIf verdict is `cloud` but the user\
    \ wants local, do not proceed silently.\nShow the `notes` array verbatim and ask\
    \ whether they want to (a) switch to\nCloud or (b) force a local install (will\
    \ OOM or be unusably slow on modern models).\n\n### Choosing an Installation Path\n\
    \nUse the hardware check first. The table below is the fallback for when the\n\
    user has already told you their hardware:\n\n| Situation | Recommended Path |\n\
    |-----------|------------------|\n| `verdict: cloud` from hardware check | **Path\
    \ A: Comfy Cloud** |\n| No GPU / want to try without commitment | **Path A: Comfy\
    \ Cloud** |\n| Windows + NVIDIA + non-technical | **Path B: ComfyUI Desktop**\
    \ |\n| Windows + NVIDIA + technical | **Path C: Portable** or **Path D: comfy-cli**\
    \ |\n| Linux + any GPU | **Path D: comfy-cli** (easiest) |\n| macOS + Apple Silicon\
    \ | **Path B: Desktop** or **Path D: comfy-cli** |\n| Headless / server / CI /\
    \ agents | **Path D: comfy-cli** |\n\nFor the fully automated path (hardware check\
    \ \u2192 install \u2192 launch \u2192 verify):\n\n```bash\nbash scripts/comfyui_setup.sh\n\
    # Or with overrides:\nbash scripts/comfyui_setup.sh --m-series --port=8190 --workspace=/data/comfy\n\
    ```\n\nIt runs `hardware_check.py` internally, refuses to install locally when\
    \ the\nverdict is `cloud` (unless `--force-cloud-override`), picks the right\n\
    `comfy-cli` flag, and prefers `pipx`/`uvx` over global `pip` to avoid polluting\n\
    system Python.\n\n---\n\n### Path A: Comfy Cloud (No Local Install)\n\nFor users\
    \ without a capable GPU or who want zero setup. Hosted on RTX 6000 Pro.\n\n**Docs:**\
    \ https://docs.comfy.org/get_started/cloud\n\n1. Sign up at https://comfy.org/cloud\n\
    2. Generate an API key at https://platform.comfy.org/login\n3. Set the key:\n\
    \   ```bash\n   export COMFY_CLOUD_API_KEY=\"comfyui-xxxxxxxxxxxx\"\n   ```\n\
    4. Run workflows:\n   ```bash\n   python3 scripts/run_workflow.py \\\n     --workflow\
    \ workflows/flux_dev_txt2img.json \\\n     --args '{\"prompt\": \"...\"}' \\\n\
    \     --host https://cloud.comfy.org \\\n     --output-dir ./outputs\n   ```\n\
    \n**Pricing:** https://www.comfy.org/cloud/pricing\n**Concurrent jobs:** Free/Standard\
    \ 1, Creator 3, Pro 5. Free tier\n**cannot run workflows via API** \u2014 only\
    \ browse models. Paid subscription\nrequired for `/api/prompt`, `/api/upload/*`,\
    \ `/api/view`, etc.\n\n---\n\n### Path B: ComfyUI Desktop (Windows / macOS)\n\n\
    One-click installer for non-technical users. Currently Beta.\n\n**Docs:** https://docs.comfy.org/installation/desktop\n\
    - **Windows (NVIDIA):** https://download.comfy.org/windows/nsis/x64\n- **macOS\
    \ (Apple Silicon):** https://comfy.org\n\nLinux is **not supported** for Desktop\
    \ \u2014 use Path D.\n\n---\n\n### Path C: ComfyUI Portable (Windows Only)\n\n\
    **Docs:** https://docs.comfy.org/installation/comfyui_portable_windows\n\nDownload\
    \ from https://github.com/comfyanonymous/ComfyUI/releases, extract,\nrun `run_nvidia_gpu.bat`.\
    \ Update via `update/update_comfyui_stable.bat`.\n\n---\n\n### Path D: comfy-cli\
    \ (All Platforms \u2014 Recommended for Agents)\n\nThe official CLI is the best\
    \ path for headless/automated setups.\n\n**Docs:** https://docs.comfy.org/comfy-cli/getting-started\n\
    \n#### Install comfy-cli\n\n```bash\n# Recommended:\npipx install comfy-cli\n\
    # Or use uvx without installing:\nuvx --from comfy-cli comfy --help\n# Or (if\
    \ pipx/uvx unavailable):\npip install --user comfy-cli\n```\n\nDisable analytics\
    \ non-interactively:\n```bash\ncomfy --skip-prompt tracking disable\n```\n\n####\
    \ Install ComfyUI\n\n```bash\ncomfy --skip-prompt install --nvidia           \
    \   # NVIDIA (CUDA)\ncomfy --skip-prompt install --amd                 # AMD (ROCm,\
    \ Linux)\ncomfy --skip-prompt install --m-series            # Apple Silicon (MPS)\n\
    comfy --skip-prompt install --cpu                 # CPU only (slow)\ncomfy --skip-prompt\
    \ install --nvidia --fast-deps  # uv-based dep resolution\n```\n\nDefault location:\
    \ `~/comfy/ComfyUI` (Linux), `~/Documents/comfy/ComfyUI`\n(macOS/Win). Override\
    \ with `comfy --workspace /custom/path install`.\n\n#### Launch / verify\n\n```bash\n\
    comfy launch --background                       # background daemon on :8188\n\
    comfy launch -- --listen 0.0.0.0 --port 8190    # LAN-accessible custom port\n\
    curl -s http://127.0.0.1:8188/system_stats      # health check\n```\n\n---\n\n\
    ### Path E: Manual Install (Advanced / Unsupported Hardware)\n\nFor Ascend NPU,\
    \ Cambricon MLU, Intel Arc, or other unsupported hardware.\n\n**Docs:** https://docs.comfy.org/installation/manual_install\n\
    \n```bash\ngit clone https://github.com/comfyanonymous/ComfyUI.git\ncd ComfyUI\n\
    pip install torch torchvision torchaudio --extra-index-url https://download.pytorch.org/whl/cu130\n\
    pip install -r requirements.txt\npython main.py\n```\n\n---\n\n### Post-Install:\
    \ Download Models\n\n```bash\n# SDXL (general purpose, ~6.5 GB)\ncomfy model download\
    \ \\\n  --url \"https://huggingface.co/stabilityai/stable-diffusion-xl-base-1.0/resolve/main/sd_xl_base_1.0.safetensors\"\
    \ \\\n  --relative-path models/checkpoints\n\n# SD 1.5 (lighter, ~4 GB, good for\
    \ 6 GB cards)\ncomfy model download \\\n  --url \"https://huggingface.co/stable-diffusion-v1-5/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors\"\
    \ \\\n  --relative-path models/checkpoints\n\n# Flux Dev fp8 (smaller variant,\
    \ ~12 GB)\ncomfy model download \\\n  --url \"https://huggingface.co/Comfy-Org/flux1-dev/resolve/main/flux1-dev-fp8.safetensors\"\
    \ \\\n  --relative-path models/checkpoints\n\n# CivitAI (set token first):\ncomfy\
    \ model download \\\n  --url \"https://civitai.com/api/download/models/128713\"\
    \ \\\n  --relative-path models/checkpoints \\\n  --set-civitai-api-token \"YOUR_TOKEN\"\
    \n```\n\nList installed: `comfy model list`.\n\n### Post-Install: Install Custom\
    \ Nodes\n\n```bash\ncomfy node install comfyui-impact-pack             # popular\
    \ utility pack\ncomfy node install comfyui-animatediff-evolved     # video generation\n\
    comfy node install comfyui-controlnet-aux          # ControlNet preprocessors\n\
    comfy node install comfyui-essentials              # common helpers\ncomfy node\
    \ update all\ncomfy node install-deps --workflow=workflow.json   # install everything\
    \ a workflow needs\n```\n\n### Post-Install: Verify\n\n```bash\npython3 scripts/health_check.py\n\
    # \u2192 comfy_cli on PATH? server reachable? checkpoints? smoke test?\n\npython3\
    \ scripts/check_deps.py my_workflow.json\n# \u2192 are this workflow's nodes/models/embeddings\
    \ installed?\n\npython3 scripts/run_workflow.py \\\n  --workflow workflows/sd15_txt2img.json\
    \ \\\n  --args '{\"prompt\": \"test\", \"steps\": 4}' \\\n  --output-dir ./test-outputs\n\
    ```\n\n## Image Upload (img2img / Inpainting)\n\nThe simplest way is to use `--input-image`\
    \ with `run_workflow.py`:\n\n```bash\npython3 scripts/run_workflow.py \\\n  --workflow\
    \ workflows/sdxl_img2img.json \\\n  --input-image image=./photo.png \\\n  --args\
    \ '{\"prompt\": \"make it cyberpunk\", \"denoise\": 0.6}'\n```\n\nThe flag uploads\
    \ `photo.png`, then injects its server-side filename into\nwhatever schema parameter\
    \ is named `image`. For inpainting, pass both:\n\n```bash\npython3 scripts/run_workflow.py\
    \ \\\n  --workflow workflows/sdxl_inpaint.json \\\n  --input-image image=./photo.png\
    \ \\\n  --input-image mask_image=./mask.png \\\n  --args '{\"prompt\": \"fill\
    \ with flowers\"}'\n```\n\nManual upload via REST:\n```bash\ncurl -X POST \"http://127.0.0.1:8188/upload/image\"\
    \ \\\n  -F \"image=@photo.png\" -F \"type=input\" -F \"overwrite=true\"\n# Returns:\
    \ {\"name\": \"photo.png\", \"subfolder\": \"\", \"type\": \"input\"}\n\n# Cloud\
    \ equivalent:\ncurl -X POST \"https://cloud.comfy.org/api/upload/image\" \\\n\
    \  -H \"X-API-Key: $COMFY_CLOUD_API_KEY\" \\\n  -F \"image=@photo.png\" -F \"\
    type=input\" -F \"overwrite=true\"\n```\n\n## Cloud Specifics\n\n- **Base URL:**\
    \ `https://cloud.comfy.org`\n- **Auth:** `X-API-Key` header (or `?token=KEY` for\
    \ WebSocket)\n- **API key:** set `$COMFY_CLOUD_API_KEY` once and the scripts pick\
    \ it up automatically\n- **Output download:** `/api/view` returns a 302 to a signed\
    \ URL; the scripts\n  follow it and strip `X-API-Key` before fetching from the\
    \ storage backend\n  (don't leak the API key to S3/CloudFront).\n- **Endpoint\
    \ differences from local ComfyUI:**\n  - `/api/object_info`, `/api/queue`, `/api/userdata`\
    \ \u2014 **403 on free tier**;\n    paid only.\n  - `/history` is renamed to `/history_v2`\
    \ on cloud (the scripts route\n    automatically).\n  - `/models/<folder>` is\
    \ renamed to `/experiment/models/<folder>` on cloud\n    (the scripts route automatically).\n\
    \  - `clientId` in WebSocket is currently ignored \u2014 all connections for a\n\
    \    user receive the same broadcast. Filter by `prompt_id` client-side.\n  -\
    \ `subfolder` is accepted on uploads but ignored \u2014 cloud has a flat namespace.\n\
    - **Concurrent jobs:** Free/Standard: 1, Creator: 3, Pro: 5. Extras queue\n  automatically.\
    \ Use `run_batch.py --parallel N` to saturate your tier.\n\n## Queue & System\
    \ Management\n\n```bash\n# Local\ncurl -s http://127.0.0.1:8188/queue | python3\
    \ -m json.tool\ncurl -X POST http://127.0.0.1:8188/queue -d '{\"clear\": true}'\
    \    # cancel pending\ncurl -X POST http://127.0.0.1:8188/interrupt          \
    \            # cancel running\ncurl -X POST http://127.0.0.1:8188/free \\\n  -H\
    \ \"Content-Type: application/json\" \\\n  -d '{\"unload_models\": true, \"free_memory\"\
    : true}'\n\n# Cloud \u2014 same paths under /api/, plus:\npython3 scripts/fetch_logs.py\
    \ --tail-queue --host https://cloud.comfy.org\n```\n\n## Pitfalls\n\n1. **API\
    \ format required** \u2014 every script and the `/api/prompt` endpoint expect\n\
    \   API-format workflow JSON. The scripts detect editor format (top-level\n  \
    \ `nodes` and `links` arrays) and tell you to re-export via\n   \"Workflow \u2192\
    \ Export (API)\" (newer UI) or \"Save (API Format)\" (older UI).\n\n2. **Server\
    \ must be running** \u2014 all execution requires a live server.\n   `comfy launch\
    \ --background` starts one. Verify with\n   `curl http://127.0.0.1:8188/system_stats`.\n\
    \n3. **Model names are exact** \u2014 case-sensitive, includes file extension.\n\
    \   `check_deps.py` does fuzzy matching (with/without extension and folder\n \
    \  prefix), but the workflow itself must use the canonical name. Use\n   `comfy\
    \ model list` to discover what's installed.\n\n4. **Missing custom nodes** \u2014\
    \ \"class_type not found\" means a required node\n   isn't installed. `check_deps.py`\
    \ reports which package to install;\n   `auto_fix_deps.py` runs the install for\
    \ you.\n\n5. **Working directory** \u2014 `comfy-cli` auto-detects the ComfyUI\
    \ workspace.\n   If commands fail with \"no workspace found\", use\n   `comfy\
    \ --workspace /path/to/ComfyUI <command>` or\n   `comfy set-default /path/to/ComfyUI`.\n\
    \n6. **Cloud free-tier API limits** \u2014 `/api/prompt`, `/api/view`, `/api/upload/*`,\n\
    \   `/api/object_info` all return 403 on free accounts. `health_check.py` and\n\
    \   `check_deps.py` handle this gracefully and surface a clear message.\n\n7.\
    \ **Timeout for video/audio workflows** \u2014 auto-detected when an output node\n\
    \   is `VHS_VideoCombine`, `SaveVideo`, etc.; the default jumps from 300 s to\n\
    \   900 s. Override explicitly with `--timeout 1800`.\n\n8. **Path traversal in\
    \ output filenames** \u2014 server-supplied filenames are\n   passed through `safe_path_join`\
    \ to refuse anything escaping `--output-dir`.\n   Keep this protection on \u2014\
    \ workflows with custom save nodes can produce\n   arbitrary paths.\n\n9. **Workflow\
    \ JSON is arbitrary code** \u2014 custom nodes run Python, so\n   submitting an\
    \ unknown workflow has the same trust profile as `eval`.\n   Inspect workflows\
    \ from untrusted sources before running.\n\n10. **Auto-randomized seed** \u2014\
    \ pass `seed: -1` in `--args` (or use\n    `--randomize-seed` and omit the seed)\
    \ to get a fresh seed per run.\n    The actual seed is logged to stderr.\n\n11.\
    \ **`tracking` prompt** \u2014 first run of `comfy` may prompt for analytics.\n\
    \    Use `comfy --skip-prompt tracking disable` to skip non-interactively.\n \
    \   `comfyui_setup.sh` does this for you.\n\n## Verification Checklist\n\nUse\
    \ `python3 scripts/health_check.py` to run the whole list at once. Manual:\n\n\
    - [ ] `hardware_check.py` verdict is `ok` OR the user explicitly chose Comfy Cloud\n\
    - [ ] `comfy --version` works (or `uvx --from comfy-cli comfy --help`)\n- [ ]\
    \ `curl http://HOST:PORT/system_stats` returns JSON\n- [ ] `comfy model list`\
    \ shows at least one checkpoint (local) OR\n      `/api/experiment/models/checkpoints`\
    \ returns models (cloud)\n- [ ] Workflow JSON is in API format\n- [ ] `check_deps.py`\
    \ reports `is_ready: true` (or only `node_check_skipped`\n      on cloud free\
    \ tier)\n- [ ] Test run with a small workflow completes; outputs land in `--output-dir`\n"
