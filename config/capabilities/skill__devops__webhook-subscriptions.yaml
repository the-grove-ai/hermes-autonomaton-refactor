  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: webhook-subscriptions\n\
    description: \"Webhook subscriptions: event-driven agent runs.\"\nversion: 1.1.0\n\
    platforms: [linux, macos, windows]\nmetadata:\n  hermes:\n    tags: [webhook,\
    \ events, automation, integrations, notifications, push]\n---\n\n# Webhook Subscriptions\n\
    \nCreate dynamic webhook subscriptions so external services (GitHub, GitLab, Stripe,\
    \ CI/CD, IoT sensors, monitoring tools) can trigger Hermes agent runs by POSTing\
    \ events to a URL.\n\n## Setup (Required First)\n\nThe webhook platform must be\
    \ enabled before subscriptions can be created. Check with:\n```bash\nhermes webhook\
    \ list\n```\n\nIf it says \"Webhook platform is not enabled\", set it up:\n\n\
    ### Option 1: Setup wizard\n```bash\nhermes gateway setup\n```\nFollow the prompts\
    \ to enable webhooks, set the port, and set a global HMAC secret.\n\n### Option\
    \ 2: Manual config\nAdd to `~/.hermes/config.yaml`:\n```yaml\nplatforms:\n  webhook:\n\
    \    enabled: true\n    extra:\n      host: \"0.0.0.0\"\n      port: 8644\n  \
    \    secret: \"generate-a-strong-secret-here\"\n```\n\n### Option 3: Environment\
    \ variables\nAdd to `~/.hermes/.env`:\n```bash\nWEBHOOK_ENABLED=true\nWEBHOOK_PORT=8644\n\
    WEBHOOK_SECRET=generate-a-strong-secret-here\n```\n\nAfter configuration, start\
    \ (or restart) the gateway:\n```bash\nhermes gateway run\n# Or if using systemd:\n\
    systemctl --user restart hermes-gateway\n```\n\nVerify it's running:\n```bash\n\
    curl http://localhost:8644/health\n```\n\n## Commands\n\nAll management is via\
    \ the `hermes webhook` CLI command:\n\n### Create a subscription\n```bash\nhermes\
    \ webhook subscribe <name> \\\n  --prompt \"Prompt template with {payload.fields}\"\
    \ \\\n  --events \"event1,event2\" \\\n  --description \"What this does\" \\\n\
    \  --skills \"skill1,skill2\" \\\n  --deliver telegram \\\n  --deliver-chat-id\
    \ \"12345\" \\\n  --secret \"optional-custom-secret\"\n```\n\nReturns the webhook\
    \ URL and HMAC secret. The user configures their service to POST to that URL.\n\
    \n### List subscriptions\n```bash\nhermes webhook list\n```\n\n### Remove a subscription\n\
    ```bash\nhermes webhook remove <name>\n```\n\n### Test a subscription\n```bash\n\
    hermes webhook test <name>\nhermes webhook test <name> --payload '{\"key\": \"\
    value\"}'\n```\n\n## Prompt Templates\n\nPrompts support `{dot.notation}` for\
    \ accessing nested payload fields:\n\n- `{issue.title}` \u2014 GitHub issue title\n\
    - `{pull_request.user.login}` \u2014 PR author\n- `{data.object.amount}` \u2014\
    \ Stripe payment amount\n- `{sensor.temperature}` \u2014 IoT sensor reading\n\n\
    If no prompt is specified, the full JSON payload is dumped into the agent prompt.\n\
    \n## Common Patterns\n\n### GitHub: new issues\n```bash\nhermes webhook subscribe\
    \ github-issues \\\n  --events \"issues\" \\\n  --prompt \"New GitHub issue #{issue.number}:\
    \ {issue.title}\\n\\nAction: {action}\\nAuthor: {issue.user.login}\\nBody:\\n{issue.body}\\\
    n\\nPlease triage this issue.\" \\\n  --deliver telegram \\\n  --deliver-chat-id\
    \ \"-100123456789\"\n```\n\nThen in GitHub repo Settings \u2192 Webhooks \u2192\
    \ Add webhook:\n- Payload URL: the returned webhook_url\n- Content type: application/json\n\
    - Secret: the returned secret\n- Events: \"Issues\"\n\n### GitHub: PR reviews\n\
    ```bash\nhermes webhook subscribe github-prs \\\n  --events \"pull_request\" \\\
    \n  --prompt \"PR #{pull_request.number} {action}: {pull_request.title}\\nBy:\
    \ {pull_request.user.login}\\nBranch: {pull_request.head.ref}\\n\\n{pull_request.body}\"\
    \ \\\n  --skills \"github-code-review\" \\\n  --deliver github_comment\n```\n\n\
    ### Stripe: payment events\n```bash\nhermes webhook subscribe stripe-payments\
    \ \\\n  --events \"payment_intent.succeeded,payment_intent.payment_failed\" \\\
    \n  --prompt \"Payment {data.object.status}: {data.object.amount} cents from {data.object.receipt_email}\"\
    \ \\\n  --deliver telegram \\\n  --deliver-chat-id \"-100123456789\"\n```\n\n\
    ### CI/CD: build notifications\n```bash\nhermes webhook subscribe ci-builds \\\
    \n  --events \"pipeline\" \\\n  --prompt \"Build {object_attributes.status} on\
    \ {project.name} branch {object_attributes.ref}\\nCommit: {commit.message}\" \\\
    \n  --deliver discord \\\n  --deliver-chat-id \"1234567890\"\n```\n\n### Generic\
    \ monitoring alert\n```bash\nhermes webhook subscribe alerts \\\n  --prompt \"\
    Alert: {alert.name}\\nSeverity: {alert.severity}\\nMessage: {alert.message}\\\
    n\\nPlease investigate and suggest remediation.\" \\\n  --deliver origin\n```\n\
    \n### Direct delivery (no agent, zero LLM cost)\n\nFor use cases where you just\
    \ want to push a notification through to a user's chat \u2014 no reasoning, no\
    \ agent loop \u2014 add `--deliver-only`. The rendered `--prompt` template becomes\
    \ the literal message body and is dispatched directly to the target adapter.\n\
    \nUse this for:\n- External service push notifications (Supabase/Firebase webhooks\
    \ \u2192 Telegram)\n- Monitoring alerts that should forward verbatim\n- Inter-agent\
    \ pings where one agent is telling another agent's user something\n- Any webhook\
    \ where an LLM round trip would be wasted effort\n\n```bash\nhermes webhook subscribe\
    \ antenna-matches \\\n  --deliver telegram \\\n  --deliver-chat-id \"123456789\"\
    \ \\\n  --deliver-only \\\n  --prompt \"\U0001F389 New match: {match.user_name}\
    \ matched with you!\" \\\n  --description \"Antenna match notifications\"\n```\n\
    \nThe POST returns `200 OK` on successful delivery, `502` on target failure \u2014\
    \ so upstream services can retry intelligently. HMAC auth, rate limits, and idempotency\
    \ still apply.\n\nRequires `--deliver` to be a real target (telegram, discord,\
    \ slack, github_comment, etc.) \u2014 `--deliver log` is rejected because log-only\
    \ direct delivery is pointless.\n\n## Security\n\n- Each subscription gets an\
    \ auto-generated HMAC-SHA256 secret (or provide your own with `--secret`)\n- The\
    \ webhook adapter validates signatures on every incoming POST\n- Static routes\
    \ from config.yaml cannot be overwritten by dynamic subscriptions\n- Subscriptions\
    \ persist to `~/.hermes/webhook_subscriptions.json`\n\n## How It Works\n\n1. `hermes\
    \ webhook subscribe` writes to `~/.hermes/webhook_subscriptions.json`\n2. The\
    \ webhook adapter hot-reloads this file on each incoming request (mtime-gated,\
    \ negligible overhead)\n3. When a POST arrives matching a route, the adapter formats\
    \ the prompt and triggers an agent run\n4. The agent's response is delivered to\
    \ the configured target (Telegram, Discord, GitHub comment, etc.)\n\n## Troubleshooting\n\
    \nIf webhooks aren't working:\n\n1. **Is the gateway running?** Check with `systemctl\
    \ --user status hermes-gateway` or `ps aux | grep gateway`\n2. **Is the webhook\
    \ server listening?** `curl http://localhost:8644/health` should return `{\"status\"\
    : \"ok\"}`\n3. **Check gateway logs:** `grep webhook ~/.hermes/logs/gateway.log\
    \ | tail -20`\n4. **Signature mismatch?** Verify the secret in your service matches\
    \ the one from `hermes webhook list`. GitHub sends `X-Hub-Signature-256`, GitLab\
    \ sends `X-Gitlab-Token`.\n5. **Firewall/NAT?** The webhook URL must be reachable\
    \ from the service. For local development, use a tunnel (ngrok, cloudflared).\n\
    6. **Wrong event type?** Check `--events` filter matches what the service sends.\
    \ Use `hermes webhook test <name>` to verify the route works.\n"
