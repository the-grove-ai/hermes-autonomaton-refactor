  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: baoyu-comic\ndescription:\
    \ \"Knowledge comics (\u77E5\u8BC6\u6F2B\u753B): educational, biography, tutorial.\"\
    \nversion: 1.56.1\nauthor: \u5B9D\u7389 (JimLiu)\nlicense: MIT\nplatforms: [linux,\
    \ macos, windows]\nmetadata:\n  hermes:\n    tags: [comic, knowledge-comic, creative,\
    \ image-generation]\n    homepage: https://github.com/JimLiu/baoyu-skills#baoyu-comic\n\
    ---\n\n# Knowledge Comic Creator\n\nAdapted from [baoyu-comic](https://github.com/JimLiu/baoyu-skills)\
    \ for Hermes Agent's tool ecosystem.\n\nCreate original knowledge comics with\
    \ flexible art style \xD7 tone combinations.\n\n## When to Use\n\nTrigger this\
    \ skill when the user asks to create a knowledge/educational comic, biography\
    \ comic, tutorial comic, or uses terms like \"\u77E5\u8BC6\u6F2B\u753B\", \"\u6559\
    \u80B2\u6F2B\u753B\", or \"Logicomix-style\". The user provides content (text,\
    \ file path, URL, or topic) and optionally specifies art style, tone, layout,\
    \ aspect ratio, or language.\n\n## Reference Images\n\nHermes' `image_generate`\
    \ tool is **prompt-only** \u2014 it accepts a text prompt and an aspect ratio,\
    \ and returns an image URL. It does **NOT** accept reference images. When the\
    \ user supplies a reference image, use it to **extract traits in text** that get\
    \ embedded in every page prompt:\n\n**Intake**: Accept file paths when the user\
    \ provides them (or pastes images in conversation).\n- File path(s) \u2192 copy\
    \ to `refs/NN-ref-{slug}.{ext}` alongside the comic output for provenance\n- Pasted\
    \ image with no path \u2192 ask the user for the path via `clarify`, or extract\
    \ style traits verbally as a text fallback\n- No reference \u2192 skip this section\n\
    \n**Usage modes** (per reference):\n\n| Usage | Effect |\n|-------|--------|\n\
    | `style` | Extract style traits (line treatment, texture, mood) and append to\
    \ every page's prompt body |\n| `palette` | Extract hex colors and append to every\
    \ page's prompt body |\n| `scene` | Extract scene composition or subject notes\
    \ and append to the relevant page(s) |\n\n**Record in each page's prompt frontmatter**\
    \ when refs exist:\n\n```yaml\nreferences:\n  - ref_id: 01\n    filename: 01-ref-scene.png\n\
    \    usage: style\n    traits: \"muted earth tones, soft-edged ink wash, low-contrast\
    \ backgrounds\"\n```\n\nCharacter consistency is driven by **text descriptions**\
    \ in `characters/characters.md` (written in Step 3) that get embedded inline in\
    \ every page prompt (Step 5). The optional PNG character sheet generated in Step\
    \ 7.1 is a human-facing review artifact, not an input to `image_generate`.\n\n\
    ## Options\n\n### Visual Dimensions\n\n| Option | Values | Description |\n|--------|--------|-------------|\n\
    | Art | ligne-claire (default), manga, realistic, ink-brush, chalk, minimalist\
    \ | Art style / rendering technique |\n| Tone | neutral (default), warm, dramatic,\
    \ romantic, energetic, vintage, action | Mood / atmosphere |\n| Layout | standard\
    \ (default), cinematic, dense, splash, mixed, webtoon, four-panel | Panel arrangement\
    \ |\n| Aspect | 3:4 (default, portrait), 4:3 (landscape), 16:9 (widescreen) |\
    \ Page aspect ratio |\n| Language | auto (default), zh, en, ja, etc. | Output\
    \ language |\n| Refs | File paths | Reference images used for style / palette\
    \ trait extraction (not passed to the image model). See [Reference Images](#reference-images)\
    \ above. |\n\n### Partial Workflow Options\n\n| Option | Description |\n|--------|-------------|\n\
    | Storyboard only | Generate storyboard only, skip prompts and images |\n| Prompts\
    \ only | Generate storyboard + prompts, skip images |\n| Images only | Generate\
    \ images from existing prompts directory |\n| Regenerate N | Regenerate specific\
    \ page(s) only (e.g., `3` or `2,5,8`) |\n\nDetails: [references/partial-workflows.md](references/partial-workflows.md)\n\
    \n### Art, Tone & Preset Catalogue\n\n- **Art styles** (6): `ligne-claire`, `manga`,\
    \ `realistic`, `ink-brush`, `chalk`, `minimalist`. Full definitions at `references/art-styles/<style>.md`.\n\
    - **Tones** (7): `neutral`, `warm`, `dramatic`, `romantic`, `energetic`, `vintage`,\
    \ `action`. Full definitions at `references/tones/<tone>.md`.\n- **Presets** (5)\
    \ with special rules beyond plain art+tone:\n\n  | Preset | Equivalent | Hook\
    \ |\n  |--------|-----------|------|\n  | `ohmsha` | manga + neutral | Visual\
    \ metaphors, no talking heads, gadget reveals |\n  | `wuxia` | ink-brush + action\
    \ | Qi effects, combat visuals, atmospheric |\n  | `shoujo` | manga + romantic\
    \ | Decorative elements, eye details, romantic beats |\n  | `concept-story` |\
    \ manga + warm | Visual symbol system, growth arc, dialogue+action balance |\n\
    \  | `four-panel` | minimalist + neutral + four-panel layout | \u8D77\u627F\u8F6C\
    \u5408 structure, B&W + spot color, stick-figure characters |\n\n  Full rules\
    \ at `references/presets/<preset>.md` \u2014 load the file when a preset is picked.\n\
    \n- **Compatibility matrix** and **content-signal \u2192 preset** table live in\
    \ [references/auto-selection.md](references/auto-selection.md). Read it before\
    \ recommending combinations in Step 2.\n\n## File Structure\n\nOutput directory:\
    \ `comic/{topic-slug}/`\n- Slug: 2-4 words kebab-case from topic (e.g., `alan-turing-bio`)\n\
    - Conflict: append timestamp (e.g., `turing-story-20260118-143052`)\n\n**Contents**:\n\
    | File | Description |\n|------|-------------|\n| `source-{slug}.md` | Saved source\
    \ content (kebab-case slug matches the output directory) |\n| `analysis.md` |\
    \ Content analysis |\n| `storyboard.md` | Storyboard with panel breakdown |\n\
    | `characters/characters.md` | Character definitions |\n| `characters/characters.png`\
    \ | Character reference sheet (downloaded from `image_generate`) |\n| `prompts/NN-{cover\\\
    |page}-[slug].md` | Generation prompts |\n| `NN-{cover\\|page}-[slug].png` | Generated\
    \ images (downloaded from `image_generate`) |\n| `refs/NN-ref-{slug}.{ext}` |\
    \ User-supplied reference images (optional, for provenance) |\n\n## Language Handling\n\
    \n**Detection Priority**:\n1. User-specified language (explicit option)\n2. User's\
    \ conversation language\n3. Source content language\n\n**Rule**: Use user's input\
    \ language for ALL interactions:\n- Storyboard outlines and scene descriptions\n\
    - Image generation prompts\n- User selection options and confirmations\n- Progress\
    \ updates, questions, errors, summaries\n\nTechnical terms remain in English.\n\
    \n## Workflow\n\n### Progress Checklist\n\n```\nComic Progress:\n- [ ] Step 1:\
    \ Setup & Analyze\n  - [ ] 1.1 Analyze content\n  - [ ] 1.2 Check existing directory\n\
    - [ ] Step 2: Confirmation - Style & options \u26A0\uFE0F REQUIRED\n- [ ] Step\
    \ 3: Generate storyboard + characters\n- [ ] Step 4: Review outline (conditional)\n\
    - [ ] Step 5: Generate prompts\n- [ ] Step 6: Review prompts (conditional)\n-\
    \ [ ] Step 7: Generate images\n  - [ ] 7.1 Generate character sheet (if needed)\
    \ \u2192 characters/characters.png\n  - [ ] 7.2 Generate pages (with character\
    \ descriptions embedded in prompt)\n- [ ] Step 8: Completion report\n```\n\n###\
    \ Flow\n\n```\nInput \u2192 Analyze \u2192 [Check Existing?] \u2192 [Confirm:\
    \ Style + Reviews] \u2192 Storyboard \u2192 [Review?] \u2192 Prompts \u2192 [Review?]\
    \ \u2192 Images \u2192 Complete\n```\n\n### Step Summary\n\n| Step | Action |\
    \ Key Output |\n|------|--------|------------|\n| 1.1 | Analyze content | `analysis.md`,\
    \ `source-{slug}.md` |\n| 1.2 | Check existing directory | Handle conflicts |\n\
    | 2 | Confirm style, focus, audience, reviews | User preferences |\n| 3 | Generate\
    \ storyboard + characters | `storyboard.md`, `characters/` |\n| 4 | Review outline\
    \ (if requested) | User approval |\n| 5 | Generate prompts | `prompts/*.md` |\n\
    | 6 | Review prompts (if requested) | User approval |\n| 7.1 | Generate character\
    \ sheet (if needed) | `characters/characters.png` |\n| 7.2 | Generate pages |\
    \ `*.png` files |\n| 8 | Completion report | Summary |\n\n### User Questions\n\
    \nUse the `clarify` tool to confirm options. Since `clarify` handles one question\
    \ at a time, ask the most important question first and proceed sequentially. See\
    \ [references/workflow.md](references/workflow.md) for the full Step 2 question\
    \ set.\n\n**Timeout handling (CRITICAL)**: `clarify` can return `\"The user did\
    \ not provide a response within the time limit. Use your best judgement to make\
    \ the choice and proceed.\"` \u2014 this is NOT user consent to default everything.\n\
    \n- Treat it as a default **for that one question only**. Continue asking the\
    \ remaining Step 2 questions in sequence; each question is an independent consent\
    \ point.\n- **Surface the default to the user visibly** in your next message so\
    \ they have a chance to correct it: e.g. `\"Style: defaulted to ohmsha preset\
    \ (clarify timed out). Say the word to switch.\"` \u2014 an unreported default\
    \ is indistinguishable from never having asked.\n- Do NOT collapse Step 2 into\
    \ a single \"use all defaults\" pass after one timeout. If the user is genuinely\
    \ absent, they will be equally absent for all five questions \u2014 but they can\
    \ correct visible defaults when they return, and cannot correct invisible ones.\n\
    \n### Step 7: Image Generation\n\nUse Hermes' built-in `image_generate` tool for\
    \ all image rendering. Its schema accepts only `prompt` and `aspect_ratio` (`landscape`\
    \ | `portrait` | `square`); it **returns a URL**, not a local file. Every generated\
    \ page or character sheet must therefore be downloaded to the output directory.\n\
    \n**Prompt file requirement (hard)**: write each image's full, final prompt to\
    \ a standalone file under `prompts/` (naming: `NN-{type}-[slug].md`) BEFORE calling\
    \ `image_generate`. The prompt file is the reproducibility record.\n\n**Aspect\
    \ ratio mapping** \u2014 the storyboard's `aspect_ratio` field maps to `image_generate`'s\
    \ format as follows:\n\n| Storyboard ratio | `image_generate` format |\n|------------------|-------------------------|\n\
    | `3:4`, `9:16`, `2:3` | `portrait` |\n| `4:3`, `16:9`, `3:2` | `landscape` |\n\
    | `1:1` | `square` |\n\n**Download step** \u2014 after every `image_generate`\
    \ call:\n1. Read the URL from the tool result\n2. Fetch the image bytes using\
    \ an **absolute** output path, e.g.\n   `curl -fsSL \"<url>\" -o /abs/path/to/comic/<slug>/NN-page-<slug>.png`\n\
    3. Verify the file exists and is non-empty at that exact path before proceeding\
    \ to the next page\n\n**Never rely on shell CWD persistence for `-o` paths.**\
    \ The terminal tool's persistent-shell CWD can change between batches (session\
    \ expiry, `TERMINAL_LIFETIME_SECONDS`, a failed `cd` that leaves you in the wrong\
    \ directory). `curl -o relative/path.png` is a silent footgun: if CWD has drifted,\
    \ the file lands somewhere else with no error. **Always pass a fully-qualified\
    \ absolute path to `-o`**, or pass `workdir=<abs path>` to the terminal tool.\
    \ Incident Apr 2026: pages 06-09 of a 10-page comic landed at the repo root instead\
    \ of `comic/<slug>/` because batch 3 inherited a stale CWD from batch 2 and `curl\
    \ -o 06-page-skills.png` wrote to the wrong directory. The agent then spent several\
    \ turns claiming the files existed where they didn't.\n\n**7.1 Character sheet**\
    \ \u2014 generate it (to `characters/characters.png`, aspect `landscape`) when\
    \ the comic is multi-page with recurring characters. Skip for simple presets (e.g.,\
    \ four-panel minimalist) or single-page comics. The prompt file at `characters/characters.md`\
    \ must exist before invoking `image_generate`. The rendered PNG is a **human-facing\
    \ review artifact** (so the user can visually verify character design) and a reference\
    \ for later regenerations or manual prompt edits \u2014 it does **not** drive\
    \ Step 7.2. Page prompts are already written in Step 5 from the **text descriptions**\
    \ in `characters/characters.md`; `image_generate` cannot accept images as visual\
    \ input.\n\n**7.2 Pages** \u2014 each page's prompt MUST already be at `prompts/NN-{cover|page}-[slug].md`\
    \ before invoking `image_generate`. Because `image_generate` is prompt-only, character\
    \ consistency is enforced by **embedding character descriptions (sourced from\
    \ `characters/characters.md`) inline in every page prompt during Step 5**. The\
    \ embedding is done uniformly whether or not a PNG sheet is produced in 7.1; the\
    \ PNG is only a review/regeneration aid.\n\n**Backup rule**: existing `prompts/\u2026\
    md` and `\u2026png` files \u2192 rename with `-backup-YYYYMMDD-HHMMSS` suffix\
    \ before regenerating.\n\nFull step-by-step workflow (analysis, storyboard, review\
    \ gates, regeneration variants): [references/workflow.md](references/workflow.md).\n\
    \n## References\n\n**Core Templates**:\n- [analysis-framework.md](references/analysis-framework.md)\
    \ - Deep content analysis\n- [character-template.md](references/character-template.md)\
    \ - Character definition format\n- [storyboard-template.md](references/storyboard-template.md)\
    \ - Storyboard structure\n- [ohmsha-guide.md](references/ohmsha-guide.md) - Ohmsha\
    \ manga specifics\n\n**Style Definitions**:\n- `references/art-styles/` - Art\
    \ styles (ligne-claire, manga, realistic, ink-brush, chalk, minimalist)\n- `references/tones/`\
    \ - Tones (neutral, warm, dramatic, romantic, energetic, vintage, action)\n- `references/presets/`\
    \ - Presets with special rules (ohmsha, wuxia, shoujo, concept-story, four-panel)\n\
    - `references/layouts/` - Layouts (standard, cinematic, dense, splash, mixed,\
    \ webtoon, four-panel)\n\n**Workflow**:\n- [workflow.md](references/workflow.md)\
    \ - Full workflow details\n- [auto-selection.md](references/auto-selection.md)\
    \ - Content signal analysis\n- [partial-workflows.md](references/partial-workflows.md)\
    \ - Partial workflow options\n\n## Page Modification\n\n| Action | Steps |\n|--------|-------|\n\
    | **Edit** | **Update prompt file FIRST** \u2192 regenerate image \u2192 download\
    \ new PNG |\n| **Add** | Create prompt at position \u2192 generate with character\
    \ descriptions embedded \u2192 renumber subsequent \u2192 update storyboard |\n\
    | **Delete** | Remove files \u2192 renumber subsequent \u2192 update storyboard\
    \ |\n\n**IMPORTANT**: When updating pages, ALWAYS update the prompt file (`prompts/NN-{cover|page}-[slug].md`)\
    \ FIRST before regenerating. This ensures changes are documented and reproducible.\n\
    \n## Pitfalls\n\n- Image generation: 10-30 seconds per page; auto-retry once on\
    \ failure\n- **Always download** the URL returned by `image_generate` to a local\
    \ PNG \u2014 downstream tooling (and the user's review) expects files in the output\
    \ directory, not ephemeral URLs\n- **Use absolute paths for `curl -o`** \u2014\
    \ never rely on persistent-shell CWD across batches. Silent footgun: files land\
    \ in the wrong directory and subsequent `ls` on the intended path shows nothing.\
    \ See Step 7 \"Download step\".\n- Use stylized alternatives for sensitive public\
    \ figures\n- **Step 2 confirmation required** - do not skip\n- **Steps 4/6 conditional**\
    \ - only if user requested in Step 2\n- **Step 7.1 character sheet** - recommended\
    \ for multi-page comics, optional for simple presets. The PNG is a review/regeneration\
    \ aid; page prompts (written in Step 5) use the text descriptions in `characters/characters.md`,\
    \ not the PNG. `image_generate` does not accept images as visual input\n- **Strip\
    \ secrets** \u2014 scan source content for API keys, tokens, or credentials before\
    \ writing any output file\n"
