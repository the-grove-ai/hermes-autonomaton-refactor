  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: imessage\ndescription:\
    \ Send and receive iMessages/SMS via the imsg CLI on macOS.\nversion: 1.0.0\n\
    author: Hermes Agent\nlicense: MIT\nplatforms: [macos]\nmetadata:\n  hermes:\n\
    \    tags: [iMessage, SMS, messaging, macOS, Apple]\nprerequisites:\n  commands:\
    \ [imsg]\n---\n\n# iMessage\n\nUse `imsg` to read and send iMessage/SMS via macOS\
    \ Messages.app.\n\n## Prerequisites\n\n- **macOS** with Messages.app signed in\n\
    - Install: `brew install steipete/tap/imsg`\n- Grant Full Disk Access for terminal\
    \ (System Settings \u2192 Privacy \u2192 Full Disk Access)\n- Grant Automation\
    \ permission for Messages.app when prompted\n\n## When to Use\n\n- User asks to\
    \ send an iMessage or text message\n- Reading iMessage conversation history\n\
    - Checking recent Messages.app chats\n- Sending to phone numbers or Apple IDs\n\
    \n## When NOT to Use\n\n- Telegram/Discord/Slack/WhatsApp messages \u2192 use\
    \ the appropriate gateway channel\n- Group chat management (adding/removing members)\
    \ \u2192 not supported\n- Bulk/mass messaging \u2192 always confirm with user\
    \ first\n\n## Quick Reference\n\n### List Chats\n\n```bash\nimsg chats --limit\
    \ 10 --json\n```\n\n### View History\n\n```bash\n# By chat ID\nimsg history --chat-id\
    \ 1 --limit 20 --json\n\n# With attachments info\nimsg history --chat-id 1 --limit\
    \ 20 --attachments --json\n```\n\n### Send Messages\n\n```bash\n# Text only\n\
    imsg send --to \"+14155551212\" --text \"Hello!\"\n\n# With attachment\nimsg send\
    \ --to \"+14155551212\" --text \"Check this out\" --file /path/to/image.jpg\n\n\
    # Force iMessage or SMS\nimsg send --to \"+14155551212\" --text \"Hi\" --service\
    \ imessage\nimsg send --to \"+14155551212\" --text \"Hi\" --service sms\n```\n\
    \n### Watch for New Messages\n\n```bash\nimsg watch --chat-id 1 --attachments\n\
    ```\n\n## Service Options\n\n- `--service imessage` \u2014 Force iMessage (requires\
    \ recipient has iMessage)\n- `--service sms` \u2014 Force SMS (green bubble)\n\
    - `--service auto` \u2014 Let Messages.app decide (default)\n\n## Rules\n\n1.\
    \ **Always confirm recipient and message content** before sending\n2. **Never\
    \ send to unknown numbers** without explicit user approval\n3. **Verify file paths**\
    \ exist before attaching\n4. **Don't spam** \u2014 rate-limit yourself\n\n## Example\
    \ Workflow\n\nUser: \"Text mom that I'll be late\"\n\n```bash\n# 1. Find mom's\
    \ chat\nimsg chats --limit 20 --json | jq '.[] | select(.displayName | contains(\"\
    Mom\"))'\n\n# 2. Confirm with user: \"Found Mom at +1555123456. Send 'I'll be\
    \ late' via iMessage?\"\n\n# 3. Send after confirmation\nimsg send --to \"+1555123456\"\
    \ --text \"I'll be late\"\n```\n"
