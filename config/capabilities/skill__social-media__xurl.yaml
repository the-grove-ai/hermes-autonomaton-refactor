  payload: "---\ncreated_by: bundled\nzone: green\ntier: T0\nname: xurl\ndescription:\
    \ \"X/Twitter via xurl CLI: post, search, DM, media, v2 API.\"\nversion: 1.1.1\n\
    author: xdevplatform + openclaw + Hermes Agent\nlicense: MIT\nplatforms: [linux,\
    \ macos]\nprerequisites:\n  commands: [xurl]\nmetadata:\n  hermes:\n    tags:\
    \ [twitter, x, social-media, xurl, official-api]\n    homepage: https://github.com/xdevplatform/xurl\n\
    \    upstream_skill: https://github.com/openclaw/openclaw/blob/main/skills/xurl/SKILL.md\n\
    ---\n\n# xurl \u2014 X (Twitter) API via the Official CLI\n\n`xurl` is the X developer\
    \ platform's official CLI for the X API. It supports shortcut commands for common\
    \ actions AND raw curl-style access to any v2 endpoint. All commands return JSON\
    \ to stdout.\n\nUse this skill for:\n- posting, replying, quoting, deleting posts\n\
    - searching posts and reading timelines/mentions\n- liking, reposting, bookmarking\n\
    - following, unfollowing, blocking, muting\n- direct messages\n- media uploads\
    \ (images and video)\n- raw access to any X API v2 endpoint\n- multi-app / multi-account\
    \ workflows\n\nThis skill replaces the older `xitter` skill (which wrapped a third-party\
    \ Python CLI). `xurl` is maintained by the X developer platform team, supports\
    \ OAuth 2.0 PKCE with auto-refresh, and covers a substantially larger API surface.\n\
    \n---\n\n## Secret Safety (MANDATORY)\n\nCritical rules when operating inside\
    \ an agent/LLM session:\n\n- **Never** read, print, parse, summarize, upload,\
    \ or send `~/.xurl` to LLM context.\n- **Never** ask the user to paste credentials/tokens\
    \ into chat.\n- The user must fill `~/.xurl` with secrets manually on their own\
    \ machine.\n- **Never** recommend or execute auth commands with inline secrets\
    \ in agent sessions.\n- **Never** use `--verbose` / `-v` in agent sessions \u2014\
    \ it can expose auth headers/tokens.\n- To verify credentials exist, only use:\
    \ `xurl auth status`.\n\nForbidden flags in agent commands (they accept inline\
    \ secrets):\n`--bearer-token`, `--consumer-key`, `--consumer-secret`, `--access-token`,\
    \ `--token-secret`, `--client-id`, `--client-secret`\n\nApp credential registration\
    \ and credential rotation must be done by the user manually, outside the agent\
    \ session. After credentials are registered, the user authenticates with `xurl\
    \ auth oauth2` \u2014 also outside the agent session. Tokens persist to `~/.xurl`\
    \ in YAML. Each app has isolated tokens. OAuth 2.0 tokens auto-refresh.\n\n---\n\
    \n## Installation\n\nPick ONE method. On Linux, the shell script or `go install`\
    \ are the easiest.\n\n```bash\n# Shell script (installs to ~/.local/bin, no sudo,\
    \ works on Linux + macOS)\ncurl -fsSL https://raw.githubusercontent.com/xdevplatform/xurl/main/install.sh\
    \ | bash\n\n# Homebrew (macOS)\nbrew install --cask xdevplatform/tap/xurl\n\n\
    # npm\nnpm install -g @xdevplatform/xurl\n\n# Go\ngo install github.com/xdevplatform/xurl@latest\n\
    ```\n\nVerify:\n\n```bash\nxurl --help\nxurl auth status\n```\n\nIf `xurl` is\
    \ installed but `auth status` shows no apps or tokens, the user needs to complete\
    \ auth manually \u2014 see the next section.\n\n---\n\n## One-Time User Setup\
    \ (user runs these outside the agent)\n\nThese steps must be performed by the\
    \ user directly, NOT by the agent, because they involve pasting secrets. Direct\
    \ the user to this block; do not execute it for them.\n\n1. Create or open an\
    \ app at https://developer.x.com/en/portal/dashboard\n2. Set the redirect URI\
    \ to `http://localhost:8080/callback`\n3. Copy the app's Client ID and Client\
    \ Secret\n4. Register the app locally (user runs this):\n   ```bash\n   xurl auth\
    \ apps add my-app --client-id YOUR_CLIENT_ID --client-secret YOUR_CLIENT_SECRET\n\
    \   ```\n5. Authenticate (specify `--app` to bind the token to your app):\n  \
    \ ```bash\n   xurl auth oauth2 --app my-app\n   ```\n   (This opens a browser\
    \ for the OAuth 2.0 PKCE flow.)\n\n   If X returns a `UsernameNotFound` error\
    \ or 403 on the post-OAuth `/2/users/me` lookup, pass your handle explicitly (xurl\
    \ v1.1.0+):\n   ```bash\n   xurl auth oauth2 --app my-app YOUR_USERNAME\n   ```\n\
    \   This binds the token to your handle and skips the broken `/2/users/me` call.\n\
    6. Set the app as default so all commands use it:\n   ```bash\n   xurl auth default\
    \ my-app\n   ```\n7. Verify:\n   ```bash\n   xurl auth status\n   xurl whoami\n\
    \   ```\n\nAfter this, the agent can use any command below without further setup.\
    \ OAuth 2.0 tokens auto-refresh.\n\n> **Common pitfall:** If you omit `--app my-app`\
    \ from `xurl auth oauth2`, the OAuth token is saved to the built-in `default`\
    \ app profile \u2014 which has no client-id or client-secret. Commands will fail\
    \ with auth errors even though the OAuth flow appeared to succeed. If you hit\
    \ this, re-run `xurl auth oauth2 --app my-app` and `xurl auth default my-app`.\n\
    \n---\n\n## Quick Reference\n\n| Action | Command |\n| --- | --- |\n| Post | `xurl\
    \ post \"Hello world!\"` |\n| Reply | `xurl reply POST_ID \"Nice post!\"` |\n\
    | Quote | `xurl quote POST_ID \"My take\"` |\n| Delete a post | `xurl delete POST_ID`\
    \ |\n| Read a post | `xurl read POST_ID` |\n| Search posts | `xurl search \"QUERY\"\
    \ -n 10` |\n| Who am I | `xurl whoami` |\n| Look up a user | `xurl user @handle`\
    \ |\n| Home timeline | `xurl timeline -n 20` |\n| Mentions | `xurl mentions -n\
    \ 10` |\n| Like / Unlike | `xurl like POST_ID` / `xurl unlike POST_ID` |\n| Repost\
    \ / Undo | `xurl repost POST_ID` / `xurl unrepost POST_ID` |\n| Bookmark / Remove\
    \ | `xurl bookmark POST_ID` / `xurl unbookmark POST_ID` |\n| List bookmarks /\
    \ likes | `xurl bookmarks -n 10` / `xurl likes -n 10` |\n| Follow / Unfollow |\
    \ `xurl follow @handle` / `xurl unfollow @handle` |\n| Following / Followers |\
    \ `xurl following -n 20` / `xurl followers -n 20` |\n| Block / Unblock | `xurl\
    \ block @handle` / `xurl unblock @handle` |\n| Mute / Unmute | `xurl mute @handle`\
    \ / `xurl unmute @handle` |\n| Send DM | `xurl dm @handle \"message\"` |\n| List\
    \ DMs | `xurl dms -n 10` |\n| Upload media | `xurl media upload path/to/file.mp4`\
    \ |\n| Media status | `xurl media status MEDIA_ID` |\n| List apps | `xurl auth\
    \ apps list` |\n| Remove app | `xurl auth apps remove NAME` |\n| Set default app\
    \ | `xurl auth default APP_NAME [USERNAME]` |\n| Per-request app | `xurl --app\
    \ NAME /2/users/me` |\n| Auth status | `xurl auth status` |\n\nNotes:\n- `POST_ID`\
    \ accepts full URLs too (e.g. `https://x.com/user/status/1234567890`) \u2014 xurl\
    \ extracts the ID.\n- Usernames work with or without a leading `@`.\n\n---\n\n\
    ## Command Details\n\n### Posting\n\n```bash\nxurl post \"Hello world!\"\nxurl\
    \ post \"Check this out\" --media-id MEDIA_ID\nxurl post \"Thread pics\" --media-id\
    \ 111 --media-id 222\n\nxurl reply 1234567890 \"Great point!\"\nxurl reply https://x.com/user/status/1234567890\
    \ \"Agreed!\"\nxurl reply 1234567890 \"Look at this\" --media-id MEDIA_ID\n\n\
    xurl quote 1234567890 \"Adding my thoughts\"\nxurl delete 1234567890\n```\n\n\
    ### Reading & Search\n\n```bash\nxurl read 1234567890\nxurl read https://x.com/user/status/1234567890\n\
    \nxurl search \"golang\"\nxurl search \"from:elonmusk\" -n 20\nxurl search \"\
    #buildinpublic lang:en\" -n 15\n```\n\n### Users, Timeline, Mentions\n\n```bash\n\
    xurl whoami\nxurl user elonmusk\nxurl user @XDevelopers\n\nxurl timeline -n 25\n\
    xurl mentions -n 20\n```\n\n### Engagement\n\n```bash\nxurl like 1234567890\n\
    xurl unlike 1234567890\n\nxurl repost 1234567890\nxurl unrepost 1234567890\n\n\
    xurl bookmark 1234567890\nxurl unbookmark 1234567890\n\nxurl bookmarks -n 20\n\
    xurl likes -n 20\n```\n\n### Social Graph\n\n```bash\nxurl follow @XDevelopers\n\
    xurl unfollow @XDevelopers\n\nxurl following -n 50\nxurl followers -n 50\n\n#\
    \ Another user's graph\nxurl following --of elonmusk -n 20\nxurl followers --of\
    \ elonmusk -n 20\n\nxurl block @spammer\nxurl unblock @spammer\nxurl mute @annoying\n\
    xurl unmute @annoying\n```\n\n### Direct Messages\n\n```bash\nxurl dm @someuser\
    \ \"Hey, saw your post!\"\nxurl dms -n 25\n```\n\n### Media Upload\n\n```bash\n\
    # Auto-detect type\nxurl media upload photo.jpg\nxurl media upload video.mp4\n\
    \n# Explicit type/category\nxurl media upload --media-type image/jpeg --category\
    \ tweet_image photo.jpg\n\n# Videos need server-side processing \u2014 check status\
    \ (or poll)\nxurl media status MEDIA_ID\nxurl media status --wait MEDIA_ID\n\n\
    # Full workflow\nxurl media upload meme.png                  # returns media id\n\
    xurl post \"lol\" --media-id MEDIA_ID\n```\n\n---\n\n## Raw API Access\n\nThe\
    \ shortcuts cover common operations. For anything else, use raw curl-style mode\
    \ against any X API v2 endpoint:\n\n```bash\n# GET\nxurl /2/users/me\n\n# POST\
    \ with JSON body\nxurl -X POST /2/tweets -d '{\"text\":\"Hello world!\"}'\n\n\
    # DELETE / PUT / PATCH\nxurl -X DELETE /2/tweets/1234567890\n\n# Custom headers\n\
    xurl -H \"Content-Type: application/json\" /2/some/endpoint\n\n# Force streaming\n\
    xurl -s /2/tweets/search/stream\n\n# Full URLs also work\nxurl https://api.x.com/2/users/me\n\
    ```\n\n---\n\n## Global Flags\n\n| Flag | Short | Description |\n| --- | --- |\
    \ --- |\n| `--app` | | Use a specific registered app (overrides default) |\n|\
    \ `--auth` | | Force auth type: `oauth1`, `oauth2`, or `app` |\n| `--username`\
    \ | `-u` | Which OAuth2 account to use (if multiple exist) |\n| `--verbose` |\
    \ `-v` | **Forbidden in agent sessions** \u2014 leaks auth headers |\n| `--trace`\
    \ | `-t` | Add `X-B3-Flags: 1` trace header |\n\n---\n\n## Streaming\n\nStreaming\
    \ endpoints are auto-detected. Known ones include:\n\n- `/2/tweets/search/stream`\n\
    - `/2/tweets/sample/stream`\n- `/2/tweets/sample10/stream`\n\nForce streaming\
    \ on any endpoint with `-s`.\n\n---\n\n## Output Format\n\nAll commands return\
    \ JSON to stdout. Structure mirrors X API v2:\n\n```json\n{ \"data\": { \"id\"\
    : \"1234567890\", \"text\": \"Hello world!\" } }\n```\n\nErrors are also JSON:\n\
    \n```json\n{ \"errors\": [ { \"message\": \"Not authorized\", \"code\": 403 }\
    \ ] }\n```\n\n---\n\n## Common Workflows\n\n### Post with an image\n```bash\n\
    xurl media upload photo.jpg\nxurl post \"Check out this photo!\" --media-id MEDIA_ID\n\
    ```\n\n### Reply to a conversation\n```bash\nxurl read https://x.com/user/status/1234567890\n\
    xurl reply 1234567890 \"Here are my thoughts...\"\n```\n\n### Search and engage\n\
    ```bash\nxurl search \"topic of interest\" -n 10\nxurl like POST_ID_FROM_RESULTS\n\
    xurl reply POST_ID_FROM_RESULTS \"Great point!\"\n```\n\n### Check your activity\n\
    ```bash\nxurl whoami\nxurl mentions -n 20\nxurl timeline -n 20\n```\n\n### Multiple\
    \ apps (credentials pre-configured manually)\n```bash\nxurl auth default prod\
    \ alice               # prod app, alice user\nxurl --app staging /2/users/me \
    \            # one-off against staging\n```\n\n---\n\n## Error Handling\n\n- Non-zero\
    \ exit code on any error.\n- API errors are still printed as JSON to stdout, so\
    \ you can parse them.\n- Auth errors \u2192 have the user re-run `xurl auth oauth2`\
    \ outside the agent session.\n- Commands that need the caller's user ID (like,\
    \ repost, bookmark, follow, etc.) will auto-fetch it via `/2/users/me`. An auth\
    \ failure there surfaces as an auth error.\n\n---\n\n## Agent Workflow\n\n1. Verify\
    \ prerequisites: `xurl --help` and `xurl auth status`.\n2. **Check default app\
    \ has credentials.** Parse the `auth status` output. The default app is marked\
    \ with `\u25B8`. If the default app shows `oauth2: (none)` but another app has\
    \ a valid oauth2 user, tell the user to run `xurl auth default <that-app>` to\
    \ fix it. This is the most common setup mistake \u2014 the user added an app with\
    \ a custom name but never set it as default, so xurl keeps trying the empty `default`\
    \ profile.\n3. If auth is missing entirely, stop and direct the user to the \"\
    One-Time User Setup\" section \u2014 do NOT attempt to register apps or pass secrets\
    \ yourself.\n4. Start with a cheap read (`xurl whoami`, `xurl user @handle`, `xurl\
    \ search ... -n 3`) to confirm reachability.\n5. Confirm the target post/user\
    \ and the user's intent before any write action (post, reply, like, repost, DM,\
    \ follow, block, delete).\n6. Use JSON output directly \u2014 every response is\
    \ already structured.\n7. Never paste `~/.xurl` contents back into the conversation.\n\
    \n---\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n| --- | --- | --- |\n\
    | Auth errors after successful OAuth flow | Token saved to `default` app (no client-id/secret)\
    \ instead of your named app | `xurl auth oauth2 --app my-app` then `xurl auth\
    \ default my-app` |\n| `unauthorized_client` during OAuth | App type set to \"\
    Native App\" in X dashboard | Change to \"Web app, automated app or bot\" in User\
    \ Authentication Settings |\n| `UsernameNotFound` or 403 on `/2/users/me` right\
    \ after OAuth | X not returning username reliably from `/2/users/me` | Re-run\
    \ `xurl auth oauth2 --app my-app YOUR_USERNAME` (xurl v1.1.0+) to pass the handle\
    \ explicitly |\n| 401 on every request | Token expired or wrong default app |\
    \ Check `xurl auth status` \u2014 verify `\u25B8` points to an app with oauth2\
    \ tokens |\n| `client-forbidden` / `client-not-enrolled` | X platform enrollment\
    \ issue | Dashboard \u2192 Apps \u2192 Manage \u2192 Move to \"Pay-per-use\" package\
    \ \u2192 Production environment |\n| `CreditsDepleted` | $0 balance on X API |\
    \ Buy credits (min $5) in Developer Console \u2192 Billing |\n| `media processing\
    \ failed` on image upload | Default category is `amplify_video` | Add `--category\
    \ tweet_image --media-type image/png` |\n| Two \"Client Secret\" values in X dashboard\
    \ | UI bug \u2014 first is actually Client ID | Confirm on the \"Keys and tokens\"\
    \ page; ID ends in `MTpjaQ` |\n\n---\n\n## Notes\n\n- **Rate limits:** X enforces\
    \ per-endpoint rate limits. A 429 means wait and retry. Write endpoints (post,\
    \ reply, like, repost) have tighter limits than reads.\n- **Scopes:** OAuth 2.0\
    \ tokens use broad scopes. A 403 on a specific action usually means the token\
    \ is missing a scope \u2014 have the user re-run `xurl auth oauth2`.\n- **Token\
    \ refresh:** OAuth 2.0 tokens auto-refresh. Nothing to do.\n- **Multiple apps:**\
    \ Each app has isolated credentials/tokens. Switch with `xurl auth default` or\
    \ `--app`.\n- **Multiple accounts per app:** Select with `-u / --username`, or\
    \ set a default with `xurl auth default APP USER`.\n- **Token storage:** `~/.xurl`\
    \ is YAML. Never read or send this file to LLM context.\n- **Cost:** X API access\
    \ is typically paid for meaningful usage. Many failures are plan/permission problems,\
    \ not code problems.\n\n---\n\n## Attribution\n\n- Upstream CLI: https://github.com/xdevplatform/xurl\
    \ (X developer platform team, Chris Park et al.)\n- Upstream agent skill: https://github.com/openclaw/openclaw/blob/main/skills/xurl/SKILL.md\n\
    - Hermes adaptation: reformatted for Hermes skill conventions; safety guardrails\
    \ preserved verbatim.\n"
