      andon_halt: false

  - id: summarization-simple
    message: "Summarize this paragraph in two sentences."
    expected:
      intent_class: summarization
      complexity_signal_in: [simple]
      tier_in: [T1]
      tools_must_include: [clarify]
      tools_must_not_include: [browser_navigate, image_generate]
      is_correction: false
      andon_halt: false

  - id: translation-simple
    message: "Translate this to Portuguese: 'Good morning, how can I help?'"
    expected:
      intent_class: translation
      complexity_signal_in: [simple]
      tier_in: [T1]
      tools_must_include: [clarify]
      tools_must_not_include: [browser_navigate, image_generate, write_file]
      is_correction: false
      andon_halt: false

  # ── Sprint 54 v2 taxonomy — new T2-native intent ──────────────────────
  # ``research`` carves the multi-source investigation surface out of
  # the Sprint 12 ``analysis`` label so the classifier can distinguish
  # synthesis-on-what-is-in-front-of-you (analysis) from go-find-it
  # (research).

  - id: research-moderate
    message: "Compare React Server Components and Solid signals for our use case."
    expected:
      intent_class: research
      complexity_signal_in: [moderate, complex]
      tier_in: [T2, T3]
      tools_must_include: [web_search, web_extract]
      tools_must_not_include: [image_generate, video_generate]
      is_correction: false
      andon_halt: false

  - id: unknown-fallback
    message: " "
    expected:
      intent_class: unknown
      complexity_signal_in: [simple, moderate, complex, novel, unknown]
      tier_in: [T1]
      tools_must_include: []
      tools_must_not_include: []
      is_correction: false
      andon_halt: false
      tool_set_is_maximal_fallback: true
