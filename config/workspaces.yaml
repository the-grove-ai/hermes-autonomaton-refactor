# workspace-governance-unification-v1 — declarative workspace grants.
#
# The positive allowlist of directories the autonomaton may read and write as
# autonomous workspaces, consulted by ALL filesystem enforcement planes
# (write_file / read_file, the agent FS chokepoint, and the shell classifier).
#
# Operator-managed. The runtime copy lives at $GROVE_HOME/workspaces.yaml and is
# itself scope-defining — the system CANNOT modify it (the meta-wall: if the
# agent could grant itself workspaces, the allowlist would be meaningless).
#
# Semantics (fail-closed):
#   * paths are RELATIVE to $GROVE_HOME (keeps the manifest portable)
#   * a trailing slash is optional; matching is component-boundary safe
#     (`research/` grants `research/notes.md` but never `research-evil/x`)
#   * a missing or malformed manifest grants NOTHING
#   * a scope-defining surface is never grantable, even if listed here
# Reconciled (living-cellar-v1 Phase 6) UP to the canonical runtime grant set
# at $GROVE_HOME/workspaces.yaml (the VM is canonical; the repo comes up to
# match) plus the wiki cellar grant. The wiki/ grant is DEFENSIVE: K1 writes
# the cellar via a system-process (the `hermes wiki` CLI / watcher, direct
# file I/O), which does not consult this allowlist — the grant future-proofs
# any later governed-FS access to the cellar.
granted_workspaces:
  - path: "scout/"
    description: "Fleet scout skill output (digest-*.json)"
  - path: "researcher/"
    description: "Fleet researcher skill output (brief-*.json)"
  - path: "drafter/"
    description: "Fleet drafter skill output (draft-*.md)"
  - path: "cultivator/"
    description: "Fleet cultivator skill output (prospects-*.json)"
  - path: "wiki/"
    description: "Living cellar — compacted canonical knowledge pages (living-cellar-v1)"
