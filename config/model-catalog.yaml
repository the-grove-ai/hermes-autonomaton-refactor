    display_name: "Claude Haiku 4.5"
    provider: openrouter
    input_cost_per_mtok: 1     # USD/Mtok — display-only, verified anthropic/claude-haiku-4.5
    output_cost_per_mtok: 5    # USD/Mtok — display-only
    notes: "Fast, cheap. Default T1 / telemetry."
