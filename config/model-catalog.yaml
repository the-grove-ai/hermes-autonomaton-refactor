# ============================================================================
# model-catalog.yaml — the menu of models the portal can bind to a tier
# ============================================================================
#
# This is the repo-shipped SEED catalog. If ~/.grove/model-catalog.yaml exists
# on a machine, that sovereign copy is loaded INSTEAD of this one (operator
# wins). The Cognitive Router never reads this file — it is display metadata for
# the portal model-swap UI only. When the operator picks a slug, the routing
# writer validates it against routing.config.yaml, not against this catalog.
#
# COST FIELDS ARE DISPLAY-ONLY HEURISTICS (N2):
#   input_cost_per_mtok / output_cost_per_mtok are STATIC USD-per-million-token
#   figures taken from OpenRouter list prices at authoring time. They are NOT
#   live billing data, carry NO accuracy guarantee, and drift as providers
#   reprice. The router does not read them; the portal renders them as-is so the
#   operator has a rough cost sense when swapping. Update by hand when stale.
# ============================================================================
models:
  - slug: "anthropic/claude-haiku-4.5"
    display_name: "Claude Haiku 4.5"
    provider: openrouter
    input_cost_per_mtok: 1.00     # USD/Mtok — display-only heuristic, see header
    output_cost_per_mtok: 5.00    # USD/Mtok — display-only heuristic, see header
    notes: "Fast, cheap. Good for T1/telemetry."
