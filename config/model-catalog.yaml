# ============================================================================
# model-catalog.yaml — the menu of models the portal can bind to a tier
# ============================================================================
#
# Repo-shipped SEED catalog. A sovereign ~/.grove/model-catalog.yaml, if present,
# is loaded INSTEAD (operator wins). The Cognitive Router never reads this file —
# it is the model menu for the portal swap UI only.
#
# EVERY slug here was verified against the live OpenRouter model list
# (GET https://openrouter.ai/api/v1/models) at authoring time, and the costs
# were pulled from it. A swap binds the exact slug, so a fictional id 400s at
# call time — hence the verification. Provider prefixes matter: GLM is z-ai/*
# (not zhipu/*), Kimi is moonshotai/*, Gemini is google/*.
#
# Google models route via OpenRouter using the operator's Google AI Studio BYOK
# key configured in OpenRouter — the slug stays google/*; provider stays openrouter.
#
# COST FIELDS ARE DISPLAY-ONLY HEURISTICS: input_cost_per_mtok /
# output_cost_per_mtok are USD per million tokens from OpenRouter list prices at
# authoring time. NOT live billing data, no accuracy guarantee, they drift. The
# router does not read them; the portal renders them as-is. Regenerate when stale.
# ============================================================================
models:
