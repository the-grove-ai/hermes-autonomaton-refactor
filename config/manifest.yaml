# Grove Disclosure Manifest (DECLARATIVE half) — Sprint 74 Phase 3.
#
# Only the units with NO registry source live here: MCP servers, goals,
# contract sections. Tool units are DERIVED live from the registry by
# grove.manifest.build_manifest (oneline from the tool description, tiers
# from tool_groups x tier_budgets) and MERGED with these at load. ids are
# globally unique across derived + declarative (fail-loud collision).
#
# mcp units flip allow-by-default -> disclose-on-match (trigger required).
# payload is a POINTER (mcp_schema:<server>, goal_record:<id>), never inlined.
version: 1
units:
- id: notion
  kind: mcp
  oneline: 'Notion workspace: search, read, and write pages and databases.'
  payload: mcp_schema:notion
  tiers:
  - T2
  - T3
  trigger:
    intents:
    - research
    - retrieval
    keywords:
    - notion
    - page
    - database
    - workspace
    - doc
    dock_goal: null
