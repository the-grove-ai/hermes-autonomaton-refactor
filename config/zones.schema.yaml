# ============================================================================
# Grove Autonomaton — Sovereignty Guardrails Schema
# ============================================================================
#
# Location:     ~/.grove/zones.schema.yaml (operator copy)
#               config/zones.schema.yaml   (repo default template)
#
# Purpose:      Declarative zone boundaries for the Autonomaton pipeline.
#               The Sovereignty Gate reads this file to classify every
#               action as Green (autonomous), Yellow (supervised), or
#               Red (sovereign — operator holds directly).
#
#               This is how a non-technical domain expert alters the
#               system's behavior by editing a config file, without a
#               deploy. The schema shapes the butler's posture, not a
#               permission system.
#
# Canonical ref: GRV-001 §III Commitment 2, Draft 1.3 Part IV Stage 04
#
# Schema version
# --------------
# Integer. The loader rejects files with unrecognized versions.
# Bump only when the schema structure changes (new keys, removed keys,
# changed semantics). Adding entries to existing lists is NOT a version
# bump — it's normal operator configuration.
#
# Hot-reload
# ----------
# Send SIGHUP to the running Autonomaton process. The loader re-reads
# this file and rebuilds the in-memory zone map without restart.
# On Windows v0.1: restart required after edit. File-watch is v0.2.
#
# Action pattern syntax
# ---------------------
# Pure dot-notation, glob-style:
#   calendar.read       — exact match
#   calendar.read.*     — matches calendar.read and all descendants
#   calendar.*          — matches calendar.<anything> and descendants
#   command.execute.*   — matches all command executions
#
# Only trailing ``.*`` is supported. Mid-pattern wildcards raise
# ValueError at load time (fail loud). No regex.
#
# Action identifiers are opaque dot-notation strings. The tool
# dispatch layer (Sprint 06a wires this) maps filesystem paths,
# command lines, and other tool inputs into pure-dot-notation
# action identifiers before calling classify(). The classifier
# itself never inspects paths or commands — only dot-segmented
# strings. This keeps the matcher simple, the schema editable
# by non-technical operators, and the policy surface auditable.
#
# Precedence
# ----------
# 1. tool_zones exact match (highest)
# 2. Zone rules: sovereign > proposes > auto_approve
# 3. Red > Yellow > Green (most restrictive wins on conflict)
# 4. Unmatched actions default to Yellow (supervised)
#
# How the zones feel to the operator
# ----------------------------------
# Green:  invisible. The system acts. The operator asked, it happened.
#         This trust was earned — prior Andon approvals promoted these
#         categories here. The system gets faster with use.
#
# Yellow: a conversation. Jidoka detects the action; Andon surfaces it
#         as the assistant, not as a system interrupt. "I can set this
#         up. Here's what it does. Want me to save it for your review?"
#         The four-choice prompt (once / session / always / deny) IS
#         the promotion mechanism — "always" moves the category to
#         Green. Pattern-Based Approval: approve categories, not
#         instances. Kaizen watches these approvals; after repeated
#         confirmations, it proposes promoting the whole category.
#
# Red:    sovereign. Andon halts execution at the boundary; Kaizen
#         then steps in as the butler with three go-forward options:
#         Cancel, Operator handles, or Try de-scoped alternative
#         (re-classified through the normal flow — may land yellow).
#         The system never executes the red action — the code path
#         to execute it through tool dispatch does not exist by design.
#         Read access is always green; the surface fields below name
#         what to read, where to edit, and how to reload. The register
#         is: "That's in your direct control — here's how." Never
#         "access denied." Never "forbidden."
#         GROVE_ZONE_STRICT=1 and gateway sessions without an interactive
#         operator skip Kaizen's prompt and return the surface message
#         directly (hard block).
#         Per GRV-003 §4: Andon's "cannot" holds. Kaizen's "here's how"
#         carries the conversation forward.
#
# Kaizen and the zone boundaries
# ------------------------------
# Kaizen watches every boundary interaction.
# - Yellow→Green promotion: after N approvals of the same category,
#   Kaizen proposes: "You've approved every calendar write. Promote
#   to Green?" The operator confirms; the schema updates.
# - Red boundary friction: if the operator keeps asking about a
#   red-zone resource, Kaizen proposes a green-zone READ skill that
#   surfaces the information more fluently. The architecture holds;
#   the experience improves. Kaizen never proposes weakening a red
#   boundary — it proposes better information delivery around it.
#
# Backward-compatibility
# ----------------------
# Skills without a zone field in SKILL.md frontmatter default to
# Yellow. Conservative: unclassified actions require approval.
# Promote to Green via auto_approve entries or SKILL.md frontmatter.
# Schema override takes precedence over frontmatter.
#
# ============================================================================

schema_version: 1

zones:
  green:
    description: |
      Autonomous. The operator earned this — prior Pattern-Based
      Approvals promoted these categories here. The system acts
      without prompting. Approve categories, not instances.
    auto_approve:
      - calendar.read.*
      - file.read.*
      - skill.invoke.*

  yellow:
    description: |
      Supervised. Jidoka detects; Andon surfaces as a conversation,
      not an interrupt. The four-choice prompt (once / session /
      always / deny) is the promotion mechanism — "always" moves
      the category to Green. Kaizen watches approval patterns and
      proposes category-level promotions after repeated confirms.
    proposes:
      - skill.create.*
      - skill.edit.*
      - skill.promote.*
      - file.write.andon_quarantine.*
      - command.dangerous.*
    review_required: synchronous

  red:
    description: |
      Sovereign. The operator holds this directly. The system cannot
      act here — not will not, cannot. But it does not withhold: it
      surfaces full read access to the protected resource, names the
      exact file and line to edit, and confirms the change took
      effect after a manual edit + SIGHUP.
    sovereign:
      - file.write.zones_schema
      - file.write.routing_config
      - skill.self_promote.*
      - command.execute.sudo
      - command.execute.su
      - command.execute.doas
    enforcement: os_permission_level
    surface:
      - read access to the protected resource (always green)
      - exact file path and line to edit
      - SIGHUP or restart instruction after manual edit
    register: |
      That's in your direct control — here's how.

# Tool-zone mapping
# -----------------
# Maps tool identifiers to zone classifications. Tool identifiers are
# the string names tools register with in the tool registry. This map
# is the operator's primary configuration surface for zone control.
#
# A tool not listed here inherits its zone from the action pattern
# matching above, or defaults to Yellow if unmatched.
#
# Kaizen observes tool-zone friction. If a tool consistently triggers
# Andon prompts that the operator always approves, Kaizen proposes
# promoting that tool's zone from yellow to green.
#
# Two forms (Sprint 22)
# ---------------------
# Each tool's entry may be EITHER a bare zone string (the original
# Sprint 04 form) OR a mapping with `default_zone` plus an ordered list
# of argument-level rules. Both forms coexist; bare-string entries
# behave identically to pre-Sprint-22.
#
#   1. Bare string (legacy):
#        terminal: yellow
#
#      Every command flowing through this tool is classified
#      `yellow`. The classifier never inspects the command's
#      arguments.
#
#   2. Hierarchical (Sprint 22):
#        terminal:
#          default_zone: yellow
#          rules:
#            - match_pattern: "^rm\\s+(-[fir]+\\s+)?/tmp/.*"
#              zone: green
#              reason: "Temporary directory cleanup is inherently safe."
#            - match_pattern: "^rm\\s+-rf\\s+/$"
#              zone: red
#              reason: "Catastrophic system destruction."
#
#      The classifier evaluates `rules` top-to-bottom against the
#      full command string with `re.fullmatch`. First match wins.
#      A command that matches no rule falls through to
#      `default_zone`. Write your most specific patterns FIRST.
#
# Pattern syntax (hierarchical rules only)
# ----------------------------------------
# Standard Python regex via `re.fullmatch`. Anchored implicitly —
# you do NOT need `^` and `$`. Examples:
#
#   ^sudo\s+.*                       # any sudo invocation
#   ^rm\s+(-[fir]+\s+)?/tmp/.*       # rm of anything under /tmp
#   ^chmod\s+\d+\s+/home/user/.*     # chmod within /home/user
#   ^pip\s+install\s+requests$       # exact: only this command
#
# Safety guardrails (Sprint 22)
# -----------------------------
# The loader rejects per-rule, with a loud log, if a pattern:
#   - exceeds 200 characters
#   - matches everything (`.*`, `^.*`, `.*/.*`, `.+`)
#   - contains nested quantifiers (`(a+)+`, `(.*)*`) — classic
#     ReDoS shape
#   - has more than 10 alternation branches in a single group
#   - is not a syntactically valid Python regex
#
# The rest of the schema continues to load with the bad rule dropped.
# Synthesised patterns (from "Approve Always" in any of the 13 paths)
# are produced conservatively — directory-scoped, anchored, no
# nested quantifiers — and pass the same check.

tool_zones:
  terminal:
    default_zone: yellow
    rules:
      # ── Privilege escalation: explicit RED ─────────────────────────
      # Hierarchical entries do NOT inherit sovereign patterns from the
      # zones.red.sovereign list — encode them here explicitly.
      - match_pattern: '^sudo\s+.*'
        zone: red
        reason: "Privilege escalation requires sovereign approval."
      - match_pattern: '^su\s+.*|^su$'
        zone: red
        reason: "User-switch requires sovereign approval."
      - match_pattern: '^doas\s+.*'
        zone: red
        reason: "doas privilege escalation requires sovereign approval."
      # ── Google Workspace skill wrappers: precise GREEN ─────────────
      # Known-safe script paths under ~/.grove/skills/productivity/google-workspace/.
      # Daily-driver UX: asking the autonomaton "what's on my calendar"
      # routes through these wrappers and should not halt for every
      # invocation.
      #
      # Sprint 53 — pattern widened. The original `^GAPI=.*python3.*` prefix
      # only matched commands of the form `GAPI=<token> python3 .../gws.py
      # <subcommand>`; bare `gws calendar list` invocations (and any other
      # entrypoint that doesn't carry the env-var prefix on the command
      # line) fell through to the terminal default_zone: yellow and halted
      # every session. The path-prefix match below is sufficient: the
      # operator's grant of the skill via Andon promotion IS the trust act.
      - match_pattern: '.*\.grove/skills/productivity/google-workspace/.*'
        zone: green
        reason: "Google Workspace skill wrapper — known-safe script path."
      # ── Promoted skills: path-prefix GREEN ─────────────────────────
      # Any terminal command whose argument references a path under
      # ~/.grove/skills/ executes a skill the operator already approved
      # via the Andon quarantine pipeline. Re-halting on every invocation
      # is governance theater — the promotion act IS the trust grant.
      # First-match-wins keeps the specific GAPI rule above in place so
      # google-workspace invocations still surface their precise reason.
      - match_pattern: '.*\.grove/skills/.*'
        zone: green
        reason: "Promoted skills have passed Andon quarantine. Execution of operator-approved skills does not require re-disposition."
  skill_manage.create:       yellow
  skill_manage.promote:      red
  file_operations.write:     yellow
  calendar.read:             green
  honcho.dialectic.read:     green
  cron.create:               yellow
  cron.delete:               yellow

