  # ── Native tools: SECURITY / SYSTEM → RED ──
  # OS-level UI automation; keystroke-injection territory.
  computer_use:                              red
  # Role/permission management on a shared service.
  discord_admin:                             red

  # ── Notion MCP bridge: READ → GREEN ──
  # Names follow `mcp_<server>_<operation>` per tools/mcp_tool.py.
  # Notion is the only MCP server on the grove-autonomaton CLI;
