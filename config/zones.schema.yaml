# ============================================================================
# Grove Autonomaton — Sovereignty Guardrails Schema
# ============================================================================
#
# Location:     ~/.grove/zones.schema.yaml (operator copy)
#               config/zones.schema.yaml   (repo default template)
#
# Purpose:      Declarative zone boundaries for the Autonomaton pipeline.
#               The Sovereignty Gate reads this file to classify every
#               action as Green (autonomous), Yellow (supervised), or
#               Red (sovereign — operator holds directly).
#
#               This is how a non-technical domain expert alters the
#               system's behavior by editing a config file, without a
#               deploy. The schema shapes the butler's posture, not a
#               permission system.
#
# Canonical ref: GRV-001 §III Commitment 2, Draft 1.3 Part IV Stage 04
#
# Schema version
# --------------
# Integer. The loader rejects files with unrecognized versions.
# Bump only when the schema structure changes (new keys, removed keys,
# changed semantics). Adding entries to existing lists is NOT a version
# bump — it's normal operator configuration.
#
# Hot-reload
# ----------
# Send SIGHUP to the running Autonomaton process. The loader re-reads
# this file and rebuilds the in-memory zone map without restart.
# On Windows v0.1: restart required after edit. File-watch is v0.2.
#
# Action pattern syntax
# ---------------------
# Pure dot-notation, glob-style:
#   calendar.read       — exact match
#   calendar.read.*     — matches calendar.read and all descendants
#   calendar.*          — matches calendar.<anything> and descendants
#   command.execute.*   — matches all command executions
#
# Only trailing ``.*`` is supported. Mid-pattern wildcards raise
# ValueError at load time (fail loud). No regex.
#
# Action identifiers are opaque dot-notation strings. The tool
# dispatch layer (Sprint 06a wires this) maps filesystem paths,
# command lines, and other tool inputs into pure-dot-notation
# action identifiers before calling classify(). The classifier
# itself never inspects paths or commands — only dot-segmented
# strings. This keeps the matcher simple, the schema editable
# by non-technical operators, and the policy surface auditable.
#
# Precedence
# ----------
# 1. tool_zones exact match (highest)
# 2. Zone rules: sovereign > proposes > auto_approve
# 3. Red > Yellow > Green (most restrictive wins on conflict)
# 4. Unmatched actions default to Yellow (supervised)
#
# How the zones feel to the operator
# ----------------------------------
# Green:  invisible. The system acts. The operator asked, it happened.
#         This trust was earned — prior Andon approvals promoted these
#         categories here. The system gets faster with use.
#
# Yellow: a conversation. Jidoka detects the action; Andon surfaces it
#         as the assistant, not as a system interrupt. "I can set this
#         up. Here's what it does. Want me to save it for your review?"
#         The four-choice prompt (once / session / always / deny) IS
#         the promotion mechanism — "always" moves the category to
#         Green. Pattern-Based Approval: approve categories, not
#         instances. Kaizen watches these approvals; after repeated
#         confirmations, it proposes promoting the whole category.
#
# Red:    sovereign. Andon halts execution at the boundary; Kaizen
#         then steps in as the butler with three go-forward options:
#         Cancel, Operator handles, or Try de-scoped alternative
#         (re-classified through the normal flow — may land yellow).
#         The system never executes the red action — the code path
#         to execute it through tool dispatch does not exist by design.
#         Read access is always green; the surface fields below name
#         what to read, where to edit, and how to reload. The register
#         is: "That's in your direct control — here's how." Never
#         "access denied." Never "forbidden."
#         GROVE_ZONE_STRICT=1 and gateway sessions without an interactive
#         operator skip Kaizen's prompt and return the surface message
#         directly (hard block).
#         Per GRV-003 §4: Andon's "cannot" holds. Kaizen's "here's how"
#         carries the conversation forward.
#
# Kaizen and the zone boundaries
# ------------------------------
# Kaizen watches every boundary interaction.
# - Yellow→Green promotion: after N approvals of the same category,
#   Kaizen proposes: "You've approved every calendar write. Promote
#   to Green?" The operator confirms; the schema updates.
# - Red boundary friction: if the operator keeps asking about a
#   red-zone resource, Kaizen proposes a green-zone READ skill that
#   surfaces the information more fluently. The architecture holds;
#   the experience improves. Kaizen never proposes weakening a red
#   boundary — it proposes better information delivery around it.
#
# Backward-compatibility
# ----------------------
# Skills without a zone field in SKILL.md frontmatter default to
# Yellow. Conservative: unclassified actions require approval.
# Promote to Green via auto_approve entries or SKILL.md frontmatter.
# Schema override takes precedence over frontmatter.
#
# ============================================================================

schema_version: 1

zones:
  green:
    description: |
      Autonomous. The operator earned this — prior Pattern-Based
      Approvals promoted these categories here. The system acts
      without prompting. Approve categories, not instances.
    auto_approve:
      - calendar.read.*
      - file.read.*
      - skill.invoke.*

  yellow:
    description: |
      Supervised. Jidoka detects; Andon surfaces as a conversation,
      not an interrupt. The four-choice prompt (once / session /
      always / deny) is the promotion mechanism — "always" moves
      the category to Green. Kaizen watches approval patterns and
      proposes category-level promotions after repeated confirms.
    proposes:
      - skill.create.*
      - skill.edit.*
      - skill.promote.*
      - file.write.andon_quarantine.*
      - command.dangerous.*
    review_required: synchronous

  red:
    description: |
      Sovereign. The operator holds this directly. The system cannot
      act here — not will not, cannot. But it does not withhold: it
      surfaces full read access to the protected resource, names the
      exact file and line to edit, and confirms the change took
      effect after a manual edit + SIGHUP.
    sovereign:
      - file.write.zones_schema
      - file.write.routing_config
      - skill.self_promote.*
      - command.execute.sudo
      - command.execute.su
      - command.execute.doas
    enforcement: os_permission_level
    surface:
      - read access to the protected resource (always green)
      - exact file path and line to edit
      - SIGHUP or restart instruction after manual edit
    register: |
      That's in your direct control — here's how.

# Tool-zone mapping
# -----------------
# Maps tool identifiers to zone classifications. Tool identifiers are
# the string names tools register with in the tool registry. This map
# is the operator's primary configuration surface for zone control.
#
# A tool not listed here inherits its zone from the action pattern
# matching above, or defaults to Yellow if unmatched.
#
# Kaizen observes tool-zone friction. If a tool consistently triggers
# Andon prompts that the operator always approves, Kaizen proposes
# promoting that tool's zone from yellow to green.
#
# Two forms (Sprint 22)
# ---------------------
# Each tool's entry may be EITHER a bare zone string (the original
# Sprint 04 form) OR a mapping with `default_zone` plus an ordered list
# of argument-level rules. Both forms coexist; bare-string entries
# behave identically to pre-Sprint-22.
#
#   1. Bare string (legacy):
#        terminal: yellow
#
#      Every command flowing through this tool is classified
#      `yellow`. The classifier never inspects the command's
#      arguments.
#
#   2. Hierarchical (Sprint 22):
#        terminal:
#          default_zone: yellow
#          rules:
#            - match_pattern: "^rm\\s+(-[fir]+\\s+)?/tmp/.*"
#              zone: green
#              reason: "Temporary directory cleanup is inherently safe."
#            - match_pattern: "^rm\\s+-rf\\s+/$"
#              zone: red
#              reason: "Catastrophic system destruction."
#
#      The classifier evaluates `rules` top-to-bottom against the
#      full command string with `re.fullmatch`. First match wins.
#      A command that matches no rule falls through to
#      `default_zone`. Write your most specific patterns FIRST.
#
# Pattern syntax (hierarchical rules only)
# ----------------------------------------
# Standard Python regex via `re.fullmatch`. Anchored implicitly —
# you do NOT need `^` and `$`. Examples:
#
#   ^sudo\s+.*                       # any sudo invocation
#   ^rm\s+(-[fir]+\s+)?/tmp/.*       # rm of anything under /tmp
#   ^chmod\s+\d+\s+/home/user/.*     # chmod within /home/user
#   ^pip\s+install\s+requests$       # exact: only this command
#
# Safety guardrails (Sprint 22)
# -----------------------------
# The loader rejects per-rule, with a loud log, if a pattern:
#   - exceeds 200 characters
#   - matches everything (`.*`, `^.*`, `.*/.*`, `.+`)
#   - contains nested quantifiers (`(a+)+`, `(.*)*`) — classic
#     ReDoS shape
#   - has more than 10 alternation branches in a single group
#   - is not a syntactically valid Python regex
#
# The rest of the schema continues to load with the bad rule dropped.
# Synthesised patterns (from "Approve Always" in any of the 13 paths)
# are produced conservatively — directory-scoped, anchored, no
# nested quantifiers — and pass the same check.

tool_zones:
  # Notion MCP read / write / delete zones are defined in the
  # consolidated "Notion MCP bridge" section further below. (A second,
  # duplicate copy of the read entries that lived here triggered a
  # ruamel DuplicateKeyError on reload — removed; the section below is
  # the single source of truth.)
  # GRV-010 C1a (conformance-shell-containment-v1) — terminal / execute_code
  # commands are classified by the bashlex-AST EFFECT classifier
  # (grove/shell_effects.py), invoked via grove.dispatch.classify_command at
  # the Dispatcher admission site. The former regex rule list was REMOVED:
  # substring matching over a shell string is unsound — a comment suffix (B1)
  # or a leading .* (B2) smuggled arbitrary commands to GREEN, and command
  # chaining slipped past. The AST sees real command nodes; opacity
  # (sh -c / eval / $(...) / pipe-into-shell), privilege, catastrophic rm,
  # writes into ~/.grove (is_governed_path), and external-agent spawn all
  # classify RED; promoted-skill execution stays GREEN by effect. The bare
  # entry below is only the fallback for a bare classify("terminal") action.
  # Phase 1.5 inline correction (runtime-config-sync): Sprint 53/53.2/69/BLOCKER
  # policy rules were written directly to the runtime file during their sprints.
  # Restored here as repo policy. Cohort 1 RED rules dropped — AST classifier
  # (grove/shell_effects.py) owns privilege escalation per GRV-010.
  terminal:
    default_zone: yellow
    rules:
      # ── Governance-mutation CLI verbs (GRV-001 Stage 04) ──────────────────
      # These verbs mutate sovereignty state (skill promotion/rejection,
      # flywheel approval, pattern demotion). They are Yellow (operator
      # decides per invocation). Disposition is governed by the Grant Token
      # model — operator-initiated turns carry an implicit grant; agent-
      # synthesized turns trigger the sovereignty prompt with all four choices.
      # Rules placed first so they fire before any broader pattern below.
      - match_pattern: hermes\s+andon\s+promote\b.*
        zone: yellow
        reason: "Skill promotion mutates live sovereignty state — per-instance operator approval required (GRV-001 Stage 04)."
      - match_pattern: hermes\s+andon\s+reject\b.*
        zone: yellow
        reason: "Skill rejection permanently deletes from .andon/ — per-instance operator approval required (GRV-001 Stage 04)."
      - match_pattern: hermes\s+andon\s+revoke\b.*
        zone: yellow
        reason: "Skill revocation returns an active skill to quarantine — per-instance operator approval required (GRV-001 Stage 04)."
      - match_pattern: hermes\s+flywheel\s+approve\b.*
        zone: yellow
        reason: "Flywheel approval writes a zone rule to the overlay — per-instance operator approval required (GRV-001 Stage 04)."
      - match_pattern: hermes\s+flywheel\s+reject\b.*
        zone: yellow
        reason: "Flywheel rejection drops a pending proposal — per-instance operator approval required (GRV-001 Stage 04)."
      - match_pattern: hermes\s+flywheel\s+patterns\s+demote\b.*
        zone: yellow
        reason: "Pattern demotion degrades a compiled T0 pattern — per-instance operator approval required (GRV-001 Stage 04)."
      # ── Google Workspace: governed by SUBCOMMAND ──
      - match_pattern: '.*\bgoogle_api\.py\s+(gmail\s+(search|get|labels)|calendar\s+list|drive\s+(search|get|download)|contacts\s+list|sheets\s+get|docs\s+get)\b.*'
        zone: green
        reason: "Google Workspace read operations."
      - match_pattern: '.*\b(google_api\.py|gws)\b.*'
        zone: yellow
        reason: "Google Workspace mutations require approval."
      # ── Quarantined skills: halt BEFORE promoted-skills green rule ──
      - match_pattern: '.*\.grove/skills/\.andon/.*'
        zone: yellow
        reason: "Quarantine gate: .andon skills require approval."
      # ── Notion fallback skill ──
      - match_pattern: '.*\bnotion\.py\s+(create-page|update-page)\b.*'
        zone: yellow
        reason: "Notion CLI fallback writes require approval."
      - match_pattern: '.*\bnotion\.py\s+(search|get|query)\b.*'
        zone: green
        reason: "Notion CLI fallback reads."
      # ── Promoted skills: operator-approved quarantine graduates ──
      - match_pattern: '.*\.grove/skills/.*'
        zone: green
        reason: "Promoted skills execute without approval."
  skill_manage.create:       yellow
  skill_manage.promote:      red
  file_operations.write:     yellow
  honcho.dialectic.read:     green
  cron.create:               yellow
  cron.delete:               yellow

  # ── Daily-driver tool surface (hotfix: read-green, write-yellow) ──
  # Operator trust model: GREEN = reads/context-gathering execute
  # silently; YELLOW = external writes go through Sovereign Prompt;
  # RED = destructive or security-sensitive actions cannot execute.
  # Tool-name lookups are exact-match against the bare name yielded
  # in ToolIntent.tool_name (see grove/dispatcher._classify_one_intent).
  #
  # ── Native tools: READ / context-gathering → GREEN ──
  browser_back:                              green
  browser_console:                           green
  browser_get_images:                        green
  browser_navigate:                          green
  browser_scroll:                            green
  browser_snapshot:                          green
  browser_vision:                            green
  clarify:                                   green
  feishu_doc_read:                           green
  feishu_drive_list_comment_replies:         green
  feishu_drive_list_comments:                green
  ha_get_state:                              green
  ha_list_entities:                          green
  ha_list_services:                          green
  kanban_list:                               green
  kanban_show:                               green
  memory:                                    green
  read_file:                                 green
  search_files:                              green
  session_search:                            green
  skill_view:                                green
  skills_list:                               green
  todo:                                      green
  video_analyze:                             green
  vision_analyze:                            green
  web_extract:                               green
  web_search:                                green
  x_search:                                  green
  yb_query_group_info:                       green
  yb_query_group_members:                    green
  yb_search_sticker:                         green

  # ── Native tools: WRITE / external modification → YELLOW ──
  browser_cdp:                               yellow
  browser_click:                             yellow
  browser_dialog:                            yellow
  browser_press:                             yellow
  browser_type:                              yellow
  cronjob:                                   yellow
  delegate_task:                             yellow
  discord:                                   yellow
  execute_code:                              yellow
  feishu_drive_add_comment:                  yellow
  feishu_drive_reply_comment:                yellow
  ha_call_service:                           yellow
  image_generate:                            yellow
  kanban_block:                              yellow
  kanban_comment:                            yellow
  kanban_complete:                           yellow
  kanban_create:                             yellow
  kanban_heartbeat:                          yellow
  kanban_link:                               yellow
  kanban_unblock:                            yellow
  mixture_of_agents:                         yellow
  patch:                                     yellow
  process:                                   yellow
  send_message:                              yellow
  skill_manage:                              yellow
  text_to_speech:                            yellow
  video_generate:                            yellow
  write_file:                                yellow
  yb_send_dm:                                yellow
  yb_send_sticker:                           yellow

  # ── GRV-009 E5 C-VERBS — make the default-source tools EXPLICIT ──
  # These 8 tools previously resolved to yellow only via the classifier's
  # default (no tool_zones entry). Their governing verb records (skills/spotify)
  # carry zone: yellow; declarative-over-implicit, parity-preserving. Their
  # current effective zone is yellow — any rezoning is a later deliberate act.
  invoke_skill:                              yellow
  spotify_albums:                            yellow
  spotify_devices:                           yellow
  spotify_library:                           yellow
  spotify_playback:                          yellow
  spotify_playlists:                         yellow
  spotify_queue:                             yellow
  spotify_search:                            yellow

  # ── GRV-009 B3 — Flywheel review/approve loop (flywheel_review_tool) ──
  # The surface-agnostic operator review/approve tools. review_proposals is
  # read-only → green. approve_proposal / reject_proposal apply (or dismiss)
  # operator-approved self-modification → yellow, so the Sovereign Prompt
  # governs the act: the agent cannot self-approve a proposal without the
  # operator's mechanical tap (declarative-over-implicit; yellow is also the
  # classifier default, but stated explicitly here per the E5 convention).
  review_proposals:                          green
  approve_proposal:                          yellow
  reject_proposal:                           yellow

  # ── Native tools: SECURITY / SYSTEM → RED ──
  # OS-level UI automation; keystroke-injection territory.
  computer_use:                              red
  # Role/permission management on a shared service.
  discord_admin:                             red

  # ── Hosted Notion MCP: READ → GREEN (Sprint 69) ──
  # Names follow `mcp_<server>_<operation>` per tools/mcp_tool.py. The
  # server key is `notion` and the hosted tools are named `notion-*`, so
  # the registered names carry a (cosmetic) doubled `notion`. These are
  # the hosted surface at mcp.notion.com; verify exact registered names
  # against the live registry after the OAuth bootstrap and adjust if the
  # sanitizer differs. The retired local @notionhq server used different
  # (`mcp_notion_API_*`) names — removed in Sprint 69.
  mcp_notion_notion_search:              green
  mcp_notion_notion_fetch:               green
  mcp_notion_notion_get_comments:        green
  mcp_notion_notion_get_users:           green
  mcp_notion_notion_get_teams:           green
  mcp_notion_notion_query_database_view: green
  mcp_notion_notion_query_meeting_notes: green

  # ── Hosted Notion MCP: WRITE → YELLOW (Sprint 69) ──
  mcp_notion_notion_create_pages:        yellow
  mcp_notion_notion_create_database:     yellow
  mcp_notion_notion_update_page:         yellow
  mcp_notion_notion_move_pages:          yellow
  mcp_notion_notion_duplicate_page:      yellow
  mcp_notion_notion_create_comment:      yellow
  mcp_notion_notion_update_data_source:  yellow
  mcp_notion_notion_create_view:         yellow
  mcp_notion_notion_update_view:         yellow

  # ── Google Workspace native verbs: READ → GREEN (workspace-first-class-capability-v1) ──
  # First-class native tools wrapping google_api.py. Classified by the bare
  # tool_name at the Dispatcher intent gate — the in-process call bypasses the
  # terminal-command classifier, so THESE entries are the enforcement. An
  # omitted verb defaults to Yellow in the classifier (fail-safe).
  gmail_search:        green
  gmail_get:           green
  gmail_labels:        green
  calendar_list:       green
  drive_search:        green
  drive_get:           green
  drive_download:      green
  contacts_list:       green
  sheets_get:          green
  docs_get:            green

  # ── Google Workspace native verbs: MUTATION → YELLOW ──
  gmail_send:          yellow
  gmail_reply:         yellow
  gmail_modify:        yellow
  calendar_create:     yellow
  calendar_delete:     yellow
  drive_upload:        yellow
  drive_create_folder: yellow
  drive_share:         yellow
  drive_delete:        yellow
  sheets_update:       yellow
  sheets_append:       yellow
  sheets_create:       yellow
  docs_create:         yellow
  docs_append:         yellow

  # ── Hierarchical example (commented out — zero behavior change) ──
  # Uncomment + edit to opt your terminal tool into argument-level
  # rules. The example below replaces the bare `terminal: yellow`
  # above (delete the bare line if you uncomment this block).
  #
  # terminal:
  #   default_zone: yellow
  #   rules:
  #     # Sovereign: privilege escalation always goes through Kaizen.
  #     - match_pattern: '^sudo\s+.*'
  #       zone: red
  #       reason: "Privilege escalation requires sovereign approval."
  #
  #     # Catastrophic: hard-no, no operator dialog.
  #     - match_pattern: '^rm\s+-rf\s+/$'
  #       zone: red
  #       reason: "Catastrophic root-filesystem deletion."
  #
  #     # Green: cleanup within /tmp is safe.
  #     - match_pattern: '^rm\s+(-[fir]+\s+)?/tmp/.*'
  #       zone: green
  #       reason: "Temporary directory cleanup is inherently safe."
  #
  #     # Anything else flowing through terminal → yellow (default_zone).

# ============================================================================
# GRV-001 v2.0 — scope-keyed zone model (shell governance path)
# ============================================================================
#
# Declarative record of the scope-keyed model the shell-effect classifier
# (grove/shell_effects.py via grove/utils/fs_utils.is_scope_defining) enforces.
# Category keying ("a filesystem write is RED because it is a write") is
# FORBIDDEN under v2.0 — a write's zone is computed from WHAT it changes:
#   * a SCOPE-DEFINING surface (would expand the agent's own authority) -> RED
#   * a GRANTED workspace under ~/.grove (everything else) -> GREEN (autonomous)
#   * a path OUTSIDE ~/.grove -> YELLOW (four-choice operator grant)
#
# NOTE on schema_version: this block is DECLARATIVE. The loader
# (grove/zones.py) hard-requires `schema_version: 1` and rejects any other
# value, so the integer above is intentionally left at 1; the scope-keyed
# model carries its own version marker below. The loader reads only
# `schema_version`, `zones`, and `tool_zones` — it ignores the keys here.
zone_model:
  version: "2.0"
  keying: operator-scope
  category_keying: forbidden
  enforcement: application_layer   # in-process classification; not os permissions

  scope_defining_surfaces:
    # Mutating any of these via the shell is RED (non-grantable,
    # TerminalGovernanceHalt). Paths are relative to ~/.grove (GROVE_HOME).
    files:
      - zones.schema.yaml
      - routing.config.yaml
      - prompt.config.yaml
      - .env                # operator secrets — never an autonomous write
      - dock/dock.yaml
      - grants.yaml         # GRV-001 Grant Token model — standing grant manifest
    directories:
      - skills              # whole live skill tree (authoring goes via .andon)
      - capabilities        # capability registry (executable-surface authority)
    enforcement: non_grantable

  granted_workspaces:
    rule: complement        # everything under ~/.grove NOT scope-defining
    default_zone: green     # autonomous; write targets only (reads stay yellow)

  unknown_paths:
    default_zone: yellow    # outside ~/.grove — four-choice operator grant
